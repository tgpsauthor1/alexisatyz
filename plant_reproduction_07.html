
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>plant_reproduction_07</title>
<style>
  :root {
    --bg: #f6f8f2;
    --card: #ffffff;
    --ink: #183025;
    --muted: #5a6b60;
    --line: #d8e1d4;
    --green: #2f7a47;
    --green-dark: #1f5b33;
    --danger: #a63a33;
    --ok: #216c42;
    --wrong-bg: #fff1ef;
    --right-bg: #edf9f0;
    --shadow: 0 10px 28px rgba(18, 48, 37, 0.09);
    --radius: 22px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at top, #fcfff8 0%, var(--bg) 50%, #edf3ea 100%);
    color: var(--ink);
    line-height: 1.4;
  }
  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 18px 14px 28px;
  }
  .topbar {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    justify-content: space-between;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(6px);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    border-radius: 20px;
    padding: 14px 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .topbar-left h1 {
    font-size: 1.18rem;
    margin: 0 0 4px;
  }
  .topbar-left .sub {
    color: var(--muted);
    font-size: 0.95rem;
  }
  .topbar-right {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .control-btn {
    border: 2px solid #cfe0d0;
    background: #f7fbf5;
    color: var(--ink);
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    min-height: 48px;
  }
  .control-btn:focus-visible, .choice-btn:focus-visible, .nav-btn:focus-visible, .tiny-btn:focus-visible {
    outline: 3px solid #1933cc33;
    outline-offset: 2px;
  }
  .demerit-bar {
    width: 100%;
    background: #f9fbf8;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 10px 12px;
  }
  .demerit-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    font-size: 0.92rem;
    color: var(--muted);
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .plant-track {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    align-items: center;
  }
  .plant-stage {
    padding: 6px 4px;
    border-radius: 16px;
    border: 1px solid #dce7d8;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    min-height: 88px;
    transition: transform 0.25s ease, opacity 0.25s ease, background 0.25s ease;
  }
  .plant-stage svg {
    width: 54px;
    height: 54px;
    display: block;
  }
  .plant-stage .label {
    font-size: 0.72rem;
    text-align: center;
    color: var(--muted);
    font-weight: 700;
  }
  .plant-stage.current {
    border-color: #8fbb98;
    background: #f3fbef;
    transform: translateY(-2px);
  }
  .plant-stage.past {
    opacity: 0.42;
    filter: grayscale(0.16);
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    padding: 18px;
    overflow: hidden;
  }
  .screen-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .screen-tag {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 700;
  }
  .instruction {
    font-size: clamp(1.2rem, 1rem + 1vw, 1.7rem);
    font-weight: 800;
    margin: 8px 0 14px;
    color: var(--green-dark);
  }
  .body-copy {
    font-size: 1rem;
    color: var(--ink);
    margin: 0 0 12px;
  }
  .soft-note {
    color: var(--muted);
    font-size: 0.95rem;
    margin: 8px 0 0;
  }
  .panel {
    background: #fbfdf9;
    border: 1px solid #d8e6d6;
    border-radius: 18px;
    padding: 12px;
  }
  .image-frame {
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid #d9e2d5;
    background: #fff;
  }
  .image-frame img {
    display: block;
    width: 100%;
    height: auto;
  }
  .question-text {
    margin-top: 12px;
    background: #f8fbf6;
    border: 1px solid #dbe7d7;
    border-radius: 18px;
    padding: 14px;
  }
  .question-text ol {
    margin: 8px 0 0 24px;
    padding: 0;
  }
  .hl {
    background: #fff3a1;
    padding: 0 3px;
    border-radius: 6px;
  }
  .choice-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .choice-grid.one-col {
    grid-template-columns: 1fr;
  }
  .choice-btn {
    width: 100%;
    text-align: left;
    padding: 14px 16px;
    border-radius: 18px;
    min-height: 74px;
    border: 2px solid #d4e2d4;
    background: #fff;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  }
  .choice-btn:hover {
    transform: translateY(-1px);
  }
  .choice-btn.selected {
    border-color: var(--green);
    background: #eff9f0;
  }
  .choice-btn.correct {
    border-color: var(--ok);
    background: var(--right-bg);
  }
  .choice-btn.incorrect {
    border-color: var(--danger);
    background: var(--wrong-bg);
  }
  .two-col {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  .center {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .feedback {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 16px;
    border: 1px solid #d9e3d4;
    display: none;
    font-weight: 700;
  }
  .feedback.show {
    display: block;
  }
  .feedback.correct {
    background: var(--right-bg);
    color: var(--ok);
    border-color: #bee5c9;
  }
  .feedback.incorrect {
    background: var(--wrong-bg);
    color: var(--danger);
    border-color: #e7c2bc;
  }
  .nav-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .nav-btn {
    border: none;
    border-radius: 18px;
    min-height: 52px;
    min-width: 120px;
    padding: 12px 18px;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
  }
  .nav-btn.primary {
    background: linear-gradient(180deg, #3d9154, #2d7442);
    color: white;
  }
  .nav-btn.secondary {
    background: #eef5eb;
    color: var(--ink);
    border: 2px solid #d7e4d4;
  }
  .nav-btn[disabled] {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .tiny-btn {
    border: 2px solid #cfe0d0;
    background: #fff;
    color: var(--ink);
    padding: 8px 12px;
    border-radius: 14px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    min-height: 42px;
  }
  .question-toggle-wrap {
    margin-top: 14px;
  }
  .question-panel {
    margin-top: 10px;
    display: none;
  }
  .question-panel.open {
    display: block;
  }
  .status-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .chip {
    background: #edf6eb;
    border: 1px solid #d4e7d1;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--green-dark);
  }
  .diagram-legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .legend-pill {
    background: #f7fbf4;
    border: 1px solid #dbe7d9;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 0.86rem;
    color: var(--muted);
    font-weight: 700;
  }
  .prompt-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .statement-box {
    background: #f8fbf6;
    border: 1px solid #dbe7d8;
    border-radius: 18px;
    padding: 14px;
    font-size: 1.02rem;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .statement-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .statement-card {
    background: #fff;
    border: 1px solid #d8e5d5;
    border-radius: 18px;
    padding: 12px;
  }
  .statement-card h4 {
    margin: 0 0 8px;
    font-size: 1rem;
  }
  .toggle-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .toggle-btn {
    flex: 1 1 120px;
  }
  .result-line {
    font-weight: 800;
    color: var(--green-dark);
  }
  .split-anim {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .anim-card {
    background: #fcfdfb;
    border: 1px solid #dbe6d8;
    border-radius: 18px;
    padding: 12px;
  }
  .anim-title {
    font-size: 1rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .popup {
    margin-top: 10px;
    border: 1px solid #dbe6d8;
    border-radius: 16px;
    background: #fbfdf9;
    overflow: hidden;
  }
  .popup summary {
    cursor: pointer;
    padding: 12px 14px;
    font-weight: 800;
  }
  .popup .popup-body {
    padding: 0 14px 14px;
    color: var(--muted);
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(18, 38, 28, 0.58);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 20;
  }
  .overlay.show {
    display: flex;
  }
  .overlay-card {
    max-width: 560px;
    width: 100%;
    background: #fff;
    border-radius: 24px;
    padding: 22px;
    border: 1px solid #d9e4d7;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  }
  .overlay-card h2 {
    margin-top: 0;
    font-size: 1.5rem;
    color: var(--danger);
  }
  .summary-list {
    margin: 10px 0 0 20px;
  }
  .footer-note {
    margin-top: 14px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .diagram-svg {
    width: 100%;
    max-width: 720px;
    height: auto;
    display: block;
    margin: 0 auto;
  }
  .loop-root .root-line {
    stroke-dasharray: 120;
    stroke-dashoffset: 120;
    animation: growRoot 3s infinite ease-in-out;
  }
  .loop-root .shoot-line {
    stroke-dasharray: 90;
    stroke-dashoffset: 90;
    animation: growShoot 3s infinite ease-in-out;
  }
  .loop-food .food-dot {
    animation: moveFoodToRoot 2.4s infinite linear;
  }
  .loop-food .dot-shoot {
    animation-name: moveFoodToShoot;
  }
  .loop-food .food-dot.d2 { animation-delay: .6s; }
  .loop-food .food-dot.d3 { animation-delay: 1.2s; }
  .loop-food .food-dot.d4 { animation-delay: 1.8s; }
  .loop-food .growth-tip {
    animation: pulseGrowth 1.5s infinite ease-in-out;
  }
  .loop-food .shoot-tip { animation-delay: .55s; }
  .live-side .oxy {
    animation: bubbleUp 2.2s infinite ease-in;
  }
  .live-side .oxy.o2 { animation-delay: .6s; }
  .live-side .oxy.o3 { animation-delay: 1.1s; }
  .rot-side .seed-shell {
    animation: rotSeed 3s infinite ease-in-out;
    transform-origin: center;
  }
  .rot-side .rot-spot {
    animation: pulseSpot 3s infinite ease-in-out;
  }
  .rot-side .cross-line {
    animation: pulseCross 1.6s infinite ease-in-out;
  }

  @keyframes growRoot {
    0% { stroke-dashoffset: 120; }
    35% { stroke-dashoffset: 10; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes growShoot {
    0%, 30% { stroke-dashoffset: 90; }
    65% { stroke-dashoffset: 24; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes moveFoodToRoot {
    0% { opacity: 0; transform: translate(0px, 0px); }
    15% { opacity: 1; }
    100% { opacity: 0; transform: translate(-30px, 54px); }
  }
  @keyframes moveFoodToShoot {
    0% { opacity: 0; transform: translate(0px, 0px); }
    15% { opacity: 1; }
    100% { opacity: 0; transform: translate(18px, -40px); }
  }
  @keyframes pulseGrowth {
    0%, 100% { opacity: .55; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.18); }
  }
  @keyframes bubbleUp {
    0% { opacity: 0; transform: translateY(16px); }
    25% { opacity: 0.95; }
    100% { opacity: 0; transform: translateY(-18px); }
  }
  @keyframes rotSeed {
    0%, 100% { fill: #b88e62; transform: scale(1); }
    50% { fill: #7b5942; transform: scale(0.96); }
  }
  @keyframes pulseSpot {
    0%, 100% { opacity: .15; r: 3; }
    50% { opacity: .6; r: 5; }
  }
  @keyframes pulseCross {
    0%,100% { opacity: .4; }
    50% { opacity: .95; }
  }

  @media (max-width: 760px) {
    .choice-grid, .two-col, .split-anim, .statement-grid {
      grid-template-columns: 1fr;
    }
    .topbar {
      padding: 12px;
    }
    .plant-track {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px;
    }
    .plant-stage {
      min-height: 78px;
      padding: 6px 2px;
    }
    .plant-stage svg {
      width: 42px;
      height: 42px;
    }
    .plant-stage .label {
      font-size: 0.62rem;
    }
  }
</style>
</head>
<body>
<div class="page">
  <div id="app"></div>
</div>

<div id="gameOver" class="overlay" aria-hidden="true">
  <div class="overlay-card">
    <h2>The plant has withered.</h2>
    <p class="body-copy">Too many rushed taps made the plant slowly languish until it died. Let us restart and read each clue carefully.</p>
    <div class="center" style="margin:16px 0;">
      <div id="deadPlantLarge"></div>
    </div>
    <button id="restartAllBtn" class="nav-btn primary">Restart the whole interactive</button>
  </div>
</div>

  function makePlantSvg(stage) {
    const leaf1 = ['#58a95a','#74b96a','#a7b95a','#927552','#6f5a4d'][stage];
    const leaf2 = ['#79c66c','#9bc97d','#c2b862','#9f7855','#7b6256'][stage];
    const stem = ['#2f7a47','#467d4f','#6f7a41','#7a5c41','#65544d'][stage];
    const droop = [0,8,18,28,35][stage];
    const stemCurve = [0,4,10,16,22][stage];
    const face = stage === 4 ? `<line x1="20" y1="39" x2="28" y2="47" stroke="#7b6256" stroke-width="2"/><line x1="28" y1="39" x2="20" y2="47" stroke="#7b6256" stroke-width="2"/>` : '';
    return `
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <rect x="16" y="50" width="32" height="8" rx="2" fill="#8a5b3d" />
        <rect x="14" y="46" width="36" height="6" rx="3" fill="#a56d47" />
        <path d="M32 46 C${32-stemCurve} 35, ${32+stemCurve/2} 28, 32 18" fill="none" stroke="${stem}" stroke-width="4" stroke-linecap="round"/>
        <ellipse cx="${24 + droop*0.18}" cy="${26 + droop*0.45}" rx="11" ry="6" transform="rotate(${-30 - droop} ${24 + droop*0.18} ${26 + droop*0.45})" fill="${leaf1}" />
        <ellipse cx="${40 - droop*0.18}" cy="${24 + droop*0.5}" rx="11" ry="6" transform="rotate(${25 + droop} ${40 - droop*0.18} ${24 + droop*0.5})" fill="${leaf2}" />
        <ellipse cx="32" cy="16" rx="7" ry="5" fill="${stage < 4 ? leaf2 : '#7b6256'}" />
        ${face}
      </svg>
    `;
  }

  function renderHeader(screenObj) {

  function renderChoiceButtons(screenId, options) {
    const selected = state.choiceSelections[screenId];
    const currentScreenId = screens[state.screen].id;
    return options.map(opt => {
      const classes = ['choice-btn'];
      if (selected === opt.key) {
        if (currentScreenId === screenId && state.feedback) {
          classes.push(state.feedback.type === 'correct' ? 'correct' : 'incorrect');
        } else if (state.completedScreens[screenId]) {
          classes.push('correct');
        } else {
          classes.push('selected');
        }
      }
      return `<button class="${classes.join(' ')}" data-choice="${opt.key}">${opt.label}</button>`;
    }).join('');
  }

  function renderScreen() {
    const screenObj = screens[state.screen];
    const content = screenObj.build();
    const canGoNext = !!state.completedScreens[screenObj.id];
    const feedbackBlock = state.feedback ? `
      <div class="feedback show ${state.feedback.type}">${state.feedback.text}</div>
    ` : `<div class="feedback"></div>`;

    const actionButtons = screenObj.actionsHtml ? screenObj.actionsHtml() : `
      <div class="nav-row">
        <button class="nav-btn secondary" data-action="back" ${state.screen === 0 ? 'disabled' : ''}>Back</button>
        <button class="nav-btn primary" data-action="next" ${canGoNext ? '' : 'disabled'}>Next</button>
      </div>
    `;

    app.innerHTML = `
      ${renderHeader(screenObj)}
      <div class="card">
        <div class="screen-top">
          <div class="screen-tag">${screenObj.title}</div>
        </div>
        <div class="instruction">${screenObj.instruction}</div>
        ${content}
        ${feedbackBlock}
        ${actionButtons}
        ${renderQuestionToggle(screenObj.id)}
      </div>
    `;
    bindEvents();
    if (state.readAloud) speakCurrentScreen();
  }

  function bindEvents() {
    app.querySelectorAll('[data-choice]').forEach(btn => {
      btn.addEventListener('click', () => {
        const choice = btn.dataset.choice;
        handleChoice(choice);
      });
    });
    app.querySelectorAll('[data-multi]').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.dataset.item;
        const val = btn.dataset.multi;
        state.multiSelections['build-pattern'] = state.multiSelections['build-pattern'] || {};
        state.multiSelections['build-pattern'][item] = val;
        rerender();
      });
    });
    app.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        handleAction(action);
      });
    });
  }

  function handleChoice(choice) {
    const screenObj = screens[state.screen];
    if (screenObj.multiCheck) return;
    state.choiceSelections[screenObj.id] = choice;
    const isCorrect = choice === screenObj.correctChoice;
    if (isCorrect) {
      markComplete();
      showFeedback('correct', screenObj.feedback.correct);
    } else {
      if (!screenObj.noDemerit) applyDemerit();
      const text = screenObj.customWrong ? screenObj.customWrong(choice) : screenObj.feedback.wrong;
      showFeedback('incorrect', text);
    }
    rerenderIfGameOverNotShown();
  }

  function handleAction(action) {
    const screenObj = screens[state.screen];
    if (action === 'toggle-read') {
      state.readAloud = !state.readAloud;
      if (!state.readAloud && 'speechSynthesis' in window) window.speechSynthesis.cancel();
      rerender();
      return;
    }
    if (action === 'read-now') {
      speakCurrentScreen(true);
      return;
    }
    if (action === 'restart-all') {
      restartAll();
      return;
    }
    if (action === 'toggle-question') {
      state.questionPanelOpen = !state.questionPanelOpen;
      rerender();
      return;
    }
    if (action === 'back') {
      if (state.screen > 0) {
        state.screen -= 1;
        state.feedback = null;
        rerender();
      }
      return;
    }
    if (action === 'next') {
      if (state.completedScreens[screenObj.id]) {
        state.screen = Math.min(state.screen + 1, screens.length - 1);
        state.feedback = null;
        rerender();
      }
      return;
    }
    if (screenObj.onAction) {
      screenObj.onAction(action);
    }
  }

  function markComplete() {
    const screenObj = screens[state.screen];
    state.completedScreens[screenObj.id] = true;
  }

  function showFeedback(type, text) {
    state.feedback = { type, text };
  }

  function applyDemerit() {
    state.demeritsUsed += 1;
    if (state.demeritsUsed >= state.demeritsMax) {
      state.gameOver = true;
      overlay.classList.add('show');
      overlay.setAttribute('aria-hidden', 'false');
      if (state.readAloud) {
        speakText('The plant has withered. Let us restart and read each clue carefully.');
      }
    }
  }

  function rerenderIfGameOverNotShown() {
    if (!state.gameOver) rerender();
  }

  function restartAll() {
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    state.screen = 0;
    state.readAloud = false;
    state.questionPanelOpen = false;
    state.demeritsUsed = 0;
    state.completedScreens = {};
    state.screenOrders = {};
    state.multiSelections = {};
    state.choiceSelections = {};
    state.feedback = null;
    state.gameOver = false;
    overlay.classList.remove('show');
    overlay.setAttribute('aria-hidden', 'true');
    rerender();
  }

  function getShuffledOptions(key, arr) {
    if (!state.screenOrders[key]) {
      const copy = arr.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      const correctIndex = copy.findIndex(x => x.correct);
      if (correctIndex === 0 && copy.length > 1) {
        const swapWith = 1 + Math.floor(Math.random() * (copy.length - 1));
        [copy[0], copy[swapWith]] = [copy[swapWith], copy[0]];
      }
      state.screenOrders[key] = copy;
    }
    return state.screenOrders[key];
  }

  function speakCurrentScreen(force = false) {
    if (!('speechSynthesis' in window)) return;
    if (!state.readAloud && !force) return;
    window.speechSynthesis.cancel();
    const screenObj = screens[state.screen];
    const feedbackText = state.feedback ? ` Feedback: ${state.feedback.text}` : '';
    speakText(`${screenObj.title}. ${screenObj.speakText ? screenObj.speakText() : screenObj.instruction}${feedbackText}`);
  }

  function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    utter.pitch = 1;
    utter.lang = 'en-SG';
    window.speechSynthesis.speak(utter);
  }

  function renderCleanSequence(opts) {
    const highlightStages = opts.highlightStages || [];
    const emphasis = opts.emphasis || '';
    const labelNote = opts.labelNote ? `<p class="soft-note">${opts.labelNote}</p>` : '';
    const stageClass = (letter) => highlightStages.includes(letter) ? 'fill="#fff8cc" stroke="#e2be3d"' : 'fill="#f8fbf7" stroke="#dbe6d8"';
    const scale = (letter) => emphasis === letter ? 1.08 : 1;
    return `
      <svg class="diagram-svg" viewBox="0 0 760 220" role="img" aria-label="Clean germination sequence from A to E">
        <defs>
          <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#69836f"></polygon>
          </marker>
        </defs>
        ${['A','B','C','D','E'].map((letter, idx) => `
          <g transform="translate(${42 + idx*142},18) scale(${scale(letter)})">
            <rect x="-8" y="-4" width="116" height="160" rx="18" ${stageClass(letter)} stroke-width="2"></rect>
            ${drawStage(letter)}
            <text x="48" y="148" text-anchor="middle" font-size="20" font-weight="800" fill="#355b43">${letter}</text>
          </g>
        `).join('')}
        ${[0,1,2,3].map(i => `<line x1="${126 + i*142}" y1="86" x2="${164 + i*142}" y2="86" stroke="#69836f" stroke-width="3" marker-end="url(#arrowHead)" />`).join('')}
      </svg>
      ${labelNote}
    `;
  }

  function drawStage(letter) {
    if (letter === 'A') return `
      <ellipse cx="48" cy="78" rx="20" ry="28" fill="#b88e62" stroke="#876448" stroke-width="2"/>
      <path d="M48 52 C44 60, 44 96, 50 104" fill="none" stroke="#e6c49b" stroke-width="2"/>
      <rect x="18" y="112" width="60" height="16" rx="8" fill="#d0b39a" opacity=".25"/>
    `;
    if (letter === 'B') return `
      <ellipse cx="48" cy="70" rx="20" ry="28" fill="#b88e62" stroke="#876448" stroke-width="2"/>
      <path d="M48 52 C44 60, 44 96, 50 104" fill="none" stroke="#e6c49b" stroke-width="2"/>
      <path d="M48 95 C46 112, 42 124, 45 132" fill="none" stroke="#d9e8cf" stroke-width="4" stroke-linecap="round"/>
      <path d="M45 128 C37 132, 36 137, 34 141" fill="none" stroke="#d9e8cf" stroke-width="3" stroke-linecap="round"/>
    `;
    if (letter === 'C') return `
      <ellipse cx="48" cy="70" rx="18" ry="24" fill="#b88e62" stroke="#876448" stroke-width="2"/>
      <path d="M48 92 C48 112, 44 126, 47 140" fill="none" stroke="#d9e8cf" stroke-width="4" stroke-linecap="round"/>
      <path d="M47 133 C38 136, 36 142, 33 146" fill="none" stroke="#d9e8cf" stroke-width="3" stroke-linecap="round"/>
      <path d="M50 62 C57 55, 60 49, 59 44" fill="none" stroke="#5a9150" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="61" cy="42" rx="8" ry="5" transform="rotate(-24 61 42)" fill="#8bcf7e"/>
    `;
    if (letter === 'D') return `
      <path d="M48 132 C48 110, 50 84, 50 52" fill="none" stroke="#557e42" stroke-width="4" stroke-linecap="round"/>
      <path d="M48 130 C38 138, 36 144, 34 149" fill="none" stroke="#d9e8cf" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="39" cy="68" rx="13" ry="8" transform="rotate(-26 39 68)" fill="#9ad47d" stroke="#6aa35b"/>
      <ellipse cx="61" cy="64" rx="13" ry="8" transform="rotate(28 61 64)" fill="#9ad47d" stroke="#6aa35b"/>
      <ellipse cx="50" cy="48" rx="7" ry="5" fill="#6fbf6a"/>
    `;
    return `
      <path d="M48 136 C48 114, 50 88, 52 42" fill="none" stroke="#3c6f3f" stroke-width="4" stroke-linecap="round"/>
      <path d="M49 132 C38 142, 35 147, 33 151" fill="none" stroke="#d9e8cf" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="38" cy="78" rx="13" ry="8" transform="rotate(-26 38 78)" fill="#7bcf70" stroke="#4a9750"/>
      <ellipse cx="60" cy="68" rx="13" ry="8" transform="rotate(28 60 68)" fill="#7bcf70" stroke="#4a9750"/>
      <ellipse cx="54" cy="44" rx="18" ry="10" transform="rotate(18 54 44)" fill="#7fc870" stroke="#4a9750"/>
      <ellipse cx="44" cy="54" rx="9" ry="6" transform="rotate(-30 44 54)" fill="#9ddd82" stroke="#5aa45a"/>
    `;
  }

  function renderRootAnimation() {
    return `
      <svg class="diagram-svg loop-root" viewBox="0 0 420 220" role="img" aria-label="Animation showing the root growing before the shoot and leaves">
        <rect x="24" y="138" width="372" height="24" rx="12" fill="#d7b89e"></rect>
        <ellipse cx="210" cy="96" rx="28" ry="38" fill="#b88e62" stroke="#876448" stroke-width="3"></ellipse>
        <path d="M210 58 C205 69, 205 121, 214 131" fill="none" stroke="#e6c49b" stroke-width="3"></path>
        <path class="root-line" d="M210 130 C209 150, 197 170, 202 190" fill="none" stroke="#d7ebcf" stroke-width="6" stroke-linecap="round"></path>
        <path class="shoot-line" d="M214 74 C224 66, 234 58, 236 43" fill="none" stroke="#4e8b46" stroke-width="6" stroke-linecap="round"></path>
        <ellipse cx="242" cy="38" rx="14" ry="8" transform="rotate(-20 242 38)" fill="#8bcf7e"></ellipse>
        <text x="40" y="30" font-size="18" font-weight="800" fill="#2d5f38">Root grows first</text>
      </svg>
    `;
  }

  function renderFoodAnimation() {
    return `
      <svg class="diagram-svg loop-food" viewBox="0 0 520 250" role="img" aria-label="Animation showing stored food in the seed leaves being used by the young seedling to grow before true leaves appear">
        <rect x="40" y="182" width="440" height="24" rx="12" fill="#d7b89e"></rect>

        <path d="M190 180 C188 162, 185 146, 186 130" fill="none" stroke="#d8ebd3" stroke-width="7" stroke-linecap="round"></path>
        <path d="M186 128 C178 143, 170 160, 160 182" fill="none" stroke="#d8ebd3" stroke-width="5" stroke-linecap="round"></path>
        <path d="M190 126 C196 115, 202 102, 204 90" fill="none" stroke="#7ca66c" stroke-width="5" stroke-linecap="round"></path>

        <ellipse cx="170" cy="126" rx="28" ry="18" transform="rotate(-24 170 126)" fill="#e7bf71" stroke="#b88e62" stroke-width="2"></ellipse>
        <ellipse cx="204" cy="122" rx="28" ry="18" transform="rotate(24 204 122)" fill="#e7bf71" stroke="#b88e62" stroke-width="2"></ellipse>

        <circle class="growth-tip root-tip" cx="160" cy="182" r="6" fill="#d8ebd3"></circle>
        <circle class="growth-tip shoot-tip" cx="204" cy="90" r="6" fill="#7ca66c"></circle>

        <circle class="food-dot dot-root d1" cx="190" cy="126" r="5" fill="#ef8d2f"></circle>
        <circle class="food-dot dot-root d2" cx="190" cy="126" r="5" fill="#ef8d2f"></circle>
        <circle class="food-dot dot-shoot d3" cx="190" cy="126" r="5" fill="#ef8d2f"></circle>
        <circle class="food-dot dot-shoot d4" cx="190" cy="126" r="5" fill="#ef8d2f"></circle>

        <text x="36" y="34" font-size="18" font-weight="800" fill="#2d5f38">Stored food in the seed leaves helps the seedling grow</text>
        <text x="114" y="96" font-size="16" font-weight="700" fill="#7a5a2e">seed leaves</text>
        <text x="82" y="216" font-size="16" font-weight="700" fill="#6a8d62">root grows</text>
        <text x="228" y="84" font-size="16" font-weight="700" fill="#487845">shoot grows</text>
        <text x="334" y="84" font-size="16" font-weight="700" fill="#7d322e">no true leaves yet</text>
      </svg>
    `;
  }

    function renderOxygenAnimation(isLive) {
    if (isLive) {
      return `
        <svg class="diagram-svg live-side" viewBox="0 0 340 220" role="img" aria-label="Animation showing a germinating seed with oxygen">
          <rect x="20" y="146" width="300" height="28" rx="14" fill="#d7b89e"></rect>
          <ellipse cx="164" cy="106" rx="24" ry="34" fill="#b88e62" stroke="#876448" stroke-width="3"></ellipse>
          <path d="M165 138 C160 153, 154 168, 156 188" fill="none" stroke="#d7ebcf" stroke-width="6" stroke-linecap="round"></path>
          <path d="M171 80 C182 70, 191 57, 192 44" fill="none" stroke="#4f8c45" stroke-width="6" stroke-linecap="round"></path>
          <ellipse cx="197" cy="38" rx="14" ry="8" transform="rotate(18 197 38)" fill="#88d07a"></ellipse>
          <circle class="oxy o1" cx="112" cy="72" r="8" fill="#80cfff"></circle>
          <circle class="oxy o2" cx="92" cy="98" r="7" fill="#80cfff"></circle>
          <circle class="oxy o3" cx="122" cy="116" r="6" fill="#80cfff"></circle>
          <text x="26" y="28" font-size="17" font-weight="800" fill="#2d5f38">oxygen is available</text>
        </svg>
      `;
    }
    return `
      <svg class="diagram-svg rot-side" viewBox="0 0 340 220" role="img" aria-label="Animation showing a seed dying and rotting when oxygen is removed">
        <rect x="20" y="146" width="300" height="28" rx="14" fill="#d7b89e"></rect>
        <ellipse class="seed-shell" cx="164" cy="106" rx="24" ry="34" fill="#8f6b50" stroke="#614532" stroke-width="3"></ellipse>
        <circle class="rot-spot" cx="154" cy="96" r="4" fill="#55372c"></circle>
        <circle class="rot-spot" cx="174" cy="118" r="4" fill="#55372c"></circle>
        <line class="cross-line" x1="78" y1="42" x2="118" y2="82" stroke="#c65b52" stroke-width="6" stroke-linecap="round"></line>
        <line class="cross-line" x1="118" y1="42" x2="78" y2="82" stroke="#c65b52" stroke-width="6" stroke-linecap="round"></line>
        <text x="26" y="28" font-size="17" font-weight="800" fill="#7d322e">oxygen is removed</text>
        <text x="122" y="196" font-size="16" font-weight="800" fill="#7d322e">seed dies and rots</text>
      </svg>
    `;
  }

  function rerender() {
    renderScreen();
  }

  renderScreen();
})();
</script>
