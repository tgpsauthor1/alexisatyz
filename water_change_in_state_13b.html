<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Change in State 13b</title>
<style>
:root{
  --bg:#eef7fb;--panel:#fff;--ink:#17324d;--muted:#5b748c;--blue:#1976a3;--blue2:#49a7d8;
  --teal:#1ea7a1;--good:#1e8e5a;--bad:#c53c3c;--shadow:0 10px 24px rgba(23,50,77,.12);
}
*{box-sizing:border-box} body{margin:0;font-family:"Trebuchet MS","Segoe UI",Arial,sans-serif;color:var(--ink);
background:linear-gradient(180deg,#dff3fb 0%,#eef7fb 38%,#f8fcfe 100%);min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:12px 14px 30px}
.topbar{background:rgba(255,255,255,.92);border:2px solid #c8e6f5;border-radius:16px;padding:10px 14px;display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;box-shadow:var(--shadow);margin-bottom:14px}
.droplets{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.droplet{width:18px;height:24px;background:linear-gradient(180deg,#6fd2ff,#1f93d6);border-radius:60% 60% 70% 70%/75% 75% 45% 45%;transform:rotate(180deg);opacity:1;transition:.25s}
.droplet.lost{opacity:.18;filter:grayscale(1);transform:rotate(180deg) scale(.9)}
.topmeta{display:flex;align-items:center;gap:10px 16px;flex-wrap:wrap;color:var(--muted);font-size:.95rem}
.toggle{display:inline-flex;align-items:center;gap:8px;background:#f7fbfd;border:1px solid #d1e9f4;border-radius:999px;padding:6px 10px}
.toggle input{accent-color:var(--blue)}
.card{background:var(--panel);border:2px solid #d9edf7;border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
.header{background:linear-gradient(90deg,var(--blue),var(--blue2));color:#fff;padding:16px 18px}
.header h1{margin:0;font-size:1.55rem;line-height:1.15}
.header p{margin:6px 0 0;font-size:.98rem;opacity:.96}
.content{padding:18px}
.instruction{font-size:1.45rem;line-height:1.22;font-weight:800;color:#0e5376;margin-bottom:14px}
.subtle{color:var(--muted);font-size:1rem;margin-top:-4px;margin-bottom:12px}
.layout{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;align-items:start}
.panel{background:#f8fdff;border:2px solid #d8eef9;border-radius:18px;padding:14px}
.question-box{font-size:1.1rem;line-height:1.42}
.kw{background:#fff0a6;padding:0 .18em;border-radius:6px}
.option-grid,.bank{display:grid;gap:12px}
.option-grid.two,.bank{grid-template-columns:repeat(2,minmax(0,1fr))}
.option-grid.one{grid-template-columns:1fr}
.option,.chunk,.start-btn,.control-btn,.small-btn,.compare-box,.blank-btn{border:2px solid #bde2f2;background:#fff;border-radius:16px;padding:14px;font-size:1.02rem;line-height:1.25;color:var(--ink);cursor:pointer;transition:.12s;box-shadow:0 4px 12px rgba(33,112,149,.08)}
.option:hover,.chunk:hover,.start-btn:hover,.control-btn:hover,.small-btn:hover,.compare-box:hover,.blank-btn:hover{transform:translateY(-1px);border-color:#79c3e2}
.option.correct,.compare-box.correct{border-color:#63c292;background:#e8fbf1}
.option.wrong,.compare-box.wrong{border-color:#e5a1a1;background:#fff0f0}
.disabled{opacity:.55;pointer-events:none}
.feedback{min-height:28px;margin-top:14px;font-size:1rem;font-weight:700}
.feedback.good{color:var(--good)} .feedback.bad{color:var(--bad)}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:16px}
.control-btn[disabled]{opacity:.45;cursor:not-allowed}
.source-wrap{margin-top:14px} details{background:#fbfeff;border:2px solid #d8eef9;border-radius:16px;padding:10px 12px}
summary{cursor:pointer;font-weight:700;color:#0f688d}
.source-img{width:100%;max-height:420px;object-fit:contain;background:#fff;border-radius:12px;margin-top:10px;border:1px solid #d9ecf6}
.diagram-area{background:linear-gradient(180deg,#f8fdff 0%,#eefaff 100%);border:2px solid #d5edf8;border-radius:18px;padding:12px;min-height:290px}
.legend{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:.95rem;margin-top:8px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dot.heat{background:#ff8a3d}.dot.drop{background:#2ba7df}
.comparison{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.compare-box h4{margin:0 0 8px;font-size:1rem;color:#0d5f86}
.compare-box.selected{border-color:var(--blue);background:#eef9ff}
.chip-area{min-height:90px;background:#fff;border:2px dashed #b8ddef;border-radius:18px;padding:10px;display:flex;gap:8px;flex-wrap:wrap;align-content:flex-start}
.chip{padding:10px 12px;border-radius:999px;background:#eaf7ff;border:2px solid #8dccea;font-weight:700;cursor:pointer}
.blank-line{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:1.1rem;line-height:1.45}
.blank-btn{min-width:160px;min-height:46px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#0f688d}
.blank-btn.filled{background:#eef9ff}
.popup{display:none;margin-top:12px;padding:12px;border-radius:14px;background:#fff7e8;border:2px solid #f2d79f;color:#7a5c16;line-height:1.4}
.guess-wrap{display:grid;gap:14px;max-width:760px}
.guess-sentence{background:#f9fdff;border:2px solid #d8eef9;border-radius:16px;padding:14px;font-size:1.12rem;line-height:1.5}
.guess-input{display:flex;gap:10px;flex-wrap:wrap}.guess-input input{flex:1 1 240px;min-width:220px;font-size:1.1rem;padding:12px 14px;border-radius:14px;border:2px solid #bfe3f3}
.completion{text-align:center;padding:16px 10px 12px}.completion h2{font-size:2rem;margin:0 0 8px;color:#0c6b91}.completion p{font-size:1.12rem;margin:6px auto;max-width:760px;line-height:1.45}
.pill{display:inline-block;border-radius:999px;background:#e7f9f8;color:#127771;padding:8px 14px;font-weight:700;margin-top:8px}
@media (max-width:860px){.layout,.comparison,.option-grid.two,.bank{grid-template-columns:1fr}.instruction{font-size:1.25rem}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="droplets" id="droplets"></div>
    <div class="topmeta">
      <div class="toggle"><label><input type="checkbox" id="readAloudToggle"> Read-aloud</label></div>
      <div id="progressText">Screen 1 of 13</div>
    </div>
  </div>

  <div class="card">
    <div class="header">
      <h1 id="screenTitle"></h1>
      <p id="screenSubtitle"></p>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

let state = {};

function resetState(){
  state = {
    screenIndex:0, demeritsLost:0, readAloud:false, sourceOpen:false, popupOpen:false,
    orderSelection:[], orderBank:null, fillSelections:{0:null,1:null,2:null}, fillBank:null, activeBlank:null,
    guessWords:["increases","quickly"], guessSolved:[false,false], guessStep:0, guessReveal:1, guessComplete:false
  };
}

function shuffle(a){ const arr=a.slice(); for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function esc(s){ return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escJS(s){ return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }

function renderTopBar(){
  const d = document.getElementById('droplets'); d.innerHTML="";
  for(let i=0;i<TOTAL_DEMERITS;i++){ const x=document.createElement('div'); x.className='droplet'+(i<state.demeritsLost?' lost':''); d.appendChild(x); }
  document.getElementById('progressText').textContent = "Screen " + (state.screenIndex+1) + " of " + screens.length;
  document.getElementById('readAloudToggle').checked = state.readAloud;
}
document.getElementById('readAloudToggle').addEventListener('change',e=>{ state.readAloud=e.target.checked; if(state.readAloud) speakCurrent(); });

function speak(text){ if(!state.readAloud || !window.speechSynthesis) return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text.replace(/\s+/g,' ')); u.rate=.95; speechSynthesis.speak(u); }
function speakCurrent(){ const t=document.querySelector('.instruction')?.innerText || ''; const f=document.querySelector('.feedback')?.innerText || ''; speak(document.getElementById('screenTitle').innerText + ". " + document.getElementById('screenSubtitle').innerText + ". " + t + ". " + f); }

function loseDemerit(){
  state.demeritsLost++;
  renderTopBar();
  if(state.demeritsLost>=TOTAL_DEMERITS){
    setTimeout(()=>{ alert("All demerit drops are used. The interactive will restart."); resetState(); render(); }, 150);
  }
}
function setHeader(t,s){ document.getElementById('screenTitle').textContent=t; document.getElementById('screenSubtitle').textContent=s; }
function maybeRead(){ if(state.readAloud) setTimeout(speakCurrent,120); }
function nav(canNext, prevDisabled, nextLabel){
  return '<div class="nav"><button class="control-btn" '+(prevDisabled?'disabled':'')+' onclick="prevScreen()">Back</button><button class="control-btn" id="nextBtn" '+(canNext?'':'disabled')+' onclick="nextScreen()">'+(nextLabel||'Next')+'</button></div>';
}
function sourceDetails(){
  return '<div class="source-wrap"><details '+(state.sourceOpen?'open':'')+' ontoggle="state.sourceOpen=this.open"><summary>Show source question</summary><img class="source-img" src="'+SOURCE_IMG+'" alt="Source question image"></details></div>';
}

      <path d="M372 72 C350 102, 336 108, 324 119" stroke="#ff8a3d" stroke-width="5" fill="none" marker-end="url(#arrowHeat)"><animate attributeName="opacity" dur="1.4s" values=".3;1;.3" repeatCount="indefinite"/></path>
      <path d="M386 100 C356 116, 341 122, 327 128" stroke="#ff8a3d" stroke-width="4" fill="none" marker-end="url(#arrowHeat)" opacity=".7"/>
    </svg>`;
  }
  if(mode==='withoutFans'){
    return common + `
      <text x="58" y="92" font-size="17" font-weight="700" fill="#5f7d90">no fan</text>
      <path d="M372 85 C350 105, 335 112, 322 122" stroke="#ff8a3d" stroke-width="4" fill="none" marker-end="url(#arrowHeat)" opacity=".45"><animate attributeName="opacity" dur="2.2s" values=".2;.6;.2" repeatCount="indefinite"/></path>
      <circle cx="181" cy="88" r="4" fill="#8ad5f7" opacity=".45"/><circle cx="233" cy="84" r="4" fill="#8ad5f7" opacity=".45"/><circle cx="292" cy="83" r="4" fill="#8ad5f7" opacity=".45"/>
      <text x="147" y="205" font-size="15" fill="#5b748c">slower evaporation</text></svg>`;
  }
  if(mode==='compareWithFans' || mode==='heatFlow' || mode==='transfer'){
    return common + fan + `
      <path d="M125 100 C155 96, 170 96, 192 104" stroke="#20a3a3" stroke-width="5" fill="none" marker-end="url(#arrowWind)"><animate attributeName="d" dur="1s" repeatCount="indefinite" values="M125 100 C155 96, 170 96, 192 104;M125 104 C156 100, 172 100, 194 108;M125 100 C155 96, 170 96, 192 104"/></path>
      <path d="M122 124 C150 119, 170 119, 192 126" stroke="#20a3a3" stroke-width="5" fill="none" marker-end="url(#arrowWind)"><animate attributeName="opacity" dur=".9s" values=".3;1;.3" repeatCount="indefinite"/></path>
      <text x="54" y="151" font-size="17" font-weight="700" fill="#0f7e7c">wind</text>
      <path d="M384 84 C351 98, 336 107, 321 118" stroke="#ff8a3d" stroke-width="5" fill="none" marker-end="url(#arrowHeat)"><animate attributeName="opacity" dur="1s" values=".2;1;.2" repeatCount="indefinite"/></path>
      <path d="M390 111 C354 118, 341 124, 327 130" stroke="#ff8a3d" stroke-width="4" fill="none" marker-end="url(#arrowHeat)"><animate attributeName="opacity" dur="1.2s" values=".2;1;.2" repeatCount="indefinite"/></path>
      <circle cx="165" cy="86" r="4" fill="#8ad5f7"><animate attributeName="cy" values="86;72;60" dur="1s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;.5;0" dur="1s" repeatCount="indefinite"/></circle>
      <circle cx="214" cy="82" r="4" fill="#8ad5f7"><animate attributeName="cy" values="82;67;54" dur="1.1s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;.5;0" dur="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="262" cy="84" r="4" fill="#8ad5f7"><animate attributeName="cy" values="84;68;54" dur=".95s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;.5;0" dur=".95s" repeatCount="indefinite"/></circle>
      <text x="110" y="219" font-size="15" fill="#0f7e7c">droplets spread over a wider area</text></svg>`;
  }
  return common + '</svg>';
}

const screens = [
  {type:'intro', title:'Read the new question', subtitle:'Part (b): focus on how the fans make the cooling work better.'},
  {type:'single', title:'What changed?', subtitle:'Find the new condition in part (b).', instruction:'Tap what is new in part (b).', useDemerit:true, diagram:'withFans', good:'Yes. The new factor is the fans.', bad:'Look for what was added in part (b).', correctKey:'fans',
   options:[{key:'coldfirst',text:'The surrounding air became colder first.'},{key:'fans',text:'Fans were added.'},{key:'smoke',text:'The mist changed into smoke.'},{key:'hotter',text:'The building became hotter.'}]},
  {type:'single', title:'What must you explain?', subtitle:'Focus on the exact effect in the question.', instruction:'Tap what the question wants you to explain.', useDemerit:true, diagram:'withFans', good:'Yes. You must explain how the fans make the cooling better.', bad:'Stay focused on the effect of the fans.', correctKey:'bettercooling',
   options:[{key:'mistwater',text:'why mist is made of water'},{key:'bettercooling',text:'how the fans help cool the surrounding air more effectively'},{key:'fanplace',text:'where the fans are placed'},{key:'windows',text:'why buildings have windows'}]},
  {type:'single', title:'What does the fan provide?', subtitle:'Connect the fan to the new science factor.', instruction:'Tap what the fans provide.', useDemerit:true, diagram:'withFans', good:'Yes. The fan provides moving air.', bad:'Think about what a fan does to the air.', correctKey:'wind',
   options:[{key:'wind',text:'wind'},{key:'magicmist',text:'more mist by magic'},{key:'coldnow',text:'colder droplets immediately'},{key:'wallheat',text:'less heat in the building walls'}]},
  {type:'single', title:'What does wind do to evaporation?', subtitle:'Use the exact science wording.', instruction:'Tap the best science statement.', useDemerit:true, diagram:'withFans', good:'Yes. Say “increases the rate of evaporation,” not just “affects evaporation.”', bad:'Use the exact idea: wind makes evaporation happen faster.', correctKey:'increase',
   options:[{key:'increase',text:'Wind increases the rate of evaporation.'},{key:'stop',text:'Wind stops evaporation.'},{key:'unclear',text:'Wind changes evaporation but not in any clear way.'},{key:'ice',text:'Wind turns water droplets into ice.'}]},
  {type:'compare', title:'Compare before and after', subtitle:'Use the fan and mist diagrams to compare evaporation.'},
  {type:'single', title:'Where does the extra heat come from?', subtitle:'Reconnect evaporation to heat transfer.', instruction:'Tap the correct heat-transfer idea.', useDemerit:true, diagram:'heatFlow', good:'Yes. The droplets gain heat from the surrounding air.', bad:'Ask: what loses heat when the droplets evaporate?', correctKey:'airtodrops',
   options:[{key:'airtodrops',text:'Heat moves from the surrounding air to the water droplets.'},{key:'dropstoair',text:'Heat moves from the water droplets to the surrounding air.'},{key:'fanonly',text:'Heat comes only from the fan motor.'},{key:'none',text:'The droplets evaporate without any heat.'}]},
  {type:'single', title:'Why is the cooling better?', subtitle:'Link faster evaporation to faster heat loss from the air.', instruction:'Tap the best reason the fans cool the air more effectively.', useDemerit:true, diagram:'heatFlow', good:'Yes. Faster evaporation means the air loses heat faster.', bad:'Link wind → faster evaporation → faster heat loss from the air.', correctKey:'fasterheat',
   options:[{key:'fasterheat',text:'The droplets evaporate faster, so they take in heat from the surrounding air faster.'},{key:'disappear',text:'The fans make the droplets disappear without heat.'},{key:'block',text:'The fans block the heat from leaving the air.'},{key:'airvapor',text:'The fans turn the surrounding air into water vapour.'}]},
  {type:'order', title:'Build the explanation chain', subtitle:'Put the cause-and-effect steps in order.'},
  {type:'fill', title:'Build the answer', subtitle:'Use the key science words in the sentence frame.'},
  {type:'guess', title:'Guess the word', subtitle:'Retrieve the key science words without penalty.'},
  {type:'transfer', title:'Transfer check', subtitle:'Use the same science idea in a new situation.', instruction:'Tap the best answer.', correctKey:'correct', good:'Yes. Same idea in a new situation.', bad:'Use the same chain: wind → faster evaporation → faster heat loss from air.',
   options:[{key:'correct',text:'Wind increases the rate of evaporation, so the water takes in heat from the air faster.'},{key:'aircold',text:'Wind makes the air colder by itself, even without evaporation.'},{key:'ice',text:'Wind changes the droplets into ice, so the air cools.'},{key:'stopheat',text:'Wind stops the water droplets from gaining heat.'}]},
  {type:'complete', title:'Complete', subtitle:'You have finished the interactive.'}
];

function render(){
  renderTopBar();
  const s = screens[state.screenIndex];
  setHeader(s.title, s.subtitle);
  if(s.type==='intro') return renderIntro();
  if(s.type==='single') return renderSingle(s);
  if(s.type==='compare') return renderCompare();
  if(s.type==='order') return renderOrder();
  if(s.type==='fill') return renderFill();
  if(s.type==='guess') return renderGuess();
  if(s.type==='transfer') return renderTransfer(s);
  if(s.type==='complete') return renderComplete();
}

function renderIntro(){
  document.getElementById('content').innerHTML = `
  <div class="layout">
    <div>
      <div class="instruction">Tap the button after you read the full question.</div>
      <div class="panel question-box">
        Fans were added to the water mist system as shown.<br><br>
        <span class="kw">Explain</span> how adding the <span class="kw">fans</span> would help
        <span class="kw">cool the surrounding air</span> <span class="kw">more effectively</span>.
      </div>
      <p class="subtle">Look for what changed and what result you must explain.</p>
      <button class="start-btn" onclick="doneIntro()">I have read the question</button>
      <div class="feedback" id="feedback"></div>
      ${nav(false,true)}
    </div>
    <div>
      <div class="diagram-area">${diagram('intro')}</div>
      <div class="legend"><span><i class="dot drop"></i> tiny water droplets</span><span><i class="dot heat"></i> heat from surrounding air</span></div>
    </div>
  </div>${sourceDetails()}`;
  maybeRead();
}
function doneIntro(){ const fb=document.getElementById('feedback'); fb.textContent='Good. Now find what changed in part (b).'; fb.className='feedback good'; document.getElementById('nextBtn').disabled=false; maybeRead(); }

function renderSingle(s){
  if(!s.shuffled) s.shuffled = shuffle(s.options);
  document.getElementById('content').innerHTML = `
  <div class="layout">
    <div>
      <div class="instruction">${esc(s.instruction)}</div>
      <div class="option-grid one" id="optwrap">${s.shuffled.map(o=>'<button class="option" onclick="chooseSingle(\''+escJS(o.key)+'\', this)">'+esc(o.text)+'</button>').join('')}</div>
      <div class="feedback" id="feedback"></div>
      ${nav(false,false)}
    </div>
    <div><div class="diagram-area">${diagram(s.diagram || 'withFans')}</div></div>
  </div>${sourceDetails()}`;
  maybeRead();
}
function chooseSingle(key, el){
  const s = screens[state.screenIndex], fb=document.getElementById('feedback');
  if(key===s.correctKey){
    [...document.querySelectorAll('.option')].forEach(b=>b.classList.add('disabled'));
    el.classList.add('correct'); fb.textContent=s.good; fb.className='feedback good'; document.getElementById('nextBtn').disabled=false;
  } else {
    el.classList.add('wrong'); setTimeout(()=>el.classList.remove('wrong'),650); fb.textContent=s.bad; fb.className='feedback bad'; if(s.useDemerit) loseDemerit();
  }
  maybeRead();
}

function renderCompare(){
  document.getElementById('content').innerHTML = `
  <div class="layout">
    <div>
      <div class="instruction">Tap the side where evaporation happens faster.</div>
      <div class="comparison">
        <div class="compare-box" onclick="chooseCompare(false,this)"><h4>Without fans</h4>${diagram('withoutFans')}</div>
        <div class="compare-box" onclick="chooseCompare(true,this)"><h4>With fans</h4>${diagram('compareWithFans')}</div>
      </div>
      <div class="feedback" id="feedback"></div>
      ${nav(false,false)}
    </div>
    <div><div class="panel"><strong>Think about this:</strong><div class="subtle" style="margin:8px 0 0">Which side has moving air? Which side shows more droplets changing to water vapour?</div></div></div>
  </div>${sourceDetails()}`;
  maybeRead();
}
function chooseCompare(ok, el){
  const fb=document.getElementById('feedback');
  if(ok){ [...document.querySelectorAll('.compare-box')].forEach(b=>b.style.pointerEvents='none'); el.classList.add('correct'); fb.textContent='Yes. With fans, the water droplets evaporate faster.'; fb.className='feedback good'; document.getElementById('nextBtn').disabled=false; }
  else { el.classList.add('wrong'); setTimeout(()=>el.classList.remove('wrong'),650); fb.textContent='Compare how moving air changes evaporation.'; fb.className='feedback bad'; loseDemerit(); }
  maybeRead();
}

function renderOrder(){
  if(!state.orderBank){
    state.orderBank = shuffle([
      'The fans produce wind.',
      'Wind increases the rate of evaporation.',
      'The droplets take in heat from the surrounding air faster.',
      'The surrounding air cools more quickly.'
    ]);
  }
  document.getElementById('content').innerHTML = `
  <div class="layout">
    <div>
      <div class="instruction">Build the science chain. Tap the cards in the correct order, then check.</div>
      <div class="chip-area">${state.orderSelection.map((t,i)=>'<div class="chip" onclick="removeOrder('+i+')">'+esc(t)+'</div>').join('')}</div>
      <div class="bank">${state.orderBank.map((t,i)=>'<button class="chunk" onclick="pickOrder('+i+')">'+esc(t)+'</button>').join('')}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;"><button class="small-btn" onclick="checkOrder()">Check</button><button class="small-btn" onclick="clearOrder()">Clear</button></div>
      <div class="feedback" id="feedback"></div>${nav(state.guessComplete,false)}
    </div>
    <div><div class="diagram-area">${diagram('heatFlow')}</div></div>
  </div>${sourceDetails()}`;
  maybeRead();
}
function pickOrder(i){ state.orderSelection.push(state.orderBank[i]); state.orderBank.splice(i,1); renderOrder(); }
function removeOrder(i){ state.orderBank.push(state.orderSelection[i]); state.orderSelection.splice(i,1); renderOrder(); }
function clearOrder(){ state.orderBank = shuffle(state.orderBank.concat(state.orderSelection)); state.orderSelection=[]; renderOrder(); }
function checkOrder(){
  const correct = ['The fans produce wind.','Wind increases the rate of evaporation.','The droplets take in heat from the surrounding air faster.','The surrounding air cools more quickly.'];
  const fb=document.getElementById('feedback');
  if(state.orderSelection.length!==4){ fb.textContent='Build all 4 steps first.'; fb.className='feedback bad'; return; }
  if(JSON.stringify(state.orderSelection)===JSON.stringify(correct)){ fb.textContent='Good. That is the full reason.'; fb.className='feedback good'; document.getElementById('nextBtn').disabled=false; }
  else { fb.textContent='Start with what the fans add.'; fb.className='feedback bad'; loseDemerit(); }
  maybeRead();
}

function renderFill(){
  if(!state.fillBank) state.fillBank = shuffle(['increases','faster','more quickly','decreases','more slowly','into water vapour first']);
  document.getElementById('content').innerHTML = `
  <div class="layout">
    <div>
      <div class="instruction">Fill the explanation. Tap a blank, then tap a matching word.</div>
      <div class="blank-line">
        <span>The wind from the fan</span>
        <button class="blank-btn ${state.fillSelections[0]?'filled':''}" onclick="setBlank(0)">${state.fillSelections[0]||'Blank 1'}</button>
        <span>the rate of evaporation, so the water droplets take in heat from the surrounding air</span>
        <button class="blank-btn ${state.fillSelections[1]?'filled':''}" onclick="setBlank(1)">${state.fillSelections[1]||'Blank 2'}</button>
        <span>. Therefore, the surrounding air is cooled</span>
        <button class="blank-btn ${state.fillSelections[2]?'filled':''}" onclick="setBlank(2)">${state.fillSelections[2]||'Blank 3'}</button><span>.</span>
      </div>
      <div class="subtle">Active blank: ${state.activeBlank==null?'Tap a blank first':'Blank ' + (state.activeBlank+1)}</div>
      <div class="bank">${state.fillBank.map((t,i)=>'<button class="chunk" onclick="pickFill('+i+')">'+esc(t)+'</button>').join('')}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;"><button class="small-btn" onclick="checkFill()">Check</button><button class="small-btn" onclick="clearFill()">Clear</button></div>
      <div class="feedback" id="feedback"></div>${nav(false,false)}
    </div>
    <div>
      <div class="diagram-area">${diagram('heatFlow')}</div>
      <button class="small-btn" style="margin-top:14px" onclick="togglePopup()">Why can this help even more?</button>
      <div class="popup" id="popupBox">The fan can spread the tiny water droplets over a wider area. More of the droplets are exposed to air, so evaporation can happen even faster.</div>
    </div>
  </div>${sourceDetails()}`;
  document.getElementById('popupBox').style.display = state.popupOpen ? 'block' : 'none';
  maybeRead();
}
function setBlank(i){ state.activeBlank=i; renderFill(); }
function pickFill(i){
  if(state.activeBlank==null) return;
  if(state.fillSelections[state.activeBlank]) state.fillBank.push(state.fillSelections[state.activeBlank]);
  state.fillSelections[state.activeBlank]=state.fillBank[i];
  state.fillBank.splice(i,1);
  state.activeBlank=null;
  renderFill();
}
function clearFill(){ state.fillBank=shuffle(state.fillBank.concat(Object.values(state.fillSelections).filter(Boolean))); state.fillSelections={0:null,1:null,2:null}; state.activeBlank=null; renderFill(); }
function checkFill(){
  const ans=[state.fillSelections[0],state.fillSelections[1],state.fillSelections[2]];
  const fb=document.getElementById('feedback');
  if(ans.some(v=>!v)){ fb.textContent='Fill all 3 blanks first.'; fb.className='feedback bad'; return; }
  if(JSON.stringify(ans)===JSON.stringify(['increases','faster','more quickly'])){ fb.textContent='Yes. That is the accepted science wording.'; fb.className='feedback good'; document.getElementById('nextBtn').disabled=false; }
  else { fb.textContent='Check the comparison idea: the fans make the cooling stronger, not weaker.'; fb.className='feedback bad'; loseDemerit(); }
  maybeRead();
}
function togglePopup(){ state.popupOpen=!state.popupOpen; const p=document.getElementById('popupBox'); if(p) p.style.display=state.popupOpen?'block':'none'; }

function renderGuess(){
  const sentence = 'The wind from the fan <strong>'+maskGuess(0)+'</strong> the rate of evaporation, so the surrounding air is cooled more <strong>'+maskGuess(1)+'</strong>.';
  const allSolved = state.guessSolved.every(Boolean);
  const current = allSolved ? '' : state.guessWords[state.guessStep];
  const clue = allSolved ? 'All key words solved.' : current.slice(0,state.guessReveal) + '_'.repeat(Math.max(0,current.length-state.guessReveal));
  document.getElementById('content').innerHTML = `
  <div class="guess-wrap">
    <div class="instruction">Type the missing science word.</div>
    <div class="guess-sentence">${sentence}</div>
    <div class="panel">
      <div><strong>Current clue:</strong> ${clue}</div>
      <div class="guess-input" style="margin-top:10px;">
        <input id="guessInput" autocomplete="off" placeholder="Type the whole word" ${allSolved ? 'disabled' : ''} onkeydown="if(event.key==='Enter')checkGuess()">
        <button class="small-btn" ${allSolved ? 'disabled' : ''} onclick="checkGuess()">Check</button>
      </div>
      <div class="subtle">Wrong tries here do not use demerits.</div>
    </div>
    <div class="feedback ${allSolved ? 'good' : ''}" id="feedback">${allSolved ? 'Yes. You solved all the key words. You can go to the next screen now.' : ''}</div>${nav(allSolved,false)}
  </div>${sourceDetails()}`;
  if(!allSolved){
    document.getElementById('guessInput').focus();
  }
  maybeRead();
}
function maskGuess(i){
  if(state.guessSolved[i]) return state.guessWords[i];
  if(i===state.guessStep) return state.guessWords[i].slice(0,state.guessReveal) + '_'.repeat(Math.max(0,state.guessWords[i].length-state.guessReveal));
  return '_'.repeat(state.guessWords[i].length);
}
function checkGuess(){
  if(state.guessSolved.every(Boolean)) return;
  const input=document.getElementById('guessInput').value.trim().toLowerCase();
  const target=state.guessWords[state.guessStep].toLowerCase();
  const fb=document.getElementById('feedback');
  if(input===target){
    state.guessSolved[state.guessStep]=true;
    fb.textContent='Yes. Good retrieval.'; fb.className='feedback good';
    if(state.guessStep < state.guessWords.length-1){
      state.guessStep++;
      state.guessReveal=1;
      setTimeout(renderGuess,350);
    } else {
      setTimeout(renderGuess,350);
    }
  } else {
    state.guessReveal=Math.min(state.guessWords[state.guessStep].length, state.guessReveal+1);
    fb.textContent='Try again. One more letter is shown.'; fb.className='feedback bad';
    setTimeout(renderGuess,220);
  }
}

function renderTransfer(s){
  if(!s.shuffled) s.shuffled = shuffle(s.options);
  document.getElementById('content').innerHTML = `
  <div class="layout">
    <div>
      <div class="instruction">${esc(s.instruction)}</div>
      <div class="panel question-box" style="margin-bottom:12px;">A fine water spray is used outdoors on a windy day. Why can the air be cooled more effectively?</div>
      <div class="option-grid one">${s.shuffled.map(o=>'<button class="option" onclick="chooseTransfer(\''+escJS(o.key)+'\',this)">'+esc(o.text)+'</button>').join('')}</div>
      <div class="feedback" id="feedback"></div>${nav(false,false)}
    </div>
    <div><div class="diagram-area">${diagram('transfer')}</div></div>
  </div>`;
  maybeRead();
}
function chooseTransfer(key, el){
  const s=screens[state.screenIndex], fb=document.getElementById('feedback');
  if(key===s.correctKey){ [...document.querySelectorAll('.option')].forEach(b=>b.classList.add('disabled')); el.classList.add('correct'); fb.textContent=s.good; fb.className='feedback good'; document.getElementById('nextBtn').disabled=false; }
  else { el.classList.add('wrong'); setTimeout(()=>el.classList.remove('wrong'),650); fb.textContent=s.bad; fb.className='feedback bad'; }
  maybeRead();
}

function renderComplete(){
  document.getElementById('content').innerHTML = `
  <div class="completion">
    <h2>Well done!</h2>
    <p>You explained how the fans help cool the surrounding air more quickly.</p>
    <p><strong>Key idea:</strong> wind increases the rate of evaporation, so the water droplets take in heat from the surrounding air faster.</p>
    <div class="pill">Final answer idea: The wind from the fan increases the rate of evaporation, so the surrounding air is cooled more quickly.</div>
    <div class="nav" style="justify-content:center;margin-top:18px;"><button class="control-btn" onclick="restartAll()">Restart interactive</button></div>
  </div>`;
  maybeRead();
}

function nextScreen(){ if(state.screenIndex < screens.length-1){ state.screenIndex++; render(); } }
function prevScreen(){ if(state.screenIndex > 0){ state.screenIndex--; render(); } }
function restartAll(){
  resetState();
  screens.forEach(s => delete s.shuffled);
  render();
}

resetState();
screens.forEach(s => delete s.shuffled);
render();
</script>
