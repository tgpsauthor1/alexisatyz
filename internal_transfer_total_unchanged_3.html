
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>internal_transfer_total_unchanged_3</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --ink:#14263d;
      --muted:#56667b;
      --line:#d8e3ef;
      --accent:#1f6feb;
      --accent-soft:#eef5ff;
      --warm:#ffb44d;
      --warm-soft:#fff5e7;
      --good:#1f8f47;
      --good-soft:#eaf8ef;
      --bad:#c73b3b;
      --bad-soft:#fff2f2;
      --shadow:0 10px 24px rgba(16,24,40,.08);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--ink);
      font-family:Arial, Helvetica, sans-serif;
    }
    body{min-height:100vh}
    button,input{font:inherit}

    .app{
      max-width:1140px;
      margin:0 auto;
      padding:18px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .title-wrap h1{
      margin:0;
      font-size:clamp(1.65rem, 3vw, 2.3rem);
      line-height:1.1;
    }
    .title-wrap p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:1rem;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:18px;
      padding:14px 18px;
      min-height:52px;
      background:var(--accent);
      color:#fff;
      cursor:pointer;
      font-weight:700;
      box-shadow:var(--shadow);
    }
    .btn.secondary{
      background:#fff;
      color:var(--ink);
      border:2px solid var(--line);
      box-shadow:none;
    }
    .btn.ghost{
      background:transparent;
      color:var(--accent);
      border:2px solid var(--accent);
      box-shadow:none;
    }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .btn:focus-visible,
    .option:focus-visible,
    .chip:focus-visible,
    .model-card:focus-visible,
    .strategy-card:focus-visible,
    .mini-btn:focus-visible,
    .question-toggle:focus-visible,
    input:focus-visible{
      outline:4px solid #93c5fd;
      outline-offset:3px;
    }

    .progress-wrap{margin:10px 0 16px}
    .progress-label{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      font-weight:700;
      margin-bottom:8px;
    }
    .progress{
      width:100%;
      height:16px;
      background:#dbe6f3;
      border-radius:999px;
      overflow:hidden;
    }
    .bar{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, var(--accent), #7fb0fb);
      transition:width .35s ease;
    }

    .screen-card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px;
      min-height:590px;
    }

    .screen-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .screen-head h2{
      margin:0;
      font-size:clamp(1.4rem, 2.6vw, 2rem);
      line-height:1.15;
    }
    .tag{
      background:var(--accent-soft);
      color:var(--accent);
      border-radius:999px;
      padding:10px 14px;
      font-weight:700;
      white-space:nowrap;
    }

    .action-box{
      background:#eef6ff;
      border:3px solid #b9d7ff;
      border-radius:20px;
      padding:16px 18px;
      font-weight:700;
      font-size:1.08rem;
      margin-bottom:12px;
    }
    .explain-box{
      background:var(--warm-soft);
      border:3px solid #f1c483;
      border-radius:20px;
      padding:14px 18px;
      margin-bottom:18px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1.2fr .95fr;
      gap:18px;
    }
    @media (max-width: 920px){
      .grid-2{grid-template-columns:1fr}
    }

    .panel{
      background:#fbfcfe;
      border:2px solid var(--line);
      border-radius:20px;
      padding:16px;
    }

    .question-card{
      margin-top:16px;
      background:#fff;
      border:2px solid var(--line);
      border-radius:20px;
      overflow:hidden;
    }
    .question-toggle{
      width:100%;
      text-align:left;
      border:none;
      background:#fff;
      padding:16px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      cursor:pointer;
      font-weight:700;
    }
    .question-body{
      display:none;
      border-top:2px solid var(--line);
      padding:16px 18px 18px;
    }
    .question-body.open{display:block}

    .q-line{
      margin:0 0 10px;
      line-height:1.5;
      font-size:1.05rem;
    }
    .q-line:last-child{margin-bottom:0}

    .chip{
      border:3px solid var(--line);
      background:#fff;
      border-radius:18px;
      min-height:62px;
      padding:14px 18px;
      font-weight:700;
      cursor:pointer;
      color:var(--ink);
    }

    .option-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:14px;
    }
    .option,
    .mini-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-height:88px;
      background:#fff;
      border:3px solid var(--line);
      border-radius:22px;
      cursor:pointer;
      padding:16px;
      font-weight:700;
      color:var(--ink);
    }
    .sentence-grid{
      display:grid;
      gap:12px;
    }
    .sentence-card{
      min-height:92px;
      justify-content:flex-start;
      text-align:left;
      line-height:1.45;
    }

    .chip.selected,
    .option.selected,
    .mini-btn.selected,
    .model-card.selected,
    .strategy-card.selected{
      border-color:var(--accent);
      background:var(--accent-soft);
      transform:translateY(-1px);
    }

    .feedback{
      display:none;
      margin-top:16px;
      padding:14px 16px;
      border-radius:18px;
      font-weight:700;
    }
    .feedback.good{
      display:block;
      background:var(--good-soft);
      border:2px solid #bde3ca;
      color:#125c2f;
    }
    .feedback.bad{
      display:block;
      background:var(--bad-soft);
      border:2px solid #f3c3c3;
      color:#8b2222;
    }

    .nav-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .scene{
      background:linear-gradient(180deg,#fdfefe,#f4f8fd);
      border:2px solid var(--line);
      border-radius:22px;
      padding:18px;
      min-height:300px;
      position:relative;
      overflow:hidden;
    }
    .scene-title{
      font-weight:700;
      color:var(--muted);
      margin-bottom:12px;
    }

    .people{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      align-items:end;
    }
    .person{
      background:#fff;
      border:2px solid var(--line);
      border-radius:20px;
      padding:12px;
      min-height:192px;
      position:relative;
    }
    .person h3{
      margin:0 0 10px;
      font-size:1.1rem;
    }

    .money-box{
      height:116px;
      border-radius:20px;
      background:linear-gradient(180deg,#d8f3ff,#a8e0ff);
      border:3px solid #79bddd;
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }
    .money-fill{
      width:100%;
      background:linear-gradient(180deg,#5eb7e6,#2b8ec5);
      border-radius:18px 18px 0 0;
      transition:height .7s ease;
    }
    .money-label{
      position:absolute;
      left:0; right:0; bottom:10px;
      text-align:center;
      font-weight:700;
      color:#08324b;
      text-shadow:0 1px 0 rgba(255,255,255,.5);
    }

    .brace{
      margin:10px auto 0;
      width:94%;
      border-top:4px solid var(--ink);
      position:relative;
      height:34px;
    }
    .brace::before,
    .brace::after{
      content:"";
      position:absolute;
      top:-4px;
      width:4px;
      height:22px;
      background:var(--ink);
    }
    .brace::before{left:0}
    .brace::after{right:0}
    .brace-label{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      top:10px;
      background:#fff;
      padding:2px 10px;
      border-radius:999px;
      font-weight:700;
    }

    .transfer-chip{
      position:absolute;
      top:88px;
      left:17%;
      background:#ffe59a;
      border:3px solid #f1bb2a;
      color:#5b4200;
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      box-shadow:0 6px 16px rgba(0,0,0,.08);
    }
    .transfer-chip.animate{animation:moveRight 2.2s ease-in-out infinite alternate}
    .transfer-chip.reverse{animation:moveLeft 2.2s ease-in-out infinite alternate}
    @keyframes moveRight{
      0%{transform:translateX(0) translateY(0)}
      100%{transform:translateX(320px) translateY(28px)}
    }
    @keyframes moveLeft{
      0%{transform:translateX(320px) translateY(28px)}
      100%{transform:translateX(0) translateY(0)}
    }

    .model-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
      gap:14px;
    }
    .model-card{
      border:3px solid var(--line);
      background:#fff;
      border-radius:22px;
      padding:14px;
      cursor:pointer;
      min-height:240px;
    }
    .model-card h4{
      margin:0 0 10px;
      text-align:center;
      font-size:1.02rem;
    }
    .model-caption{
      margin-top:10px;
      color:var(--muted);
      text-align:center;
      font-weight:700;
      min-height:42px;
    }

    .unit-stack{
      display:grid;
      gap:8px;
      margin-top:8px;
    }
    .unit-row{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-start;
      flex-wrap:nowrap;
    }
    .unit-label{
      width:78px;
      flex:0 0 78px;
      font-weight:700;
      font-size:.95rem;
    }
    .unit{
      width:110px;
      flex:0 0 110px;
      height:46px;
      border-radius:14px;
      border:3px solid #7aa7e8;
      background:#dcebff;
      position:relative;
      overflow:hidden;
    }
    .unit::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,#7aa7e8,#4d82d8);
      opacity:.94;
    }
    .unit.orange{
      border-color:#e3ab4a;
      background:#fff0cf;
    }
    .unit.orange::after{
      background:linear-gradient(180deg,#ffd48b,#ffb64c);
    }

    .equation{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      font-size:1.45rem;
      font-weight:700;
      background:#fff;
      border:2px dashed #bed3ef;
      border-radius:18px;
      padding:16px;
      margin:12px 0;
    }
    .blank{
      min-width:94px;
      min-height:38px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-bottom:4px solid var(--ink);
      padding:0 8px 4px;
    }

    .input-row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px;
    }
    .answer-input{
      min-height:64px;
      width:min(240px,100%);
      border-radius:18px;
      border:3px solid var(--line);
      padding:12px 14px;
      font-size:1.2rem;
      font-weight:700;
    }

    .mini-panel{
      margin-top:14px;
      background:#f8fbff;
      border:2px solid #cfe1fb;
      border-radius:20px;
      padding:14px;
    }
    .mini-panel h4{
      margin:0 0 10px;
      font-size:1.05rem;
    }
    .mini-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(160px,1fr));
      gap:12px;
      margin-top:12px;
    }

    .story-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    @media (max-width: 780px){
      .story-grid{grid-template-columns:1fr}
    }
    .story-card{
      border:2px solid var(--line);
      background:#fff;
      border-radius:20px;
      padding:14px;
    }
    .story-card h4{margin:0 0 10px}
    .story-line{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      margin-top:8px;
      border-radius:14px;
      background:#f8fbff;
      font-weight:700;
    }

    .compare-banner{
      margin-top:14px;
      background:#eef7ff;
      border:2px solid #c7ddfb;
      border-radius:18px;
      padding:14px;
      font-weight:700;
      text-align:center;
    }

    .strategy-layout{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    @media (max-width: 900px){
      .strategy-layout{grid-template-columns:1fr}
    }
    .strategy-zone{
      background:#fbfcfe;
      border:2px solid var(--line);
      border-radius:22px;
      padding:14px;
      min-height:260px;
    }
    .strategy-zone h4{margin:0 0 12px}
    .strategy-list{
      display:grid;
      gap:10px;
    }
    .strategy-card{
      border:3px solid var(--line);
      background:#fff;
      border-radius:18px;
      padding:14px;
      cursor:pointer;
      text-align:left;
      font-weight:700;
    }
    .ordered-card{
      border:3px solid #a7d4b6;
      background:#f2fbf5;
      border-radius:18px;
      padding:14px;
      min-height:68px;
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:700;
    }
    .ordered-num{
      width:36px;
      height:36px;
      border-radius:999px;
      background:var(--good);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      font-weight:700;
    }

    .end-banner{
      margin-top:16px;
      background:linear-gradient(135deg,#eefaf2,#def5e8);
      border:2px solid #bfe7ca;
      border-radius:22px;
      padding:18px;
      font-weight:700;
      font-size:1.15rem;
    }

    .muted{color:var(--muted)}
    .center{text-align:center}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Money Transfer Interactive</h1>
        <p>Keep the total the same. Build the after model. Work backwards to the start.</p>
      </div>
      <div class="controls">
        <button class="btn secondary" id="readAloudBtn" type="button">🔊 Read aloud</button>
        <button class="btn secondary" id="restartBtn" type="button">↺ Restart</button>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">Step 1 of 14</span>
        <span id="progressName">Read the problem</span>
      </div>
      <div class="progress"><div class="bar" id="progressBar"></div></div>
    </div>

    <div class="screen-card" id="appScreen"></div>

    <div class="question-card">
      <button class="question-toggle" id="questionToggle" type="button">
        <span>Show question</span>
        <span id="questionArrow">▼</span>
      </button>
      <div class="question-body" id="questionBody">
        <p class="q-line">Thomas and Puma have a total of <strong>$150</strong>.</p>
        <p class="q-line">After Thomas gave Puma <strong>$30</strong>, Thomas had <strong>twice as much as Puma</strong>.</p>
        <p class="q-line">How much money did Thomas have at first?</p>
      </div>
    </div>
  </div>

  <script>
    const QUESTION_TEXT = [
      "Thomas and Puma have a total of 150 dollars.",
      "After Thomas gave Puma 30 dollars, Thomas had twice as much as Puma.",
      "How much money did Thomas have at first?"
    ].join(" ");

    const screenMeta = [
      {title:"Read the problem", short:"Read the problem"},
      {title:"Find the after clue", short:"Find the after clue"},
      {title:"Does the total change?", short:"Total stays the same"},
      {title:"Who has more after?", short:"Who has more?"},
      {title:"Choose the after model", short:"Choose the model"},
      {title:"How many equal units?", short:"Count the units"},
      {title:"Find 1 unit", short:"Find 1 unit"},
      {title:"What does $50 mean?", short:"Check $50"},
      {title:"Find Thomas’s amount after", short:"Find Thomas after"},
      {title:"Before or after?", short:"Check $100"},
      {title:"Add or subtract to go back?", short:"Work backwards"},
      {title:"Find Thomas’s amount at first", short:"Find the start"},
      {title:"Check the story", short:"Check the story"},
      {title:"Consolidate the strategy", short:"Consolidate"}
    ];

    const strategyCorrect = [
      "The total stays $150.",
      "After the transfer, Thomas = 2 units and Puma = 1 unit.",
      "There are 3 equal units altogether.",
      "$150 ÷ 3 = $50, so Thomas has $100 after.",
      "Add back $30 to find Thomas’s amount at first."
    ];

    const state = {
      screen: 0,
      selected: null,
      feedbackType: "",
      feedbackText: "",
      unlocked: false,
      attempts: {},
      s7Input: "",
      s7MiniInput: "",
      s9Input: "",
      s11Stage: 0,
      s11PracticeSelected: null,
      s11PracticePassed: false,
      s12Input: "",
      s14Chosen: [],
      s14Pool: [
        "Add back $30 to find Thomas’s amount at first.",
        "$150 ÷ 3 = $50, so Thomas has $100 after.",
        "After the transfer, Thomas = 2 units and Puma = 1 unit.",
        "There are 3 equal units altogether.",
        "The total stays $150."
      ]
    };

    const appScreen = document.getElementById("appScreen");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const progressName = document.getElementById("progressName");

    function normalizeNumber(value){
      return String(value || "").replace(/[,\s$]/g, "");
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function clearFeedback(){
      state.feedbackType = "";
      state.feedbackText = "";
    }

    function setFeedback(type, text){
      state.feedbackType = type;
      state.feedbackText = text;
      render();
    }

    function markAttempt(key){
      state.attempts[key] = (state.attempts[key] || 0) + 1;
    }

    function updateProgress(){
      const pct = ((state.screen + 1) / screenMeta.length) * 100;
      progressBar.style.width = pct + "%";
      progressText.textContent = `Step ${state.screen + 1} of ${screenMeta.length}`;
      progressName.textContent = screenMeta[state.screen].short;
    }

    function feedbackHtml(){
      if(!state.feedbackText) return "";
      return `<div class="feedback ${state.feedbackType}">${state.feedbackText}</div>`;
    }

    function navHtml(showBack = true, nextDisabled = !state.unlocked){
      return `
        <div class="nav-row">
          <button class="btn secondary" type="button" data-action="back" ${showBack ? "" : "style='visibility:hidden'"}>← Back</button>
          <button class="btn" type="button" data-action="next" ${nextDisabled ? "disabled" : ""}>Next →</button>
        </div>
      `;
    }

    function renderQuestionWithChips(){
      return `
        <div class="panel">
          <p class="q-line">Thomas and Puma have a total of
            <button class="chip ${state.selected === '150' ? 'selected' : ''}" type="button" data-action="select-chip" data-value="150">$150</button>.
          </p>
          <p class="q-line">After Thomas gave Puma
            <button class="chip ${state.selected === '30' ? 'selected' : ''}" type="button" data-action="select-chip" data-value="30">$30</button>,
            Thomas had twice as much as Puma.
          </p>
          <p class="q-line">How much money did Thomas have at first?</p>
        </div>
      `;
    }

    function renderScreen1(){
      appScreen.innerHTML = `
        <div class="screen-head">
          <h2>Read the problem</h2>
          <div class="tag">Tap the total</div>
        </div>
        <div class="action-box">Tap the amount that tells the total money for both people together.</div>
        <div class="explain-box">Look for the amount for Thomas and Puma together.</div>

        <div class="grid-2">
          <div>
            ${renderQuestionWithChips()}
            <div class="input-row">
              <button class="btn ghost" type="button" data-action="check-s1">Check</button>
            </div>
            ${feedbackHtml()}
          </div>
          <div class="scene">
            <div class="scene-title">Who is in the story?</div>
            <div class="people">
              <div class="person">
                <h3>Thomas</h3>
                <div class="money-box">
                  <div class="money-fill" style="height:74%"></div>
                  <div class="money-label">His money</div>
                </div>
              </div>
              <div class="person">
                <h3>Puma</h3>
                <div class="money-box">
                  <div class="money-fill" style="height:44%"></div>
                  <div class="money-label">Her money</div>
                </div>
              </div>
            </div>
            <div class="brace"><div class="brace-label">Total together</div></div>
          </div>
        </div>
        ${navHtml(false)}
      `;
    }

    function renderScreen2(){
      appScreen.innerHTML = `
        <div class="screen-head">
          <h2>Find the after clue</h2>
          <div class="tag">Tap the after clue</div>
        </div>
        <div class="action-box">Tap the sentence that tells what happens after Thomas gave Puma $30.</div>
        <div class="explain-box">We will build the after picture first.</div>

        <div class="sentence-grid">
          <button class="option sentence-card ${state.selected === 'total' ? 'selected' : ''}" type="button" data-action="select-option" data-value="total">

        case 4: renderScreen5(); break;
        case 5: renderScreen6(); break;
        case 6: renderScreen7(); break;
        case 7: renderScreen8(); break;
        case 8: renderScreen9(); break;
        case 9: renderScreen10(); break;
        case 10: renderScreen11(); break;
        case 11: renderScreen12(); break;
        case 12: renderScreen13(); break;
        case 13: renderScreen14(); break;
      }
      attachHandlers();
    }

    function attachHandlers(){
      appScreen.querySelectorAll("[data-action='select-chip']").forEach(btn => {
        btn.addEventListener("click", () => {
          state.selected = btn.dataset.value;
          clearFeedback();
          render();
        });
      });

      appScreen.querySelectorAll("[data-action='select-option']").forEach(btn => {
        btn.addEventListener("click", () => {
          state.selected = btn.dataset.value;
          clearFeedback();
          render();
        });
      });

      appScreen.querySelectorAll("[data-action='select-practice']").forEach(btn => {
        btn.addEventListener("click", () => {
          state.s11PracticeSelected = btn.dataset.value;
          clearFeedback();
          render();
        });
      });

      appScreen.querySelectorAll("[data-action='pick-strategy']").forEach(btn => {
        btn.addEventListener("click", () => {
          const clean = btn.textContent.trim();
          if(!state.s14Chosen.includes(clean)){
            state.s14Chosen.push(clean);
            clearFeedback();
            state.unlocked = false;
            render();
          }
        });
      });

      const backBtn = appScreen.querySelector("[data-action='back']");
      if(backBtn){
        backBtn.addEventListener("click", () => {
          if(state.screen > 0){
            state.screen -= 1;
            state.selected = null;
            clearFeedback();
            state.unlocked = state.screen < 13;
            render();
          }
        });
      }

      const nextBtn = appScreen.querySelector("[data-action='next']");
      if(nextBtn){
        nextBtn.addEventListener("click", () => {
          if(state.unlocked && state.screen < screenMeta.length - 1){
            state.screen += 1;
            state.selected = null;
            clearFeedback();
            state.unlocked = false;
            render();
          }
        });
      }

      const resetStrategyBtn = appScreen.querySelector("[data-action='reset-strategy']");
      if(resetStrategyBtn){
        resetStrategyBtn.addEventListener("click", () => {
          state.s14Chosen = [];
          clearFeedback();
          state.unlocked = false;
          render();
        });
      }

      bindChecks();
    }

    function bindChecks(){
      const actions = {
        "check-s1": () => {
          markAttempt("s1");
          if(state.selected === "150"){
            state.unlocked = true;
            setFeedback("good", "$150 is the total money for Thomas and Puma together.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Look for the amount for both of them together.");
          }
        },
        "check-s2": () => {
          markAttempt("s2");
          if(state.selected === "after"){
            state.unlocked = true;
            setFeedback("good", "Good. We will use the after picture first.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Look for the part that starts after Thomas gave Puma $30.");
          }
        },
        "check-s3": () => {
          markAttempt("s3");
          if(state.selected === "same"){
            state.unlocked = true;
            setFeedback("good", "The money moved, but none was added or removed. The total stays $150.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "The money only moved from Thomas to Puma. The total for both of them stays the same.");
          }
        },
        "check-s4": () => {
          markAttempt("s4");
          if(state.selected === "thomas"){
            state.unlocked = true;
            setFeedback("good", "Yes. Thomas has more money after the transfer.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "The question says Thomas had twice as much as Puma.");
          }
        },
        "check-s5": () => {
          markAttempt("s5");
          if(state.selected === "correct"){
            state.unlocked = true;
            setFeedback("good", "Correct. After the transfer, Thomas has 2 equal units and Puma has 1 equal unit.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Twice as much means Thomas has 2 equal units when Puma has 1 equal unit.");
          }
        },
        "check-s6": () => {
          markAttempt("s6");
          if(state.selected === "3"){
            state.unlocked = true;
            setFeedback("good", "Yes. 2 units plus 1 unit makes 3 equal units.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Count the equal units carefully: 2 for Thomas and 1 for Puma.");
          }
        },
        "check-s7": () => {
          markAttempt("s7");
          if(normalizeNumber(state.s7Input) === "50"){
            state.unlocked = true;
            setFeedback("good", "$150 ÷ 3 = $50. One unit is $50.");
          } else {
            state.unlocked = false;
            if((state.attempts.s7 || 0) >= 2){
              setFeedback("bad", "Think: 3 equal units make $150, so each unit is one-third of $150.");
            } else {
              setFeedback("bad", "Remember: 3 equal units make $150.");
            }
          }
        },
        "check-s7-mini": () => {
          if(normalizeNumber(state.s7MiniInput) === "4"){
            setFeedback("good", "Good. 12 split into 3 equal parts gives 4 in each part. Now use the same idea for $150.");
          } else {
            setFeedback("bad", "12 ÷ 3 = 4. Now go back and think about $150 ÷ 3.");
          }
        },
        "check-s8": () => {
          markAttempt("s8");
          if(state.selected === "pumaAfter"){
            state.unlocked = true;
            setFeedback("good", "Yes. $50 is 1 unit, and Puma has 1 unit after the transfer.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "$50 is only 1 unit. Thomas has 2 units after the transfer.");
          }
        },
        "check-s9": () => {
          markAttempt("s9");
          if(normalizeNumber(state.s9Input) === "100"){
            state.unlocked = true;
            setFeedback("good", "Yes. Thomas has 2 units, so he has $100 after the transfer.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Thomas has 2 units after the transfer, not 1 unit.");
          }
        },
        "check-s10": () => {
          markAttempt("s10");
          if(state.selected === "after"){
            state.unlocked = true;
            setFeedback("good", "Yes. $100 is Thomas’s amount after he gave Puma $30.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "We found $100 from the after picture.");
          }
        },
        "check-s11": () => {
          markAttempt("s11");
          if(state.selected === "add"){
            state.unlocked = true;
            setFeedback("good", "Add back. Thomas had more before he gave away $30.");
          } else {
            state.unlocked = false;
            if(state.s11Stage === 0){
              state.s11Stage = 1;
              setFeedback("bad", "Before giving away money, Thomas had more money.");
            } else if(state.s11Stage === 1){
              state.s11Stage = 2;
              setFeedback("bad", "Try the quick practice below. Then come back to Thomas.");
            } else {
              setFeedback("bad", "Go back to the idea: before giving away money, Thomas had more.");
            }
          }
        },
        "check-s11-practice": () => {
          if(state.s11PracticeSelected === "more"){
            state.s11PracticePassed = true;
            setFeedback("good", "Correct. Before giving, Ken had more. Use the same idea for Thomas.");
          } else {
            setFeedback("bad", "If Ken gave money away and then had $60, Ken must have had more before.");
          }
          render();
        },
        "check-s12": () => {
          markAttempt("s12");
          if(normalizeNumber(state.s12Input) === "130"){
            state.unlocked = true;
            setFeedback("good", "Yes. Thomas had $130 at first.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Add back the $30 that Thomas gave away: $100 + $30.");
          }
        },
        "check-s13": () => {
          markAttempt("s13");
          if(state.selected === "yes"){
            state.unlocked = true;
            setFeedback("good", "Check complete. The total stays $150, and after the transfer Thomas has twice as much as Puma.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Check again: Thomas has $100 after giving, and Puma has $50. $100 is twice $50.");
          }
        },
        "check-s14": () => {
          const ok = JSON.stringify(state.s14Chosen) === JSON.stringify(strategyCorrect);
          if(ok){
            state.unlocked = true;
            setFeedback("good", "Strategy: keep the total the same, build the after model, find 1 unit, find Thomas’s after amount, then add back the transfer.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Try again. Start with the total staying the same. Then build the after model.");
          }
        }
      };

      appScreen.querySelectorAll("[data-action^='check-']").forEach(btn => {
        btn.addEventListener("click", () => {
          const fn = actions[btn.dataset.action];
          if(fn) fn();
        });
      });
    }

    function getCurrentReadText(){
      const extras = {
        0: "Tap the amount that tells the total money for both people together.",
        1: "Tap the sentence that tells what happens after Thomas gave Puma 30 dollars.",
        2: "Thomas gives 30 dollars to Puma. The total stays the same because the money moves inside the pair.",
        3: "After the transfer, decide who has more money.",
        4: "Choose the model where Thomas has 2 units and Puma has 1 unit.",
        5: "Count the equal units in the after model.",
        6: "Three equal units make 150 dollars. Type the amount in 1 unit.",
        7: "Fifty dollars is only one unit.",
        8: "Thomas has 2 units after the transfer, so find Thomas's amount after.",
        9: "One hundred dollars belongs to the after picture, not the before picture.",
        10: "To go back to Thomas's amount at first, decide whether to add or subtract 30 dollars.",
        11: "Add back 30 dollars to find Thomas's amount at first.",
        12: "Check whether the story fits the answer.",
        13: "Put the strategy cards in the correct order."
      };
      return `Step ${state.screen + 1}. ${screenMeta[state.screen].title}. ${QUESTION_TEXT} ${extras[state.screen] || ""}`;
    }

    document.getElementById("readAloudBtn").addEventListener("click", () => {
      const text = getCurrentReadText();
      if("speechSynthesis" in window){
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.92;
        utter.pitch = 1;
        window.speechSynthesis.speak(utter);
      } else {
        alert("Read aloud is not available on this device.");
      }
    });

    document.getElementById("restartBtn").addEventListener("click", () => {
      if("speechSynthesis" in window) window.speechSynthesis.cancel();
      state.screen = 0;
      state.selected = null;
      state.feedbackType = "";
      state.feedbackText = "";
      state.unlocked = false;
      state.attempts = {};
      state.s7Input = "";
      state.s7MiniInput = "";
      state.s9Input = "";
      state.s11Stage = 0;
      state.s11PracticeSelected = null;
      state.s11PracticePassed = false;
      state.s12Input = "";
      state.s14Chosen = [];
      render();
    });

    const questionToggle = document.getElementById("questionToggle");
    const questionBody = document.getElementById("questionBody");
    const questionArrow = document.getElementById("questionArrow");
    questionToggle.addEventListener("click", () => {
      const open = questionBody.classList.toggle("open");
      questionArrow.textContent = open ? "▲" : "▼";
      questionToggle.querySelector("span").textContent = open ? "Hide question" : "Show question";
    });

    render();
  </script>
</body>
</html>
