
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>plant_reproduction_8b</title>
<style>
  :root{
    --bg:#f5fbf5;
    --card:#ffffff;
    --ink:#17311f;
    --muted:#5d7363;
    --line:#d6e6d8;
    --green:#2f7d46;
    --green-dark:#225b33;
    --green-light:#e7f5e9;
    --yellow:#f6c945;
    --blue:#dff2ff;
    --red:#c62828;
    --red-soft:#ffe9e9;
    --shadow:0 10px 24px rgba(26,52,35,.08);
    --radius:22px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:linear-gradient(180deg,#f3fbf2 0%, #eef7ff 100%);color:var(--ink);font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;}
  body{padding:18px}
  .app{max-width:960px;margin:0 auto}
  .topbar{
    background:rgba(255,255,255,.88);
    backdrop-filter:saturate(1.1) blur(8px);
    border:1px solid var(--line);
    border-radius:20px;
    padding:12px 14px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    box-shadow:var(--shadow);
    margin-bottom:14px;
  }
  .top-left,.top-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .title-pill,.progress-pill,.lives-pill,.toggle-pill{
    display:flex;align-items:center;gap:8px;
    padding:10px 14px;border-radius:999px;border:1px solid var(--line);
    background:#fff;min-height:46px;
  }
  .title-pill{font-weight:800}
  .progress-pill,.toggle-pill,.lives-pill{color:var(--muted);font-weight:700}
  .screen{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:22px;
    min-height:620px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .screen-head{
    display:flex;
    gap:12px;
    justify-content:space-between;
    align-items:flex-start;
    flex-wrap:wrap;
  }
  .eyebrow{
    color:var(--green-dark);
    font-weight:800;
    letter-spacing:.02em;
    text-transform:uppercase;
    font-size:.84rem;
  }
  .instruction{
    font-size:clamp(1.4rem, 1.2rem + .9vw, 2rem);
    line-height:1.2;
    font-weight:900;
    margin:4px 0 0;
    max-width:720px;
  }
  .subtle{color:var(--muted);font-size:1rem;line-height:1.4}
  .read-btn,.small-btn,.check-btn,.next-btn,.step-btn,.option-btn,.slot-btn,.chip-btn,.finish-btn,.toggle-btn{
    border:1px solid var(--line);
    border-radius:18px;
    background:#fff;
    color:var(--ink);
    padding:14px 16px;
    font-size:1.02rem;
    line-height:1.25;
    font-weight:800;
    cursor:pointer;
    min-height:54px;
    transition:transform .08s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
    box-shadow:0 2px 0 rgba(0,0,0,.02);
  }
  .read-btn,.small-btn,.toggle-btn{min-height:46px;padding:10px 14px;font-size:.95rem}
  .check-btn,.next-btn,.finish-btn{padding:15px 20px}
  button:hover{transform:translateY(-1px)}
  button:disabled{cursor:not-allowed;opacity:.5;transform:none}
  .read-btn,.toggle-btn{background:#fff}
  .toggle-btn.active{background:var(--green-light);border-color:#aad5b4;color:var(--green-dark)}
  .action-area{
    display:flex;flex-direction:column;gap:18px;flex:1;
  }
  .hero-card,.question-card,.diagram-card,.feedback,.panel,.completion-card{
    background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px;
  }
  .hero-card{background:linear-gradient(180deg,#fbfffb 0%,#f1fff2 100%)}
  .question-card{background:linear-gradient(180deg,#f8fffb 0%,#ffffff 100%)}
  .question-text{
    font-size:1.2rem;line-height:1.55;font-weight:700;
  }
  .hl{background:#fff6c3;padding:2px 4px;border-radius:6px}
  .chip-grid,.option-grid{display:grid;gap:12px}
  .chip-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
  .option-grid{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
  .option-btn,.chip-btn{
    text-align:left;background:#fff;
  }
  .option-btn.selected,.chip-btn.selected,.slot-btn.selected{
    background:var(--green-light);border-color:#8fd3a2;
  }
  .option-btn.correct,.chip-btn.correct,.slot-btn.correct{
    background:#eaf8ee;border-color:#6bc387;color:#1f5f34;
  }
  .option-btn.wrong,.chip-btn.wrong,.slot-btn.wrong{
    background:var(--red-soft);border-color:#f2a7a7;color:#8e2020;
  }
  .controls-row,.nav-row,.check-row,.guess-row{
    display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  }
  .nav-row{justify-content:space-between;padding-top:4px}
  .next-btn,.finish-btn,.step-btn,.check-btn{
    background:var(--green);color:#fff;border-color:transparent;
  }
  .next-btn.secondary,.small-btn.ghost,.step-btn.secondary{
    background:#fff;color:var(--ink);border-color:var(--line)
  }
  .feedback{min-height:86px;display:flex;align-items:center}
  .feedback.correct{background:#effaf1;border-color:#92d6a0}
  .feedback.wrong{background:#fff1f1;border-color:#efb0b0}
  .feedback-text{font-weight:800;font-size:1.04rem;line-height:1.4}
  details.question-panel{
    margin-top:auto;
    border:1px solid var(--line);
    border-radius:20px;
    overflow:hidden;
    background:#fbfffb;
  }
  details.question-panel > summary{
    cursor:pointer;
    list-style:none;
    padding:16px 18px;
    font-weight:900;
    color:var(--green-dark);
  }
  details.question-panel > summary::-webkit-details-marker{display:none}
  .question-panel-body{padding:0 18px 18px}
  .sequence-wrap{display:grid;grid-template-columns:1fr;gap:14px}
  .diagram-caption{font-size:1rem;color:var(--muted);font-weight:700}
  .bars{
    display:grid;gap:10px;margin-top:6px;
  }
  .bar-card{
    display:grid;gap:8px;padding:12px;border-radius:18px;border:1px solid var(--line);background:#fbfffb;
  }
  .bar-label{font-weight:900}
  .bar-track{height:16px;background:#edf3ee;border-radius:999px;overflow:hidden}
  .bar-fill{height:100%;border-radius:999px}
  .bar-fill.seed{background:linear-gradient(90deg,#88c29b 0%, #2f7d46 100%)}
  .bar-fill.leaf{background:linear-gradient(90deg,#ffe59a 0%, #f6c945 100%)}
  .stage-tag{
    display:inline-flex;padding:8px 12px;background:#eef7ff;border:1px solid #cfe4f7;border-radius:999px;font-weight:800;color:#245d7a;
  }
  .match-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;
  }
  .slot{
    border:2px dashed #b7d7bf;border-radius:22px;background:#f9fef9;padding:14px;display:grid;gap:10px;min-height:132px;
  }
  .slot-label{font-weight:900;color:var(--green-dark)}
  .slot-drop{
    min-height:56px;border-radius:16px;border:1px dashed #b9d1be;background:#fff;padding:10px;display:flex;align-items:center;
    font-weight:800;color:var(--muted)
  }
  .bank-title{font-weight:900}
  .bank-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .blank-wrap{display:grid;gap:16px}
  .blank-card{
    background:#fbfffb;border:1px solid var(--line);border-radius:22px;padding:16px;
    font-weight:800;line-height:1.6;font-size:1.12rem;
  }
  .blank{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:220px;min-height:46px;padding:8px 12px;margin:0 4px;border-radius:14px;border:2px dashed #bad3bf;background:#fff;color:var(--muted);vertical-align:middle;
  }
  .blank.filled{border-style:solid;background:#eefaf1;color:var(--ink)}
  .guess-card{
    display:grid;gap:14px;
  }
  .guess-sentence{
    font-size:1.16rem;line-height:1.7;font-weight:800;background:#fbfffb;border:1px solid var(--line);padding:16px;border-radius:20px;
  }
  .masked{
    display:inline-flex;align-items:center;justify-content:center;min-width:120px;padding:4px 8px;border-bottom:3px solid #7eb18d;border-radius:10px;background:#eff8f1;font-weight:900;letter-spacing:.12em
  }
  .guess-input{
    width:min(280px,100%);font-size:1.1rem;padding:14px 16px;border-radius:16px;border:2px solid #bfd4c4;background:#fff;font-weight:800;
  }
  .helper{
    color:var(--muted);font-weight:700
  }
  .popup-row{display:flex;gap:10px;flex-wrap:wrap}
  dialog.info{
    border:none;border-radius:22px;max-width:520px;width:min(92vw,520px);padding:0;box-shadow:0 30px 60px rgba(0,0,0,.2)
  }
  dialog.info::backdrop{background:rgba(0,0,0,.28)}
  .dialog-card{padding:22px}
  .dialog-title{font-size:1.2rem;font-weight:900;margin:0 0 8px}
  .dialog-text{font-size:1.05rem;line-height:1.55;margin:0 0 18px}
  .gameover{
    position:fixed;inset:0;background:rgba(15,31,20,.46);
    display:none;align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .gameover.show{display:flex}
  .gameover-card{
    background:#fff;border-radius:28px;padding:24px;max-width:460px;width:100%;box-shadow:0 30px 60px rgba(0,0,0,.24);border:1px solid var(--line);text-align:center;
  }
  .gameover-card h2{margin:0 0 10px;font-size:2rem}
  .gameover-card p{font-size:1.06rem;line-height:1.5;color:var(--muted)}
  .leaf-row{display:flex;gap:6px;align-items:center}
  .leaf-icon{width:24px;height:24px;display:inline-block}
  .leaf-lost{opacity:.18;filter:grayscale(.5)}
  .completion-card{
    display:grid;gap:14px;text-align:center;background:linear-gradient(180deg,#fafffb 0%,#eef9f1 100%);
  }
  .summary-line{
    background:#fff;border:1px solid var(--line);padding:14px 16px;border-radius:18px;font-weight:800;line-height:1.5;text-align:left;
  }
  .inline-note{font-size:.98rem;color:var(--muted);font-weight:700}
  .sr-only{position:absolute;left:-9999px}
  @media (max-width:720px){
    body{padding:12px}
    .screen{padding:16px;min-height:unset}
    .instruction{font-size:1.45rem}
    .topbar{padding:10px}
    .option-grid,.chip-grid,.bank-grid,.match-grid{grid-template-columns:1fr}
    .blank{display:block;margin:8px 0}
  }
</style>
</head>
<body>
<div class="app">
  <div id="topbar" class="topbar" aria-live="polite"></div>
  <main id="screen" class="screen" aria-live="polite"></main>
</div>

<dialog id="popupDialog" class="info" aria-labelledby="dialogTitle">
  <div class="dialog-card">
    <h2 id="dialogTitle" class="dialog-title"></h2>
    <p id="dialogText" class="dialog-text"></p>
    <button id="closeDialog" class="small-btn">Close</button>
  </div>
</dialog>

<div id="gameOver" class="gameover" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
  <div class="gameover-card">
    <h2 id="gameOverTitle">All the leaf bites are gone.</h2>
    <p>Time to restart from the beginning and read the clues more carefully.</p>
    <button id="restartAll" class="finish-btn">Start again</button>
  </div>
</div>

<script>
(() => {
  const QUESTION = 'State the difference between how the seedling get its food before and after the leaves appear.';
  const TOTAL_TEACHING_SCREENS = 5;
  const TOTAL_LIVES = Math.ceil(TOTAL_TEACHING_SCREENS / 2);

  const app = {
    screenIndex: 0,
    readAloud: false,
    livesTotal: TOTAL_LIVES,
    lives: TOTAL_LIVES,
    questionPanelOpen: false,
    local: {},
    voiceReady: false
  };

  const screens = [
    {
      id: 's1',
      phase: 'Question 8(b)',
      title: 'Find the comparison point',
      instruction: 'Tap the words that tell you what to compare.',
      type: 'single',
      teaching: true,
      prominentQuestion: true,
      options: [
        { text: 'before and after the leaves appear', correct: true },
        { text: 'write in the spaces provided', correct: false },
        { text: 'list the three conditions', correct: false }
      ],
      feedbackCorrect: 'Yes. Compare how the seedling gets food before leaves appear and after leaves appear.',
      feedbackWrong: 'Look for the words that name the two stages to compare.'
    },
    {
      id: 's2',
      phase: 'Before leaves appear',
      title: 'Watch the early growth',
      instruction: 'Tap Next Step to watch the seedling grow before leaves appear. Then tap where it gets food from.',
      type: 'animation-early',
      teaching: true,
      steps: [
        { stage: 0, stageLabel: 'Seed', note: 'The seed has stored food in its seed leaves.', seedFood: 100, leafFood: 0 },
        { stage: 2, stageLabel: 'Shoot grows', note: 'The seedling grows, but there are still no true leaves yet.', seedFood: 62, leafFood: 0 },
        { stage: 3, stageLabel: 'Before true leaves', note: 'Before leaves appear, the seedling is still using stored food in the seed leaves.', seedFood: 34, leafFood: 0 }
      ],
      options: [
        { text: 'stored food in the seed leaves', correct: true },
        { text: 'food made in the leaves', correct: false },
        { text: 'food from the roots', correct: false }
      ],
      feedbackCorrect: 'Yes. Before leaves appear, it gets food from stored food in the seed leaves.',
      feedbackWrong: 'Look again. The leaves have not appeared yet.',
      popup: { title: 'What are seed leaves?', text: 'Seed leaves contain stored food that helps the seedling grow at first.' }
    },
    {
      id: 's3',
      phase: 'When leaves appear',
      title: 'Watch what changes',
      instruction: 'Tap Next Step until leaves appear. Then tap what starts happening.',
      type: 'animation-transition',
      teaching: true,
      steps: [
        { stage: 4, stageLabel: 'First leaves appear', note: 'Now the seedling has leaves.', seedFood: 26, leafFood: 18 },
        { stage: 5, stageLabel: 'Leaves start working', note: 'The seedling starts using its leaves to make food.', seedFood: 14, leafFood: 46 },
        { stage: 7, stageLabel: 'Stored food used up', note: 'Any stored food is used up over time, and the leaves keep making food.', seedFood: 0, leafFood: 84 }
      ],
      options: [
        { text: 'the seedling starts using its leaves to make food', correct: true },
        { text: 'the roots start making all the food', correct: false },
        { text: 'the seedling no longer needs food at all', correct: false }
      ],
      feedbackCorrect: 'Yes. After leaves appear, the seedling uses its leaves to make its own food.',
      feedbackWrong: 'Think about what the leaves let the seedling do.',
      popup: { title: 'Why do leaves matter?', text: 'When leaves appear, the plant can use them to make food.' }
    },
    {
      id: 's4',
      phase: 'Compare the two stages',
      title: 'Match each stage',
      instruction: 'Match each stage to how the seedling gets food. Then tap Check.',
      type: 'match2',
      teaching: true,
      slots: [
        { key: 'before', label: 'Before leaves appear', correctText: 'stored food in the seed leaves' },
        { key: 'after', label: 'After leaves appear', correctText: 'uses its leaves to make its own food' }
      ],
      bank: [
        'stored food in the seed leaves',
        'uses its leaves to make its own food',
        'gets food from roots',
        'gets food from water'
      ],
      feedbackCorrect: 'Good. You matched the early stage and the later stage correctly.',
      feedbackWrong: 'Check which stage has leaves and which stage does not.'
    },
    {
      id: 's5',
      phase: 'Build the answer',
      title: 'Fill the two key parts',
      instruction: 'Fill both blanks to build the answer. Then tap Check.',
      type: 'fill2',
      teaching: true,
      blanks: [
        {
          id: 'b1',
          sentenceBefore: 'Before leaves appear, the seedling gets its food from',
          correctText: 'stored food in the seed leaves'
        },
        {
          id: 'b2',
          sentenceBefore: 'After leaves appear, the seedling',
          correctText: 'uses its leaves to make its own food'
        }
      ],
      bank: [
        'stored food in the seed leaves',
        'uses its leaves to make its own food',
        'gets water from the roots',
        'grows taller',
        'takes in oxygen'
      ],
      feedbackCorrect: 'Well done. You built both parts of the answer.',
      feedbackWrong: 'Check that one blank is for before leaves appear and one blank is for after leaves appear.'
    },
    {
      id: 's6',
      phase: 'Guess the word',
      title: 'Retrieve the before part',
      instruction: 'Type the missing word. Wrong tries here do not cost a leaf bite.',
      type: 'guess',
      teaching: false,
      sequence: [
        {
          prompt: 'Word 1',
          sentence: 'Before leaves appear, the seedling gets its food from stored food in the ____ leaves.',
          word: 'seed'
        },
        {
          prompt: 'Word 2',
          sentence: 'Before leaves appear, the seedling gets its food from stored food in the seed ____.',
          word: 'leaves'
        }
      ],
      finalSentence: 'Before leaves appear, the seedling gets its food from stored food in the seed leaves.'
    },
    {
      id: 's7',
      phase: 'Guess the word',
      title: 'Retrieve the after part',
      instruction: 'Type the missing word. Wrong tries here do not cost a leaf bite.',
      type: 'guess',
      teaching: false,
      sequence: [
        {
          prompt: 'Word 1',
          sentence: 'After leaves appear, the seedling uses its ____ to make its own food.',
          word: 'leaves'
        },
        {
          prompt: 'Word 2',
          sentence: 'After leaves appear, the seedling uses its leaves to make its own ____.',
          word: 'food'
        }
      ],
      finalSentence: 'After leaves appear, the seedling uses its leaves to make its own food.'
    },
    {
      id: 's8',
      phase: 'Transfer check',
      title: 'One new question',
      instruction: 'Which statement is true when leaves first appear? Tap one.',
      type: 'single',
      teaching: false,
      options: [
        { text: 'The seedling starts using its leaves to make food.', correct: true },
        { text: 'The seedling stops needing food at once.', correct: false },
        { text: 'The roots begin making food for the plant.', correct: false },
        { text: 'The seedling no longer needs the seed leaves because roots make all the food.', correct: false }
      ],
      feedbackCorrect: 'Yes. Leaves let the seedling start making food.',
      feedbackWrong: 'Think about what the leaves allow the plant to do.'
    },
    {
      id: 's9',
      phase: 'Finished',
      title: 'You finished',
      instruction: 'Tap a button below.',
      type: 'completion',
      teaching: false
    }
  ];

  const topbar = document.getElementById('topbar');
  const screenEl = document.getElementById('screen');
  const popupDialog = document.getElementById('popupDialog');
  const dialogTitle = document.getElementById('dialogTitle');
  const dialogText = document.getElementById('dialogText');
  const closeDialog = document.getElementById('closeDialog');
  const gameOverEl = document.getElementById('gameOver');
  const restartAllBtn = document.getElementById('restartAll');

  function shuffle(array){
    const arr = [...array];
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'",'&#039;');
  }

  function getLeafIcon(active){
    return `
      <svg class="leaf-icon ${active ? '' : 'leaf-lost'}" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20.5 3.5c-8.8.3-14 5.8-14 12.2 0 2.8 1.7 4.8 4.4 4.8 6.6 0 9.2-6.3 9.6-17z" fill="${active ? '#2f7d46' : '#9eb6a5'}"></path>
        <path d="M8 19c2.1-3 4.7-5.3 9-7.7" stroke="#dff2e5" stroke-width="1.6" fill="none" stroke-linecap="round"></path>
      </svg>
    `;
  }

  function renderTopbar(){
    const livesIcons = Array.from({length: app.livesTotal}, (_, i) => getLeafIcon(i < app.lives)).join('');
    topbar.innerHTML = `
      <div class="top-left">
        <div class="title-pill">🌱 plant_reproduction_8b</div>
        <div class="progress-pill">Screen ${app.screenIndex + 1} of ${screens.length}</div>
      </div>
      <div class="top-right">
        <div class="lives-pill">
          <span>Leaf Bites Left:</span>
          <span class="leaf-row" aria-label="${app.lives} leaf bites left">${livesIcons}</span>
        </div>
        <button id="toggleRead" class="toggle-btn ${app.readAloud ? 'active' : ''}" aria-pressed="${app.readAloud ? 'true' : 'false'}">
          🔊 Read-aloud: ${app.readAloud ? 'On' : 'Off'}
        </button>
      </div>
    `;
    document.getElementById('toggleRead').addEventListener('click', () => {
      app.readAloud = !app.readAloud;
      render();
      if(app.readAloud){
        speak(getSpeechText());
      } else {
        window.speechSynthesis.cancel();
      }
    });
  }

  function getState(screenId){
    if(!app.local[screenId]){
      const screen = screens.find(s => s.id === screenId);
      const base = { completed: false, feedback: '', feedbackType: '', nextUnlocked: false };

      if(screen.type === 'single'){
        base.options = shuffle(screen.options);
        while(base.options[0] && base.options[0].correct && base.options.some(o => !o.correct)){
          base.options = shuffle(screen.options);
        }
        base.selected = null;
      }

      if(screen.type === 'multi'){
        base.options = shuffle(screen.options);
        base.selected = [];
      }

      if(screen.type === 'animation-early' || screen.type === 'animation-transition'){
        base.stepIndex = 0;
        base.options = shuffle(screen.options);
        while(base.options[0] && base.options[0].correct && base.options.some(o => !o.correct)){
          base.options = shuffle(screen.options);
        }
      }

      if(screen.type === 'match2'){
        base.selectedChip = null;
        base.slots = Object.fromEntries(screen.slots.map(slot => [slot.key, '']));
        base.bank = shuffle(screen.bank);
        while(base.bank.join('|') === screen.bank.join('|')){
          base.bank = shuffle(screen.bank);
        }
      }

      if(screen.type === 'fill2'){
        base.selectedChip = null;
        base.filled = Object.fromEntries(screen.blanks.map(b => [b.id, '']));
        base.bank = shuffle(screen.bank);
        while(base.bank.join('|') === screen.bank.join('|')){
          base.bank = shuffle(screen.bank);
        }
      }

      if(screen.type === 'guess'){
        base.currentWordIndex = 0;
        base.revealedCounts = screen.sequence.map(item => 1);
        base.inputValue = '';
        base.showFinalSentence = false;
      }

      app.local[screenId] = base;
    }
    return app.local[screenId];
  }

  function questionHtml(prominent = false){
    const q = prominent
      ? `State the <span class="hl">difference</span> between how the seedling <span class="hl">get its food</span> <span class="hl">before</span> and <span class="hl">after</span> the <span class="hl">leaves appear</span>.`
      : escapeHtml(QUESTION);
    return `
      <div class="question-card">
        <div class="eyebrow">Question</div>
        <div class="question-text">${q}</div>
      </div>
    `;
  }

  function miniPlantSVG(cx, stage){

  function largePlantSVG(stage){
    if(stage === 0){
      return `
        <g>
          <ellipse cx="210" cy="158" rx="40" ry="28" fill="#f2e4c2" stroke="#ba9f68" stroke-width="4"/>
          <path d="M 202 138 C 222 150, 224 168, 208 182" stroke="#8a6b3f" stroke-width="4" fill="none" />
        </g>
      `;
    }
    const stemH = stage >= 7 ? 118 : stage >= 6 ? 110 : stage >= 5 ? 96 : stage >= 4 ? 84 : stage >= 3 ? 70 : stage >= 2 ? 56 : 38;
    const topY = 190 - stemH;
    const rootSpread = stage >= 6 ? 48 : stage >= 4 ? 38 : 26;
    const cotyledonOpacity = stage >= 7 ? .35 : 1;
    const leafOpacity = stage >= 4 ? 1 : 0;
    return `
      <g>
        <path d="M 220 190 C 204 ${202 + rootSpread/2}, 190 ${206 + rootSpread/2}, 176 ${226 - rootSpread/2}" stroke="#8a6b3f" stroke-width="4" fill="none"/>
        <path d="M 220 190 C 236 ${205 + rootSpread/2}, 248 ${212 + rootSpread/2}, 260 ${230 - rootSpread/2}" stroke="#8a6b3f" stroke-width="4" fill="none"/>
        <path d="M 220 190 L 220 ${topY}" stroke="#4d9457" stroke-width="7" stroke-linecap="round"/>
        <ellipse cx="204" cy="176" rx="25" ry="11" fill="#9fd2a6" opacity="${cotyledonOpacity}" transform="rotate(-34 204 176)"/>
        <ellipse cx="236" cy="176" rx="25" ry="11" fill="#9fd2a6" opacity="${cotyledonOpacity}" transform="rotate(34 236 176)"/>
        <ellipse cx="198" cy="${topY + 18}" rx="24" ry="11" fill="#6ab06f" opacity="${leafOpacity}" transform="rotate(-28 198 ${topY + 18})"/>
        <ellipse cx="244" cy="${topY + 14}" rx="24" ry="11" fill="#6ab06f" opacity="${leafOpacity}" transform="rotate(30 244 ${topY + 14})"/>
        <circle cx="220" cy="${topY}" r="5" fill="#4d9457"/>
      </g>
    `;
  }

  function renderFeedback(state){
    const cls = state.feedbackType ? `feedback ${state.feedbackType}` : 'feedback';
    const text = state.feedback || 'Make your choice to continue.';
    return `
      <div class="${cls}">
        <div class="feedback-text">${escapeHtml(text)}</div>
      </div>
    `;
  }

  function renderQuestionPanel(){
    return `
      <details class="question-panel" ${app.questionPanelOpen ? 'open' : ''}>
        <summary>Show the question again</summary>
        <div class="question-panel-body">
          ${questionHtml(false)}
        </div>
      </details>
    `;
  }

  function renderSingle(screen, state){
    return `
      <div class="hero-card">
        ${screen.prominentQuestion ? questionHtml(true) : ''}
        ${screen.prominentQuestion ? `<div class="diagram-card">${renderSequenceSVG()}</div>` : ''}
        ${!screen.prominentQuestion ? `<div class="subtle">Think about the stage named in the instruction.</div>` : ''}
      </div>
      <div class="option-grid">
        ${state.options.map((opt, idx) => `
          <button class="option-btn ${state.selected === idx ? 'selected' : ''} ${state.completed && state.selected === idx ? (opt.correct ? 'correct' : 'wrong') : ''}" data-action="single-select" data-index="${idx}">
            ${escapeHtml(opt.text)}
          </button>
        `).join('')}
      </div>
      ${renderFeedback(state)}
      ${!screen.prominentQuestion ? renderQuestionPanel() : ''}
    `;
  }

  function renderMulti(screen, state){
    return `
      <div class="panel">
        <div class="subtle">Choose exactly two cards.</div>
      </div>
      <div class="option-grid">
        ${state.options.map((opt, idx) => `
          <button class="option-btn ${state.selected.includes(idx) ? 'selected' : ''} ${state.completed ? (opt.correct ? 'correct' : (state.selected.includes(idx) ? 'wrong' : '')) : ''}" data-action="multi-toggle" data-index="${idx}">
            ${escapeHtml(opt.text)}
          </button>
        `).join('')}
      </div>
      <div class="check-row">
        <button class="check-btn" data-action="multi-check">Check</button>
      </div>
      ${renderFeedback(state)}
      ${renderQuestionPanel()}
    `;
  }

  function renderAnimation(screen, state){
    const step = screen.steps[state.stepIndex];
    const optionsVisible = state.stepIndex === screen.steps.length - 1;
    return `
      <div class="panel">
        ${renderPlantStageSVG(step.stage, step.seedFood, step.leafFood, step.stageLabel, step.note)}
      </div>
      <div class="controls-row">
        <button class="step-btn" data-action="anim-step" ${optionsVisible ? 'disabled' : ''}>Next Step</button>
        ${screen.popup ? `<button class="small-btn ghost" data-action="show-popup" data-title="${escapeHtml(screen.popup.title)}" data-text="${escapeHtml(screen.popup.text)}">${screen.popup.title}</button>` : ''}
      </div>
      ${optionsVisible ? `
        <div class="option-grid">
          ${state.options.map((opt, idx) => `
            <button class="option-btn ${state.selected === idx ? 'selected' : ''} ${state.completed && state.selected === idx ? (opt.correct ? 'correct' : 'wrong') : ''}" data-action="single-select" data-index="${idx}">
              ${escapeHtml(opt.text)}
            </button>
          `).join('')}
        </div>
      ` : `<div class="panel"><div class="subtle">Keep tapping Next Step until the question appears.</div></div>`}
      ${renderFeedback(state)}
      ${renderQuestionPanel()}
    `;
  }

  function renderMatch(screen, state){
    return `
      <div class="match-grid">
        ${screen.slots.map(slot => `
          <div class="slot">
            <div class="slot-label">${escapeHtml(slot.label)}</div>
            <button class="slot-drop ${state.slots[slot.key] ? 'selected' : ''}" data-action="place-chip" data-slot="${slot.key}">
              ${state.slots[slot.key] ? escapeHtml(state.slots[slot.key]) : 'Tap a choice below, then tap this box.'}
            </button>
          </div>
        `).join('')}
      </div>
      <div class="panel">
        <div class="bank-title">Choice bank</div>
        <div class="bank-grid" style="margin-top:12px">
          ${state.bank.map((text, idx) => `
            <button class="chip-btn ${state.selectedChip === idx ? 'selected' : ''}" data-action="pick-chip" data-index="${idx}">
              ${escapeHtml(text)}
            </button>
          `).join('')}
        </div>
        <div class="inline-note" style="margin-top:10px">Tap one choice. Then tap a stage box.</div>
      </div>
      <div class="check-row">
        <button class="small-btn ghost" data-action="clear-match">Clear all</button>
        <button class="check-btn" data-action="match-check">Check</button>
      </div>
      ${renderFeedback(state)}
      ${renderQuestionPanel()}
    `;
  }

  function renderFill(screen, state){
    return `
      <div class="blank-wrap">
        ${screen.blanks.map(blank => `
          <div class="blank-card">
            ${escapeHtml(blank.sentenceBefore)}
            <button class="blank ${state.filled[blank.id] ? 'filled' : ''}" data-action="place-blank" data-blank="${blank.id}">
              ${state.filled[blank.id] ? escapeHtml(state.filled[blank.id]) : 'Tap a choice below, then tap here'}
            </button>.
          </div>
        `).join('')}
      </div>
      <div class="panel">
        <div class="bank-title">Choice bank</div>
        <div class="bank-grid" style="margin-top:12px">
          ${state.bank.map((text, idx) => `
            <button class="chip-btn ${state.selectedChip === idx ? 'selected' : ''}" data-action="pick-chip" data-index="${idx}">
              ${escapeHtml(text)}
            </button>
          `).join('')}
        </div>
      </div>
      <div class="check-row">
        <button class="small-btn ghost" data-action="clear-fill">Clear all</button>
        <button class="check-btn" data-action="fill-check">Check</button>
      </div>
      ${renderFeedback(state)}
      ${renderQuestionPanel()}
    `;
  }

  function renderGuess(screen, state){
    const item = screen.sequence[state.currentWordIndex];
    const currentWord = item.word;
    const revealCount = state.revealedCounts[state.currentWordIndex];
    const shown = currentWord.slice(0, revealCount);
    const masked = shown + '_'.repeat(Math.max(0, currentWord.length - revealCount));
    return `
      <div class="guess-card">
        <div class="guess-sentence">
          <div class="eyebrow">${escapeHtml(item.prompt)}</div>
          <div style="margin-top:8px">${escapeHtml(item.sentence).replace('____', `<span class="masked">${escapeHtml(masked)}</span>`)}</div>
        </div>
        <div class="helper">Type the whole missing word.</div>
        <div class="guess-row">
          <input id="guessInput" class="guess-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" value="${escapeHtml(state.inputValue || '')}" />
          <button class="check-btn" data-action="guess-check">Check</button>
        </div>
        ${renderFeedback(state)}
        ${state.showFinalSentence ? `
          <div class="summary-line">${escapeHtml(screen.finalSentence)}</div>
        ` : ''}
      </div>
      ${renderQuestionPanel()}
    `;
  }

  function renderCompletion(){
    return `
      <div class="completion-card">
        <div class="eyebrow">Clear finish</div>
        <div style="font-size:2rem;font-weight:900">Great job.</div>
        <div class="summary-line">Before leaves appear, the seedling gets its food from stored food in the seed leaves.</div>
        <div class="summary-line">After leaves appear, the seedling uses its leaves to make its own food.</div>
        <div class="inline-note">You compared the food source before and after the leaves appeared.</div>
        <div class="controls-row" style="justify-content:center">
          <button class="finish-btn" data-action="speak-final">🔊 Read the final answer</button>
          <button class="next-btn secondary" data-action="restart">Start again</button>
        </div>
      </div>
    `;
  }

  function renderScreen(){
    renderTopbar();
    const screen = screens[app.screenIndex];
    const state = getState(screen.id);

    let body = '';
    if(screen.type === 'single') body = renderSingle(screen, state);
    if(screen.type === 'multi') body = renderMulti(screen, state);
    if(screen.type === 'animation-early' || screen.type === 'animation-transition') body = renderAnimation(screen, state);
    if(screen.type === 'match2') body = renderMatch(screen, state);
    if(screen.type === 'fill2') body = renderFill(screen, state);
    if(screen.type === 'guess') body = renderGuess(screen, state);
    if(screen.type === 'completion') body = renderCompletion();

    screenEl.innerHTML = `
      <div class="screen-head">
        <div>
          <div class="eyebrow">${escapeHtml(screen.phase)}</div>
          <div class="instruction">${escapeHtml(screen.instruction)}</div>
        </div>
        <button class="read-btn" data-action="read-screen">🔊 Read this screen</button>
      </div>
      <div class="action-area">
        ${body}
      </div>
      <div class="nav-row">
        <button class="next-btn secondary" data-action="back" ${app.screenIndex === 0 ? 'disabled' : ''}>Back</button>
        <button class="next-btn" data-action="next" ${(screen.type === 'completion' || state.nextUnlocked) ? '' : 'disabled'}>${screen.type === 'completion' ? 'Done' : 'Next'}</button>
      </div>
    `;

    bindInteractions(screen, state);

    const details = screenEl.querySelector('details.question-panel');
    if(details){
      details.addEventListener('toggle', () => {
        app.questionPanelOpen = details.open;
      });
    }

    if(app.readAloud){
      speak(getSpeechText());
    }
  }

  function bindInteractions(screen, state){
    screenEl.querySelector('[data-action="read-screen"]').addEventListener('click', () => speak(getSpeechText()));

    const nextBtn = screenEl.querySelector('[data-action="next"]');
    if(nextBtn){
      nextBtn.addEventListener('click', () => {
        if(screen.type === 'completion'){
          return;
        }
        if(state.nextUnlocked && app.screenIndex < screens.length - 1){
          app.screenIndex += 1;
          renderScreen();
        }
      });
    }

    const backBtn = screenEl.querySelector('[data-action="back"]');
    if(backBtn){
      backBtn.addEventListener('click', () => {
        if(app.screenIndex > 0){
          app.screenIndex -= 1;
          renderScreen();
        }
      });
    }

    screenEl.querySelectorAll('[data-action="show-popup"]').forEach(btn => {
      btn.addEventListener('click', () => {
        dialogTitle.textContent = btn.dataset.title;
        dialogText.textContent = btn.dataset.text;
        popupDialog.showModal();
      });
    });

    if(screen.type === 'single'){
      screenEl.querySelectorAll('[data-action="single-select"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.dataset.index);
          state.selected = idx;
          const option = state.options[idx];
          if(option.correct){
            state.feedback = screen.feedbackCorrect;
            state.feedbackType = 'correct';
            state.completed = true;
            state.nextUnlocked = true;
          } else {
            state.feedback = screen.feedbackWrong;
            state.feedbackType = 'wrong';
            if(screen.teaching){
              loseLeaf();
              if(app.lives <= 0) return;
            }
          }
          renderScreen();
          if(app.readAloud) speak(state.feedback);
        });
      });
    }

    if(screen.type === 'multi'){
      screenEl.querySelectorAll('[data-action="multi-toggle"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.dataset.index);
          if(state.selected.includes(idx)){
            state.selected = state.selected.filter(i => i !== idx);
          } else {
            if(state.selected.length < 2) state.selected.push(idx);
          }
          renderScreen();
        });
      });
      screenEl.querySelector('[data-action="multi-check"]').addEventListener('click', () => {
        const correctSet = state.options.map((opt, idx) => opt.correct ? idx : null).filter(v => v !== null).sort((a,b)=>a-b);
        const chosen = [...state.selected].sort((a,b)=>a-b);
        const ok = correctSet.length === chosen.length && correctSet.every((v, i) => v === chosen[i]);
        if(ok){
          state.feedback = screen.feedbackCorrect;
          state.feedbackType = 'correct';
          state.completed = true;
          state.nextUnlocked = true;
        } else {
          state.feedback = screen.feedbackWrong;
          state.feedbackType = 'wrong';
          if(screen.teaching){
            loseLeaf();
            if(app.lives <= 0) return;
          }
        }
        renderScreen();
        if(app.readAloud) speak(state.feedback);
      });
    }

    if(screen.type === 'animation-early' || screen.type === 'animation-transition'){
      const stepBtn = screenEl.querySelector('[data-action="anim-step"]');
      if(stepBtn){
        stepBtn.addEventListener('click', () => {
          if(state.stepIndex < screen.steps.length - 1){
            state.stepIndex += 1;
            state.feedback = 'Good. Keep watching the change over time.';
            state.feedbackType = '';
            renderScreen();
          }
        });
      }
      screenEl.querySelectorAll('[data-action="single-select"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.dataset.index);
          state.selected = idx;
          const option = state.options[idx];
          if(option.correct){
            state.feedback = screen.feedbackCorrect;
            state.feedbackType = 'correct';
            state.completed = true;
            state.nextUnlocked = true;
          } else {
            state.feedback = screen.feedbackWrong;
            state.feedbackType = 'wrong';
            if(screen.teaching){
              loseLeaf();
              if(app.lives <= 0) return;
            }
          }
          renderScreen();
          if(app.readAloud) speak(state.feedback);
        });
      });
    }

    if(screen.type === 'match2'){
      screenEl.querySelectorAll('[data-action="pick-chip"]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedChip = Number(btn.dataset.index);
          renderScreen();
        });
      });
      screenEl.querySelectorAll('[data-action="place-chip"]').forEach(btn => {
        btn.addEventListener('click', () => {
          if(state.selectedChip === null) return;
          const slotKey = btn.dataset.slot;
          const text = state.bank[state.selectedChip];
          // return old text to bank position if overwriting
          state.slots[slotKey] = text;
          state.selectedChip = null;
          renderScreen();
        });
      });
      screenEl.querySelector('[data-action="clear-match"]').addEventListener('click', () => {
        state.slots = Object.fromEntries(screen.slots.map(slot => [slot.key, '']));
        state.selectedChip = null;
        state.feedback = 'All the stage boxes are clear again.';
        state.feedbackType = '';
        renderScreen();
      });
      screenEl.querySelector('[data-action="match-check"]').addEventListener('click', () => {
        const ok = screen.slots.every(slot => state.slots[slot.key] === slot.correctText);
        if(ok){
          state.feedback = screen.feedbackCorrect;
          state.feedbackType = 'correct';
          state.completed = true;
          state.nextUnlocked = true;
        } else {
          state.feedback = screen.feedbackWrong;
          state.feedbackType = 'wrong';
          if(screen.teaching){
            loseLeaf();
            if(app.lives <= 0) return;
          }
        }
        renderScreen();
        if(app.readAloud) speak(state.feedback);
      });
    }

    if(screen.type === 'fill2'){
      screenEl.querySelectorAll('[data-action="pick-chip"]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedChip = Number(btn.dataset.index);
          renderScreen();
        });
      });
      screenEl.querySelectorAll('[data-action="place-blank"]').forEach(btn => {
        btn.addEventListener('click', () => {
          if(state.selectedChip === null) return;
          const blankId = btn.dataset.blank;
          const text = state.bank[state.selectedChip];
          state.filled[blankId] = text;
          state.selectedChip = null;
          renderScreen();
        });
      });
      screenEl.querySelector('[data-action="clear-fill"]').addEventListener('click', () => {
        state.filled = Object.fromEntries(screen.blanks.map(b => [b.id, '']));
        state.selectedChip = null;
        state.feedback = 'Both blanks are clear again.';
        state.feedbackType = '';
        renderScreen();
      });
      screenEl.querySelector('[data-action="fill-check"]').addEventListener('click', () => {
        const ok = screen.blanks.every(blank => state.filled[blank.id] === blank.correctText);
        if(ok){
          state.feedback = screen.feedbackCorrect;
          state.feedbackType = 'correct';
          state.completed = true;
          state.nextUnlocked = true;
        } else {
          state.feedback = screen.feedbackWrong;
          state.feedbackType = 'wrong';
          if(screen.teaching){
            loseLeaf();
            if(app.lives <= 0) return;
          }
        }
        renderScreen();
        if(app.readAloud) speak(state.feedback);
      });
    }

    if(screen.type === 'guess'){
      const input = document.getElementById('guessInput');
      if(input){
        input.focus();
        input.addEventListener('input', (e) => {
          state.inputValue = e.target.value;
        });
        input.addEventListener('keydown', (e) => {
          if(e.key === 'Enter'){
            e.preventDefault();
            const btn = screenEl.querySelector('[data-action="guess-check"]');
            if(btn) btn.click();
          }
        });
      }
      screenEl.querySelector('[data-action="guess-check"]').addEventListener('click', () => {
        const item = screen.sequence[state.currentWordIndex];
        const guess = (state.inputValue || '').trim().toLowerCase();
        if(guess === item.word.toLowerCase()){
          state.feedback = `Yes. ${item.word} is correct.`;
          state.feedbackType = 'correct';
          state.inputValue = '';
          if(state.currentWordIndex < screen.sequence.length - 1){
            state.currentWordIndex += 1;
          } else {
            state.showFinalSentence = true;
            state.nextUnlocked = true;
            state.feedback = 'Well done. You rebuilt this part of the answer.';
          }
        } else {
          const word = item.word;
          state.revealedCounts[state.currentWordIndex] = Math.min(word.length, state.revealedCounts[state.currentWordIndex] + 1);
          state.feedback = 'Try again. One more letter is showing now.';
          state.feedbackType = 'wrong';
        }
        renderScreen();
        if(app.readAloud) speak(state.feedback);
      });
    }

    if(screen.type === 'completion'){
      screenEl.querySelector('[data-action="restart"]').addEventListener('click', resetApp);
      screenEl.querySelector('[data-action="speak-final"]').addEventListener('click', () => {
        speak('Before leaves appear, the seedling gets its food from stored food in the seed leaves. After leaves appear, the seedling uses its leaves to make its own food.');
      });
    }
  }

  function loseLeaf(){
    app.lives = Math.max(0, app.lives - 1);
    if(app.lives === 0){
      renderTopbar();
      gameOverEl.classList.add('show');
    }
  }

  function resetApp(){
    app.screenIndex = 0;
    app.lives = app.livesTotal;
    app.questionPanelOpen = false;
    app.local = {};
    gameOverEl.classList.remove('show');
    renderScreen();
  }

  closeDialog.addEventListener('click', () => popupDialog.close());
  restartAllBtn.addEventListener('click', resetApp);

  function getSpeechText(){
    const screen = screens[app.screenIndex];
    const state = getState(screen.id);
    let parts = [screen.phase, screen.instruction];

    if(screen.prominentQuestion){
      parts.push(QUESTION);
    }

    if(screen.type === 'single'){
      parts.push(...state.options.map(o => o.text));
    }
    if(screen.type === 'multi'){
      parts.push(...state.options.map(o => o.text));
    }
    if(screen.type === 'animation-early' || screen.type === 'animation-transition'){
      const step = screen.steps[state.stepIndex];
      parts.push(step.stageLabel, step.note);
      if(state.stepIndex === screen.steps.length - 1){
        parts.push(...state.options.map(o => o.text));
      }
    }
    if(screen.type === 'match2'){
      parts.push(...screen.slots.map(s => s.label));
      parts.push(...state.bank);
    }
    if(screen.type === 'fill2'){
      parts.push(...screen.blanks.map(b => b.sentenceBefore));
      parts.push(...state.bank);
    }
    if(screen.type === 'guess'){
      const item = screen.sequence[state.currentWordIndex];
      parts.push(item.sentence);
      parts.push('Type the whole missing word.');
    }
    if(screen.type === 'completion'){
      parts.push('Before leaves appear, the seedling gets its food from stored food in the seed leaves.');
      parts.push('After leaves appear, the seedling uses its leaves to make its own food.');
    }
    if(state.feedback){
      parts.push(state.feedback);
    }
    return parts.join('. ');
  }

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    utter.pitch = 1;
    window.speechSynthesis.speak(utter);
  }

  renderScreen();
})();
</script>
