
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Table and Chair Interactive v5</title>
<style>
  :root{
    --bg:#f5f7fb; --card:#fff; --ink:#1f2937; --muted:#6b7280; --line:#d1d5db;
    --blue:#2563eb; --blue2:#dbeafe; --green:#166534; --greenbg:#dcfce7;
    --amber:#92400e; --amberbg:#fef3c7; --red:#991b1b; --redbg:#fee2e2;
    --chair:#c7d2fe; --diff:#fde68a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif}
  .app{max-width:940px;margin:0 auto;padding:16px}
  .top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .title{font-size:clamp(28px,4vw,38px);font-weight:800}
  .btns{display:flex;gap:10px;flex-wrap:wrap}
  button{
    border:none;border-radius:16px;padding:14px 18px;min-height:52px;cursor:pointer;
    font-size:18px;font-weight:700;background:var(--blue);color:white;touch-action:manipulation
  }
  button.alt{background:#374151}
  button.ghost{background:white;color:var(--ink);border:2px solid var(--line)}
  button:disabled{opacity:.55;cursor:not-allowed}
  .card{background:var(--card);border:2px solid #e5e7eb;border-radius:20px;padding:18px;margin:14px 0;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .question{font-size:clamp(22px,3vw,28px);font-weight:800;line-height:1.4}
  .sub{font-size:18px;color:var(--muted);margin-top:8px}
  .progress{height:16px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:12px}
  .progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--blue),#0f766e);transition:width .3s ease}
  .prompt{font-size:clamp(24px,3.3vw,32px);font-weight:800;margin-bottom:8px}
  .mini{font-size:20px;color:var(--muted)}
  .options{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:16px}
  .option,.sentence{
    cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  .option{
    border:3px solid var(--line);border-radius:18px;padding:16px;background:white;min-height:80px;
    display:flex;align-items:center;justify-content:center;text-align:center;font-size:24px;font-weight:800
  }
  .option.selected,.sentence.selected{border-color:var(--blue)!important;background:var(--blue2)!important}
  .feedback{margin-top:16px;padding:14px 16px;border-radius:16px;font-size:22px;font-weight:800}
  .ok{background:var(--greenbg);color:var(--green)}
  .hint{background:var(--amberbg);color:var(--amber)}
  .bad{background:var(--redbg);color:var(--red)}
  .nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .sentence{font-size:24px;font-weight:800;padding:14px;border:3px solid var(--line);border-radius:16px;margin:10px 0;background:white}
  .model{margin-top:12px;padding:14px;border:2px dashed var(--line);border-radius:18px;background:#fcfcff}
  .row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start}
  .col{flex:1 1 320px;min-width:290px}
  .barrow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:14px 0}
  .lab{width:92px;font-size:22px;font-weight:800}
  .segs{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .seg{min-width:94px;height:62px;border:3px solid #475569;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;transition:all .5s ease}
  .chair{background:var(--chair)}
  .diff{background:var(--diff)}
  .pulse{animation:pulse 1.1s infinite}
  .slideIn{animation:slideIn .9s ease}
  .fade{opacity:.2}
  .math{font-size:34px;font-weight:900;margin:10px 0}
  .banner{margin-top:12px;padding:12px 14px;border-left:6px solid var(--blue);background:#eef6ff;border-radius:12px;font-size:22px;font-weight:800}
  .checkbox{margin-top:12px;padding:14px;border-radius:14px;background:#eef6ff;border:2px solid #bfdbfe}
  .checkline{font-size:26px;font-weight:800;margin:6px 0}
  .inputrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}
  input{font-size:28px;padding:12px 14px;border-radius:14px;border:3px solid var(--line);width:170px}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.12)}50%{box-shadow:0 0 0 10px rgba(37,99,235,.18)}}
  @keyframes slideIn{0%{transform:translateX(-28px);opacity:0}100%{transform:translateX(0);opacity:1}}
  @media (max-width:640px){
    .option,.sentence{font-size:22px}
    .seg{min-width:82px;height:56px;font-size:19px}
    .lab{width:auto}
    .math{font-size:28px}
    .checkline{font-size:22px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="title">Table and Chair</div>
    <div class="btns">
      <button class="alt" id="readBtn" type="button">🔊 Read</button>
      <button class="ghost" id="restartBtn" type="button">↺ Restart</button>
    </div>
  </div>

  <div class="card">
    <div class="question" id="questionText">
      A table costs $360 more than a chair.<br>
      1 table and 5 identical chairs cost $1320.
    </div>
    <div class="sub">(a) How much does a chair cost? &nbsp; (b) How much does a table cost?</div>
    <div class="progress"><div id="fill"></div></div>
  </div>

  <div id="screen"></div>
</div>

<script>
(() => {
  const state = { step:0, selected:null, tries:{} };
  const screen = document.getElementById('screen');
  const fill = document.getElementById('fill');
  const total = 9;

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/\$/g,' dollars '));
    u.rate = 0.95;
    speechSynthesis.speak(u);
  }

  document.getElementById('readBtn').addEventListener('click', () => speak(screen.innerText || document.getElementById('questionText').innerText));
  document.getElementById('restartBtn').addEventListener('click', () => { state.step=0; state.selected=null; state.tries={}; render(); });

  function attempt(key){ state.tries[key]=(state.tries[key]||0)+1; return state.tries[key]; }
  function next(){ if(state.step<total-1){ state.step++; state.selected=null; render(); } }
  function back(){ if(state.step>0){ state.step--; state.selected=null; render(); } }
  function fb(kind,text){ return `<div class="feedback ${kind}">${text}</div>`; }

  function model(mode){
    if(mode==='compare'){
      return `<div class="model">
        <div class="barrow"><div class="lab">Chair</div><div class="segs"><div class="seg chair">chair</div></div></div>
        <div class="barrow"><div class="lab">Table</div><div class="segs"><div class="seg chair">chair</div><div class="seg diff slideIn">$360</div></div></div>
        <div class="banner">$360 is the difference.</div>
      </div>`;
    }
    if(mode==='with5'){
      return `<div class="model">
        <div class="barrow"><div class="lab">Table</div><div class="segs"><div class="seg chair">chair</div><div class="seg diff">$360</div></div></div>
        <div class="barrow"><div class="lab">5 chairs</div><div class="segs">
          <div class="seg chair">chair</div><div class="seg chair">chair</div><div class="seg chair">chair</div><div class="seg chair">chair</div><div class="seg chair">chair</div>
        </div></div>
      </div>`;
    }
    if(mode==='swap'){
      return `<div class="model">
        <div class="barrow"><div class="lab">Total</div><div class="segs">
          <div class="seg chair pulse">chair</div><div class="seg chair pulse">chair</div><div class="seg chair pulse">chair</div>
          <div class="seg chair pulse">chair</div><div class="seg chair pulse">chair</div><div class="seg chair pulse">chair</div>
          <div class="seg diff">$360</div>
        </div></div>
      </div>`;
    }
    if(mode==='minus'){
      return `<div class="model">
        <div class="barrow"><div class="lab">$1320</div><div class="segs">
          <div class="seg chair">chair</div><div class="seg chair">chair</div><div class="seg chair">chair</div>
          <div class="seg chair">chair</div><div class="seg chair">chair</div><div class="seg chair">chair</div>
          <div class="seg diff fade">$360</div>
        </div></div>
      </div>`;
    }
    if(mode==='six'){
      return `<div class="model">
        <div class="barrow"><div class="lab">$960</div><div class="segs">
          <div class="seg chair">chair</div><div class="seg chair">chair</div><div class="seg chair">chair</div>
          <div class="seg chair">chair</div><div class="seg chair">chair</div><div class="seg chair">chair</div>
        </div></div>
      </div>`;
    }
  }

  function bindCommon(){
    screen.querySelectorAll('[data-act]').forEach(b=>{
      b.addEventListener('click',()=>b.dataset.act==='next'?next():back());
    });

    screen.querySelectorAll('[data-choice]').forEach(el=>{
      const select = (e) => {
        e.preventDefault();
        e.stopPropagation();
        state.selected = el.dataset.choice;
        screen.querySelectorAll('[data-choice]').forEach(x=>x.classList.remove('selected'));
        el.classList.add('selected');
      };
      el.addEventListener('click', select);
      el.addEventListener('pointerup', select);
    });
  }

  function render0(){
    screen.innerHTML = `<div class="card">
      <div class="prompt">Tap the sentence with “more than”.</div>
      <div class="sentence" data-choice="more">A table costs $360 more than a chair.</div>
      <div class="sentence" data-choice="total">1 table and 5 identical chairs cost $1320.</div>
      <div class="nav"><button data-check="s0">Check</button></div>
      <div id="fb"></div>
    </div>`;
    bindCommon();
    document.querySelector('[data-check="s0"]').addEventListener('click',()=>{
      const box=document.getElementById('fb');
      if(state.selected==='more'){ box.innerHTML=fb('ok','Yes. This sentence shows the difference.'); setTimeout(next,800); }
      else if(!state.selected){ box.innerHTML=fb('hint','Tap one sentence.'); }
      else { box.innerHTML=fb('hint','Look for the words <b>more than</b>.'); }
    });
  }

  function render1(){
    screen.innerHTML = `<div class="card">
      <div class="prompt">What is $360?</div>
      ${model('compare')}
      <div class="options">
        <div class="option" data-choice="chair">$360 is a chair.</div>
        <div class="option" data-choice="difference">$360 is the difference.</div>
        <div class="option" data-choice="table">$360 is a table.</div>
      </div>
      <div class="nav"><button class="ghost" data-act="back">← Back</button><button data-check="s1">Check</button></div>
      <div id="fb"></div>
    </div>`;
    bindCommon();
    document.querySelector('[data-check="s1"]').addEventListener('click',()=>{
      const box=document.getElementById('fb');
      const t=attempt('s1');
      if(state.selected==='difference'){ box.innerHTML=fb('ok','Right. $360 is the difference. It is not a chair.'); setTimeout(next,900); }
      else if(!state.selected){ box.innerHTML=fb('hint','Choose one answer.'); }
      else if(t===1){ box.innerHTML=fb('hint','The yellow box shows how much more the table costs.'); }
      else { box.innerHTML=fb('bad','$360 is the difference between the table and the chair.'); }
    });
  }

  function render2(){
    screen.innerHTML = `<div class="card">
      <div class="prompt">Build the first model.</div>
      <div class="mini">The table is one chair and $360 more.</div>
      ${model('compare')}
      <div class="options">
        <div class="option" data-choice="a">table = chair + $360</div>
        <div class="option" data-choice="b">chair = table + $360</div>
      </div>
      <div class="nav"><button class="ghost" data-act="back">← Back</button><button data-check="s2">Check</button></div>
      <div id="fb"></div>
    </div>`;
    bindCommon();
    document.querySelector('[data-check="s2"]').addEventListener('click',()=>{
      const box=document.getElementById('fb');
      if(state.selected==='a'){ box.innerHTML=fb('ok','Good. The table is one chair and $360 more.'); setTimeout(next,900); }
      else if(!state.selected){ box.innerHTML=fb('hint','Choose one answer.'); }
      else { box.innerHTML=fb('hint','Which costs more? The table.'); }
    });
  }

  function render3(){
    screen.innerHTML = `<div class="card">
      <div class="prompt">Now add 5 chairs.</div>
      ${model('with5')}
      <div class="options">
        <div class="option" data-choice="six">Now I can see 6 chairs and $360.</div>
        <div class="option" data-choice="five">Now I can see 5 chairs and $360.</div>
      </div>
      <div class="nav"><button class="ghost" data-act="back">← Back</button><button data-check="s3">Check</button></div>
      <div id="fb"></div>
    </div>`;
    bindCommon();
    document.querySelector('[data-check="s3"]').addEventListener('click',()=>{
      const box=document.getElementById('fb');
      const t=attempt('s3');
      if(state.selected==='six'){ box.innerHTML=fb('ok','Yes. There is 1 chair in the table and 5 more chairs.'); setTimeout(next,900); }
      else if(!state.selected){ box.innerHTML=fb('hint','Choose one answer.'); }
      else if(t===1){ box.innerHTML=fb('hint','The table already has one chair in it.'); }
      else { box.innerHTML=fb('bad','Count again: 1 chair in the table and 5 more chairs makes 6.'); }
    });
  }

  function render4(){
    screen.innerHTML = `<div class="card">
      <div class="prompt">Swap the table.</div>
      <div class="row">
        <div class="col"><div class="mini">Before</div>${model('with5')}</div>
        <div class="col"><div class="mini">After</div>${model('swap')}</div>
      </div>
      <div class="options">
        <div class="option" data-choice="a">6 chairs and $360</div>
        <div class="option" data-choice="b">6 chairs only</div>
      </div>
      <div class="nav"><button class="ghost" data-act="back">← Back</button><button data-check="s4">Check</button></div>
      <div id="fb"></div>
    </div>`;
    bindCommon();
    document.querySelector('[data-check="s4"]').addEventListener('click',()=>{
      const box=document.getElementById('fb');
      if(state.selected==='a'){ box.innerHTML=fb('ok','Yes. Now we can see 6 chairs and the difference.'); setTimeout(next,900); }
      else if(!state.selected){ box.innerHTML=fb('hint','Choose one answer.'); }
      else { box.innerHTML=fb('hint','Do not forget the $360 difference.'); }
    });
  }

  function render5(){
    screen.innerHTML = `<div class="card">
      <div class="prompt">Can we divide by 6 now?</div>
      ${model('swap')}
      <div class="options">
        <div class="option" data-choice="no">No. $360 is still there.</div>
        <div class="option" data-choice="yes">Yes. Divide now.</div>
      </div>
      <div class="nav"><button class="ghost" data-act="back">← Back</button><button data-check="s5">Check</button></div>
      <div id="fb"></div>
    </div>`;
    bindCommon();
    document.querySelector('[data-check="s5"]').addEventListener('click',()=>{
      const box=document.getElementById('fb');
      const t=attempt('s5');
      if(state.selected==='no'){ box.innerHTML=fb('ok','Right. The $360 difference is still there.'); setTimeout(next,950); }
      else if(!state.selected){ box.innerHTML=fb('hint','Choose one answer.'); }
      else if(t===1){ box.innerHTML=fb('hint','We can divide only when only chairs are left.'); }
      else { box.innerHTML=fb('bad','Do not divide yet. Take away the $360 difference first.'); }
    });
  }

  function render6(){
    screen.innerHTML = `<div class="card">
      <div class="prompt">Take away the $360 difference.</div>
      ${model('minus')}
      <div class="inputrow">
        <div class="math">$1320 - $360 =</div>
        <input id="ans6" type="number" inputmode="numeric">
        <button data-check="s6">Check</button>
      </div>
      <div class="nav"><button class="ghost" data-act="back">← Back</button></div>
      <div id="fb"></div>
    </div>`;
    bindCommon();
    document.querySelector('[data-check="s6"]').addEventListener('click',()=>{
      const box=document.getElementById('fb');
      const v=(document.getElementById('ans6').value||'').trim();
      if(v===''){ box.innerHTML=fb('hint','Type an answer.'); return; }
      if(Number(v)===960){ box.innerHTML=fb('ok','Yes. Now only 6 chairs are left.'); setTimeout(next,900); }
      else { box.innerHTML=fb('hint','Check the subtraction again.'); }
    });
  }

  function render7(){
    screen.innerHTML = `<div class="card">
      <div class="prompt">Now divide by 6.</div>
      ${model('six')}
      <div class="inputrow">
        <div class="math">$960 ÷ 6 =</div>
        <input id="ans7" type="number" inputmode="numeric">
        <button data-check="s7">Check</button>
      </div>
      <div class="banner">Part (a): cost of 1 chair</div>
      <div class="nav"><button class="ghost" data-act="back">← Back</button></div>
      <div id="fb"></div>
    </div>`;
    bindCommon();
    document.querySelector('[data-check="s7"]').addEventListener('click',()=>{
      const box=document.getElementById('fb');
      const v=(document.getElementById('ans7').value||'').trim();
      if(v===''){ box.innerHTML=fb('hint','Type an answer.'); return; }
      if(Number(v)===160){ box.innerHTML=fb('ok','Good. 1 chair costs $160.'); setTimeout(next,900); }
      else { box.innerHTML=fb('hint','Divide the cost of 6 chairs by 6.'); }
    });
  }

  function render8(){
    screen.innerHTML = `<div class="card">
      <div class="prompt">Part (b)</div>
      <div class="math">chair = $160</div>
      <div class="math">table = $160 + $360</div>
      <div class="inputrow">
        <div class="math">table =</div>
        <input id="ans8" type="number" inputmode="numeric">
        <button data-check="s8">Check</button>
      </div>
      <div class="nav"><button class="ghost" data-act="back">← Back</button></div>
      <div id="fb"></div>
    </div>`;
    bindCommon();
    document.querySelector('[data-check="s8"]').addEventListener('click',()=>{
      const box=document.getElementById('fb');
      const v=(document.getElementById('ans8').value||'').trim();
      if(v===''){ box.innerHTML=fb('hint','Type an answer.'); return; }
      if(Number(v)===520){
        box.innerHTML = fb('ok', `
          Yes. 1 table costs $520.
          <div class="checkbox">
            <div class="checkline">5 × $160 = $800</div>
            <div class="checkline">$800 + $520 = $1320</div>
          </div>
        `);
      } else {
        box.innerHTML=fb('hint','Add $360 to the chair cost.');
      }
    });
  }

  const renders=[render0,render1,render2,render3,render4,render5,render6,render7,render8];
  function render(){ fill.style.width=((state.step)/(total-1))*100+'%'; renders[state.step](); }
  render();
})();
</script>
</body>
</html>
