<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Before and After 3</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --text:#1d2433;
      --muted:#5d6b82;
      --primary:#1f5fbf;
      --primary-soft:#eaf2ff;
      --accent:#f59e0b;
      --accent-soft:#fff5dd;
      --good:#157347;
      --good-soft:#e8f6ee;
      --bad:#b42318;
      --bad-soft:#fdeceb;
      --line:#d7dfeb;
      --shadow:0 10px 28px rgba(19,35,68,0.08);
      --radius:20px;
    }

    * { box-sizing:border-box; }

    html, body {
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
      line-height:1.45;
      -webkit-text-size-adjust:100%;
    }

    .app {
      max-width:1120px;
      margin:0 auto;
      padding:18px 16px 36px;
    }

    .topbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .pill {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:var(--panel);
      border:2px solid var(--line);
      box-shadow:var(--shadow);
      font-weight:700;
    }

    .toolbar {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button, .choice-card, .sentence-card, .slot, .amount-chip, .tap-part {
      touch-action:manipulation;
    }

    button {
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:transform 0.08s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      box-shadow:var(--shadow);
    }
    button:hover { transform:translateY(-1px); }
    button:active { transform:translateY(0); }

    .btn-primary { background:var(--primary); color:#fff; }
    .btn-secondary {
      background:#fff;
      color:var(--text);
      border:2px solid var(--line);
    }
    .btn-ghost {
      background:var(--primary-soft);
      color:var(--primary);
      border:2px solid #cfe0ff;
    }
    .btn-disabled {
      opacity:0.5;
      cursor:not-allowed;
      transform:none !important;
    }

    .question-panel {
      background:var(--panel);
      border:2px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:16px;
    }

    .question-head {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      padding:16px 18px;
      background:#f9fbff;
      border-bottom:2px solid var(--line);
    }

    .question-head h2 {
      margin:0;
      font-size:1.2rem;
    }

    .question-body {
      padding:18px;
      display:none;
    }
    .question-body.open { display:block; }
    .question-body p {
      margin:0 0 14px;
      font-size:1.08rem;
    }

    .main-card {
      background:var(--panel);
      border:2px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
    }

    .screen-top {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .screen-title {
      margin:0;
      font-size:1.55rem;
    }

    .screen-subtitle {
      margin:8px 0 0;
      color:var(--muted);
      font-size:1rem;
      max-width:760px;
    }

    .step-chip {
      background:var(--primary-soft);
      color:var(--primary);
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      border:2px solid #cfe0ff;
      white-space:nowrap;
    }

    .action-box {
      background:var(--primary-soft);
      border:2px solid #cfe0ff;
      border-radius:18px;
      padding:16px 18px;
      margin-bottom:14px;
    }

    .explain-box {
      background:var(--accent-soft);
      border:2px solid #f4d28c;
      border-radius:18px;
      padding:14px 16px;
      margin-bottom:18px;
    }

    .label {
      font-size:0.88rem;
      font-weight:700;
      letter-spacing:0.02em;
      text-transform:uppercase;
      margin-bottom:6px;
    }
    .action-box .label { color:var(--primary); }
    .explain-box .label { color:#a15c00; }

    .action-box .text {
      font-size:1.15rem;
      font-weight:700;
    }

    .grid {
      display:grid;
      gap:14px;
    }

    .grid-3 {
      grid-template-columns:repeat(auto-fit, minmax(230px, 1fr));
    }

    .sentence-card,
    .choice-card {
      background:#fff;
      border:3px solid var(--line);
      border-radius:18px;
      padding:16px;
      min-height:78px;
      cursor:pointer;
      transition:border-color 0.15s ease, box-shadow 0.15s ease, transform 0.08s ease;
    }

    .sentence-card:hover,
    .choice-card:hover,
    .amount-chip:hover,
    .slot:hover,
    .tap-part:hover {
      transform:translateY(-1px);
    }

    .sentence-card.selected,
    .choice-card.selected,
    .amount-chip.selected,
    .slot.selected,
    .tap-part.selected {
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(31,95,191,0.12);
      background:var(--primary-soft);
    }

    .choice-card .title {
      font-weight:700;
      font-size:1.04rem;
      margin-bottom:6px;
    }

    .desc {
      color:var(--muted);
    }

    .check-row {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin-top:18px;
    }

    .feedback {
      margin-top:16px;
      display:none;
      border-radius:18px;
      padding:14px 16px;
      border:2px solid transparent;
      font-weight:700;
    }

    .feedback.show { display:block; }
    .feedback.good {
      background:var(--good-soft);
      border-color:#9fd3b1;
      color:var(--good);
    }
    .feedback.bad {
      background:var(--bad-soft);
      border-color:#efb0aa;
      color:var(--bad);
    }

    .hint-box, .help-box {
      margin-top:14px;
      display:none;
      border-radius:18px;
      padding:14px 16px;
    }
    .hint-box.show, .help-box.show { display:block; }

    .hint-box {
      background:#f7faff;
      border:2px dashed #9bbcf2;
    }
    .help-box {
      background:#fffaf0;
      border:2px solid #f2d7a1;
    }

    .bars-wrap {
      display:grid;
      gap:18px;
      margin-top:6px;
    }

    .bar-row {
      display:grid;
      grid-template-columns:92px 1fr;
      gap:10px;
      align-items:center;
    }

    .bar-label {
      font-weight:700;
      font-size:1rem;
    }

    .bar {
      display:flex;
      min-height:66px;
      border-radius:16px;
      overflow:hidden;
      border:3px solid #bcc7d8;
      background:#f2f5fa;
    }

    .seg {
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px;
      font-weight:700;
      text-align:center;
      min-width:0;
      font-size:0.98rem;
      border-right:2px solid #cbd4e2;
    }
    .seg:last-child { border-right:none; }

    .unit {
      background:#e6f2ff;
      color:#1f5fbf;
    }

    .spent {
      background:#ffe8c7;
      color:#9a5800;
    }

    .diff {
      background:#fde3e1;
      color:#b42318;
    }

    .tap-part {
      cursor:pointer;
    }

    .compare-note, .focus-card {
      margin-top:12px;
      background:#f8fbff;
      border:2px solid #cfe0ff;
      border-radius:18px;
      padding:14px 16px;
    }

    .equation-strip,
    .arrow-line {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:center;
      margin-top:10px;
      font-weight:700;
    }

    .eq-box, .badge {
      padding:10px 14px;
      border-radius:14px;
      background:#fff;
      border:2px solid var(--line);
      text-align:center;
    }

    .input-row {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      margin-top:8px;
    }

    .num-input {
      width:240px;
      max-width:100%;
      padding:14px 16px;
      font-size:1.12rem;
      border-radius:16px;
      border:3px solid var(--line);
      outline:none;
      font-weight:700;
    }

    .num-input:focus {
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(31,95,191,0.12);
    }

    .mini-note {
      color:var(--muted);
      font-size:0.96rem;
      margin-top:8px;
    }

    .amount-bank {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:8px;
    }

    .amount-chip {
      padding:14px 18px;
      border-radius:16px;
      border:3px solid var(--line);
      background:#fff;
      font-weight:700;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .place-grid {
      display:grid;
      gap:14px;
      grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
      margin-top:12px;
    }

    .place-card {
      border:2px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:#fff;
    }

    .place-card h4 {
      margin:0 0 10px;
      font-size:1.05rem;
    }

    .place-bar {
      display:flex;
      min-height:68px;
      border-radius:16px;
      overflow:hidden;
      border:3px solid #bcc7d8;
      background:#f2f5fa;
    }

    .blank-left {
      flex:2;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#e6f2ff;
      color:#1f5fbf;
      border-right:2px solid #cbd4e2;
      font-weight:700;
      padding:8px;
      text-align:center;
    }

    .blank-right {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:6px;
      background:#fff4df;
    }

    .slot {
      min-height:72px;
      width:100%;
      border:3px dashed #9db0c7;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
      background:#f9fbff;
      font-weight:700;
      text-align:center;
      cursor:pointer;
    }

    .slot.filled {
      border-style:solid;
      background:#fff;
    }

    .success-card {
      background:linear-gradient(180deg, #f8fffb 0%, #eefaf2 100%);
      border:2px solid #9fd3b1;
      border-radius:22px;
      padding:18px;
      margin-top:18px;
    }

    .summary-list {
      margin:10px 0 0 18px;
      padding:0;
    }

    .summary-list li { margin:8px 0; }

    .tiny {
      color:var(--muted);
      font-size:0.92rem;
    }

    @media (max-width:760px) {
      .app { padding:12px 10px 26px; }
      .main-card { padding:16px; }
      .screen-title { font-size:1.35rem; }
      .action-box .text { font-size:1.05rem; }
      .bar-row { grid-template-columns:1fr; }
      .bar-label { margin-bottom:4px; }
      .question-head { padding:14px; }
      .question-body { padding:14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="pill" id="progressPill">Step 1 of 13</div>
      <div class="toolbar">
        <button class="btn-secondary" id="toggleQuestionBtn" type="button">Show question</button>
        <button class="btn-ghost" id="readAloudBtn" type="button">Read aloud</button>
        <button class="btn-secondary" id="restartBtn" type="button">Restart</button>
      </div>
    </div>

    <div class="question-panel">
      <div class="question-head">
        <h2>Question</h2>
        <div class="tiny">The question stays available on every step.</div>
      </div>
      <div class="question-body" id="questionBody">
        <p><strong>Larry received the same amount of monthly salary in May and June.</strong></p>
        <p>After spending <strong>$990</strong> on an iPad in May and <strong>$1230</strong> on a holiday in June, he had <strong>twice as much money left in May as in June</strong>.</p>
        <p><strong>How much was his monthly salary?</strong></p>
      </div>
    </div>

    <div class="main-card" id="screenHost" aria-live="polite"></div>
  </div>

  <script>
    (function() {
      const questionLines = [
        "Larry received the same amount of monthly salary in May and June.",
        "After spending $990 on an iPad in May and $1230 on a holiday in June, he had twice as much money left in May as in June.",
        "How much was his monthly salary?"
      ];

      const screens = [
        { id:"s1", title:"Start with the clue", subtitle:"Read carefully before building the bar model.", action:"Tap the sentence that tells you the salaries started the same.", explain:"We are looking for the clue that tells us how the two starting bars should look." },
        { id:"s2", title:"Find the goal", subtitle:"We should know exactly what the question wants before we solve.", action:"What are we finding?", explain:"Choose the final answer the question asks for." },
        { id:"s3", title:"Choose the starting model", subtitle:"Use the clue about the starting salary.", action:"How should the two starting salary bars look?", explain:"Pick the model that matches 'the same amount'." },
        { id:"s4", title:"Place the spent amounts", subtitle:"Now match each amount to the correct month.", action:"Tap an amount. Then tap the correct spent part.", explain:"Only place the amounts on the spent sections, not on the money left sections." },
        { id:"s5", title:"Show the money left", subtitle:"The bars started the same, but the leftover parts are different.", action:"How should the money left look?", explain:"Look at the words 'twice as much money left in May as in June'." },
        { id:"s6", title:"Notice the extra spent part", subtitle:"Keep the three blue equal units in view.", action:"Tap the extra spent part in June.", explain:"The three blue parts are equal units. June has only 1 equal unit left, so one equal unit has turned into extra spending." },
        { id:"s7", title:"Build the number sentence", subtitle:"Use the model to show why we subtract.", action:"Choose the number sentence for the extra spent part.", explain:"June's spent amount is $1230 altogether. The $990 part matches May's spending. So we subtract to find the extra part." },
        { id:"s8", title:"Calculate the extra spent part", subtitle:"Now work out the value of that extra part.", action:"Type how much more June spent than May.", explain:"Use the number sentence for the extra part: 1230 - 990." },
        { id:"s9", title:"Match the extra spent part to the equal unit", subtitle:"This is the key model idea.", action:"The $240 extra spent matches which part?", explain:"Because the salary bars end at the same place, the extra spent part lines up with one extra equal unit in May." },
        { id:"s10", title:"Find the value of 1 equal unit", subtitle:"Now use the model meaning, not just the numbers.", action:"Type the value of 1 equal unit.", explain:"The extra spent part matched one equal unit, so one equal unit has the same value." },
        { id:"s11", title:"Choose how to find the salary", subtitle:"We know June spent $1230 and June had $240 left.", action:"What should we do to find the salary?", explain:"The salary is the whole amount, so we put June's spent money and June's money left back together." },
        { id:"s12", title:"Find the monthly salary", subtitle:"Now complete the final step.", action:"Type Larry's monthly salary.", explain:"Think: salary = June spent + June left." },
        { id:"s13", title:"Consolidate the strategy", subtitle:"Say the idea clearly so you can use it again.", action:"Which summary explains the strategy best?", explain:"Pick the summary that matches the model and the steps you used." }
      ];

      function baseState() {
        return {
          current: 0,
          questionOpen: false,
          selections: {},
          inputs: {},
          attempts: {},
          feedback: {},
          screenDone: {},
          placements: { may:null, june:null }
        };
      }

      let state = baseState();

      const host = document.getElementById("screenHost");
      const questionBody = document.getElementById("questionBody");
      const toggleQuestionBtn = document.getElementById("toggleQuestionBtn");
      const readAloudBtn = document.getElementById("readAloudBtn");
      const restartBtn = document.getElementById("restartBtn");
      const progressPill = document.getElementById("progressPill");

      function stopSpeech() {
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      }

      function speak(text) {
        if (!("speechSynthesis" in window)) return;
        stopSpeech();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.95;
        utter.pitch = 1;
        utter.lang = "en-SG";
        window.speechSynthesis.speak(utter);
      }

      function updateQuestionToggle() {
        questionBody.classList.toggle("open", state.questionOpen);
        toggleQuestionBtn.textContent = state.questionOpen ? "Hide question" : "Show question";
      }

      function getAttempts(id) {
        return state.attempts[id] || 0;
      }

      function bumpAttempts(id) {
        state.attempts[id] = getAttempts(id) + 1;
      }

      function markDone(id) {
        state.screenDone[id] = true;
      }

      function canGoNext() {
        return !!state.screenDone[screens[state.current].id];
      }

      function selectedId(id) {
        return state.selections[id] || null;
      }

      function setSelected(screenId, choiceId) {
        state.selections[screenId] = choiceId;
        clearFeedback();
        render();
      }

      function setFeedback(kind, message) {
        state.feedback[screens[state.current].id] = { kind, message };
        render();
      }

      function clearFeedback() {
        delete state.feedback[screens[state.current].id];
      }

      function shuffleWithState(screenId, options) {
        const key = "_order_" + screenId;
        if (!state.selections[key]) {
          const ids = options.map(o => o.id);
          for (let i = ids.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [ids[i], ids[j]] = [ids[j], ids[i]];
          }
          state.selections[key] = ids;
        }
        const order = state.selections[key];
        return order.map(id => options.find(o => o.id === id)).filter(Boolean);
      }

      function nextScreen() {
        if (canGoNext() && state.current < screens.length - 1) {
          stopSpeech();
          state.current += 1;
          render();
        }
      }

      function prevScreen() {
        if (state.current > 0) {
          stopSpeech();
          state.current -= 1;
          render();
        }
      }

      function restart() {
        stopSpeech();
        state = baseState();
        render();
      }

      function renderShell(content) {
        const screen = screens[state.current];
        return `
          <div class="screen-top">
            <div>
              <h1 class="screen-title">${screen.title}</h1>
              <p class="screen-subtitle">${screen.subtitle}</p>
            </div>
            <div class="step-chip">Step ${state.current + 1}</div>
          </div>
          <div class="action-box">
            <div class="label">Do this now</div>
            <div class="text">${screen.action}</div>
          </div>
          <div class="explain-box">
            <div class="label">Why this matters</div>
            <div>${screen.explain}</div>
          </div>
          ${content}
        `;
      }

      function renderFeedbackAndButtons(screenId, extraHint="", extraHelp="") {
        const feedback = state.feedback[screenId];
        return `
          <div class="check-row">
            <button type="button" class="btn-primary" data-kind="check" data-screen="${screenId}">Check</button>
            <button type="button" class="btn-secondary" data-kind="back" ${state.current === 0 ? 'disabled' : ''}>Back</button>
            <button type="button" class="btn-secondary ${canGoNext() ? '' : 'btn-disabled'}" data-kind="next">Next</button>
          </div>
          <div class="feedback ${feedback ? 'show ' + feedback.kind : ''}">${feedback ? feedback.message : ''}</div>
          <div class="hint-box ${extraHint ? 'show' : ''}">${extraHint}</div>
          <div class="help-box ${extraHelp ? 'show' : ''}">${extraHelp}</div>
        `;
      }

      function renderChoiceCards(screenId, options) {
        const ordered = shuffleWithState(screenId, options);
        const selected = selectedId(screenId);
        return `
          <div class="grid grid-3">
            ${ordered.map(opt => `
              <div class="choice-card ${selected === opt.id ? 'selected' : ''}" data-kind="select-choice" data-screen="${screenId}" data-id="${opt.id}" role="button" tabindex="0" aria-pressed="${selected === opt.id}">
                <div class="title">${opt.title}</div>
                ${opt.desc ? `<div class="desc">${opt.desc}</div>` : ``}
                ${opt.preview || ``}
              </div>
            `).join("")}
          </div>
        `;
      }

      function renderScreen() {
        const id = screens[state.current].id;
        progressPill.textContent = `Step ${state.current + 1} of ${screens.length}`;

        if (id === "s1") {
          const selected = selectedId("s1");
          const attempts = getAttempts("s1");
          const content = `
            <div class="grid">
              ${[
                { id:"same", text:questionLines[0] },
                { id:"after", text:questionLines[1] },
                { id:"find", text:questionLines[2] }
              ].map(item => `
                <div class="sentence-card ${selected === item.id ? 'selected' : ''}" data-kind="select-choice" data-screen="s1" data-id="${item.id}" role="button" tabindex="0" aria-pressed="${selected === item.id}">
                  <strong>Sentence</strong>
                  <div style="margin-top:6px;">${item.text}</div>
                </div>
              `).join("")}
            </div>
            ${renderFeedbackAndButtons(
              "s1",
              attempts >= 1 && !canGoNext() ? "<strong>Hint:</strong> Look for the sentence that tells you how the two starting salary bars compare before any spending." : "",
              ""
            )}
          `;
          return renderShell(content);
        }

        if (id === "s2") {
          const attempts = getAttempts("s2");
          return renderShell(
            renderChoiceCards("s2", [
              { id:"salary", title:"Larry's monthly salary", desc:"the whole amount before spending" },
              { id:"may-left", title:"money left in May", desc:"the amount after spending in May" },
              { id:"june-left", title:"money left in June", desc:"the amount after spending in June" }
            ]) +
            renderFeedbackAndButtons(
              "s2",
              attempts >= 1 && !canGoNext() ? "<strong>Hint:</strong> Look at the last sentence. Which whole amount are we trying to find?" : "",
              ""
            )
          );
        }

        if (id === "s3") {
          const attempts = getAttempts("s3");
          return renderShell(
            renderChoiceCards("s3", [
              {
                id:"equal",
                title:"Equal total bars",
                desc:"May and June start with the same total salary.",
                preview: `
                  <div class="bars-wrap" style="margin-top:10px;">
                    <div class="bar-row"><div class="bar-label">May</div><div class="bar"><div class="seg unit" style="flex:1;">same total</div></div></div>
                    <div class="bar-row"><div class="bar-label">June</div><div class="bar"><div class="seg unit" style="flex:1;">same total</div></div></div>
                  </div>`
              },
              {
                id:"may-longer",
                title:"May longer",
                desc:"May starts with more salary.",
                preview: `

                  </div>

            </div>
            ${renderFeedbackAndButtons(

              attempts >= 1 && !canGoNext() ? "<strong>Hint:</strong> Read the question again. Which month spent $990? Which month spent $1230?" : "",
              ""

          `;
          return renderShell(content);
        }

        if (id === "s5") {
          const attempts = getAttempts("s5");
          return renderShell(
            renderChoiceCards("s5", [
              {
                id:"correct",
                title:"May-left = 2 equal units, June-left = 1 equal unit",

                      <div class="bar-label">May</div>
                      <div class="bar">
                        <div class="seg unit" style="flex:1;">1 equal unit</div>

                    </div>
                  </div>`
              },
              {
                id:"spent-twice",
                title:"June spent is twice May spent",
                desc:"This uses the wrong relationship."
              },
              {
                id:"reversed",
                title:"May-left = 1 equal unit, June-left = 2 equal units",

            renderFeedbackAndButtons(

        if (id === "s6") {
          const attempts = getAttempts("s6");
          const selected = selectedId("s6");
          const content = `
            <div class="bars-wrap">
              <div class="bar-row">
                <div class="bar-label">May</div>
                <div class="bar">
                  <div class="seg unit" style="flex:1;">1 equal unit</div>

              <div class="bar-row">

                  <div class="seg unit" style="flex:1;">1 equal unit</div>
                  <div class="seg diff tap-part ${selected === 'extra' ? 'selected' : ''}" style="flex:1;" data-kind="select-choice" data-screen="s6" data-id="extra" role="button" tabindex="0" aria-pressed="${selected === 'extra'}">tap the extra spent part</div>

            <div class="compare-note">

            ${renderFeedbackAndButtons(

        if (id === "s7") {
          const attempts = getAttempts("s7");

            <div class="bars-wrap">

              { id:"990-1230", title:"extra part = 990 - 1230", desc:"this subtracts in the wrong order" },

            ${renderFeedbackAndButtons(

        if (id === "s8") {

          const content = `
            <div class="focus-card">
              <strong>Use the number sentence for the extra part.</strong>
              <div class="equation-strip">
                <div class="eq-box">$1230</div>
                <div>−</div>

                <div>=</div>

            <div class="input-row">
              <input class="num-input" inputmode="numeric" pattern="[0-9]*" id="numInput" value="${value}" placeholder="Type a number" aria-label="Type the extra spent part">
              <button type="button" class="btn-primary" data-kind="check" data-screen="s8">Check</button>
              <button type="button" class="btn-secondary" data-kind="back">Back</button>
              <button type="button" class="btn-secondary ${canGoNext() ? '' : 'btn-disabled'}" data-kind="next">Next</button>
            </div>

            <div class="feedback ${feedback ? 'show ' + feedback.kind : ''}">${feedback ? feedback.message : ''}</div>
            <div class="hint-box ${attempts >= 1 && !canGoNext() ? 'show' : ''}">
              <strong>Hint:</strong> Use the number sentence from the last step: 1230 - 990.
            </div>
            <div class="help-box ${attempts >= 2 && !canGoNext() ? 'show' : ''}">
              <strong>Stronger help:</strong> $1230 - $990 = $240
            </div>
          `;
          return renderShell(content);
        }

        if (id === "s9") {
          const attempts = getAttempts("s9");
          const content = `
            <div class="bars-wrap">
              <div class="bar-row">
                <div class="bar-label">May</div>
                <div class="bar">
                  <div class="seg unit" style="flex:1;">1 equal unit</div>
                  <div class="seg unit" style="flex:1;">1 extra equal unit</div>
                  <div class="seg spent" style="flex:4;">$990 spent</div>
                </div>
              </div>

              <div class="bar-row">
                <div class="bar-label">June</div>
                <div class="bar">
                  <div class="seg unit" style="flex:1;">1 equal unit</div>
                  <div class="seg diff" style="flex:1;">$240 extra spent</div>
                  <div class="seg spent" style="flex:4;">$990 spent</div>
                </div>
              </div>
            </div>

            <div class="compare-note">
              The <strong>three blue boxes are equal units</strong>. The salary bars end at the same place. So this <strong>$240 extra spent</strong> in June lines up with the <strong>one extra equal unit</strong> in May.
            </div>

            ${renderChoiceCards("s9", [
              { id:"extra-unit", title:"the 1 extra equal unit in May", desc:"June is missing this one equal unit." },
              { id:"both-units", title:"both May equal units together", desc:"This is too much." },
              { id:"whole-salary", title:"the whole salary", desc:"This is the whole bar, not the matching part." }
            ])}

            ${renderFeedbackAndButtons(
              "s9",
              attempts >= 1 && !canGoNext() ? "<strong>Hint:</strong> Match the red $240 part to the one blue equal unit that June is missing." : "",
              ""
            )}
          `;
          return renderShell(content);
        }

        if (id === "s10") {
          const attempts = getAttempts("s10");
          const feedback = state.feedback["s10"];
          const value = state.inputs["s10"] || "";
          const content = `
            <div class="input-row">
              <input class="num-input" inputmode="numeric" pattern="[0-9]*" id="numInput" value="${value}" placeholder="Type a number" aria-label="Type the value of one equal unit">
              <button type="button" class="btn-primary" data-kind="check" data-screen="s10">Check</button>
              <button type="button" class="btn-secondary" data-kind="back">Back</button>
              <button type="button" class="btn-secondary ${canGoNext() ? '' : 'btn-disabled'}" data-kind="next">Next</button>
            </div>
            <div class="mini-note">1 equal unit is the money left in June.</div>
            <div class="feedback ${feedback ? 'show ' + feedback.kind : ''}">${feedback ? feedback.message : ''}</div>
            <div class="hint-box ${attempts >= 1 && !canGoNext() ? 'show' : ''}">
              <strong>Hint:</strong> In the last step, the extra $240 matched 1 equal unit.
            </div>
            <div class="help-box ${attempts >= 2 && !canGoNext() ? 'show' : ''}">
              <strong>Stronger help:</strong> 1 equal unit = $240
            </div>
          `;
          return renderShell(content);
        }

        if (id === "s11") {
          const attempts = getAttempts("s11");
          return renderShell(
            renderChoiceCards("s11", [
              { id:"add", title:"$1230 + $240", desc:"put June's whole bar back together" },
              { id:"subtract", title:"$1230 - $240", desc:"this makes the amount smaller" },
              { id:"wrong-add", title:"$990 + $240", desc:"this uses May's spent amount" }
            ]) +
            renderFeedbackAndButtons(
              "s11",
              attempts >= 1 && !canGoNext() ? "<strong>Hint:</strong> In June, salary is the whole. Whole = spent + left." : "",
              ""
            )
          );
        }

        if (id === "s12") {
          const attempts = getAttempts("s12");
          const feedback = state.feedback["s12"];
          const value = state.inputs["s12"] || "";
          const content = `
            <div class="input-row">
              <input class="num-input" inputmode="numeric" pattern="[0-9]*" id="numInput" value="${value}" placeholder="Type the salary" aria-label="Type the salary">
              <button type="button" class="btn-primary" data-kind="check" data-screen="s12">Check</button>
              <button type="button" class="btn-secondary" data-kind="back">Back</button>

        if (id === "s13") {

          const content = `
            ${renderChoiceCards("s13", [
              {
                id:"best",
                title:"Same salary totals. June spent $240 more, so June had $240 less left. That $240 is 1 equal unit. Then add June spent and June left.",
                desc:"This matches the model."

              {
                id:"wrong-1",
                title:"Subtract $1230 - $990, then double it to get the salary.",
                desc:"This does not rebuild the whole salary bar."

                id:"wrong-2",
                title:"$240 is both leftover units together, so use $990 + $240.",
                desc:"This gives the wrong meaning to $240."

              "s13",
              attempts >= 1 && !canGoNext() ? "<strong>Hint:</strong> The key idea is: equal totals, extra spending in June, one matching equal unit, then rebuild the whole salary." : "",
              ""
            )}
            ${canGoNext() ? `
              <div class="success-card">
                <h3 style="margin:0 0 10px;">Great job.</h3>
                <div>You used the strategy for this kind of before-and-after problem:</div>
                <ul class="summary-list">
                  <li>Start with equal total bars because the salaries are the same.</li>
                  <li>Show the spent amounts on the correct months.</li>
                  <li>Use the clue about how much money is left.</li>
                  <li>Show the extra spent part in June.</li>
                  <li>Subtract to find that extra spent part.</li>
                  <li>Match that extra spent part to 1 equal unit.</li>
                  <li>Find 1 equal unit, then rebuild the whole salary.</li>
                </ul>
              </div>` : ``}
          `;
          return renderShell(content);
        }

        return "";
      }

      function checkScreen(screenId) {
        if (screenId === "s1") {
          const selected = selectedId("s1");
          if (!selected) return setFeedback("bad", "Choose a sentence first.");
          if (selected === "same") {
            markDone("s1");
            return setFeedback("good", "Yes. That sentence tells us the salaries started the same, so the two starting salary bars must be equal.");
          }
          bumpAttempts("s1");
          return setFeedback("bad", "Not yet. That sentence does not tell us how the two starting salaries compare at the start.");
        }

        if (screenId === "s2") {
          const selected = selectedId("s2");
          if (!selected) return setFeedback("bad", "Choose one answer first.");
          if (selected === "salary") {
            markDone("s2");
            return setFeedback("good", "Yes. We are finding Larry's monthly salary.");
          }
          bumpAttempts("s2");
          return setFeedback("bad", "Not yet. The question is asking for the whole salary amount, not one leftover amount.");
        }

        if (screenId === "s3") {
          const selected = selectedId("s3");
          if (!selected) return setFeedback("bad", "Choose one answer first.");
          if (selected === "equal") {
            markDone("s3");
            return setFeedback("good", "Yes. The salaries started the same, so the total bars must be equal.");
          }
          bumpAttempts("s3");
          return setFeedback("bad", "Not yet. 'Same amount' means the two starting total salary bars are equal.");
        }

        if (screenId === "s4") {
          const may = state.placements.may;
          const june = state.placements.june;
          if (!may || !june) return setFeedback("bad", "Place both amounts first.");
          if (may === "$990" && june === "$1230") {
            markDone("s4");
            return setFeedback("good", "Good. May spent $990 and June spent $1230.");
          }
          bumpAttempts("s4");
          return setFeedback("bad", "Not yet. Check which month spent $990 and which month spent $1230.");
        }

        if (screenId === "s5") {
          const selected = selectedId("s5");
          if (!selected) return setFeedback("bad", "Choose one answer first.");
          if (selected === "correct") {
            markDone("s5");
            return setFeedback("good", "Yes. May-left is 2 equal units and June-left is 1 equal unit.");
          }
          bumpAttempts("s5");
          return setFeedback("bad", "Not yet. The clue is about the money left, not about the spent amounts.");
        }

        if (screenId === "s6") {
          const selected = selectedId("s6");
          if (!selected) return setFeedback("bad", "Tap the extra spent part first.");
          if (selected === "extra") {
            markDone("s6");
            return setFeedback("good", "Yes. That red middle part is the extra spent part in June.");
          }
          bumpAttempts("s6");
          return setFeedback("bad", "Not yet. Tap the part in June that takes the place of May's second equal unit.");
        }

        if (screenId === "s7") {
          const selected = selectedId("s7");
          if (!selected) return setFeedback("bad", "Choose one answer first.");
          if (selected === "1230-990") {
            markDone("s7");
            return setFeedback("good", "Yes. The extra part is what is left after taking away the $990 part that matches May's spending.");
          }
          bumpAttempts("s7");
          return setFeedback("bad", "Not yet. Start with June's whole spent amount, then take away the $990 part that matches May's spending.");
        }

        if (screenId === "s8") {
          const raw = (state.inputs.s8 || "").trim();
          if (!raw) return setFeedback("bad", "Type a number first.");
          if (Number(raw) === 240) {
            markDone("s8");
            return setFeedback("good", "Yes. The extra spent part is $240.");
          }
          bumpAttempts("s8");
          return setFeedback("bad", "Not yet. Use 1230 - 990.");
        }

        if (screenId === "s9") {
          const selected = selectedId("s9");
          if (!selected) return setFeedback("bad", "Choose one answer first.");
          if (selected === "extra-unit") {
            markDone("s9");
            return setFeedback("good", "Yes. The $240 extra spent part matches the 1 extra equal unit in May.");
          }
          bumpAttempts("s9");
          return setFeedback("bad", "Not yet. Match the red $240 part to the one blue equal unit that June is missing.");
        }

        if (screenId === "s10") {
          const raw = (state.inputs.s10 || "").trim();
          if (!raw) return setFeedback("bad", "Type a number first.");
          if (Number(raw) === 240) {
            markDone("s10");
            return setFeedback("good", "Yes. 1 equal unit = $240, so June had $240 left.");
          }
          bumpAttempts("s10");
          return setFeedback("bad", "Not yet. The last step showed that the extra $240 matched 1 equal unit.");
        }

        if (screenId === "s11") {
          const selected = selectedId("s11");
          if (!selected) return setFeedback("bad", "Choose one answer first.");
          if (selected === "add") {
            markDone("s11");
            return setFeedback("good", "Yes. Salary = June spent + June left, so use $1230 + $240.");
          }
          bumpAttempts("s11");
          return setFeedback("bad", "Not yet. To find the whole salary, put June's spent money and June's money left back together.");
        }

        if (screenId === "s12") {
          const raw = (state.inputs.s12 || "").trim();
          if (!raw) return setFeedback("bad", "Type a number first.");
          if (Number(raw) === 1470) {
            markDone("s12");
            return setFeedback("good", "Yes. Larry's monthly salary was $1470.");
          }
          bumpAttempts("s12");
          return setFeedback("bad", "Not yet. Use salary = June spent + June left.");
        }

        if (screenId === "s13") {
          const selected = selectedId("s13");
          if (!selected) return setFeedback("bad", "Choose one answer first.");
          if (selected === "best") {
            markDone("s13");
            return setFeedback("good", "Yes. That is the strategy to remember for this question.");
          }
          bumpAttempts("s13");
          return setFeedback("bad", "Not yet. Choose the summary that uses equal totals, the extra spent part, one equal unit, and then the whole salary.");
        }
      }

      function render() {
        updateQuestionToggle();
        host.innerHTML = renderScreen();
        const input = document.getElementById("numInput");
        if (input) {
          input.addEventListener("input", (e) => {
            state.inputs[screens[state.current].id] = e.target.value.replace(/[^0-9]/g, "");
          });
        }
      }

      host.addEventListener("click", (e) => {
        const t = e.target.closest("[data-kind]");
        if (!t) return;
        const kind = t.dataset.kind;

        if (kind === "select-choice") {
          setSelected(t.dataset.screen, t.dataset.id);
          return;
        }

        if (kind === "place-slot") {
          const amount = selectedId("s4");
          if (!amount) {
            setFeedback("bad", "Tap an amount first.");
            return;
          }
          state.placements[t.dataset.slot] = amount;
          clearFeedback();
          render();
          return;
        }

        if (kind === "check") {
          checkScreen(t.dataset.screen);
          return;
        }

        if (kind === "back") {
          prevScreen();
          return;
        }

        if (kind === "next") {
          if (canGoNext()) nextScreen();
          return;
        }
      });

      host.addEventListener("keydown", (e) => {
        const t = e.target.closest("[data-kind]");
        if (!t) return;
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          t.click();
        }
      });

      toggleQuestionBtn.addEventListener("click", () => {
        state.questionOpen = !state.questionOpen;
        render();
      });

      readAloudBtn.addEventListener("click", () => {
        const screen = screens[state.current];
        const text = [
          "Step " + (state.current + 1),
          screen.title,
          screen.action,
          screen.explain,
          "Question",
          questionLines.join(" ")
        ].join(". ");
        speak(text);
      });

      restartBtn.addEventListener("click", restart);
      window.addEventListener("beforeunload", stopSpeech);

      render();
    })();
  </script>
</body>
</html>
