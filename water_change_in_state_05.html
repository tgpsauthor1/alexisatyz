<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Change in State 05</title>
  <style>
    :root {
      --bg: #eef6fb;
      --card: #ffffff;
      --ink: #17324d;
      --soft-ink: #4f6480;
      --accent: #1f78c8;
      --accent-2: #3aa7e0;
      --accent-3: #d9effb;
      --good: #1e8e5b;
      --bad: #c53b3b;
      --warn: #ffdf7a;
      --line: #cfe0ef;
      --shadow: 0 12px 28px rgba(31, 120, 200, 0.12);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Avenir Next", Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(58, 167, 224, 0.16), transparent 28%),
        linear-gradient(180deg, #f6fbff 0%, var(--bg) 100%);
      color: var(--ink);
      min-height: 100vh;
    }
    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px;
    }
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .brand {
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
    }
    .brand h1 {
      font-size: clamp(1.2rem, 2.2vw, 1.7rem);
      margin: 0 0 4px 0;
    }
    .brand p {
      margin: 0;
      color: var(--soft-ink);
      font-size: 0.98rem;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .control-btn {
      appearance: none;
      border: 2px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 48px;
      box-shadow: var(--shadow);
    }
    .control-btn.active {
      border-color: var(--accent);
      background: #e9f6ff;
    }
    .meter {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .meter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .meter-title {
      font-size: 0.96rem;
      color: var(--soft-ink);
      font-weight: 700;
    }
    .drops {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .drop {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      font-size: 18px;
      background: #d9effb;
      border: 1px solid #b9dcf4;
      transition: 0.2s ease;
    }
    .drop.lost {
      opacity: 0.28;
      transform: scale(0.92);
      filter: grayscale(1);
    }
    .progress {
      font-weight: 700;
      color: var(--soft-ink);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(16px, 2vw, 24px);
    }
    .screen-title {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1.15;
    }
    .instruction {
      margin-top: 14px;
      font-size: clamp(1.2rem, 2.4vw, 1.45rem);
      font-weight: 800;
      line-height: 1.25;
      color: #0b4b82;
    }
    .support {
      margin-top: 10px;
      color: var(--soft-ink);
      font-size: 1rem;
      line-height: 1.45;
    }
    .question-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      border: 2px solid var(--accent-3);
      background: #f7fcff;
    }
    .question-box strong.highlight {
      background: #fff4a8;
      padding: 0 4px;
      border-radius: 6px;
    }
    .question-image {
      margin-top: 14px;
      width: 100%;
      max-width: 560px;
      border-radius: 14px;
      border: 1px solid var(--line);
      display: block;
      background: #fff;
    }
    .options {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .option {
      appearance: none;
      width: 100%;
      text-align: left;
      border: 2px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 18px;
      padding: 16px;
      font-size: 1.08rem;
      font-weight: 700;
      line-height: 1.35;
      cursor: pointer;
      min-height: 64px;
      transition: 0.16s ease;
    }
    .option:hover, .control-btn:hover, .next-btn:hover, .small-btn:hover {
      transform: translateY(-1px);
    }
    .option.selected {
      border-color: var(--accent);
      background: #eef8ff;
    }
    .option.correct {
      border-color: var(--good);
      background: #eefaf4;
    }
    .option.wrong {
      border-color: var(--bad);
      background: #fff2f2;
    }
    .feedback {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 1.02rem;
      font-weight: 700;
      line-height: 1.4;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.good {
      background: #eefaf4;
      color: #125a39;
      border: 1px solid #b9e3cb;
    }
    .feedback.bad {
      background: #fff4f4;
      color: #8d2020;
      border: 1px solid #f0c6c6;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .next-btn, .small-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      min-height: 50px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }
    .next-btn {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      color: white;
      min-width: 132px;
    }
    .next-btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }
    .small-btn {
      background: #edf7ff;
      color: var(--ink);
      border: 2px solid var(--line);
    }
    .diagram-wrap {
      margin-top: 18px;
      background: #f7fbff;
      border: 2px solid var(--accent-3);
      border-radius: 22px;
      padding: 14px;
    }
    .diagram-caption {
      margin-top: 10px;
      color: var(--soft-ink);
      font-size: 0.98rem;
    }
    .diagram-hotspots {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .diagram-hotspot {
      flex: 1 1 180px;
    }
    .sequence-area {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .slots {
      display: grid;
      gap: 10px;
    }
    .slot {
      min-height: 58px;
      border-radius: 16px;
      border: 2px dashed #b8d9ef;
      background: #f8fcff;
      display: flex;
      align-items: center;
      padding: 12px 14px;
      font-weight: 700;
      color: #4b6a83;
      cursor: pointer;
    }
    .slot.filled {
      border-style: solid;
      color: var(--ink);
      background: #edf7ff;
    }
    .chip-bank {
      display: grid;
      gap: 10px;
    }
    .chip {
      appearance: none;
      border: 2px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      min-height: 58px;
      text-align: left;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }
    .chip.used {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .check-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .check-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      background: #0b4b82;
      color: white;
      padding: 14px 18px;
      min-height: 50px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }
    .question-toggle-wrap {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }
    .question-panel {
      margin-top: 12px;
      padding: 14px;
      border-radius: 16px;
      background: #f8fbfe;
      border: 1px solid var(--line);
      display: none;
    }
    .question-panel.show { display: block; }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #edf7ff;
      border: 1px solid var(--line);
      color: #205b8e;
      font-weight: 800;
      font-size: 0.9rem;
      margin-top: 10px;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 42, 68, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 10;
    }
    .overlay.show { display: flex; }
    .overlay-card {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0,0,0,0.24);
    }
    .overlay-card h2 {
      margin: 0 0 10px 0;
      font-size: 1.8rem;
    }
    .overlay-card p {
      margin: 0;
      color: var(--soft-ink);
      line-height: 1.45;
      font-weight: 700;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .rain-drop {
      animation: fall 1.4s linear infinite;
      opacity: 0.85;
    }
    .rain-drop.delay-1 { animation-delay: 0.25s; }
    .rain-drop.delay-2 { animation-delay: 0.6s; }
    .vapour-dot {
      animation: drift 2.4s ease-in-out infinite;
    }
    .vapour-dot.delay-1 { animation-delay: 0.4s; }
    .vapour-dot.delay-2 { animation-delay: 0.8s; }
    .vapour-dot.delay-3 { animation-delay: 1.2s; }
    .droplet-dot {
      animation: twinkle 1.7s ease-in-out infinite;
    }
    .cool-arrow {
      animation: pulseMove 1.6s ease-in-out infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-6px); opacity: 0; }
      35% { opacity: 0.95; }
      100% { transform: translateY(16px); opacity: 0; }
    }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0); opacity: 0.5; }
      50% { transform: translate(18px, -8px); opacity: 1; }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
    @keyframes pulseMove {
      0%, 100% { opacity: 0.35; transform: translateX(0); }
      50% { opacity: 1; transform: translateX(-6px); }
    }
    @media (max-width: 760px) {
      .topbar {
        grid-template-columns: 1fr;
      }
      .controls {
        justify-content: flex-start;
      }
      .option {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <h1>What is the mist?</h1>
        <p>Water change of state interactive</p>
      </div>
      <div class="controls">
        <button id="readToggle" class="control-btn" type="button" aria-pressed="false">Read-aloud: Off</button>
        <button id="speakBtn" class="control-btn" type="button" disabled>Read this screen</button>
      </div>
    </div>

    <div class="meter" aria-live="polite">
      <div class="meter-row">
        <div>
          <div class="meter-title">Foggy Oops Meter</div>
          <div class="drops" id="drops"></div>
        </div>
        <div class="progress" id="progressText"></div>
      </div>
    </div>

    <main id="app" class="card" aria-live="polite"></main>
  </div>

  <div class="overlay" id="gameOverOverlay" aria-hidden="true">
    <div class="overlay-card">
      <h2>Too many foggy taps!</h2>
      <p>You used all your chances. Starting again now…</p>
    </div>
  </div>

    function shuffleArray(input) {
      const arr = [...input];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function shuffleUntilDifferent(input, isBadOrderFn) {
      let tries = 0;
      let output = shuffleArray(input);
      while (isBadOrderFn(output) && tries < 12) {
        output = shuffleArray(input);
        tries++;
      }
      return output;
    }

    const demeritMax = Math.ceil(screens.filter(s => s.applyDemerit).length / 2);

    const state = {
      screenIndex: 0,
      demeritMax,
      demeritsLeft: demeritMax,
      readAloud: false,
      questionPanelOpen: false,
      correctDone: false,
      currentOptions: [],
      selectedOptionIdx: null,
      sequenceBank: [],
      sequenceSlots: [],
      sequenceSolved: false,
      hotspotSolved: false,
      isSpeaking: false
    };

    const app = document.getElementById("app");
    const drops = document.getElementById("drops");
    const progressText = document.getElementById("progressText");
    const readToggle = document.getElementById("readToggle");
    const speakBtn = document.getElementById("speakBtn");
    const overlay = document.getElementById("gameOverOverlay");

    function updateHeader() {
      drops.innerHTML = "";
      for (let i = 0; i < state.demeritMax; i++) {
        const span = document.createElement("span");
        span.className = "drop" + (i < state.demeritsLeft ? "" : " lost");
        span.textContent = "💧";
        drops.appendChild(span);
      }
      const current = Math.min(state.screenIndex + 1, screens.length);
      progressText.textContent = "Screen " + current + " of " + screens.length;
      readToggle.textContent = "Read-aloud: " + (state.readAloud ? "On" : "Off");
      readToggle.classList.toggle("active", state.readAloud);
      readToggle.setAttribute("aria-pressed", state.readAloud ? "true" : "false");
      speakBtn.disabled = !state.readAloud;
      speakBtn.classList.toggle("active", state.readAloud);
    }

    readToggle.addEventListener("click", () => {
      state.readAloud = !state.readAloud;
      if (!state.readAloud && window.speechSynthesis) {
        speechSynthesis.cancel();
      }
      updateHeader();
    });

    speakBtn.addEventListener("click", () => {
      if (state.readAloud) speakCurrentScreen();
    });

    function loseDemerit() {
      if (!screens[state.screenIndex].applyDemerit) return;
      state.demeritsLeft = Math.max(0, state.demeritsLeft - 1);
      updateHeader();
      if (state.demeritsLeft === 0) {
        overlay.classList.add("show");
        overlay.setAttribute("aria-hidden", "false");
        if (window.speechSynthesis) speechSynthesis.cancel();
        setTimeout(resetAll, 1800);
      }
    }

    function resetAll() {
      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
      state.screenIndex = 0;
      state.demeritsLeft = state.demeritMax;
      state.questionPanelOpen = false;
      state.selectedOptionIdx = null;
      state.sequenceBank = [];
      state.sequenceSlots = [];
      state.sequenceSolved = false;
      state.hotspotSolved = false;
      render();
    }

    function makeQuestionPanel() {

      toggle.textContent = state.questionPanelOpen ? "Hide full question" : "Show full question";
      toggle.addEventListener("click", () => {
        state.questionPanelOpen = !state.questionPanelOpen;
        render();
      });
      wrap.appendChild(toggle);

      const panel = document.createElement("div");
      panel.className = "question-panel" + (state.questionPanelOpen ? " show" : "");
      panel.innerHTML = `
        <div><strong>Original question</strong></div>
        <div style="margin-top:8px; line-height:1.5;">${QUESTION_TEXT}</div>
        <img class="question-image" alt="Original worksheet question" src="${QUESTION_IMAGE}">
      `;
      wrap.appendChild(panel);
      return wrap;
    }

      const box = document.createElement("div");

      if (state.readAloud) speakText(collectSpeakableText() + " " + text);

      const nav = document.createElement("div");

        state.sequenceBank = [];

        app.appendChild(q);
      }

      if (withVisual) app.appendChild(withVisual);

      const optionsWrap = document.createElement("div");
      optionsWrap.className = "options";
      state.currentOptions = shuffleArray(screen.options.map(opt => ({ ...opt })));

      state.currentOptions.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.type = "button";
        btn.textContent = opt.text;
        btn.dataset.index = String(idx);
        btn.addEventListener("click", () => {
          if (state.correctDone) return;
          state.selectedOptionIdx = idx;
          const correct = !!opt.correct;
          [...optionsWrap.children].forEach((child, childIdx) => {
            child.classList.remove("selected", "correct", "wrong");
            if (childIdx === idx) {
              child.classList.add(correct ? "correct" : "wrong");
            }
          });
          const existing = app.querySelector(".feedback");
          if (existing) existing.remove();
          if (correct) {
            state.correctDone = true;
            addFeedback(app, screen.correctFeedback, true);
            const nav = app.querySelector(".nav");
            if (nav) nav.remove();
            setNav(app, true);
          } else {
            if (screen.applyDemerit) loseDemerit();
            addFeedback(app, screen.wrongFeedback, false);
          }
        });
        optionsWrap.appendChild(btn);
      });
      app.appendChild(optionsWrap);

      setNav(app, false);

      if (screen.id !== "intro") {
        app.appendChild(makeQuestionPanel());
      }
    }

    function renderHotspot(screen) {
      const title = document.createElement("h2");
      title.className = "screen-title";
      title.textContent = screen.title;
      app.appendChild(title);

      const instruction = document.createElement("div");
      instruction.className = "instruction";
      instruction.textContent = screen.instruction;
      app.appendChild(instruction);

      const diagram = makeCarDiagram("surface");
      const caption = document.createElement("div");
      caption.className = "diagram-caption";
      caption.textContent = "Use the clean car model to spot the inner and outer surface of the windscreen.";
      diagram.appendChild(caption);

      const hotspots = document.createElement("div");
      hotspots.className = "diagram-hotspots";

      const buttons = [
        { key: "outer", text: "Outer surface" },
        { key: "inner", text: "Inner surface" }
      ];
      const bank = shuffleArray(buttons);

      bank.forEach(item => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option diagram-hotspot";
        btn.textContent = item.text;
        btn.dataset.surface = item.key;
        btn.addEventListener("click", () => {
          if (state.hotspotSolved) return;
          const good = item.key === screen.correctHotspot;
          btn.classList.add(good ? "correct" : "wrong");
          const existing = app.querySelector(".feedback");
          if (existing) existing.remove();
          if (good) {
            state.hotspotSolved = true;
            addFeedback(app, screen.correctFeedback, true);
            const nav = app.querySelector(".nav");
            if (nav) nav.remove();
            setNav(app, true);
          } else {
            if (screen.applyDemerit) loseDemerit();
            addFeedback(app, screen.wrongFeedback, false);
          }
        });
        hotspots.appendChild(btn);
      });

      diagram.appendChild(hotspots);
      app.appendChild(diagram);
      setNav(app, false);
      app.appendChild(makeQuestionPanel());
    }

    function renderSequence(screen) {
      const title = document.createElement("h2");
      title.className = "screen-title";
      title.textContent = screen.title;
      app.appendChild(title);

      const instruction = document.createElement("div");
      instruction.className = "instruction";
      instruction.textContent = screen.instruction;
      app.appendChild(instruction);

      const diagram = makeCarDiagram("condense");
      app.appendChild(diagram);

      if (!state.sequenceBank.length) {
        const shuffled = shuffleUntilDifferent(screen.items, arr => arr.every((item, idx) => item === screen.items[idx]));
        state.sequenceBank = shuffled.map(text => ({ text, used: false }));
        state.sequenceSlots = new Array(screen.items.length).fill(null);
      }

      const area = document.createElement("div");
      area.className = "sequence-area";

      const slots = document.createElement("div");
      slots.className = "slots";
      state.sequenceSlots.forEach((slotText, idx) => {
        const slot = document.createElement("button");
        slot.type = "button";
        slot.className = "slot" + (slotText ? " filled" : "");
        slot.textContent = slotText || ("Step " + (idx + 1));
        slot.addEventListener("click", () => {
          if (!slotText || state.sequenceSolved) return;
          const bankItem = state.sequenceBank.find(item => item.text === slotText);
          if (bankItem) bankItem.used = false;
          state.sequenceSlots[idx] = null;
          render();
        });
        slots.appendChild(slot);
      });
      area.appendChild(slots);

      const bank = document.createElement("div");
      bank.className = "chip-bank";
      state.sequenceBank.forEach((item, idx) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "chip" + (item.used ? " used" : "");
        chip.textContent = item.text;
        chip.disabled = item.used || state.sequenceSolved;
        chip.addEventListener("click", () => {
          const openIndex = state.sequenceSlots.findIndex(v => v === null);
          if (openIndex === -1) return;
          state.sequenceSlots[openIndex] = item.text;
          item.used = true;
          render();
        });
        bank.appendChild(chip);
      });
      area.appendChild(bank);

      const row = document.createElement("div");
      row.className = "check-row";

      const check = document.createElement("button");
      check.className = "check-btn";
      check.type = "button";
      check.textContent = "Check order";
      check.disabled = state.sequenceSlots.some(v => v === null) || state.sequenceSolved;
      check.addEventListener("click", () => {
        const right = state.sequenceSlots.every((text, idx) => text === screen.items[idx]);
        const existing = app.querySelector(".feedback");
        if (existing) existing.remove();
        if (right) {
          state.sequenceSolved = true;
          addFeedback(app, screen.correctFeedback, true);
          const nav = app.querySelector(".nav");
          if (nav) nav.remove();
          setNav(app, true);
          check.disabled = true;
        } else {
          if (screen.applyDemerit) loseDemerit();
          addFeedback(app, screen.wrongFeedback, false);
        }
      });
      row.appendChild(check);

      const reset = document.createElement("button");
      reset.className = "small-btn";
      reset.type = "button";
      reset.textContent = "Clear order";
      reset.disabled = state.sequenceSolved;
      reset.addEventListener("click", () => {
        state.sequenceBank.forEach(item => item.used = false);
        state.sequenceSlots = new Array(screen.items.length).fill(null);
        render();
      });
      row.appendChild(reset);

      area.appendChild(row);
      app.appendChild(area);

      const feedback = app.querySelector(".feedback");
      if (feedback) feedback.remove();

      if (state.sequenceSolved) {
        addFeedback(app, screen.correctFeedback, true);
      }

      setNav(app, state.sequenceSolved);
      app.appendChild(makeQuestionPanel());
    }

    function renderCompletion(screen) {
      const title = document.createElement("h2");
      title.className = "screen-title";
      title.textContent = screen.title;
      app.appendChild(title);

      const instruction = document.createElement("div");
      instruction.className = "instruction";
      instruction.textContent = screen.instruction;
      app.appendChild(instruction);

      const support = document.createElement("div");
      support.className = "support";
      support.textContent = screen.support;
      app.appendChild(support);

      app.appendChild(makeCarDiagram("condense"));

      const nav = document.createElement("div");
      nav.className = "nav";
      const left = document.createElement("button");
      left.className = "small-btn";
      left.type = "button";
      left.textContent = "Try again from start";
      left.addEventListener("click", resetAll);

      const right = document.createElement("button");
      right.className = "next-btn";
      right.type = "button";
      right.textContent = "Read the question again";
      right.addEventListener("click", () => {
        state.screenIndex = 0;
        render();
      });

      nav.appendChild(left);
      nav.appendChild(right);
      app.appendChild(nav);
    }

    function collectSpeakableText() {
      const screen = screens[state.screenIndex];
      let text = "";
      if (!screen) return text;
      text += screen.title + ". ";
      text += screen.instruction + ". ";
      if (screen.type === "intro") {
        text += QUESTION_TEXT + ". ";
      }
      if (screen.prompt) text += screen.prompt + ". ";
      if (screen.type === "single") {
        const opts = state.currentOptions && state.currentOptions.length ? state.currentOptions : screen.options;
        text += "Options. " + opts.map((opt, i) => "Option " + (i + 1) + ": " + opt.text + ".").join(" ");
      }
      if (screen.type === "sequence") {
        text += "Build the order from the strips on screen.";
      }
      if (screen.type === "hotspot") {
        text += "Choose between inner surface and outer surface.";
      }
      const feedback = app.querySelector(".feedback");
      if (feedback) text += "Feedback. " + feedback.textContent;
      return text;
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.95;
      utter.pitch = 1;
      utter.lang = "en-SG";
      window.speechSynthesis.speak(utter);
    }

    function speakCurrentScreen() {
      speakText(collectSpeakableText());
    }

    function render() {
      if (window.speechSynthesis) {
        speechSynthesis.cancel();
      }
      state.correctDone = false;
      app.innerHTML = "";
      updateHeader();

      const screen = screens[state.screenIndex];
      if (!screen) return;

      if (screen.type === "intro") {
        renderIntro(screen);
      } else if (screen.type === "single") {
        const visual = screen.visual ? makeCarDiagram(screen.visual) : null;
        renderOptions(screen, visual);
      } else if (screen.type === "hotspot") {
        renderHotspot(screen);
      } else if (screen.type === "sequence") {
        renderSequence(screen);
      } else if (screen.type === "completion") {
        renderCompletion(screen);
      }

      if (state.readAloud) {
        setTimeout(speakCurrentScreen, 120);
      }
    }

    render();
  </script>
</body>
</html>
