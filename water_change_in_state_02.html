<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Change in State 02</title>
  <style>
    :root {
      --bg: #f4f8ff;
      --panel: #ffffff;
      --ink: #17324d;
      --sub: #52677d;
      --line: #d7e2ef;
      --accent: #2f80ed;
      --accent-2: #1f5fb9;
      --warm: #ffb84d;
      --ok: #1f8f63;
      --bad: #c44536;
      --soft-ok: #e9f8f1;
      --soft-bad: #fff0ed;
      --soft-accent: #eef5ff;
      --shadow: 0 14px 32px rgba(23, 50, 77, 0.12);
      --radius: 18px;
      --chip: #dff0ff;
      --ice: #d7efff;
      --highlight: #fff3a3;
      --focus: #1f5fb9;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Arial", "Helvetica Neue", Helvetica, sans-serif;
      background: linear-gradient(180deg, #eaf3ff 0%, #f8fbff 100%);
      color: var(--ink);
      min-height: 100vh;
    }
    button, .choice, .slot, .toggle-btn {
      font: inherit;
    }
    button:focus-visible, .choice:focus-visible, .slot:focus-visible, .toggle-btn:focus-visible, summary:focus-visible {
      outline: 4px solid rgba(31,95,185,0.28);
      outline-offset: 3px;
    }
    .app {
      width: min(1040px, 100%);
      margin: 0 auto;
      padding: 0 16px 28px;
    }
    .topbar {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: stretch;
    }
    .topcard {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px 14px;
    }
    .demerit-card {
      flex: 1 1 360px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .demerit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .demerit-label {
      font-weight: 700;
      font-size: 1rem;
    }
    .lives {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .life {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      background: var(--ice);
      border: 2px solid #a9d8ff;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }
    .life.lost {
      background: #eef1f5;
      border-color: #d4dbe4;
      opacity: 0.45;
      transform: scale(0.92);
    }
    .small-note {
      font-size: 0.95rem;
      color: var(--sub);
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    .toggle-btn {
      min-height: 48px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 2px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
      box-shadow: var(--shadow);
    }
    .toggle-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .main-card {
      margin-top: 14px;
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .screen-wrap {
      padding: 22px 22px 16px;
    }
    .screen-tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--soft-accent);
      color: var(--accent-2);
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 12px;
    }
    .instruction {
      font-size: clamp(1.45rem, 2.6vw, 2rem);
      line-height: 1.2;
      font-weight: 800;
      margin: 0 0 14px;
      color: #0d2940;
    }
    .support-text {
      font-size: 1rem;
      color: var(--sub);
      margin: 0 0 12px;
    }
    .stage {
      min-height: 430px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .grid-two {
      display: grid;
      gap: 16px;
      grid-template-columns: 1.15fr 0.95fr;
      align-items: start;
    }
    .panel {
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 16px;
    }
    .panel.soft {
      background: #fbfdff;
    }
    .question-text {
      font-size: 1.02rem;
      line-height: 1.55;
    }
    .question-text mark {
      background: var(--highlight);
      padding: 0 4px;
      border-radius: 4px;
    }
    .question-image {
      width: 100%;
      border-radius: 14px;
      border: 2px solid var(--line);
      display: block;
      background: #fff;
    }
    .redraw {
      display: grid;
      gap: 14px;
    }
    table.clean {
      width: 100%;
      border-collapse: collapse;
      font-size: 1rem;
    }
    table.clean th, table.clean td {
      border: 2px solid #9ab8d6;
      padding: 10px 12px;
      text-align: center;
    }
    table.clean th {
      background: #e8f2ff;
    }
    .mini-caption {
      font-size: 0.95rem;
      color: var(--sub);
      margin: 0;
    }
    .state-diagram {
      border: 2px solid #9ab8d6;
      border-radius: 16px;
      padding: 12px;
      background: #f9fcff;
    }
    .line-visual {
      position: relative;
      height: 98px;
      margin-top: 6px;
    }
    .line-main {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 38px;
      height: 6px;
      background: linear-gradient(90deg, #b9d6ff 0%, #6ca8ff 100%);
      border-radius: 999px;
    }
    .marker {
      position: absolute;
      top: 18px;
      width: 4px;
      height: 48px;
      background: #f3a31b;
      border-radius: 999px;
    }
    .marker.freeze {
      left: 44%;
    }
    .marker.boil {
      left: 80%;
      background: #7f8fa6;
    }
    .zone-labels, .state-labels {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.94rem;
      color: var(--sub);
      font-weight: 700;
    }
    .zone-labels {
      top: 0;
    }
    .state-labels {
      top: 62px;
      color: var(--ink);
    }
    .choices {
      display: grid;
      gap: 12px;
    }
    .choices.cols-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .choice {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 16px;
      border: 2px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      min-height: 62px;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      font-weight: 700;
    }
    .choice:hover {
      transform: translateY(-1px);
    }
    .choice.selected {
      border-color: var(--accent);
      background: var(--soft-accent);
    }
    .choice.correct {
      border-color: var(--ok);
      background: var(--soft-ok);
    }
    .choice.wrong {
      border-color: var(--bad);
      background: var(--soft-bad);
    }
    .feedback {
      min-height: 52px;
      border-radius: 16px;
      border: 2px solid var(--line);
      padding: 12px 14px;
      background: #fbfdff;
      font-weight: 700;
      line-height: 1.45;
    }
    .feedback.ok {
      border-color: #b9ead5;
      background: var(--soft-ok);
      color: #0f6d49;
    }
    .feedback.bad {
      border-color: #f3c2ba;
      background: var(--soft-bad);
      color: #9d3228;
    }
    .nav {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      min-height: 52px;
      padding: 12px 18px;
      border-radius: 14px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .btn.secondary {
      background: #fff;
      color: var(--ink);
      border: 2px solid var(--line);
      box-shadow: none;
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }
    .chip-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 86px;
      min-height: 56px;
      padding: 10px 14px;
      border-radius: 16px;
      background: var(--chip);
      color: var(--accent-2);
      border: 2px solid #a9d8ff;
      font-weight: 800;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.04);
    }
    .slot-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .slot {
      min-height: 88px;
      border-radius: 18px;
      border: 2px dashed #9ab8d6;
      background: #fcfeff;
      padding: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      color: var(--ink);
      font-weight: 800;
      text-align: center;
    }
    .slot small {
      color: var(--sub);
      font-weight: 700;
    }
    .slot.correct {
      border-style: solid;
      border-color: var(--ok);
      background: var(--soft-ok);
    }
    .slot.wrong {
      border-style: solid;
      border-color: var(--bad);
      background: var(--soft-bad);
    }
    .placed-chip {
      display: inline-flex;
      align-self: center;
      margin-top: 4px;
    }
    details.panel-toggle {
      margin-top: 8px;
      border: 2px solid var(--line);
      border-radius: 16px;
      background: #fff;
      overflow: hidden;
    }
    details.panel-toggle[open] {
      box-shadow: var(--shadow);
    }
    details.panel-toggle summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 800;
      color: var(--ink);
      background: #f9fbff;
      user-select: none;
    }
    details.panel-toggle summary::-webkit-details-marker {
      display: none;
    }
    .toggle-content {
      padding: 14px 16px 16px;
      border-top: 2px solid var(--line);
      display: grid;
      gap: 14px;
    }
    .source-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 1.15fr 0.95fr;
      align-items: start;
    }
    .popup-wrap {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .popup-card {
      border: 2px solid #cfe3ff;
      background: #f5faff;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 0.98rem;
      line-height: 1.45;
    }
    .final-list {
      margin: 0;
      padding-left: 22px;
      line-height: 1.65;
      font-size: 1rem;
    }
    .option-label {
      display: inline-flex;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      background: #edf4ff;
      color: var(--accent-2);
      font-weight: 800;
      flex: 0 0 auto;
    }
    .hint {
      border-left: 5px solid #a9d8ff;
      padding: 10px 12px;
      background: #f7fbff;
      border-radius: 12px;
      font-weight: 700;
      color: var(--ink);
    }
    @media (max-width: 860px) {
      .grid-two, .source-grid {
        grid-template-columns: 1fr;
      }
      .choices.cols-2, .slot-grid {
        grid-template-columns: 1fr;
      }
      .topbar {
        align-items: stretch;
      }
      .toolbar {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topcard demerit-card" aria-live="polite">
        <div class="demerit-row">
          <div class="demerit-label">Ice cracks left</div>
          <div class="lives" id="livesRow"></div>
        </div>
        <div class="small-note" id="demeritNote">Wrong checks in the teaching part will crack one ice circle. If all the ice cracks, the activity restarts.</div>
      </div>
      <div class="toolbar">
        <button id="readAloudToggle" class="toggle-btn" type="button" aria-pressed="false">🔈 Read-aloud: Off</button>
      </div>
    </div>

    <main class="main-card" id="appMain">
      <div class="screen-wrap">
        <div id="screenRoot" class="stage"></div>
      </div>
    </main>
  </div>

    const cleanTableRows = [
      ["A", "5"],
      ["B", "30"],
      ["C", "120"]
    ];

    const originalOptions = [
      { key: "1", text: "A is a solid at 3°C.", correct: true },
      { key: "2", text: "A and B are both liquids at 28°C.", correct: false },
      { key: "3", text: "B and C are both solids at 130°C.", correct: false },
      { key: "4", text: "C can be a liquid or a gas at 120°C.", correct: false }
    ];

    const transferOptions = [
      { text: "D is a solid at 15°C.", correct: true },
      { text: "D is a gas at 15°C.", correct: false },
      { text: "D is a gas at 20°C.", correct: false },
      { text: "D is a liquid only at 20°C.", correct: false }
    ];

    const screenTitles = [
      "Screen 1 of 10",
      "Screen 2 of 10",
      "Screen 3 of 10",
      "Screen 4 of 10",
      "Screen 5 of 10",
      "Screen 6 of 10",
      "Screen 7 of 10",
      "Screen 8 of 10",
      "Screen 9 of 10",
      "Screen 10 of 10"
    ];

    const screenState = {
      current: 0,
      readAloudOn: false,
      questionOpen: false,
      sourceOpen: false,
      popupOpen: false,
      livesTotal: 0,
      livesLeft: 0,
      lockedNext: true,
      feedback: null,
      selected: null,
      questionReady: false,
      randomOrder: {},
      penalisedScreens: [1,2,3,4,5,6],
    };

    const screenRoot = document.getElementById("screenRoot");
    const livesRow = document.getElementById("livesRow");
    const readAloudToggle = document.getElementById("readAloudToggle");

    function shuffle(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function setupLives() {
      const half = Math.ceil(screenState.penalisedScreens.length / 2);
      screenState.livesTotal = half;
      screenState.livesLeft = half;
    }

    function resetForRestart() {
      window.speechSynthesis?.cancel?.();
      screenState.current = 0;
      screenState.questionOpen = false;
      screenState.sourceOpen = false;
      screenState.popupOpen = false;
      screenState.lockedNext = true;
      screenState.feedback = null;
      screenState.selected = null;
      screenState.questionReady = false;
      screenState.randomOrder = {};
      setupLives();
      render();
    }

    setupLives();

    function getQuestionHighlights() {
      return `
        <p class="question-text">
          The table below shows the <mark>freezing points</mark> of three substances, A, B and C.
          Based on the information given above, <mark>which one of the following is correct?</mark>
        </p>
      `;
    }

    function drawCleanTable() {
      return `
        <table class="clean" aria-label="Freezing points table">
          <thead>
            <tr><th>Substance</th><th>Freezing point (°C)</th></tr>
          </thead>
          <tbody>
            ${cleanTableRows.map(row => `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`).join("")}
          </tbody>
        </table>
      `;
    }

    function drawStateDiagram(extraNote = true) {
      return `
        <div class="state-diagram" aria-label="Clean state diagram">
          <p class="mini-caption">Use the freezing point as a boundary.</p>
          <div class="line-visual">
            <div class="line-main"></div>
            <div class="marker freeze" aria-hidden="true"></div>
            <div class="marker boil" aria-hidden="true"></div>
            <div class="zone-labels">
              <span>Before</span>
              <span>At freezing point</span>
              <span>After</span>
            </div>
            <div class="state-labels">
              <span>Solid</span>
              <span>Solid + liquid</span>
              <span>Boiling point not given</span>
            </div>
          </div>
          ${extraNote ? `<p class="mini-caption">This question gives freezing points only, so do not jump straight to gas.</p>` : ""}
        </div>
      `;
    }

    function questionPanelMarkup() {
      return `
        <details class="panel-toggle" ${screenState.questionOpen ? "open" : ""} id="questionPanel">
          <summary>Show the question again</summary>
          <div class="toggle-content">
            <div class="panel">
              ${getQuestionHighlights()}
              <img class="question-image" src="${originalImage}" alt="Original freezing point question" />
            </div>
          </div>
        </details>
      `;
    }

    function sourcePanelMarkup() {
      return `
        <details class="panel-toggle" ${screenState.sourceOpen ? "open" : ""} id="sourcePanel">
          <summary>Show the source visual and clean redraw</summary>
          <div class="toggle-content">
            <div class="source-grid">
              <div class="panel">
                <p class="mini-caption">Original screenshot</p>
                <img class="question-image" src="${originalImage}" alt="Original freezing point question screenshot" />
              </div>
              <div class="panel soft redraw">
                <p class="mini-caption">Clean redraw</p>
                ${drawCleanTable()}
                ${drawStateDiagram(true)}
              </div>
            </div>
          </div>
        </details>
      `;
    }

    function updateTogglesPersistence() {
      const q = document.getElementById("questionPanel");
      if (q) {
        q.addEventListener("toggle", () => {
          screenState.questionOpen = q.open;
        });
      }
      const s = document.getElementById("sourcePanel");
      if (s) {
        s.addEventListener("toggle", () => {
          screenState.sourceOpen = s.open;
        });
      }
    }

    function speakScreen() {
      if (!screenState.readAloudOn || !("speechSynthesis" in window)) return;
      const bits = [];
      const title = screenRoot.querySelector(".screen-tag")?.textContent?.trim();
      const instruction = screenRoot.querySelector(".instruction")?.textContent?.trim();
      if (title) bits.push(title);
      if (instruction) bits.push(instruction);
      screenRoot.querySelectorAll(".support-text, .mini-caption, .choice, .slot, .hint, .feedback, summary, .question-text").forEach(el => {
        const t = el.textContent.trim();
        if (t) bits.push(t);
      });
      const utter = new SpeechSynthesisUtterance(bits.join(". "));
      utter.rate = 0.95;
      utter.pitch = 1;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utter);
    }

    function loseLifeIfNeeded() {
      if (!screenState.penalisedScreens.includes(screenState.current)) return false;
      screenState.livesLeft -= 1;
      if (screenState.livesLeft <= 0) {
        alert("All the ice cracked. The whole interactive will restart.");
        resetForRestart();
        return true;
      }
      return false;
    }

    function ensureOrder(key, items) {
      if (!screenState.randomOrder[key]) {
        screenState.randomOrder[key] = shuffle(items);
      }
      return screenState.randomOrder[key];
    }

    function nextScreen() {
      if (screenState.current < 9) {
        screenState.current += 1;
        screenState.selected = null;
        screenState.feedback = null;
        render();
      }
    }

    function prevScreen() {
      if (screenState.current > 0) {
        screenState.current -= 1;
        screenState.selected = null;
        screenState.feedback = null;
        render();
      }
    }

    function choiceClass(value) {
      const selected = screenState.selected === value;
      return selected ? "choice selected" : "choice";
    }

    function renderFeedback() {
      if (!screenState.feedback) {
        return `<div class="feedback" aria-live="polite">Feedback will appear here.</div>`;
      }
      const cls = screenState.feedback.type === "ok" ? "feedback ok" : "feedback bad";
      return `<div class="${cls}" aria-live="polite">${screenState.feedback.message}</div>`;
    }

    function renderBottomNav(showBack = true, nextText = "Next") {
      const nextEnabled = screenState.lockedNext;
      return `
        <div class="nav">
          <button class="btn secondary" type="button" id="backBtn" ${showBack ? "" : "style='visibility:hidden'"}>Back</button>
          <button class="btn" type="button" id="nextBtn" ${nextEnabled ? "" : "disabled"}>${nextText}</button>
        </div>
      `;
    }

    function renderScreen0() {
      return `
        <div class="screen-tag">${screenTitles[0]}</div>
        <h1 class="instruction">Read the question. Then tap “I’m ready.”</h1>
        <div class="stage">
          <div class="grid-two">
            <div class="panel">
              ${getQuestionHighlights()}
              <img class="question-image" src="${originalImage}" alt="Original freezing point question" />
            </div>
            <div class="panel soft redraw">
              <p class="mini-caption">Clean redraw</p>
              ${drawCleanTable()}
              ${drawStateDiagram(true)}
            </div>
          </div>
          <div class="hint">Look for the type of point shown in the table. You will use it as a boundary.</div>
          <div class="nav">
            <button class="btn secondary" type="button" style="visibility:hidden">Back</button>
            <button class="btn" type="button" id="readyBtn">I’m ready</button>
          </div>
        </div>
      `;
    }

    function renderScreen1() {
      screenState.lockedNext = screenState.feedback?.type === "ok";
      const options = ensureOrder("screen1", [
        { value: "boiling points", label: "boiling points" },
        { value: "freezing points", label: "freezing points" },
        { value: "colours", label: "colours of the substances" },
        { value: "sizes", label: "sizes of the substances" }
      ]);
      return `
        <div class="screen-tag">${screenTitles[1]}</div>
        <h1 class="instruction">Tap the information the table gives.</h1>
        <p class="support-text">Choose the clue you must use first.</p>
        <div class="stage">
          <div class="choices cols-2">
            ${options.map(opt => `<button class="${choiceClass(opt.value)}" type="button" data-value="${opt.value}">${opt.label}</button>`).join("")}
          </div>
          ${renderFeedback()}
          ${sourcePanelMarkup()}
          ${questionPanelMarkup()}
          ${renderBottomNav(true)}
        </div>
      `;
    }

    function renderScreen2() {
      screenState.lockedNext = screenState.feedback?.type === "ok";
      const options = ensureOrder("screen2", [
        { value: "solid", label: "Below the freezing point → solid" },
        { value: "gas", label: "Below the freezing point → gas" },
        { value: "atgas", label: "At the freezing point → gas only" },
        { value: "abovesolid", label: "Above the freezing point → solid only" }
      ]);
      return `
        <div class="screen-tag">${screenTitles[2]}</div>
        <h1 class="instruction">Choose the true sentence.</h1>
        <div class="stage">
          <div class="panel soft">
            ${drawStateDiagram(false)}
          </div>
          <div class="choices">
            ${options.map(opt => `<button class="${choiceClass(opt.value)}" type="button" data-value="${opt.value}">${opt.label}</button>`).join("")}
          </div>
          ${renderFeedback()}
          ${sourcePanelMarkup()}
          ${questionPanelMarkup()}
          ${renderBottomNav(true)}
        </div>
      `;
    }

    function renderScreen3() {
      screenState.lockedNext = screenState.feedback?.type === "ok";
      return `
        <div class="screen-tag">${screenTitles[3]}</div>
        <h1 class="instruction">Tap the freezing point of substance A.</h1>
        <p class="support-text">Find A in the table first.</p>
        <div class="stage">
          <div class="panel soft">
            ${drawCleanTable()}
          </div>
          <div class="choices cols-2">
            <button class="${choiceClass('5')}" type="button" data-value="5">5°C</button>
            <button class="${choiceClass('30')}" type="button" data-value="30">30°C</button>
            <button class="${choiceClass('120')}" type="button" data-value="120">120°C</button>
          </div>
          ${renderFeedback()}
          ${sourcePanelMarkup()}
          ${questionPanelMarkup()}
          ${renderBottomNav(true)}
        </div>
      `;
    }

    function renderScreen4() {
      screenState.lockedNext = screenState.feedback?.type === "ok";
      const chosen = screenState.selected;
      return `
        <div class="screen-tag">${screenTitles[4]}</div>
        <h1 class="instruction">Place 3°C in the correct spot.</h1>
        <p class="support-text">Compare 3°C with A’s freezing point of 5°C.</p>
        <div class="stage">
          <div class="panel soft">
            <div class="chip-row">
              <span class="chip" aria-hidden="true">3°C</span>
              <span class="small-note">Tap the correct box below.</span>
            </div>
          </div>
          <div class="slot-grid">
            <button class="slot ${chosen === 'before' && screenState.feedback?.type === 'ok' ? 'correct' : ''} ${chosen === 'before' && screenState.feedback?.type === 'bad' ? 'wrong' : ''}" type="button" data-value="before">
              <span>Before 5°C</span>
              <small>smaller than 5</small>
              ${chosen === 'before' ? '<span class="chip placed-chip">3°C</span>' : ''}
            </button>
            <button class="slot ${chosen === 'at' && screenState.feedback?.type === 'bad' ? 'wrong' : ''}" type="button" data-value="at">
              <span>At 5°C</span>
              <small>exactly equal to 5</small>
              ${chosen === 'at' ? '<span class="chip placed-chip">3°C</span>' : ''}
            </button>
            <button class="slot ${chosen === 'after' && screenState.feedback?.type === 'bad' ? 'wrong' : ''}" type="button" data-value="after">
              <span>After 5°C</span>
              <small>bigger than 5</small>
              ${chosen === 'after' ? '<span class="chip placed-chip">3°C</span>' : ''}
            </button>
          </div>
          ${renderFeedback()}
          ${sourcePanelMarkup()}
          ${questionPanelMarkup()}
          ${renderBottomNav(true)}
        </div>
      `;
    }

    function renderScreen5() {
      screenState.lockedNext = screenState.feedback?.type === "ok";
      const options = ensureOrder("screen5", [
        { value: "solid", label: "🧊 Solid" },
        { value: "liquid", label: "💧 Liquid" },
        { value: "gas", label: "☁️ Gas" },
        { value: "both", label: "🧊💧 Solid and liquid" }
      ]);
      return `
        <div class="screen-tag">${screenTitles[5]}</div>
        <h1 class="instruction">Now choose the state of A at 3°C.</h1>
        <p class="support-text">Use your last step: 3°C was before 5°C.</p>
        <div class="stage">
          <div class="panel soft">
            <div class="hint">Before the freezing point → solid.</div>
          </div>
          <div class="choices cols-2">
            ${options.map(opt => `<button class="${choiceClass(opt.value)}" type="button" data-value="${opt.value}">${opt.label}</button>`).join("")}
          </div>
          ${renderFeedback()}
          ${sourcePanelMarkup()}
          ${questionPanelMarkup()}
          ${renderBottomNav(true)}
        </div>
      `;
    }

    function renderScreen6() {
      screenState.lockedNext = screenState.feedback?.type === "ok";
      const options = ensureOrder("screen6", [
        { value: "mustgas", label: "Above the freezing point, the substance must be a gas." },
        { value: "needmore", label: "Above the freezing point, the substance is no longer solid, but we still need more information to decide if it is gas." }
      ]);
      return `
        <div class="screen-tag">${screenTitles[6]}</div>
        <h1 class="instruction">Choose the safer science statement.</h1>
        <p class="support-text">This helps you avoid a common mistake in the final question.</p>
        <div class="stage">
          <div class="choices">
            ${options.map(opt => `<button class="${choiceClass(opt.value)}" type="button" data-value="${opt.value}">${opt.label}</button>`).join("")}
          </div>
          <div class="popup-wrap">
            <button class="btn secondary" type="button" id="whyGasBtn">Why not gas?</button>
          </div>
          ${screenState.popupOpen ? `<div class="popup-card">The question gives freezing points only. To be sure it is a gas, you would also need the boiling point.</div>` : ""}
          ${renderFeedback()}
          ${sourcePanelMarkup()}
          ${questionPanelMarkup()}
          ${renderBottomNav(true)}
        </div>
      `;
    }

    function renderScreen7() {
      screenState.lockedNext = screenState.feedback?.type === "ok";
      const options = ensureOrder("screen7", originalOptions);
      return `
        <div class="screen-tag">${screenTitles[7]}</div>
        <h1 class="instruction">Choose the correct option for the original question.</h1>
        <p class="support-text">Use the table and the freezing-point boundary.</p>
        <div class="stage">
          <div class="choices">
            ${options.map(opt => `
              <button class="${choiceClass(opt.key)} ${screenState.feedback?.type === 'ok' && screenState.selected === opt.key ? 'correct' : ''} ${screenState.feedback?.type === 'bad' && screenState.selected === opt.key ? 'wrong' : ''}"
                type="button" data-value="${opt.key}">
                <span class="option-label">${opt.key}</span>
                <span>${opt.text}</span>
              </button>
            `).join("")}
          </div>
          ${renderFeedback()}
          ${sourcePanelMarkup()}
          ${questionPanelMarkup()}
          ${renderBottomNav(true)}
        </div>
      `;
    }

    function renderScreen8() {
      screenState.lockedNext = screenState.feedback?.type === "ok";
      const options = ensureOrder("screen8", transferOptions);
      return `
        <div class="screen-tag">${screenTitles[8]}</div>
        <h1 class="instruction">Choose the true statement.</h1>
        <p class="support-text">A substance D has a freezing point of 20°C.</p>
        <div class="stage">
          <div class="panel soft">
            <div class="hint">Start by comparing the temperature with the freezing point.</div>
          </div>
          <div class="choices">
            ${options.map(opt => `
              <button class="${choiceClass(opt.text)} ${screenState.feedback?.type === 'ok' && screenState.selected === opt.text ? 'correct' : ''} ${screenState.feedback?.type === 'bad' && screenState.selected === opt.text ? 'wrong' : ''}"
                type="button" data-value="${opt.text}">
                ${opt.text}
              </button>
            `).join("")}
          </div>
          ${renderFeedback()}
          ${renderBottomNav(true, "Finish")}
        </div>
      `;
    }

    function renderScreen9() {
      screenState.lockedNext = false;
      return `
        <div class="screen-tag">${screenTitles[9]}</div>
        <h1 class="instruction">You’re done.</h1>
        <div class="stage">
          <div class="panel soft">
            <p class="support-text" style="margin-top:0;">Remember these three ideas:</p>
            <ul class="final-list">
              <li>Below the freezing point → solid.</li>
              <li>At the freezing point → solid and liquid can both be present.</li>
              <li>Do not claim gas unless the boiling point is also known.</li>
            </ul>
          </div>
          <div class="nav">
            <button class="btn secondary" type="button" id="restartBtn">Restart</button>
            <button class="btn" type="button" id="finishBtn">Close read-aloud and stay here</button>
          </div>
        </div>
      `;
    }

    function render() {
      livesRow.innerHTML = Array.from({ length: screenState.livesTotal }, (_, i) => {
        const alive = i < screenState.livesLeft;
        return `<span class="life ${alive ? "" : "lost"}" aria-hidden="true">${alive ? "❄️" : "○"}</span>`;
      }).join("");

      readAloudToggle.classList.toggle("active", screenState.readAloudOn);
      readAloudToggle.textContent = screenState.readAloudOn ? "🔈 Read-aloud: On" : "🔈 Read-aloud: Off";
      readAloudToggle.setAttribute("aria-pressed", String(screenState.readAloudOn));

      let html = "";
      switch (screenState.current) {
        case 0: html = renderScreen0(); break;
        case 1: html = renderScreen1(); break;
        case 2: html = renderScreen2(); break;
        case 3: html = renderScreen3(); break;
        case 4: html = renderScreen4(); break;
        case 5: html = renderScreen5(); break;
        case 6: html = renderScreen6(); break;
        case 7: html = renderScreen7(); break;
        case 8: html = renderScreen8(); break;
        case 9: html = renderScreen9(); break;
      }
      screenRoot.innerHTML = html;
      attachHandlers();
      updateTogglesPersistence();
      if (screenState.readAloudOn) {
        setTimeout(speakScreen, 80);
      }
    }

    function attachChoiceHandlers(selector, onChoose) {
      document.querySelectorAll(selector).forEach(btn => {
        btn.addEventListener("click", () => {
          onChoose(btn.dataset.value);
        });
      });
    }

    function attachHandlers() {
      document.getElementById("backBtn")?.addEventListener("click", prevScreen);
      document.getElementById("nextBtn")?.addEventListener("click", nextScreen);

      document.getElementById("readyBtn")?.addEventListener("click", () => {
        screenState.questionReady = true;
        nextScreen();
      });

      if (screenState.current === 1) {
        attachChoiceHandlers(".choice", value => {
          screenState.selected = value;
          if (value === "freezing points") {
            screenState.feedback = { type: "ok", message: "Yes. The table gives freezing points." };
          } else {
            if (loseLifeIfNeeded()) return;
            screenState.feedback = { type: "bad", message: "Look at the heading of the right column." };
          }
          render();
        });
      }

      if (screenState.current === 2) {
        attachChoiceHandlers(".choice", value => {
          screenState.selected = value;
          if (value === "solid") {
            screenState.feedback = { type: "ok", message: "Yes. Below the freezing point, the substance is solid." };
          } else {
            if (loseLifeIfNeeded()) return;
            screenState.feedback = { type: "bad", message: "Think about what happens before the substance starts melting." };
          }
          render();
        });
      }

      if (screenState.current === 3) {
        attachChoiceHandlers(".choice", value => {
          screenState.selected = value;
          if (value === "5") {
            screenState.feedback = { type: "ok", message: "Yes. A freezes at 5°C." };
          } else {
            if (loseLifeIfNeeded()) return;
            screenState.feedback = { type: "bad", message: "Look at row A." };
          }
          render();
        });
      }

      if (screenState.current === 4) {
        attachChoiceHandlers(".slot", value => {
          screenState.selected = value;
          if (value === "before") {
            screenState.feedback = { type: "ok", message: "Yes. 3°C is before 5°C." };
          } else {
            if (loseLifeIfNeeded()) return;
            screenState.feedback = { type: "bad", message: "Compare the two numbers. Is 3 smaller or bigger than 5?" };
          }
          render();
        });
      }

      if (screenState.current === 5) {
        attachChoiceHandlers(".choice", value => {
          screenState.selected = value;
          if (value === "solid") {
            screenState.feedback = { type: "ok", message: "Yes. Before the freezing point means solid." };
          } else {
            if (loseLifeIfNeeded()) return;
            screenState.feedback = { type: "bad", message: "Use your last step. 3°C was before 5°C." };
          }
          render();
        });
      }

      if (screenState.current === 6) {
        attachChoiceHandlers(".choice", value => {
          screenState.selected = value;
          if (value === "needmore") {
            screenState.feedback = { type: "ok", message: "Yes. We would need the boiling point to be sure about gas." };
          } else {
            if (loseLifeIfNeeded()) return;
            screenState.feedback = { type: "bad", message: "The question gives freezing points, not boiling points." };
          }
          render();
        });
        document.getElementById("whyGasBtn")?.addEventListener("click", () => {
          screenState.popupOpen = !screenState.popupOpen;
          render();
        });
      }

      if (screenState.current === 7) {
        attachChoiceHandlers(".choice", value => {
          screenState.selected = value;
          if (value === "1") {
            screenState.feedback = { type: "ok", message: "Yes. A is solid at 3°C because 3°C is below A’s freezing point of 5°C." };
          } else {
            const map = {
              "2": "Check B at 28°C. Is 28°C below or above 30°C?",
              "3": "130°C is above the freezing points of both B and C, so they are not both solids.",
              "4": "At 120°C, C is at its freezing point, so ‘gas’ is not supported."
            };
            screenState.feedback = { type: "bad", message: map[value] || "Try again." };
          }
          render();
        });
      }

      if (screenState.current === 8) {
        attachChoiceHandlers(".choice", value => {
          screenState.selected = value;
          const correct = transferOptions.find(opt => opt.text === value)?.correct;
          if (correct) {
            screenState.feedback = { type: "ok", message: "Yes. 15°C is below 20°C, so D is solid." };
          } else {
            screenState.feedback = { type: "bad", message: "Compare the temperature with the freezing point first." };
          }
          render();
        });
      }

      if (screenState.current === 9) {
        document.getElementById("restartBtn")?.addEventListener("click", resetForRestart);
        document.getElementById("finishBtn")?.addEventListener("click", () => {
          window.speechSynthesis?.cancel?.();
          screenState.readAloudOn = false;
          render();
        });
      }
    }

    readAloudToggle.addEventListener("click", () => {
      screenState.readAloudOn = !screenState.readAloudOn;
      if (!screenState.readAloudOn) {
        window.speechSynthesis?.cancel?.();
      }
      render();
    });

    render();
  </script>
</body>
</html>
