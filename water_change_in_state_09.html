<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Water Change in State 09</title>
<style>
  :root {
    --bg: #f4fbff;
    --panel: #ffffff;
    --panel-2: #eef8ff;
    --ink: #18314f;
    --muted: #4c647d;
    --line: #c7def0;
    --accent: #1f7db8;
    --accent-2: #64b5de;
    --ok: #1b8d5a;
    --bad: #c44e4e;
    --warn: #cc8a17;
    --solid: #8fb7d8;
    --liquid: #69c5dc;
    --gas: #ffd27a;
    --shadow: 0 12px 26px rgba(18, 68, 109, 0.10);
    --radius: 20px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(180deg, #eaf7ff 0%, #f8fdff 100%); color: var(--ink); }
  body { min-height: 100vh; }
  .app {
    max-width: 980px;
    margin: 0 auto;
    padding: 14px 14px 26px;
  }
  .topbar {
    display: grid;
    gap: 10px;
    margin-bottom: 12px;
  }
  .topcard {
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 12px 14px;
  }
  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .title {
    font-size: clamp(1.15rem, 2.2vw, 1.5rem);
    font-weight: 700;
  }
  .subtle {
    color: var(--muted);
    font-size: 0.98rem;
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  button {
    font: inherit;
    border: none;
    border-radius: 16px;
    padding: 12px 16px;
    cursor: pointer;
    background: var(--accent);
    color: white;
    font-weight: 700;
    min-height: 50px;
    box-shadow: 0 6px 16px rgba(31, 125, 184, 0.2);
  }
  button.secondary {
    background: #ffffff;
    color: var(--ink);
    border: 2px solid var(--line);
    box-shadow: none;
  }
  button.ghost {
    background: #edf7ff;
    color: var(--ink);
    border: 2px solid var(--line);
    box-shadow: none;
  }
  button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .demerit-wrap {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .demerit-left {
    display: grid;
    gap: 4px;
  }
  .demerit-title {
    font-weight: 700;
    font-size: 1rem;
  }
  .ice-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ice {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    border: 2px solid #8ecae6;
    background: linear-gradient(180deg, #dff6ff 0%, #bfe8ff 100%);
    display: grid;
    place-items: center;
    font-size: 1.3rem;
    transition: 0.2s ease;
  }
  .ice.lost {
    background: linear-gradient(180deg, #ffe3bf 0%, #ffd29d 100%);
    border-color: #ffb156;
    opacity: 0.6;
    transform: translateY(2px) rotate(-4deg);
  }
  .screen {
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: clamp(16px, 3vw, 24px);
  }
  .progress {
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 8px;
    font-size: 0.96rem;
  }
  .instruction {
    font-size: clamp(1.45rem, 4vw, 2rem);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 14px;
  }
  .helper {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .question-block {
    background: #f6fbff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 14px;
    display: grid;
    gap: 12px;
  }
  .question-text {
    font-size: clamp(1.02rem, 2.7vw, 1.15rem);
    line-height: 1.55;
  }
  mark {
    background: #fff3a6;
    padding: 0 4px;
    border-radius: 6px;
  }
  .source-img {
    width: min(100%, 520px);
    border-radius: 16px;
    border: 2px solid var(--line);
    background: white;
    display: block;
  }
  .card-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    margin-top: 10px;
  }
  .choice {
    background: #ffffff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 16px;
    min-height: 84px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    transition: 0.18s ease;
    box-shadow: 0 4px 10px rgba(24, 49, 79, 0.04);
  }
  .choice:hover {
    transform: translateY(-1px);
  }
  .choice.selected {
    border-color: var(--accent);
    background: #dff2ff;
    box-shadow: 0 8px 18px rgba(31, 125, 184, 0.14);
  }
  .choice.correct {
    border-color: var(--ok);
    background: #e7f9ef;
  }
  .choice.incorrect {
    border-color: var(--bad);
    background: #ffeded;
  }
  .panel {
    background: var(--panel-2);
    border: 2px solid var(--line);
    border-radius: 20px;
    padding: 14px;
    margin-top: 8px;
  }
  .state-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-radius: 20px;
    overflow: hidden;
    border: 2px solid var(--line);
    margin-top: 12px;
  }
  .state-seg {
    padding: 18px 12px;
    text-align: center;
    font-weight: 800;
    font-size: 1.05rem;
  }
  .solid { background: var(--solid); }
  .liquid { background: var(--liquid); }
  .gas { background: var(--gas); }
  .drop-zone-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(3, minmax(110px, 1fr));
    margin-top: 14px;
  }
  .zone {
    background: #ffffff;
    border: 2px dashed var(--line);
    border-radius: 18px;
    padding: 14px;
    min-height: 96px;
    display: grid;
    place-items: center;
    text-align: center;
    font-weight: 700;
  }
  .chip-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin: 10px 0;
  }
  .chip {
    min-width: 110px;
    padding: 14px 16px;
    background: white;
    border: 2px solid var(--line);
    color: var(--ink);
    border-radius: 16px;
    font-weight: 800;
  }
  .chip.selected {
    border-color: var(--accent);
    background: #e7f5ff;
  }
  .chip.placed {
    opacity: 0.45;
  }
  .row-card {
    background: white;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 14px;
    display: grid;
    gap: 8px;
    align-content: start;
  }
  .row-card strong { font-size: 1rem; }
  .row-card small { color: var(--muted); }
  .feedback {
    margin-top: 14px;
    min-height: 58px;
    border-radius: 16px;
    padding: 12px 14px;
    border: 2px solid transparent;
    background: #f8fbff;
    display: flex;
    align-items: center;
    font-weight: 700;
    line-height: 1.4;
  }
  .feedback.good {
    background: #eaf8f0;
    color: #13583a;
    border-color: #b3e2c8;
  }
  .feedback.bad {
    background: #fff0f0;
    color: #7d2f2f;
    border-color: #f0b9b9;
  }
  .nav {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  details {
    margin-top: 16px;
    background: #f7fbff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 0 14px 14px;
  }
  summary {
    cursor: pointer;
    font-weight: 800;
    padding: 14px 0;
    list-style: none;
  }
  summary::-webkit-details-marker { display: none; }
  .table-mini {
    display: grid;
    gap: 10px;
    margin-top: 10px;
  }
  .table-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .cell {
    background: white;
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 12px;
    font-weight: 700;
    text-align: center;
  }
  .pill {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 999px;
    background: #ebf7ff;
    border: 2px solid var(--line);
    font-size: 0.92rem;
    font-weight: 800;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(9, 31, 55, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 50;
  }
  .overlay.show { display: flex; }
  .modal {
    width: min(92vw, 560px);
    background: white;
    border-radius: 24px;
    padding: 24px;
    border: 2px solid var(--line);
    box-shadow: 0 18px 34px rgba(0,0,0,0.18);
    text-align: center;
  }
  .modal h2 { margin-top: 0; font-size: 1.8rem; }
  .modal p { font-size: 1.06rem; line-height: 1.5; }
  .two-col {
    display: grid;
    gap: 14px;
    grid-template-columns: 1fr 1fr;
  }
  .big-center {
    display: grid;
    place-items: center;
    padding: 6px 0;
  }
  .summary-box {
    background: #f3fbff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 16px;
    line-height: 1.55;
    font-weight: 700;
  }

  .organiser {
    margin: 10px 0 16px;
    background: #f7fcff;
  }
  .organiser-title {
    font-size: 1.02rem;
    font-weight: 800;
    margin-bottom: 10px;
  }
  .organiser-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(3, minmax(150px, 1fr));
  }
  .organiser-card {
    background: #ffffff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 14px;
    display: grid;
    gap: 8px;
    min-height: 118px;
  }
  .organiser-card strong {
    font-size: 1rem;
    line-height: 1.35;
  }
  .organiser-card span {
    color: var(--muted);
    font-weight: 700;
    line-height: 1.35;
  }
  .organiser-solid { background: #eef6fc; }
  .organiser-liquid { background: #eefbfd; }
  .organiser-gas { background: #fff8ea; }
  .step-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .step-chip {
    background: white;
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 8px 12px;
    font-weight: 800;
  }
  @media (max-width: 700px) {
    .two-col, .table-row, .organiser-grid { grid-template-columns: 1fr; }
    .drop-zone-grid { grid-template-columns: 1fr; }
    .title-row { align-items: flex-start; }
    .screen { padding: 16px; }
    .instruction { font-size: 1.45rem; }
    .choice { min-height: 74px; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<div class="overlay" id="gameOverOverlay" aria-hidden="true">
  <div class="modal">
    <h2>All 3 ice cubes melted.</h2>
    <p>That means too many rushed checks. The whole interactive will restart in <span id="restartCount">3</span> seconds.</p>
    <p><strong>Tip:</strong> Read both clues. Then compare each temperature with both points.</p>
  </div>
</div>

    retry: {

      options: shuffleRows([
        {id:"r1", mp:120, bp:450, correct:true},
        {id:"r2", mp:120, bp:500, correct:false},

      ], "r1")
    },

      selected: null, checked: false, passed: false, feedback: "",

function shuffleRows(arr, correctId) {
  let copy = arr.map(x => ({...x}));
  do {
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
  } while (copy.findIndex(x => x.id === correctId) === 0);
  return copy;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}


function renderOrganizer() {
  const currentId = screens[state.screen].id;
  if (currentId === "done") return "";
  return `
    <div class="panel organiser">
      <div class="organiser-title">Quick organiser</div>
      <div class="organiser-grid">
        <div class="organiser-card organiser-solid">
          <strong>Less than melting point</strong>
          <span>State = solid</span>
        </div>
        <div class="organiser-card organiser-liquid">
          <strong>Between melting point and boiling point</strong>
          <span>State = liquid</span>
        </div>
        <div class="organiser-card organiser-gas">

          <span>State = gas</span>

}

function appHtml(inner) {

      </div>

}

function render() {
  const app = document.getElementById("app");
  const s = screens[state.screen];
  const body = `
    <div class="screen">
      <div class="progress">${escapeHtml(s.progress)}</div>
      <div class="instruction">${escapeHtml(s.instruction)}</div>
      <div class="helper">${escapeHtml(s.helper || "")}</div>
      ${renderOrganizer()}
      ${s.renderMain()}
      ${renderPanels()}
      <div class="nav">
        <button class="secondary" id="backBtn" ${state.screen === 0 ? "disabled" : ""}>Back</button>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          ${s.check ? `<button class="secondary" id="checkBtn">${getCheckLabel(s.id)}</button>` : ""}
          <button id="nextBtn" ${canGoNext() ? "" : "disabled"}>${s.nextLabel || (state.screen === screens.length - 1 ? "Done" : "Next")}</button>
        </div>
      </div>
    </div>
  `;
  app.innerHTML = appHtml(body);
  bindGlobalControls();
  bindScreenControls();
  restoreDetailsState();
  if (state.readAloudOn) speakCurrentScreen();
}

    q.addEventListener("toggle", () => { state.questionPanelOpen = q.open; });
  }
  if (s) {
    s.open = !!state.sourcePanelOpen;
    s.addEventListener("toggle", () => { state.sourcePanelOpen = s.open; });
  }
}

function bindGlobalControls() {
  const toggle = document.getElementById("toggleRead");
  const speakNow = document.getElementById("speakNow");
  toggle.addEventListener("click", () => {
    state.readAloudOn = !state.readAloudOn;
    if (!state.readAloudOn) window.speechSynthesis.cancel();
    render();
  });
  speakNow.addEventListener("click", () => speakCurrentScreen());

  const back = document.getElementById("backBtn");
  if (back) back.addEventListener("click", () => {
    if (state.screen > 0) {
      state.screen--;
      render();
    }
  });

  const next = document.getElementById("nextBtn");
  next.addEventListener("click", () => {
    if (!canGoNext()) return;
    if (state.screen < screens.length - 1) {
      state.screen++;
      render();
    }
  });

  const s = screens[state.screen];
  const check = document.getElementById("checkBtn");
  if (check && s.check) {
    check.addEventListener("click", () => s.check());
  }
}

function speakCurrentScreen() {
  const s = screens[state.screen];
  let text = s.instruction + ". ";
  if (s.helper) text += s.helper + ". ";
  const feedback = getFeedbackText();
  if (feedback) text += "Feedback: " + feedback + ". ";
  if (state.screen === 0) {
    text += "Substance R is a liquid at 160 degrees Celsius and a gas at 480 degrees Celsius. Which of the following is possible?";
  }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.95;
  utt.pitch = 1;
  window.speechSynthesis.speak(utt);
}

function canGoNext() {
  const s = screens[state.screen];
  if (s.id === "intro") return true;
  if (s.id === "done") return false;
  const st = state.screenState[s.id];
  return !!(st && st.passed);
}

function getFeedbackText() {
  const s = screens[state.screen];
  const st = state.screenState[s.id];
  return st && st.feedback ? st.feedback : "";
}

function markDemeritIfNeeded(screenId) {
  if (!teachingScreenIds.has(screenId)) return;
  state.demerits += 1;
  if (state.demerits >= MAX_DEMERITS) triggerGameOver();
}

function triggerGameOver() {
  const overlay = document.getElementById("gameOverOverlay");
  const count = document.getElementById("restartCount");
  let n = 3;
  overlay.classList.add("show");
  count.textContent = String(n);
  if (state.restartTimer) clearInterval(state.restartTimer);
  state.restartTimer = setInterval(() => {
    n -= 1;
    count.textContent = String(Math.max(n, 0));
    if (n <= 0) {
      clearInterval(state.restartTimer);
      state.restartTimer = null;
      overlay.classList.remove("show");
      restartAll();
    }
  }, 1000);
}

function restartAll() {
  window.speechSynthesis.cancel();
  state.screen = 0;
  state.demerits = 0;
  state.questionPanelOpen = false;
  state.sourcePanelOpen = false;
  initScreenState();
  render();
}

function renderFeedback(screenId) {
  const st = state.screenState[screenId];
  const cls = st.checked ? (st.passed ? "good" : "bad") : "";
  const defaultText = screenId === "intro" ? "" : "Choose or place your answer, then tap Check.";
  return `<div class="feedback ${cls}">${st.feedback ? escapeHtml(st.feedback) : defaultText}</div>`;
}

function renderIntro() {
  return `
    <div class="question-block">
      <div class="question-text">
        Substance R is a <mark>liquid at 160°C</mark> and a <mark>gas at 480°C</mark>.<br>
        Which of the following is <mark>possible</mark>?
      </div>
      <img class="source-img" src="${SOURCE_IMG}" alt="Original exam question screenshot">
    </div>
    <div class="panel" style="margin-top:16px;">
      <span class="pill">What to notice first</span>
      <div style="margin-top:10px; line-height:1.55;">
        There are <strong>two clues</strong>: one tells you where 160°C must sit, and one tells you where 480°C must sit. Use the quick organiser on every screen to help you.
      </div>
    </div>
  `;
}

function renderClueScreen() {
  const st = state.screenState.clues;
  const options = [
    {id:"c1", text:"R is a liquid at 160°C"},
    {id:"c2", text:"R is a gas at 480°C"},
    {id:"c3", text:"2018"},
    {id:"c4", text:"Which of the following is possible?"}
  ];
  return `
    <div class="card-grid">
      ${options.map(o => `
        <button class="choice ${st.selected.includes(o.id) ? "selected" : ""}" data-choice="${o.id}">
          ${escapeHtml(o.text)}
        </button>
      `).join("")}
    </div>
    ${renderFeedback("clues")}
  `;
}

function checkClues() {
  const st = state.screenState.clues;
  st.checked = true;
  const picked = [...st.selected].sort().join(",");
  st.passed = picked === ["c1","c2"].sort().join(",");
  st.feedback = st.passed
    ? "Yes. You must use both clues."
    : "Find the two clues that tell you a temperature and a state.";
  if (!st.passed) markDemeritIfNeeded("clues");
  render();
}

function renderStateRule(which) {
  const st = state.screenState[which + "Rule"];
  const labels = [
    {id:"left", text:"less than melting point"},
    {id:"middle", text:"between melting point and boiling point"},
    {id:"right", text:"more than boiling point"}
  ];
  return `
    <div class="state-bar" aria-hidden="true">
      <div class="state-seg solid">Solid</div>
      <div class="state-seg liquid">Liquid</div>
      <div class="state-seg gas">Gas</div>
    </div>
    <div class="card-grid">
      ${labels.map(l => `
        <button class="choice ${st.selected === l.id ? "selected" : ""}" data-choice="${l.id}">${escapeHtml(l.text)}</button>
      `).join("")}
    </div>
    ${renderFeedback(which + "Rule")}
  `;
}

function checkRule(which) {
  const st = state.screenState[which + "Rule"];
  st.checked = true;
  const correct = which === "liquid" ? "middle" : "right";
  st.passed = st.selected === correct;
  st.feedback = st.passed
    ? (which === "liquid" ? "Yes. Liquid means between the two points." : "Yes. Gas means more than the boiling point.")
    : (which === "liquid" ? "A liquid is not less than the melting point and not more than the boiling point." : "Gas must be more than the boiling point.");
  if (!st.passed) markDemeritIfNeeded(which + "Rule");
  render();
}

function renderPlaceTemps() {
  const st = state.screenState.placeTemps;
  const active = st.activeChip;
  const zones = [
    {id:"left", title:"Less than 120°C", note:"less than the melting point"},
    {id:"middle", title:"Between 120°C and 450°C", note:"between the two points"},
    {id:"right", title:"More than 450°C", note:"more than the boiling point"}
  ];
  return `
    <div class="panel">
      <div class="table-mini">
        <div class="table-row">
          <div class="cell">Melting point = <strong>120°C</strong></div>
          <div class="cell">Boiling point = <strong>450°C</strong></div>
        </div>
      </div>
      <div class="chip-row">
        <button class="chip ${active === "t160" ? "selected" : ""} ${st.placements.t160 ? "placed" : ""}" data-chip="t160">160°C</button>
        <button class="chip ${active === "t480" ? "selected" : ""} ${st.placements.t480 ? "placed" : ""}" data-chip="t480">480°C</button>
      </div>
      <div class="helper" style="margin-bottom:8px;">Tap a temperature chip. Then tap the zone where it belongs.</div>
      <div class="drop-zone-grid">
        ${zones.map(z => `
          <button class="zone" data-zone="${z.id}">
            <div>
              <div style="font-weight:800;">${escapeHtml(z.title)}</div>
              <div style="font-size:0.94rem; color:var(--muted); margin-top:4px;">${escapeHtml(z.note)}</div>
              <div style="margin-top:8px; font-size:1.1rem;">${[
                st.placements.t160 === z.id ? "160°C" : "",
                st.placements.t480 === z.id ? "480°C" : ""
              ].filter(Boolean).join("  •  ") || "Tap to place"}</div>
            </div>
          </button>
        `).join("")}
      </div>
    </div>
    ${renderFeedback("placeTemps")}
  `;
}

function checkPlaceTemps() {
  const st = state.screenState.placeTemps;
  st.checked = true;
  st.passed = st.placements.t160 === "middle" && st.placements.t480 === "right";
  st.feedback = st.passed
    ? "Good. 160°C gives a liquid and 480°C gives a gas. This row is possible."
    : "Check each temperature against both boundaries.";
  if (!st.passed) markDemeritIfNeeded("placeTemps");
  render();
}

function renderEliminate160() {
  const st = state.screenState.eliminate160;
  const rows = [
    {id:"r1", label:"Row 1", mp:120, bp:450},
    {id:"r2", label:"Row 2", mp:120, bp:500},
    {id:"r3", label:"Row 3", mp:200, bp:450},
    {id:"r4", label:"Row 4", mp:200, bp:500}
  ];
  return `
    <div class="card-grid">
      ${rows.map(r => `
        <button class="row-card choice ${st.selected.includes(r.id) ? "selected" : ""}" data-row="${r.id}">
          <strong>${escapeHtml(r.label)}</strong>
          <small>Melting point: ${r.mp}°C</small>
          <small>Boiling point: ${r.bp}°C</small>
        </button>
      `).join("")}
    </div>
    ${renderFeedback("eliminate160")}
  `;
}

function checkEliminate160() {
  const st = state.screenState.eliminate160;
  st.checked = true;
  const picked = [...st.selected].sort().join(",");
  st.passed = picked === ["r3","r4"].sort().join(",");
  st.feedback = st.passed
    ? "Yes. 160°C is less than 200°C, so those rows would give a solid."
    : "Look for rows where 160°C is still less than the melting point.";
  if (!st.passed) markDemeritIfNeeded("eliminate160");
  render();
}

function renderFail480() {
  const st = state.screenState.fail480;
  const rows = [
    {id:"r1", mp:120, bp:450, text:"160°C is between 120°C and 450°C. 480°C is more than 450°C."},
    {id:"r2", mp:120, bp:500, text:"160°C is between 120°C and 500°C. 480°C is below 500°C."}
  ];
  return `
    <div class="two-col">
      ${rows.map(r => `
        <button class="row-card choice ${st.selected === r.id ? "selected" : ""}" data-choice="${r.id}">
          <strong>Melting point ${r.mp}°C, boiling point ${r.bp}°C</strong>
  <div style="font-weight:700; line-height:1.5;">${escapeHtml(r.text)}</div>
        </button>
      `).join("")}
    </div>
    ${renderFeedback("fail480")}
  `;
}

function checkFail480() {
  const st = state.screenState.fail480;
  st.checked = true;
  st.passed = st.selected === "r2";
  st.feedback = st.passed
    ? "Yes. 480°C is still less than 500°C, so R would still be liquid there."
    : "Ask: is 480°C already more than the boiling point?";
  if (!st.passed) markDemeritIfNeeded("fail480");
  render();
}

function renderRetry() {
  const st = state.screenState.retry;
  return `
    <div class="card-grid">
      ${st.options.map(o => `
        <button class="row-card choice ${st.selected === o.id ? "selected" : ""}" data-choice="${o.id}">
          <strong>Melting point: ${o.mp}°C</strong>
          <strong>Boiling point: ${o.bp}°C</strong>
        </button>
      `).join("")}
    </div>
    ${renderFeedback("retry")}
  `;
}

function checkRetry() {
  const st = state.screenState.retry;
  st.checked = true;
  const chosen = st.options.find(o => o.id === st.selected);
  st.passed = !!chosen && chosen.correct;
  st.feedback = st.passed
    ? "Correct. Only one row fits both clues."
    : "Check one row at a time: 160°C first, then 480°C.";
  render();
}

function renderTransfer() {
  const st = state.screenState.transfer;
  return `
    <div class="question-block">
      <div class="question-text">
        Substance T is a <mark>liquid at 180°C</mark> and a <mark>gas at 320°C</mark>.<br>
        Which row is possible?
      </div>
    </div>
    <div class="card-grid" style="margin-top:14px;">
      ${st.options.map(o => `
        <button class="row-card choice ${st.selected === o.id ? "selected" : ""}" data-choice="${o.id}">
          <strong>Melting point: ${o.mp}°C</strong>
          <strong>Boiling point: ${o.bp}°C</strong>
        </button>
      `).join("")}
    </div>
    ${renderFeedback("transfer")}
  `;
}

function checkTransfer() {
  const st = state.screenState.transfer;
  st.checked = true;
  const chosen = st.options.find(o => o.id === st.selected);
  st.passed = !!chosen && chosen.correct;
  st.feedback = st.passed
    ? "Yes. 150 < 180 < 300 and 320 > 300."
    : "Use both clues. One temperature must be between. The other must be more than the boiling point.";
  render();
}

function renderDone() {
  return `
    <div class="summary-box">
      <div style="font-size:1.18rem; font-weight:800; margin-bottom:8px;">Strong method</div>
      <div>1. Read both clues.</div>
      <div>2. Check whether the first temperature is <strong>between</strong> the melting point and boiling point.</div>
      <div>3. Check whether the second temperature is <strong>above</strong> the boiling point.</div>
      <div>4. Eliminate rows that fail.</div>
    </div>
    <div class="big-center" style="margin-top:16px;">
      <span class="pill">Interactive complete</span>
    </div>
  `;
}

function bindScreenControls() {
  const s = screens[state.screen];
  switch(s.id) {
    case "clues":
      document.querySelectorAll("[data-choice]").forEach(btn => btn.addEventListener("click", () => {
        const id = btn.dataset.choice;
        const st = state.screenState.clues;
        if (st.selected.includes(id)) {
          st.selected = st.selected.filter(x => x !== id);
        } else if (st.selected.length < 2) {
          st.selected.push(id);
        }
        render();
      }));
      break;
    case "liquidRule":
    case "gasRule":
      document.querySelectorAll("[data-choice]").forEach(btn => btn.addEventListener("click", () => {
        state.screenState[s.id].selected = btn.dataset.choice;
        render();
      }));
      break;
    case "placeTemps":
      document.querySelectorAll("[data-chip]").forEach(btn => btn.addEventListener("click", () => {
        const st = state.screenState.placeTemps;
        const id = btn.dataset.chip;
        if (st.placements[id]) st.placements[id] = null;
        st.activeChip = id;
        render();
      }));
      document.querySelectorAll("[data-zone]").forEach(btn => btn.addEventListener("click", () => {
        const zone = btn.dataset.zone;
        const st = state.screenState.placeTemps;
        if (!st.activeChip) return;
        st.placements[st.activeChip] = zone;
        const other = st.activeChip === "t160" ? "t480" : "t160";
        st.activeChip = st.placements[other] ? null : other;
        render();
      }));
      break;
    case "eliminate160":
      document.querySelectorAll("[data-row]").forEach(btn => btn.addEventListener("click", () => {
        const id = btn.dataset.row;
        const st = state.screenState.eliminate160;
        if (st.selected.includes(id)) {
          st.selected = st.selected.filter(x => x !== id);
        } else {
          st.selected.push(id);
        }
        render();
      }));
      break;
    case "fail480":
    case "retry":
    case "transfer":
      document.querySelectorAll("[data-choice]").forEach(btn => btn.addEventListener("click", () => {
        state.screenState[s.id].selected = btn.dataset.choice;
        render();
      }));
      break;
  }
}

initScreenState();
render();
</script>
</body>
</html>
