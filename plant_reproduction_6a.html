<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant Reproduction 6(a) Interactive</title>
<style>
  :root{
    --green:#2d6a4f;
    --leaf:#52b788;
    --leaf-light:#d8f3dc;
    --soil:#8b5e34;
    --sun:#f4c542;
    --sky:#f3fbff;
    --water:#4dabf7;
    --danger:#d9534f;
    --ink:#183027;
    --panel:#ffffff;
    --soft:#eef8f1;
    --shadow:0 8px 24px rgba(0,0,0,0.10);
    --radius:20px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 20%, #ffffff 0 10%, transparent 10% 100%),
      linear-gradient(180deg, #effbf3 0%, #e9f7ff 45%, #f8fffb 100%);
  }
  .app{
    max-width:1100px;
    margin:0 auto;
    padding:16px 16px 28px;
  }
  .topbar{
    background:linear-gradient(90deg, #1b4332, #2d6a4f);
    color:white;
    border-radius:20px;
    padding:14px 18px;
    box-shadow:var(--shadow);
    margin-bottom:14px;
  }
  .toprow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .titleblock h1{
    font-size:clamp(1.3rem, 2.2vw, 1.9rem);
    margin:0 0 4px 0;
  }
  .titleblock p{
    margin:0;
    opacity:.95;
    font-size:0.98rem;
  }
  .controls{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .toggle{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,0.12);
    padding:8px 12px;
    border-radius:999px;
  }
  .toggle input{
    width:18px;height:18px;
  }
  button{
    border:none;
    border-radius:16px;
    padding:14px 18px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.18s transform ease, .18s box-shadow ease, .18s background ease;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
  }
  button:hover{ transform:translateY(-1px); }
  button:disabled{
    opacity:.55;
    cursor:not-allowed;
    transform:none;
  }
  .btn-primary{ background:var(--green); color:white; }
  .btn-secondary{ background:#e6f4ea; color:#133020; }
  .btn-ghost{ background:white; color:var(--green); }
  .btn-danger{ background:var(--danger); color:white; }
  .demerit-strip{
    margin-top:12px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .demerit-label{
    font-weight:700;
    font-size:1rem;
  }
  .seed-row{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .seed{
    width:36px;
    height:24px;
    position:relative;
    transition:.25s ease;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,.2));
  }
  .seed::before,
  .seed::after{
    content:"";
    position:absolute;
    background:var(--leaf-light);
    border:2px solid #437b5d;
  }
  .seed::before{
    width:20px;height:14px;left:2px;top:5px;
    border-radius:100% 0 100% 0;
    transform:rotate(-26deg);
  }
  .seed::after{
    width:20px;height:14px;right:2px;top:5px;
    border-radius:0 100% 0 100%;
    transform:rotate(26deg);
  }
  .seed .dot{
    position:absolute;
    left:50%; top:50%;
    width:8px; height:8px;
    background:#8b5e34;
    border-radius:50%;
    transform:translate(-50%,-20%);
    border:1px solid #5c3a18;
  }
  .seed.lost{
    opacity:.16;
    transform:translateY(-8px) rotate(-12deg);
    filter:grayscale(1);
  }
  .card{
    background:var(--panel);
    border-radius:24px;
    box-shadow:var(--shadow);
    padding:18px;
  }
  .screen{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
  }
  .instruction{
    font-size:clamp(1.18rem, 2.2vw, 1.55rem);
    font-weight:800;
    line-height:1.3;
    margin:0;
    color:#143020;
  }
  .subtext{
    margin:4px 0 0;
    font-size:1rem;
    line-height:1.45;
  }
  .question-panel details,
  .source-panel details{
    background:var(--panel);
    border-radius:18px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .question-panel summary,
  .source-panel summary{
    cursor:pointer;
    list-style:none;
    padding:14px 18px;
    font-weight:800;
    background:#f3fbf5;
  }
  .question-panel summary::-webkit-details-marker,
  .source-panel summary::-webkit-details-marker{ display:none; }
  .question-content{
    padding:16px 18px 18px;
    line-height:1.5;
  }
  .highlight{
    background:#fff3b0;
    padding:2px 6px;
    border-radius:8px;
  }
  .grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  @media(max-width:820px){
    .grid-2{ grid-template-columns:1fr; }
  }
  .choices{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:14px;
  }
  .choice, .scene-card, .chip, .resource{
    border:3px solid transparent;
    background:#fbfffc;
    padding:16px;
    border-radius:18px;
    min-height:82px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:1rem;
    font-weight:700;
  }
  .choice:hover, .scene-card:hover, .chip:hover, .resource:hover{
    border-color:#9cd3af;
    background:#f2fff5;
  }
  .selected{
    border-color:var(--green)!important;
    background:#eaf8ee!important;
  }
  .correct{
    border-color:#2f9e44!important;
    background:#ecfff0!important;
  }
  .wrong{
    border-color:#d94841!important;
    background:#fff0ef!important;
  }
  .feedback{
    min-height:58px;
    border-radius:18px;
    padding:14px 16px;
    font-weight:700;
    line-height:1.4;
    background:#f8fcf9;
    border:2px dashed #cde8d4;
  }
  .feedback.good{ background:#edfdf2; border-color:#79c48f; }
  .feedback.bad{ background:#fff1f0; border-color:#eba39d; }
  .mini-table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.06);
  }
  .mini-table th, .mini-table td{
    border:1px solid #b9d5c2;
    padding:10px 12px;
    text-align:center;
    font-size:1rem;
  }
  .mini-table th{
    background:#ecf9ef;
  }
  .visual-box{
    background:linear-gradient(180deg, #f9fffb 0%, #eef8ff 100%);
    border-radius:22px;
    padding:16px;
    min-height:260px;
    border:2px solid #d7ebdd;
  }
  .center{
    display:flex; align-items:center; justify-content:center;
  }
  .scene-wrap{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  @media(max-width:760px){ .scene-wrap{ grid-template-columns:1fr; } }
  .scene-card{
    min-height:260px;
    flex-direction:column;
    gap:10px;
    align-items:stretch;
    justify-content:flex-start;
  }
  .scene-label{
    font-size:1.05rem;
    font-weight:800;
  }
  .chain-area{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    margin-bottom:14px;
  }
  @media(max-width:820px){ .chain-area{ grid-template-columns:1fr; } }
  .chain-slot{
    min-height:88px;
    border-radius:18px;
    border:3px dashed #a9d4b7;
    padding:10px;
    background:#f9fffa;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:700;
  }
  .chip-bank{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:12px;
  }
  .chip{ min-height:74px; cursor:pointer; }
  .resource-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    gap:12px;
  }
  .resource{
    min-height:96px;
    cursor:pointer;
    flex-direction:column;
    gap:8px;
  }
  .resource .emoji{
    font-size:2rem;
  }
  .hint-box{
    margin-top:12px;
    padding:12px 14px;
    background:#fff8d9;
    border-radius:16px;
    font-weight:700;
    line-height:1.5;
  }
  .sentence-box{
    background:#f9fff9;
    border:2px solid #d5ecdd;
    border-radius:20px;
    padding:18px;
    font-size:1.08rem;
    line-height:1.8;
  }
  .blank{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:130px;
    min-height:48px;
    padding:4px 10px;
    margin:4px 2px;
    border-radius:14px;
    background:white;
    border:3px dashed #8fc39f;
    font-weight:800;
    vertical-align:middle;
  }
  .option-bank{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
    gap:12px;
    margin-top:14px;
  }
  .option-token{
    min-height:60px;
    padding:14px 12px;
    border-radius:16px;
    border:3px solid transparent;
    background:#fcfffd;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:800;
    cursor:pointer;
  }
  .option-token:hover{ border-color:#9cd3af; background:#f2fff5; }
  .option-token.used{ opacity:.35; pointer-events:none; }
  .badge{
    display:inline-block;
    padding:4px 10px;
    background:#e8f7ed;
    border-radius:999px;
    font-size:.92rem;
    font-weight:800;
  }
  .student-answer{
    font-size:1.15rem;
    line-height:1.5;
    background:#fffef6;
    border-left:8px solid #f4c542;
    padding:16px;
    border-radius:16px;
    font-weight:700;
  }
  .guess-box{
    display:grid;
    gap:14px;
  }
  .guess-sentence{
    background:#f9fff9;
    border:2px solid #d5ecdd;
    border-radius:20px;
    padding:18px;
    font-size:1.1rem;
    line-height:1.85;
  }
  .guess-input-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .guess-input-row input{
    flex:1;
    min-width:180px;
    padding:14px 16px;
    border-radius:16px;
    border:2px solid #b6d8c1;
    font-size:1.05rem;
    font-weight:700;
  }
  .completion{
    text-align:center;
    padding:18px 10px;
  }
  .completion h2{
    font-size:1.8rem;
    margin:6px 0 12px;
    color:#1d4d36;
  }
  .final-answer{
    background:#effcf2;
    border:2px solid #8ed0a5;
    border-radius:20px;
    padding:18px;
    line-height:1.7;
    font-size:1.08rem;
    font-weight:700;
    text-align:left;
  }
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(10,25,20,.72);
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:30;
  }
  .overlay.show{ display:flex; }
  .overlay-card{
    max-width:560px;
    width:100%;
    background:white;
    border-radius:24px;
    padding:24px;
    text-align:center;
    box-shadow:0 16px 40px rgba(0,0,0,.25);
  }
  .overlay-card h2{
    margin:0 0 10px;
    font-size:1.9rem;
  }
  .footer-row{
    display:flex;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
    margin-top:8px;
  }
  .small{
    font-size:.94rem;
    line-height:1.45;
  }
  .muted{ opacity:.85; }
  .keyline{
    height:1px;
    background:linear-gradient(90deg, transparent, #c8e2d0, transparent);
    margin:10px 0;
  }

  /* SVG animation helpers */
  .flight-seed{
    transform-box:fill-box;
    transform-origin:center;
    animation:floatseed 1.4s ease-in-out infinite;
  }
  @keyframes floatseed{
    0%,100%{ transform:translateY(0px) rotate(-3deg);}
    50%{ transform:translateY(-6px) rotate(3deg);}
  }
  .pulse-ray{
    animation:pulseRay 1.6s infinite;
  }
  @keyframes pulseRay{
    0%,100%{ opacity:.25; }
    50%{ opacity:.85; }
  }
  .resource-arrow{
    animation:flowArrow 1.7s infinite;
  }
  @keyframes flowArrow{
    0%{ opacity:.15; transform:translateX(0); }
    50%{ opacity:1; transform:translateX(8px); }
    100%{ opacity:.15; transform:translateX(0); }
  }
  .tag{
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    background:#eefaf1;
    font-weight:800;
    font-size:.92rem;
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="toprow">
      <div class="titleblock">
        <h1>Plant Reproduction 6(a)</h1>
        <p>Seed dispersal: from results to advantage</p>
      </div>
      <div class="controls">
        <button class="btn-ghost" id="readBtn" type="button">🔊 Read this screen</button>
        <label class="toggle" for="ttsToggle">
          <input type="checkbox" id="ttsToggle" />
          <span>Read-aloud on</span>
        </label>
        <button class="btn-ghost" id="restartBtn" type="button">↺ Restart</button>
      </div>
    </div>
    <div class="demerit-strip" aria-label="Demerit tracker">
      <span class="demerit-label">Seeds left:</span>
      <div class="seed-row" id="seedRow"></div>
      <span class="small muted">Wrong checked answers make one seed fly away.</span>
    </div>
  </div>

  <main id="screenHost" class="screen"></main>
</div>

<div class="overlay" id="gameOverOverlay" aria-hidden="true">
  <div class="overlay-card">
    <div style="font-size:3rem;">🌬️🌱</div>
    <h2>All the seeds have flown off!</h2>
    <p class="subtext">Start again and read more carefully.</p>
    <button class="btn-primary" id="restartOverlayBtn" type="button">Start again</button>
  </div>
</div>

<script>
(function(){
  const acceptedFinalAnswer = "A taller tree allows seed T to be dispersed further away from the parent plant. This reduces competition for water, mineral salts, space and sunlight with the parent plant.";

  const state = {
    screen: 0,
    lives: 7,
    maxLives: 7,
    ttsOn: false,
    ttsVoice: null,
    activeSelections: {},
    hintShown: false,
    chainOrder: [],
    resourcesSelected: [],
    fill1: { current: 0, values: ["", ""] },
    fill2: { current: 0, values: ["", "", "", "", ""] },
    guessStage: 0,
    guessReveals: [0,0,0],
    guessWords: ["reduces", "mineral salts", "sunlight"],
    guessDone: ["","",""],
    screenReadQueued: false
  };

  const host = document.getElementById("screenHost");
  const seedRow = document.getElementById("seedRow");
  const overlay = document.getElementById("gameOverOverlay");
  const readBtn = document.getElementById("readBtn");
  const restartBtn = document.getElementById("restartBtn");
  const restartOverlayBtn = document.getElementById("restartOverlayBtn");
  const ttsToggle = document.getElementById("ttsToggle");

  function shuffle(arr){
    const copy = [...arr];
    for(let i=copy.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function initVoices(){
    const pickVoice = () => {
      const voices = speechSynthesis.getVoices();
      state.ttsVoice =
        voices.find(v => /en-(SG|GB|US)/i.test(v.lang)) ||
        voices.find(v => /^en/i.test(v.lang)) ||
        voices[0] || null;
    };
    pickVoice();
    if (typeof speechSynthesis !== "undefined") {
      speechSynthesis.onvoiceschanged = pickVoice;
    }
  }

  function speak(text){
    if(!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text.replace(/\s+/g, " ").trim());
    if(state.ttsVoice) utter.voice = state.ttsVoice;
    utter.rate = 0.94;
    utter.pitch = 1;
    speechSynthesis.speak(utter);
  }

  function maybeSpeakScreen(){
    if(state.ttsOn){
      const text = collectReadableText();
      if(text) speak(text);
    }
  }

  function collectReadableText(){
    const region = host;
    if(!region) return "";
    const chunks = [];
    const nodes = region.querySelectorAll("[data-read], .instruction, .subtext, .feedback, .choice, .scene-label, .chip, .resource, .option-token, .student-answer, .guess-sentence, summary");
    nodes.forEach(n => {
      const t = (n.getAttribute("data-read") || n.textContent || "").trim();
      if(t) chunks.push(t);
    });
    return chunks.join(". ");
  }

  function loseLife(){
    if(state.lives <= 0) return;
    state.lives -= 1;
    renderSeeds();
    if(state.lives <= 0){
      setTimeout(() => {
        overlay.classList.add("show");
        overlay.setAttribute("aria-hidden", "false");
        speak("All the seeds have flown off. Start again and read more carefully.");
      }, 220);
    }
  }

  function renderSeeds(){
    seedRow.innerHTML = "";
    for(let i=0;i<state.maxLives;i++){
      const seed = document.createElement("div");
      seed.className = "seed" + (i >= state.lives ? " lost" : "");
      seed.innerHTML = '<span class="dot"></span>';
      seedRow.appendChild(seed);
    }
  }

  function nextScreen(){
    state.screen += 1;
    render();
  }

  function resetState(){
    state.screen = 0;
    state.lives = 7;
    state.activeSelections = {};
    state.hintShown = false;
    state.chainOrder = [];
    state.resourcesSelected = [];
    state.fill1 = { current: 0, values: ["", ""] };
    state.fill2 = { current: 0, values: ["", "", "", "", ""] };
    state.guessStage = 0;
    state.guessReveals = [0,0,0];
    state.guessDone = ["","",""];
    overlay.classList.remove("show");
    overlay.setAttribute("aria-hidden", "true");
    if("speechSynthesis" in window){ speechSynthesis.cancel(); }
    renderSeeds();
    render();
  }

  function createQuestionPanels(){
    return `
      <div class="question-panel">
        <details open>
          <summary data-read="Question">Question</summary>
          <div class="question-content">
            <p><span class="highlight">Based on Meifen’s results</span>, why is it an <span class="highlight">advantage</span> for seed T to be found on a <span class="highlight">tall tree</span>?</p>
          </div>
        </details>
      </div>
      <div class="source-panel">
        <details>
          <summary data-read="Show question and source">Show question and source</summary>
          <div class="question-content">
            <p>Meifen dropped seed T from different heights in front of a fan and measured the distance travelled.</p>
            <table class="mini-table" aria-label="Results table">
              <tr><th>H (cm)</th><th>120</th><th>100</th><th>80</th><th>60</th></tr>
              <tr><th>D (cm)</th><td>50</td><td>44</td><td>31</td><td>15</td></tr>
            </table>
            <div class="keyline"></div>
            ${miniSourceSvg()}
          </div>
        </details>
      </div>
    `;
  }

  function miniSourceSvg(){
    return `
    <div class="visual-box center" style="min-height:230px;">
      <svg viewBox="0 0 760 240" width="100%" height="210" aria-hidden="true">
        <rect x="0" y="0" width="760" height="240" rx="20" fill="#f7fffb"/>
        <rect x="0" y="175" width="760" height="65" fill="#dbeedc"/>
        <rect x="85" y="55" width="34" height="120" rx="8" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
        <ellipse cx="102" cy="40" rx="18" ry="20" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
        <rect x="95" y="26" width="14" height="28" rx="6" fill="#b7cdd1"/>
        ${[65,82,99,116,133].map(y => `<path d="M 132 ${y} C 150 ${y-8}, 165 ${y+8}, 184 ${y}" stroke="#7aa5b4" stroke-width="4" fill="none"/>`).join("")}
        <line x1="318" y1="40" x2="318" y2="160" stroke="#555" stroke-width="3"/>
        <polygon points="318,40 312,52 324,52" fill="#555"/>
        <polygon points="318,160 312,148 324,148" fill="#555"/>
        <text x="332" y="108" font-size="28" font-weight="700" fill="#224">H</text>

        <line x1="336" y1="182" x2="610" y2="182" stroke="#555" stroke-width="3"/>
        <polygon points="610,182 598,176 598,188" fill="#555"/>
        <text x="470" y="170" font-size="28" font-weight="700" fill="#224">D</text>

        <g transform="translate(280,38)">
          <path d="M 0 34 Q 34 0 68 34" fill="#d8f3dc" stroke="#437b5d" stroke-width="3"/>
          <path d="M 68 34 Q 102 0 136 34" fill="#d8f3dc" stroke="#437b5d" stroke-width="3"/>
          <ellipse cx="68" cy="40" rx="10" ry="12" fill="#8b5e34" stroke="#5c3a18" stroke-width="2"/>
          <text x="45" y="14" font-size="22" font-weight="700" fill="#224">4 cm</text>
        </g>
        <text x="44" y="160" font-size="22" fill="#222">fan</text>
      </svg>
    </div>`;
  }

  function largeAnimationSvg(){
    return `
    <div class="visual-box">
      <svg viewBox="0 0 860 340" width="100%" height="100%" aria-label="Seed flight comparison">
        <defs>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity=".16"/>
          </filter>
        </defs>

        </div>

    host.innerHTML = wrapped;
    const feedback = document.getElementById("feedbackBox");
    const nextBtn = document.getElementById("nextBtn");
    host.querySelectorAll("[data-choice]").forEach(btn => {
      btn.addEventListener("click", () => {
        if(btn.classList.contains("correct")) return;
        const idx = Number(btn.dataset.choice);
        const correct = data.options[idx].correct;
        host.querySelectorAll("[data-choice]").forEach(b => b.disabled = true);
        if(correct){
          btn.classList.add("correct");
          feedback.className = "feedback good";
          feedback.textContent = data.correctFeedback;
          nextBtn.disabled = false;
        }else{
          btn.classList.add("wrong");
          feedback.className = "feedback bad";
          feedback.textContent = data.wrongFeedback;
          loseLife();
          setTimeout(() => {
            host.querySelectorAll("[data-choice]").forEach(b => {
              b.disabled = false;
              if(!b.classList.contains("correct")) b.classList.remove("wrong");
            });
          }, 650);
        }
      });
    });
    nextBtn.addEventListener("click", nextScreen);
    maybeSpeakScreen();
  }

            <button class="option-token ${values.includes(opt.text) ? "used" : ""}" type="button" data-token="${opt.text}" data-correct-index="${opt.correctIndex}" data-read="${opt.text}">
              ${opt.text}
            </button>`).join("")}
        </div>
        <div class="footer-row">
          <div class="feedback" id="feedbackBox">${config.startFeedback(currentIndex)}</div>
          <button class="btn-primary" id="nextBtn" type="button" ${values.every(v => v) ? "" : "disabled"}>Next</button>
        </div>
      </div>
      ${createQuestionPanels()}
    `;
    const feedback = document.getElementById("feedbackBox");
    const nextBtn = document.getElementById("nextBtn");
    host.querySelectorAll("[data-token]").forEach(btn => {
      btn.addEventListener("click", () => {
        if(btn.classList.contains("used")) return;
        const token = btn.dataset.token;
        const correctIndex = Number(btn.dataset.correctIndex);
        const idx = state[localKey].current;
        if(correctIndex === idx){
          state[localKey].values[idx] = token;
          state[localKey].current += 1;
          renderFillScreen(config);
        }else{
          let text = config.wrongFeedback;
          if(token === "minerals"){
            text = "Use the exact science term: mineral salts.";
          }
          if(token === "avoids" || token === "prevents"){
            text = "The seed does not stop competition completely. It reduces it.";
          }
          feedback.className = "feedback bad";
          feedback.textContent = text;
          loseLife();
        }
      });
    });
    if(values.every(v => v)){
      feedback.className = "feedback good";
      feedback.textContent = config.doneFeedback;
      nextBtn.disabled = false;
      host.querySelectorAll("[data-token]").forEach(btn => btn.disabled = true);
    }
    nextBtn.addEventListener("click", nextScreen);
    maybeSpeakScreen();
  }

  function renderScreen7(){
    renderFillScreen({
      key:"fill1",
      instruction:"Fill the sentence. Tap the best words for each blank.",
      subtext:"Build the result part of the answer first.",
      options:[
        {text:"further away", correctIndex:0},
        {text:"parent plant", correctIndex:1},
        {text:"closer", correctIndex:0},
        {text:"fan", correctIndex:1},
        {text:"tall tree", correctIndex:1}
      ],
      startFeedback:(i)=> i===0 ? "Tap the best words for Blank 1." : "Good. Now tap the best words for Blank 2.",
      wrongFeedback:"Use the result from the table.",
      doneFeedback:"Yes. The results show that seed T can be dispersed further away from the parent plant."
    });
  }

  function renderScreen8(){
    const resourceOptions = shuffle([
      {text:"water", correct:true},
      {text:"mineral salts", correct:true},
      {text:"space", correct:true},
      {text:"sunlight", correct:true},
      {text:"wind", correct:false},
      {text:"food", correct:false},
      {text:"minerals", correct:false},
      {text:"fan speed", correct:false}
    ]);
    host.innerHTML = `
      <div class="card">
        <p class="instruction" data-read="Now fill the reason. Tap all four resources. They can be in any order.">Now fill the reason. Tap all four resources. They can be in <span class="tag">any order</span>.</p>
        <p class="subtext" data-read="Reduced competition is still the key idea.">Reduced competition is still the key idea.</p>
      </div>
      <div class="card">
        <div class="sentence-box" data-read="This reduces competition for the chosen resources with the parent plant.">
          This <span class="badge">reduces</span> competition for
          <span class="blank" id="resourceSummary" style="min-width:380px; justify-content:flex-start; text-align:left; padding:8px 14px;">Tap the four resources</span>
          with the parent plant.
        </div>
        <div class="option-bank" style="margin-top:18px;">
          ${resourceOptions.map((opt) => `
            <button class="option-token" type="button" data-resource="${opt.text}" data-correct="${opt.correct}" data-read="${opt.text}">
              ${opt.text}
            </button>
          `).join("")}
        </div>
        <div class="footer-row">
          <div class="feedback" id="feedbackBox">Choose all four resources. They do not need to be in a fixed order.</div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn-secondary" id="clearBtn" type="button">Clear</button>
            <button class="btn-primary" id="checkBtn" type="button">Check</button>
            <button class="btn-primary" id="nextBtn" type="button" disabled>Next</button>
          </div>
        </div>
      </div>
      ${createQuestionPanels()}
    `;
    const required = ["water","mineral salts","space","sunlight"];
    const chosen = new Set();
    const summary = document.getElementById("resourceSummary");
    const feedback = document.getElementById("feedbackBox");
    const nextBtn = document.getElementById("nextBtn");

    function updateSummary(){
      const values = [...chosen];
      summary.textContent = values.length ? values.join(", ") : "Tap the four resources";
    }

    host.querySelectorAll("[data-resource]").forEach(btn => {
      btn.addEventListener("click", () => {
        const value = btn.dataset.resource;
        if(chosen.has(value)){
          chosen.delete(value);
          btn.classList.remove("selected");
        }else{
          chosen.add(value);
          btn.classList.add("selected");
        }
        updateSummary();
      });
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      chosen.clear();
      host.querySelectorAll("[data-resource]").forEach(btn => {
        btn.classList.remove("selected","correct","wrong");
        btn.disabled = false;
      });
      feedback.className = "feedback";
      feedback.textContent = "Choose all four resources. They do not need to be in a fixed order.";
      nextBtn.disabled = true;
      updateSummary();
    });

    document.getElementById("checkBtn").addEventListener("click", () => {
      const values = [...chosen].sort();
      const ok = values.length === 4 && JSON.stringify(values) === JSON.stringify([...required].sort());
      if(ok){
        feedback.className = "feedback good";
        feedback.textContent = "Good. The key idea is reduced competition for water, mineral salts, space and sunlight.";
        host.querySelectorAll("[data-resource]").forEach(btn => {
          const value = btn.dataset.resource;
          if(chosen.has(value)) btn.classList.add("correct");
          btn.disabled = true;
        });
        summary.textContent = "water, mineral salts, space and sunlight";
        nextBtn.disabled = false;
      }else{
        feedback.className = "feedback bad";
        feedback.textContent = "You need all four resources: water, mineral salts, space and sunlight.";
        loseLife();
      }
    });

    document.getElementById("nextBtn").addEventListener("click", nextScreen);
    updateSummary();
    maybeSpeakScreen();
  }

  function renderScreen9(){
    renderSingleChoice({
      instruction:"What is missing from this answer?",
      subtext:"Check whether the answer gives only the result, or the real advantage too.",
      topHtml:`<div class="card">
        <div class="student-answer" data-read="Seed T can be dispersed further away.">
          “Seed T can be dispersed further away.”
        </div>
      </div>`,
      options: shuffle([
        {text:"why being further away is an advantage", correct:true},
        {text:"the height values in the table", correct:false},
        {text:"the name of the scientist", correct:false}
      ]),
      correctFeedback:"Yes. This answer gives the result, but not the advantage.",
      wrongFeedback:"The problem is not the table detail. It is the missing reason."
    });
  }

  function renderScreen10(){
    const done = state.guessDone;
    const stage = state.guessStage;
    const words = state.guessWords;
    const acceptedGuesses = [
      ["reduces"],
      ["mineral salts"],
      ["sunlight","light"]
    ];

    function maskWord(word, extraReveal){
      const parts = word.split(" ");
      let extra = extraReveal;
      return parts.map(part => {
        const visible = Math.min(part.length, 1 + extra);
        extra = Math.max(0, extra - Math.max(0, visible - 1));
        return part.slice(0, visible) + "_".repeat(Math.max(0, part.length - visible));
      }).join(" ");
    }

    const displayWord = (index) => done[index] ? done[index] : maskWord(words[index], state.guessReveals[index]);
    const instruction = stage < words.length ? "Type the missing word." : "You have completed the answer.";

    host.innerHTML = `
      <div class="card">
        <p class="instruction" data-read="${instruction}">${instruction}</p>
        <p class="subtext" data-read="Wrong tries here do not take away a seed. The first letter is already shown in the sentence.">Wrong tries here do not take away a seed. The first letter is already shown in the sentence.</p>
      </div>
      <div class="card guess-box">
        <div class="guess-sentence" data-read="${acceptedFinalAnswer}">
          A taller tree allows seed T to be dispersed further away from the parent plant.
          This <strong>${displayWord(0)}</strong> competition for water, <strong>${displayWord(1)}</strong>, space and <strong>${displayWord(2)}</strong> with the parent plant.
        </div>
        ${stage < words.length ? `
          <div class="guess-input-row">
            <input type="text" id="guessInput" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="Type the missing word" />
            <button class="btn-secondary" type="button" id="checkGuessBtn">Check</button>
          </div>
        ` : ""}
        <div class="feedback" id="feedbackBox">${stage < words.length ? "Look at the word in the sentence and type it." : "Well done. You built the full answer."}</div>
        <div class="footer-row">
          <div></div>
          <button class="btn-primary" id="nextBtn" type="button" ${stage < words.length ? "disabled" : ""}>Next</button>
        </div>
      </div>
      ${createQuestionPanels()}
    `;

    const feedback = document.getElementById("feedbackBox");
    if(stage < words.length){
      const input = document.getElementById("guessInput");
      const checkBtn = document.getElementById("checkGuessBtn");
      input.focus();
      function normalise(s){ return s.trim().toLowerCase().replace(/\s+/g," "); }
      function checkGuess(){
        const attempt = normalise(input.value);
        const targets = acceptedGuesses[stage].map(normalise);
        if(!attempt){
          feedback.className = "feedback bad";
          feedback.textContent = "Type a word first.";
          return;
        }
        if(targets.includes(attempt)){
          state.guessDone[stage] = attempt === "light" ? "light" : words[stage];
          state.guessStage += 1;
          renderScreen10();
        }else{
          state.guessReveals[stage] = Math.min(words[stage].replace(/\s/g,"").length - 1, state.guessReveals[stage] + 1);
          feedback.className = "feedback bad";
          feedback.textContent = "Not yet. More letters are now shown in the sentence.";
          renderScreen10();
        }
      }
      checkBtn.addEventListener("click", checkGuess);
      input.addEventListener("keydown", (e) => {
        if(e.key === "Enter") checkGuess();
      });
    }else{
      document.getElementById("nextBtn").disabled = false;
      document.getElementById("nextBtn").addEventListener("click", nextScreen);
    }
    maybeSpeakScreen();
  }

  function renderScreen11(){
    host.innerHTML = `
      <div class="card completion">
        <div style="font-size:3rem;">🌿✨</div>
        <h2 data-read="You have built the full answer.">You have built the full answer.</h2>
        <div class="final-answer" data-read="${acceptedFinalAnswer}">
          ${acceptedFinalAnswer}
        </div>
        <div class="footer-row" style="justify-content:center; margin-top:18px;">
          <button class="btn-secondary" id="hearAnswerBtn" type="button">Hear the answer</button>
          <button class="btn-primary" id="restartFinalBtn" type="button">Try again</button>
        </div>
      </div>
    `;
    document.getElementById("hearAnswerBtn").addEventListener("click", () => speak(acceptedFinalAnswer));
    document.getElementById("restartFinalBtn").addEventListener("click", resetState);
    maybeSpeakScreen();
  }

  function render(){
    renderSeeds();
    switch(state.screen){
      case 0: renderScreen0(); break;
      case 1: renderScreen1(); break;
      case 2: renderScreen2(); break;
      case 3: renderScreen3(); break;
      case 4: renderScreen4(); break;
      case 5: renderScreen5(); break;
      case 6: renderScreen6(); break;
      case 7: renderScreen7(); break;
      case 8: renderScreen8(); break;
      case 9: renderScreen9(); break;
      case 10: renderScreen10(); break;
      default: renderScreen11(); break;
    }
  }

  readBtn.addEventListener("click", () => {
    const text = collectReadableText();
    if(text) speak(text);
  });

  restartBtn.addEventListener("click", resetState);
  restartOverlayBtn.addEventListener("click", resetState);
  ttsToggle.addEventListener("change", (e) => {
    state.ttsOn = e.target.checked;
    if(state.ttsOn) maybeSpeakScreen();
    else if("speechSynthesis" in window) speechSynthesis.cancel();
  });

  initVoices();
  renderSeeds();
  render();

})();
</script>
