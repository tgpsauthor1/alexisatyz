<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>water_change_in_state_03</title>
  <style>
    :root {
      --bg: #f4f8ff;
      --card: #ffffff;
      --ink: #17324d;
      --muted: #5b728a;
      --line: #c8d9ee;
      --blue: #2b6cb0;
      --blue-2: #d9ebff;
      --green: #2f855a;
      --green-2: #def7e8;
      --red: #c53030;
      --red-2: #fde8e8;
      --yellow: #b7791f;
      --yellow-2: #fff7d6;
      --shadow: 0 10px 30px rgba(22, 52, 93, 0.10);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #edf5ff 0%, #f7fbff 100%);
      color: var(--ink);
    }

    .page {
      max-width: 1024px;
      margin: 0 auto;
      padding: 14px 14px 28px;
    }

    .top-strip {
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 10px 14px;
      display: grid;
      gap: 10px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .top-row, .top-row-2 {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .brand {
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--blue);
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 700;
      flex-wrap: wrap;
    }

    .bubble-strip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f5fbff;
      border: 1px solid #cfe6ff;
    }

    .bubble-label {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .bubble {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffffff 0 22%, #9fd4ff 23% 55%, #58a8f1 56% 100%);
      border: 1px solid #4e9ae1;
      display: inline-block;
    }

    .bubble.lost {
      background: #edf2f7;
      border-color: #cbd5e0;
      opacity: 0.65;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toggle-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f7fbff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      color: var(--muted);
      font-weight: 700;
    }

    .toggle-wrap input {
      width: 18px;
      height: 18px;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      background: var(--blue);
      color: white;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      min-height: 52px;
      box-shadow: 0 8px 18px rgba(43, 108, 176, 0.18);
      transition: transform 0.08s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn.secondary {
      background: white;
      color: var(--blue);
      border: 2px solid var(--line);
      box-shadow: none;
    }

    .btn.good {
      background: var(--green);
      box-shadow: 0 8px 18px rgba(47, 133, 90, 0.18);
    }

    .btn.warn {
      background: var(--yellow);
      color: #3f2e11;
      box-shadow: none;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .screen-head {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .eyebrow {
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-size: 0.82rem;
    }

    .screen-title {
      margin: 0;
      font-size: clamp(1.4rem, 3.4vw, 2rem);
      line-height: 1.15;
      color: var(--ink);
    }

    .instruction {
      font-size: clamp(1.12rem, 2.5vw, 1.35rem);
      font-weight: 900;
      line-height: 1.25;
      background: #eef6ff;
      color: var(--ink);
      border: 2px solid #c9def9;
      padding: 14px 16px;
      border-radius: 16px;
      margin: 8px 0 12px;
    }

    .main-grid {
      display: grid;
      gap: 16px;
      align-items: start;
    }

    .visual-card {
      border: 2px solid var(--line);
      border-radius: 18px;
      background: #f8fbff;
      padding: 12px;
    }

    .question-box {
      border: 2px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: #fbfdff;
    }

    .question-text {
      font-size: 1.08rem;
      line-height: 1.45;
    }

    mark {
      background: #fff09c;
      color: inherit;
      padding: 0 4px;
      border-radius: 6px;
    }

    .options-grid {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      background: white;
      color: var(--ink);
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 62px;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.08s ease;
    }

    .option-btn:hover {
      transform: translateY(-1px);
    }

    .option-btn.selected {
      border-color: var(--blue);
      background: var(--blue-2);
      box-shadow: 0 0 0 3px rgba(43,108,176,0.10);
    }

    .option-btn.correct {
      border-color: var(--green);
      background: var(--green-2);
    }

    .option-btn.wrong {
      border-color: var(--red);
      background: var(--red-2);
    }

    .mini-help {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .feedback {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.4;
      border: 2px solid var(--line);
      background: #f7fbff;
      min-height: 56px;
    }

    .feedback.good {
      border-color: #b7e4c7;
      background: var(--green-2);
      color: #20543f;
    }

    .feedback.bad {
      border-color: #fecaca;
      background: var(--red-2);
      color: #822727;
    }

    .feedback.info {
      border-color: #d6e4ff;
      background: #edf5ff;
      color: #254e7a;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    details.question-panel {
      border: 2px solid var(--line);
      border-radius: 16px;
      background: #fcfeff;
      margin-bottom: 14px;
      overflow: hidden;
    }

    details.question-panel summary {
      cursor: pointer;
      list-style: none;
      padding: 14px 16px;
      font-weight: 900;
      color: var(--blue);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    details.question-panel summary::-webkit-details-marker {
      display: none;
    }

    .panel-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 12px;
    }

    .source-image {
      width: 100%;
      max-width: 560px;
      display: block;
      margin: 0 auto;
      border-radius: 14px;
      border: 2px solid var(--line);
      background: #fff;
    }

    .source-caption {
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .step-bank {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .build-area {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .slot {
      min-height: 70px;
      border: 2px dashed #9db7d6;
      border-radius: 16px;
      background: #f7fbff;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 800;
      color: var(--muted);
    }

    .slot.filled {
      border-style: solid;
      border-color: #7eb3e7;
      background: #eaf4ff;
      color: var(--ink);
    }

    .judge-card {
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 12px;
      background: white;
    }

    .judge-statement {
      font-weight: 800;
      font-size: 1rem;
      line-height: 1.4;
    }

    .judge-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
    }

    .judge-note {
      font-size: 0.96rem;
      line-height: 1.4;
      color: var(--muted);
      display: none;
    }

    .judge-note.show {
      display: block;
    }

    .summary-box {
      background: #f8fbff;
      border: 2px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      line-height: 1.5;
      font-size: 1rem;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #edf5ff;
      border: 1px solid #cfe2ff;
      color: var(--blue);
      font-weight: 800;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .completion {
      display: grid;
      gap: 14px;
      text-align: left;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(16, 32, 52, 0.52);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: min(520px, 100%);
      background: white;
      border-radius: 22px;
      border: 2px solid var(--line);
      padding: 22px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .modal-card h2 {
      margin-top: 0;
      font-size: 1.6rem;
      color: var(--red);
    }

    .muted {
      color: var(--muted);
    }

    .soup-visual, .boiling-visual {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      display: block;
    }

    .center {
      text-align: center;
    }

    @media (min-width: 860px) {
      .main-grid.two {
        grid-template-columns: 1.1fr 1fr;
      }
    }

    @media (max-width: 720px) {
      .build-area {
        grid-template-columns: repeat(2, 1fr);
      }
      .judge-controls {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-strip" id="topStrip">
      <div class="top-row">
        <div class="brand">Boiling and Condensation</div>
        <div class="progress-wrap">
          <span id="progressText">Step 1 of 11</span>
          <div class="bubble-strip" aria-label="Bubble chances">
            <span class="bubble-label">Bubble chances</span>
            <span id="bubbleWrap"></span>
          </div>
        </div>
      </div>
      <div class="top-row-2">
        <div class="controls">
          <label class="toggle-wrap">
            <input type="checkbox" id="autoReadToggle" />
            <span>Auto read-aloud</span>
          </label>
          <button class="btn secondary" id="speakBtn" type="button">🔊 Read this screen</button>
        </div>
        <button class="btn secondary" id="restartBtn" type="button">Restart</button>
      </div>
    </div>

    <main id="app" aria-live="polite"></main>
  </div>

  <div class="modal" id="gameOverModal" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
    <div class="modal-card">
      <h2 id="gameOverTitle">All bubble chances used.</h2>
      <p class="muted">The whole interactive will restart so you can try again carefully.</p>
      <button class="btn" id="restartNowBtn" type="button">Restart now</button>
    </div>
  </div>

    const screens = [
      { key: "intro", title: "Read the question carefully", countsForDemerit: false },
      { key: "taskDemand", title: "What are you looking for?", countsForDemerit: true },
      { key: "boilingPoint", title: "Check option 1", countsForDemerit: true },
      { key: "heatGain", title: "Check option 2", countsForDemerit: true },
      { key: "stateChange", title: "Check option 4", countsForDemerit: true },
      { key: "sequence", title: "Build the visible-cloud story", countsForDemerit: false },
      { key: "whiteCloud", title: "What is the white cloud?", countsForDemerit: true },
      { key: "judgeAll", title: "Judge all 4 statements", countsForDemerit: true },
      { key: "retry", title: "Retry the original question", countsForDemerit: true },
      { key: "transfer", title: "New situation: hot soup", countsForDemerit: true },
      { key: "finish", title: "Finish", countsForDemerit: false }
    ];

    const totalChances = Math.ceil(screens.filter(s => s.countsForDemerit).length / 2);

    const state = {
      screenIndex: 0,
      chancesLeft: totalChances,
      autoRead: false,
      questionPanelOpen: false
    };

    const app = document.getElementById("app");
    const progressText = document.getElementById("progressText");
    const bubbleWrap = document.getElementById("bubbleWrap");
    const autoReadToggle = document.getElementById("autoReadToggle");
    const speakBtn = document.getElementById("speakBtn");
    const restartBtn = document.getElementById("restartBtn");
    const restartNowBtn = document.getElementById("restartNowBtn");
    const gameOverModal = document.getElementById("gameOverModal");

    autoReadToggle.addEventListener("change", () => {
      state.autoRead = autoReadToggle.checked;
      if (state.autoRead) {
        speakCurrentScreen();
      } else {
        stopSpeaking();
      }
    });

    speakBtn.addEventListener("click", speakCurrentScreen);
    restartBtn.addEventListener("click", restartWholeActivity);
    restartNowBtn.addEventListener("click", restartWholeActivity);

    function stopSpeaking() {
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    function speakCurrentScreen() {
      stopSpeaking();
      if (!("speechSynthesis" in window)) return;
      const texts = [];
      const title = document.querySelector("[data-read=title]");
      const instruction = document.querySelector("[data-read=instruction]");
      const question = document.querySelector("[data-read=question]");
      const feedback = document.querySelector("[data-read=feedback]");
      const optionEls = [...document.querySelectorAll("[data-read=option]")];

      [title, instruction, question].forEach(el => {
        if (el && el.textContent.trim()) texts.push(el.textContent.trim());
      });
      optionEls.forEach((el, i) => {
        const t = el.textContent.trim();
        if (t) texts.push("Option " + (i + 1) + ". " + t);
      });
      if (feedback && feedback.textContent.trim()) texts.push(feedback.textContent.trim());

      const utterance = new SpeechSynthesisUtterance(texts.join(" "));
      utterance.rate = 0.95;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    function shuffleArray(input, avoidSolvedOrder = false) {
      const arr = [...input];
      function sameOrder(a, b) {
        return a.length === b.length && a.every((item, i) => item.id === b[i].id);
      }
      do {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      } while (avoidSolvedOrder && sameOrder(arr, input));
      return arr;
    }

    function updateTopStrip() {
      progressText.textContent = `Step ${state.screenIndex + 1} of ${screens.length}`;
      bubbleWrap.innerHTML = "";
      for (let i = 0; i < totalChances; i++) {
        const span = document.createElement("span");
        span.className = "bubble" + (i >= state.chancesLeft ? " lost" : "");
        bubbleWrap.appendChild(span);
      }
      autoReadToggle.checked = state.autoRead;
    }

    function useDemerit() {
      state.chancesLeft -= 1;
      updateTopStrip();
      if (state.chancesLeft <= 0) {
        gameOverModal.classList.add("show");
      }
    }

    function restartWholeActivity() {
      stopSpeaking();
      gameOverModal.classList.remove("show");
      state.screenIndex = 0;
      state.chancesLeft = totalChances;
      state.questionPanelOpen = false;
      render();
    }

    function renderSingleChoice(config) {
      const options = shuffleArray(config.options, false);
      app.innerHTML = createBaseScreen(
        config.title,
        config.instruction,
        `
          ${config.visualHtml ? `<div class="visual-card center">${config.visualHtml}</div>` : ""}
          ${config.bodyHtml ? `<div class="question-box">${config.bodyHtml}</div>` : ""}
          <div class="options-grid" id="optionsWrap">
            ${options.map((opt) => `
              <button class="option-btn" type="button" data-read="option" data-id="${opt.id}">
                ${opt.label}
              </button>
            `).join("")}
          </div>
          <div class="nav-row">
            <div class="mini-help">${config.helpText || "Tap one answer. Then tap Check."}</div>
            <button class="btn warn" id="checkBtn" type="button" disabled>Check</button>
          </div>
          <div class="feedback info" data-read="feedback" id="feedbackBox">Choose an answer first.</div>
          ${createNav(false)}
        `
      );
      attachQuestionPanelSync();
      const buttons = [...document.querySelectorAll(".option-btn")];
      const checkBtn = document.getElementById("checkBtn");
      const feedbackBox = document.getElementById("feedbackBox");
      const nextBtn = document.getElementById("nextBtn");
      let selectedId = null;
      let solved = false;

      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          if (solved) return;
          selectedId = btn.dataset.id;
          buttons.forEach(b => b.classList.toggle("selected", b === btn));
          checkBtn.disabled = false;
          feedbackBox.textContent = "Now tap Check.";
          feedbackBox.className = "feedback info";
        });
      });

      checkBtn.addEventListener("click", () => {
        if (!selectedId || solved) return;
        const choice = config.options.find(opt => opt.id === selectedId);
        const selectedBtn = buttons.find(btn => btn.dataset.id === selectedId);

        if (choice.correct) {
          solved = true;
          selectedBtn.classList.add("correct");
          feedbackBox.textContent = choice.feedback;
          feedbackBox.className = "feedback good";
          nextBtn.disabled = false;
          checkBtn.disabled = true;
          buttons.forEach(b => b.disabled = true);
        } else {
          selectedBtn.classList.add("wrong");
          feedbackBox.textContent = choice.feedback;
          feedbackBox.className = "feedback bad";
          useDemerit();
          if (state.chancesLeft > 0) {
            buttons.forEach(b => {
              b.disabled = false;
              if (b !== selectedBtn) b.classList.remove("selected");
            });
            selectedBtn.classList.remove("selected");
            selectedId = null;
            checkBtn.disabled = true;
          }
        }
      });

      attachNextHandler();
      setAutoReadLater();
    }

    function renderSequenceScreen() {

      );
      attachQuestionPanelSync();
      const buttons = [...document.querySelectorAll("#stepBank .option-btn")];
      const slots = [...document.querySelectorAll(".slot")];
      const feedbackBox = document.getElementById("feedbackBox");
      const visual = document.getElementById("sequenceVisual");
      const nextBtn = document.getElementById("nextBtn");
      let progress = 0;

      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          const expected = correctOrder[progress];
          if (btn.dataset.id === expected.id) {
            slots[progress].classList.add("filled");
            slots[progress].textContent = expected.label;
            btn.disabled = true;
            btn.classList.add("correct");
            progress += 1;
            visual.innerHTML = boilingSVG(progress);
            if (progress < correctOrder.length) {
              feedbackBox.textContent = "Good. Now tap the next step.";
              feedbackBox.className = "feedback good";
            } else {
              feedbackBox.textContent = "Good. The gas cannot be seen. The white mist appears after the vapour cools and condenses.";
              feedbackBox.className = "feedback good";
              nextBtn.disabled = false;
            }
          } else {
            feedbackBox.textContent = progress === 0
              ? "Start with what happens in the beaker first."
              : progress === 1
                ? "After the water boils, the water vapour rises."
                : progress === 2
                  ? "Before droplets form, the vapour touches cooler air."
                  : "Droplets form after the vapour cools.";
            feedbackBox.className = "feedback bad";
          }
        });
      });

      attachNextHandler();
      setAutoReadLater();
    }

        `
      );
      attachQuestionPanelSync();

      const checkAllBtn = document.getElementById("checkAllBtn");
      const feedbackBox = document.getElementById("feedbackBox");
      const nextBtn = document.getElementById("nextBtn");
      const selections = new Array(statements.length).fill(null);

      cards.forEach(card => {
        const index = Number(card.dataset.index);
        const choices = [...card.querySelectorAll(".judge-choice")];
        choices.forEach(choice => {
          choice.addEventListener("click", () => {
            choices.forEach(c => c.classList.toggle("selected", c === choice));
            selections[index] = choice.dataset.value;
            checkAllBtn.disabled = selections.some(v => !v);
          });
        });

      checkAllBtn.addEventListener("click", () => {
        const allCorrect = statements.every((s, i) => s.correctState === selections[i]);
        cards.forEach((card, i) => {

          const choices = [...card.querySelectorAll(".judge-choice")];
          choices.forEach(choice => {
            const isChosen = selections[i] === choice.dataset.value;
            choice.classList.remove("correct", "wrong");
            if (choice.dataset.value === statements[i].correctState) choice.classList.add("correct");

          note.textContent = statements[i].note;
          note.classList.add("show");
          note.style.color = statements[i].correctState === selections[i] ? "#20543f" : "#822727";

        if (allCorrect) {
          feedbackBox.textContent = "Yes. Only statement (3) is not correct.";

          nextBtn.disabled = false;
          checkAllBtn.disabled = true;
          cards.forEach(card => card.querySelectorAll(".judge-choice").forEach(btn => btn.disabled = true));
        } else {
          feedbackBox.textContent = "Some choices are not right yet. Use the notes on each card and check again.";

      setAutoReadLater();

            options: [
              { id: "100", label: "Water boils at 100°C.", correct: true, feedback: "Yes. Water boils at 100°C." },
              { id: "0", label: "Water boils at 0°C.", correct: false, feedback: "Remember the boiling point of water. It is 100°C." },
              { id: "ice", label: "Water boils only when it becomes ice.", correct: false, feedback: "Ice is the solid state. Boiling is not about becoming ice." }
            ]
          });
          break;
        case "heatGain":
          renderSingleChoice({
            title: "Check option 2",
            instruction: "During boiling, what happens to heat? Then tap Check.",
            bodyHtml: `<div class="question-text">Choose the best answer.</div>`,
            options: [
              { id: "gain", label: "Water gains heat.", correct: true, feedback: "Yes. Water still gains heat during boiling." },
              { id: "lose", label: "Water loses heat.", correct: false, feedback: "Boiling happens while water is being heated. It gains heat." },
              { id: "none", label: "No heat is gained.", correct: false, feedback: "During a change of state like boiling, water is still taking in heat." }
            ]
          });
          break;
        case "stateChange":
          renderSingleChoice({
            title: "Check option 4",
            instruction: "Boiling changes water from... Then tap Check.",
            bodyHtml: `<div class="question-text">Choose the correct change of state.</div>`,
            options: [
              { id: "l2g", label: "liquid to gas", correct: true, feedback: "Yes. Boiling changes liquid water to a gas." },
              { id: "g2l", label: "gas to liquid", correct: false, feedback: "Gas to liquid is condensation, not boiling." },
              { id: "l2s", label: "liquid to solid", correct: false, feedback: "Liquid to solid is freezing, not boiling." }
            ]
          });
          break;
        case "sequence":
          renderSequenceScreen();
          break;
        case "whiteCloud":
          renderSingleChoice({
            title: "What is the white cloud?",
            instruction: "Tap the best answer. Then tap Check.",
            visualHtml: boilingSVG(4),
            options: [
              { id: "steam", label: "steam that can be seen", correct: false, feedback: "Steam is water vapour, and it cannot be seen here. The visible white cloud forms after cooling." },
              { id: "droplets", label: "tiny water droplets formed by condensation", correct: true, feedback: "Yes. Steam is the gas. The white cloud is tiny liquid water droplets." },
              { id: "smoke", label: "smoke from the flame", correct: false, feedback: "This white cloud is not smoke. It forms when water vapour cools and condenses." }
            ]
          });
          break;
        case "judgeAll":
          renderJudgeAll();
          break;
        case "retry":
          renderSingleChoice({
            title: "Retry the original question",
            instruction: "Tap the not correct option. Then tap Check.",
            bodyHtml: `
              <div class="question-text">
                Which of the following options is <mark>not correct</mark>?
              </div>
            `,
            options: [
              { id: "1", label: "(1) Water boils at 100°C.", correct: false, feedback: "Option 1 is true. Water boils at 100°C." },
              { id: "2", label: "(2) Heat is gained during boiling.", correct: false, feedback: "Option 2 is true. Heat is gained during boiling." },
              { id: "3", label: "(3) Steam is the white clouds seen when water boils.", correct: true, feedback: "Yes. Option 3 is the not correct statement." },
              { id: "4", label: "(4) When water boils, it changes from a liquid to a gaseous state.", correct: false, feedback: "Option 4 is true. Boiling changes liquid water to gas." }
            ]
          });
          break;
        case "transfer":
          renderSingleChoice({
            title: "New situation: hot soup",
            instruction: "Read the new situation. Then tap the not correct statement and tap Check.",
            visualHtml: soupSVG(),
            bodyHtml: `
              <div class="question-text">
                <strong>Water from the hot soup boils.</strong> A white mist can be seen above the bowl.
                Which statement is <mark>not correct</mark>?
              </div>
            `,
            options: [
              { id: "mistIsSteam", label: "The white mist is steam.", correct: true, feedback: "Yes. The visible white mist is not steam. It is tiny water droplets formed after condensation." },
              { id: "vapourRose", label: "Water vapour rose from the hot soup.", correct: false, feedback: "This can be true. Water vapour can rise from the hot soup." },
              { id: "lostHeat", label: "The water vapour lost heat in the cooler air.", correct: false, feedback: "This can be true. The vapour can lose heat in cooler air." },
              { id: "dropletsFormed", label: "Tiny water droplets formed in the cooler air.", correct: false, feedback: "This can be true. The visible mist is made of tiny droplets." }
            ]
          });
          break;
        case "finish":
          renderFinish();
          break;
      }
    }

    render();
  </script>
</body>
</html>
