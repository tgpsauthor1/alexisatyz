
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Transfer, Total Unchanged</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --ink:#132238;
      --muted:#4d5b70;
      --line:#d9e2ee;
      --accent:#1f6feb;
      --accent-2:#ff9f1c;
      --good:#1f8f47;
      --bad:#c73b3b;
      --soft-good:#e9f8ef;
      --soft-bad:#fff1f1;
      --soft-accent:#eef5ff;
      --shadow:0 8px 24px rgba(16, 24, 40, 0.08);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:Arial, Helvetica, sans-serif}
    body{min-height:100vh}
    button,input{font:inherit}
    .app{
      max-width:1100px;
      margin:0 auto;
      padding:18px;
    }

    .topbar{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .title-wrap h1{
      margin:0;
      font-size:clamp(1.6rem, 3vw, 2.2rem);
      line-height:1.1;
    }
    .title-wrap p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:1rem;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:18px;
      padding:14px 18px;
      min-height:52px;
      background:var(--accent);
      color:#fff;
      cursor:pointer;
      box-shadow:var(--shadow);
      font-weight:700;
    }
    .btn.secondary{
      background:#fff;
      color:var(--ink);
      border:2px solid var(--line);
      box-shadow:none;
    }
    .btn.ghost{
      background:transparent;
      color:var(--accent);
      border:2px solid var(--accent);
      box-shadow:none;
    }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .btn:focus-visible, .option:focus-visible, .chip:focus-visible, .model-card:focus-visible, .mini-btn:focus-visible, .strategy-card:focus-visible, input:focus-visible{
      outline:4px solid #93c5fd;
      outline-offset:3px;
    }

    .progress-wrap{
      margin:10px 0 16px;
    }
    .progress-label{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-weight:700;
      margin-bottom:8px;
    }
    .progress{
      width:100%;
      height:16px;
      background:#dbe6f3;
      border-radius:999px;
      overflow:hidden;
    }
    .bar{
      height:100%;
      background:linear-gradient(90deg, var(--accent), #6ea8fe);
      width:0%;
      transition:width .35s ease;
    }

    .screen-card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px;
      min-height:540px;
    }

    .screen-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .screen-head h2{
      margin:0;
      font-size:clamp(1.4rem, 2.6vw, 2rem);
      line-height:1.15;
    }

    .tag{
      background:var(--soft-accent);
      color:var(--accent);
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      white-space:nowrap;
    }

    .action-box{
      background:#eef6ff;
      border:3px solid #b8d8ff;
      border-radius:20px;
      padding:16px 18px;
      font-weight:700;
      font-size:1.08rem;
      margin-bottom:12px;
    }

    .explain-box{
      background:#fff6ea;
      border:3px solid #ffd7a0;
      border-radius:20px;
      padding:14px 18px;
      color:var(--ink);
      margin-bottom:18px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1.2fr .95fr;
      gap:18px;
    }
    @media (max-width: 880px){
      .grid-2{grid-template-columns:1fr}
    }

    .panel{
      background:#fbfcfe;
      border:2px solid var(--line);
      border-radius:20px;
      padding:16px;
    }

    .question-card{
      margin-top:16px;
      background:#fff;
      border:2px solid var(--line);
      border-radius:20px;
      overflow:hidden;
    }
    .question-toggle{
      width:100%;
      text-align:left;
      background:#fff;
      border:none;
      padding:16px 18px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .question-body{
      display:none;
      border-top:2px solid var(--line);
      padding:16px 18px 18px;
      color:var(--ink);
    }
    .question-body.open{display:block}
    .q-line{margin:0 0 10px; font-size:1.06rem; line-height:1.5}
    .q-line:last-child{margin-bottom:0}

    .chip-row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .chip{
      border:3px solid var(--line);
      background:#fff;
      border-radius:18px;
      min-height:62px;
      padding:14px 18px;
      font-weight:700;
      cursor:pointer;
      min-width:110px;
      box-shadow:none;
    }
    .chip.selected, .option.selected, .model-card.selected, .mini-btn.selected, .strategy-card.selected{
      border-color:var(--accent);
      background:var(--soft-accent);
      transform:translateY(-1px);
    }

    .option-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:14px;
    }

    .option, .mini-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-height:86px;
      background:#fff;
      border:3px solid var(--line);
      border-radius:22px;
      cursor:pointer;
      padding:16px;
      font-weight:700;
      color:var(--ink);
    }

    .sentence-grid{
      display:grid;
      gap:12px;
    }
    .sentence-card{
      min-height:92px;
      justify-content:flex-start;
      text-align:left;
      line-height:1.45;
    }

    .feedback{
      margin-top:16px;
      padding:14px 16px;
      border-radius:18px;
      font-weight:700;
      display:none;
    }
    .feedback.good{
      display:block;
      background:var(--soft-good);
      border:2px solid #bde3ca;
      color:#125c2f;
    }
    .feedback.bad{
      display:block;
      background:var(--soft-bad);
      border:2px solid #f3c3c3;
      color:#8b2222;
    }

    .nav-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    /* Visuals */
    .scene{
      background:linear-gradient(180deg,#fdfefe,#f4f8fd);
      border:2px solid var(--line);
      border-radius:22px;
      padding:18px;
      min-height:290px;
      position:relative;
      overflow:hidden;
    }

    .money-title{
      font-weight:700;
      margin-bottom:12px;
      color:var(--muted);
    }

    .people{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      align-items:end;
    }
    .person{
      background:#fff;
      border:2px solid var(--line);
      border-radius:20px;
      padding:12px;
      position:relative;
      min-height:182px;
    }
    .person h3{
      margin:0 0 10px;
      font-size:1.1rem;
    }
    .money-box{
      height:110px;
      border-radius:20px;
      background:linear-gradient(180deg,#d7f5de,#a7e3b4);
      position:relative;
      overflow:hidden;
      border:3px solid #7dc38e;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }
    .money-fill{
      width:100%;
      background:linear-gradient(180deg,#55b96f,#2f9650);
      border-radius:18px 18px 0 0;
      transition:height .7s ease;
    }
    .money-label{
      position:absolute;
      inset:auto 0 10px 0;
      text-align:center;
      font-weight:700;
      color:#08381a;
      text-shadow:0 1px 0 rgba(255,255,255,.4);
    }

    .brace{
      margin:10px auto 0;
      width:94%;
      border-top:4px solid var(--ink);
      position:relative;
      height:34px;
    }
    .brace::before, .brace::after{
      content:"";
      position:absolute;
      top:-4px;
      width:4px;
      height:22px;
      background:var(--ink);
    }
    .brace::before{left:0}
    .brace::after{right:0}
    .brace-label{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      top:10px;
      background:#fff;
      padding:2px 10px;
      border-radius:999px;
      font-weight:700;
    }

    .transfer-chip{
      position:absolute;
      top:78px;
      left:18%;
      background:#ffe59a;
      border:3px solid #f1bb2a;
      color:#5b4200;
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      box-shadow:0 6px 16px rgba(0,0,0,.08);
    }
    .transfer-chip.animate{
      animation:moveRight 2.2s ease-in-out infinite alternate;
    }
    .transfer-chip.reverse{
      animation:moveLeft 2.2s ease-in-out infinite alternate;
    }
    @keyframes moveRight{
      0%{transform:translateX(0) translateY(0)}
      100%{transform:translateX(300px) translateY(28px)}
    }
    @keyframes moveLeft{
      0%{transform:translateX(300px) translateY(28px)}
      100%{transform:translateX(0) translateY(0)}
    }

    .equal-model{
      display:flex;
      align-items:flex-end;
      gap:10px;
      margin-top:10px;
    }
    .bar-wrap{
      flex:1;
    }
    .bar-label{
      font-weight:700;
      margin-bottom:8px;
      text-align:center;
    }
    .bar-model{
      height:76px;
      border-radius:16px;
      border:3px solid #7aa7e8;
      background:#dcebff;
      position:relative;
      overflow:hidden;
    }
    .bar-part{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,#7aa7e8,#4d82d8);
      opacity:.95;
    }
    .bar-model.unequal-left .bar-part{width:72%}
    .bar-model.unequal-right .bar-part{width:45%}
    .bar-model.equal .bar-part{width:100%}
    .bar-model.extra .part-main{
      position:absolute; inset:0 auto 0 0; width:66%; background:#4d82d8;
    }
    .bar-model.extra .part-extra{
      position:absolute; inset:0 0 0 auto; width:34%; background:#ffbd59;
    }

    .model-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
      gap:14px;
    }
    .model-card{
      border:3px solid var(--line);
      background:#fff;
      border-radius:22px;
      padding:14px;
      cursor:pointer;
      min-height:220px;
    }
    .model-card h4{
      margin:0 0 10px;
      text-align:center;
      font-size:1.02rem;
    }
    .model-caption{
      margin-top:10px;
      text-align:center;
      color:var(--muted);
      font-weight:700;
      min-height:42px;
    }

    .input-row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px;
    }
    .answer-input{
      min-height:64px;
      width:min(230px,100%);
      border-radius:18px;
      border:3px solid var(--line);
      padding:12px 14px;
      font-size:1.2rem;
      font-weight:700;
    }

    .equation{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      font-size:1.45rem;
      font-weight:700;
      background:#fff;
      border:2px dashed #bed3ef;
      border-radius:18px;
      padding:16px;
      margin:10px 0;
    }
    .equation .blank{
      min-width:92px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-bottom:4px solid var(--ink);
      padding:0 8px 4px;
      min-height:38px;
    }

    .mini-panel{
      margin-top:14px;
      background:#f8fbff;
      border:2px solid #cfe1fb;
      border-radius:20px;
      padding:14px;
    }
    .mini-panel h4{
      margin:0 0 10px;
      font-size:1.05rem;
    }
    .mini-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(160px,1fr));
      gap:12px;
      margin-top:12px;
    }

    .story-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    @media (max-width: 780px){
      .story-grid{grid-template-columns:1fr}
    }
    .story-card{
      border:2px solid var(--line);
      border-radius:20px;
      padding:14px;
      background:#fff;
    }
    .story-card h4{margin:0 0 10px}
    .story-line{
      display:flex;
      justify-content:space-between;
      gap:12px;
      background:#f8fbff;
      border-radius:14px;
      padding:12px 14px;
      margin-top:8px;
      font-weight:700;
    }

    .strategy-layout{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    @media (max-width: 900px){
      .strategy-layout{grid-template-columns:1fr}
    }
    .strategy-zone{
      background:#fbfcfe;
      border:2px solid var(--line);
      border-radius:22px;
      padding:14px;
      min-height:230px;
    }
    .strategy-zone h4{
      margin:0 0 12px;
    }
    .strategy-list{
      display:grid;
      gap:10px;
    }
    .strategy-card{
      border:3px solid var(--line);
      background:#fff;
      border-radius:18px;
      padding:14px;
      cursor:pointer;
      font-weight:700;
      text-align:left;
    }
    .ordered-card{
      border:3px solid #a7d4b6;
      background:#f2fbf5;
      border-radius:18px;
      padding:14px;
      font-weight:700;
      min-height:66px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .ordered-num{
      width:36px;
      height:36px;
      border-radius:999px;
      background:var(--good);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      flex:0 0 auto;
    }

    .end-banner{
      margin-top:16px;
      background:linear-gradient(135deg,#eefaf2,#def5e8);
      border:2px solid #bfe7ca;
      border-radius:22px;
      padding:18px;
      font-weight:700;
      font-size:1.15rem;
    }

    .muted{
      color:var(--muted);
    }

    .center{
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Money Transfer Interactive</h1>
        <p>See the transfer. Keep the total the same. Work backwards to the start.</p>
      </div>
      <div class="controls">
        <button class="btn secondary" id="readAloudBtn" type="button">🔊 Read aloud</button>
        <button class="btn secondary" id="restartBtn" type="button">↺ Restart</button>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">Step 1 of 11</span>
        <span id="progressName">Read the problem</span>
      </div>
      <div class="progress"><div class="bar" id="progressBar"></div></div>
    </div>

    <div class="screen-card" id="appScreen"></div>

    <div class="question-card">
      <button class="question-toggle" id="questionToggle" type="button">
        <span>Show question</span>
        <span id="questionArrow">▼</span>
      </button>
      <div class="question-body" id="questionBody">
        <p class="q-line">Kenneth and his sister had a total of <strong>$880</strong>.</p>
        <p class="q-line">After Kenneth gave <strong>$140</strong> to his sister, they had the same amount of money.</p>
        <p class="q-line">How much money did he have at first?</p>
      </div>
    </div>
  </div>

  <script>
    const QUESTION_TEXT = [
      "Kenneth and his sister had a total of 880 dollars.",
      "After Kenneth gave 140 dollars to his sister, they had the same amount of money.",
      "How much money did he have at first?"
    ].join(" ");

    const state = {
      screen: 0,
      selected: null,
      feedbackType: "",
      feedbackText: "",
      unlocked: false,
      attempts: {},
      s6Input: "",
      s6MiniInput: "",
      s8Stage: 0,
      s8PracticeSelected: null,
      s8PracticePassed: false,
      s9Input: "",
      s11Chosen: [],
      s11Pool: [
        "Add back $140 to find Kenneth’s amount at first.",
        "The total stays $880.",
        "$880 ÷ 2 = $440.",
        "After the transfer, there are 2 equal parts."
      ]
    };

    const screenMeta = [
      { title: "Read the problem", short: "Read the problem" },
      { title: "Find the after clue", short: "Find the after clue" },
      { title: "Does the total change?", short: "Total stays the same" },
      { title: "Choose the after model", short: "Choose the model" },
      { title: "How many equal parts?", short: "Equal parts" },
      { title: "Find each equal part", short: "Find one equal part" },
      { title: "Before or after?", short: "Check the amount" },
      { title: "Add or subtract to go back?", short: "Work backwards" },
      { title: "Find Kenneth's amount at first", short: "Find the start" },
      { title: "Check the story", short: "Check the story" },
      { title: "Consolidate the strategy", short: "Consolidate" }
    ];

    const appScreen = document.getElementById("appScreen");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const progressName = document.getElementById("progressName");

    function normalizeNumber(value){
      return String(value).replace(/[$,\s]/g, "");
    }

    function setFeedback(type, text){
      state.feedbackType = type;
      state.feedbackText = text;
      render();
    }

    function clearFeedback(){
      state.feedbackType = "";
      state.feedbackText = "";
    }

    function markAttempt(key){
      state.attempts[key] = (state.attempts[key] || 0) + 1;
    }

    function updateProgress(){
      const pct = ((state.screen + 1) / screenMeta.length) * 100;
      progressBar.style.width = pct + "%";
      progressText.textContent = `Step ${state.screen + 1} of ${screenMeta.length}`;
      progressName.textContent = screenMeta[state.screen].short;
    }

    function feedbackHtml(){
      if(!state.feedbackText) return "";
      return `<div class="feedback ${state.feedbackType}">${state.feedbackText}</div>`;
    }

    function navHtml(showBack = true, nextDisabled = !state.unlocked){
      return `
        <div class="nav-row">
          <button class="btn secondary" type="button" data-action="back" ${showBack ? "" : "style='visibility:hidden'"}>← Back</button>
          <button class="btn" type="button" data-action="next" ${nextDisabled ? "disabled" : ""}>Next →</button>
        </div>
      `;
    }

    function questionMarkupInteractive(){
      return `
        <div class="panel">
          <p class="q-line">Kenneth and his sister had a total of 
            <button class="chip ${state.selected === '$880' ? 'selected' : ''}" type="button" data-action="select-chip" data-value="$880">$880</button>.
          </p>
          <p class="q-line">After Kenneth gave 
            <button class="chip ${state.selected === '$140' ? 'selected' : ''}" type="button" data-action="select-chip" data-value="$140">$140</button> 
            to his sister, they had the same amount of money.
          </p>
          <p class="q-line">How much money did he have at first?</p>
        </div>
      `;
    }

    function renderScreen1(){
      appScreen.innerHTML = `
        <div class="screen-head">
          <h2>Read the problem</h2>
          <div class="tag">Tap the total amount</div>
        </div>
        <div class="action-box">Tap the amount that tells the total for both of them together.</div>
        <div class="explain-box">Look for the amount for Kenneth and his sister together.</div>

        <div class="grid-2">
          <div>
            ${questionMarkupInteractive()}
            <div class="input-row">
              <button class="btn ghost" type="button" data-action="check-s1">Check</button>
            </div>
            ${feedbackHtml()}
          </div>
          <div class="scene">
            <div class="money-title">Who is in the story?</div>
            <div class="people">
              <div class="person">
                <h3>Kenneth</h3>
                <div class="money-box">
                  <div class="money-fill" style="height:78%"></div>
                  <div class="money-label">His money</div>
                </div>
              </div>
              <div class="person">
                <h3>Sister</h3>
                <div class="money-box">
                  <div class="money-fill" style="height:42%"></div>
                  <div class="money-label">Her money</div>
                </div>
              </div>
            </div>
            <div class="brace"><div class="brace-label">Total together</div></div>
          </div>
        </div>
        ${navHtml(false)}
      `;
    }

    function renderScreen2(){
      appScreen.innerHTML = `
        <div class="screen-head">
          <h2>Find the after clue</h2>
          <div class="tag">Tap the after clue</div>
        </div>
        <div class="action-box">Tap the sentence that tells what it is like after the transfer.</div>
        <div class="explain-box">We need the after picture first.</div>

        <div class="sentence-grid">
          <button class="option sentence-card ${state.selected === 'total' ? 'selected' : ''}" type="button" data-action="select-option" data-value="total">
            Kenneth and his sister had a total of $880.
          </button>
          <button class="option sentence-card ${state.selected === 'after' ? 'selected' : ''}" type="button" data-action="select-option" data-value="after">
            After Kenneth gave $140 to his sister, they had the same amount of money.
          </button>
          <button class="option sentence-card ${state.selected === 'ask' ? 'selected' : ''}" type="button" data-action="select-option" data-value="ask">
            How much money did he have at first?
          </button>
        </div>
        <div class="input-row">
          <button class="btn ghost" type="button" data-action="check-s2">Check</button>
        </div>
        ${feedbackHtml()}
        ${navHtml()}
      `;
    }

    function renderScreen3(){
      appScreen.innerHTML = `
        <div class="screen-head">
          <h2>Does the total change?</h2>
          <div class="tag">See the transfer</div>
        </div>

      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

      updateProgress();
      switch(state.screen){
        case 0: renderScreen1(); break;
        case 1: renderScreen2(); break;
        case 2: renderScreen3(); break;
        case 3: renderScreen4(); break;
        case 4: renderScreen5(); break;
        case 5: renderScreen6(); break;
        case 6: renderScreen7(); break;

    function attachCommonHandlers(){
      appScreen.querySelectorAll("[data-action='select-chip']").forEach(btn => {
        btn.addEventListener("click", () => {
          state.selected = btn.dataset.value;
          clearFeedback();
          render();
        });
      });

      appScreen.querySelectorAll("[data-action='select-option']").forEach(btn => {
        btn.addEventListener("click", () => {
          state.selected = btn.dataset.value;
          clearFeedback();
          render();
        });
      });

      appScreen.querySelectorAll("[data-action='select-practice']").forEach(btn => {
        btn.addEventListener("click", () => {
          state.s8PracticeSelected = btn.dataset.value;
          clearFeedback();
          render();
        });
      });

      appScreen.querySelectorAll("[data-action='pick-strategy']").forEach(btn => {
        btn.addEventListener("click", () => {
          const value = btn.dataset.value;
          const clean = value
            .replace(/&quot;/g, '"')
            .replace(/&amp;/g, "&")
            .replace(/&lt;/g, "<")
            .replace(/&gt;/g, ">");
          if(!state.s11Chosen.includes(clean)){
            state.s11Chosen.push(clean);
            clearFeedback();
            render();
          }
        });
      });

      const backBtn = appScreen.querySelector("[data-action='back']");
      if(backBtn){
        backBtn.addEventListener("click", () => {
          if(state.screen > 0){
            state.screen -= 1;
            state.selected = null;
            clearFeedback();
            const unlockedNow = (state.screen < 10) ? true : state.unlocked;
            state.unlocked = unlockedNow;
            render();
          }
        });
      }

      const nextBtn = appScreen.querySelector("[data-action='next']");
      if(nextBtn){
        nextBtn.addEventListener("click", () => {
          if(state.unlocked && state.screen < screenMeta.length - 1){
            state.screen += 1;
            state.selected = null;
            clearFeedback();
            state.unlocked = false;
            render();
          }
        });
      }

      const resetStrategy = appScreen.querySelector("[data-action='reset-strategy']");
      if(resetStrategy){
        resetStrategy.addEventListener("click", () => {
          state.s11Chosen = [];
          clearFeedback();
          state.unlocked = false;
          render();
        });
      }

      bindChecks();
    }

          } else {
            state.unlocked = false;
            if(state.s8Stage === 0){
              state.s8Stage = 1;
              setFeedback("bad", "Kenneth gave money away, so before that he had more.");
            } else if(state.s8Stage === 1){
              state.s8Stage = 2;
              setFeedback("bad", "Try the quick practice below. Then come back to Kenneth.");
            } else {
              setFeedback("bad", "Go back to the idea: before giving away money, Kenneth had more.");
            }
          }
        },
        "check-s8-practice": () => {
          if(state.s8PracticeSelected === "more"){
            state.s8PracticePassed = true;
            setFeedback("good", "Correct. Before giving, Sam had more. Use the same idea for Kenneth.");
          } else {
            setFeedback("bad", "If Sam gave money away and then had $60, he must have had more before.");
          }
          render();
        },
        "check-s9": () => {
          markAttempt("s9");
          if(normalizeNumber(state.s9Input) === "580"){
            state.unlocked = true;
            setFeedback("good", "Yes. Kenneth had $580 at first.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Add back the $140 that Kenneth gave away: $440 + $140.");
          }
        },
        "check-s10": () => {
          markAttempt("s10");
          if(state.selected === "yes"){
            state.unlocked = true;
            setFeedback("good", "Check complete. The total stays $880, and after the transfer both have $440.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Check again: $580 − $140 = $440, and the sister gets that $140 to make $440 too.");
          }
        },
        "check-s11": () => {
          const correct = [
            "The total stays $880.",
            "After the transfer, there are 2 equal parts.",
            "$880 ÷ 2 = $440.",
            "Add back $140 to find Kenneth’s amount at first."
          ];
          const ok = JSON.stringify(state.s11Chosen) === JSON.stringify(correct);
          if(ok){
            state.unlocked = true;
            setFeedback("good", "Strategy: keep the total the same, find the equal after amount, then add back the transfer.");
          } else {
            state.unlocked = false;
            setFeedback("bad", "Try again. Start with the total staying the same. Then use the equal after picture.");
          }
        }
      };

      appScreen.querySelectorAll("[data-action^='check-']").forEach(btn => {
        btn.addEventListener("click", () => {
          const fn = actions[btn.dataset.action];
          if(fn) fn();
        });
      });
    }

    function getCurrentReadText(){
      const titles = [
        "Step 1. Read the problem.",
        "Step 2. Find the after clue.",
        "Step 3. Does the total change?",
        "Step 4. Choose the after model.",
        "Step 5. How many equal parts?",
        "Step 6. Find Kenneth's amount after giving.",
        "Step 7. Before or after?",
        "Step 8. Add or subtract to go back?",
        "Step 9. Find Kenneth's amount at first.",
        "Step 10. Check the story.",
        "Step 11. Consolidate the strategy."
      ];
      const extra = {
        0: "Tap the amount that tells the total for both of them together.",
        1: "Tap the sentence that tells what it is like after the transfer.",
        2: "Kenneth gives money to his sister. The money moves inside the pair. Did the total stay the same or change?",
        3: "Choose the model where Kenneth and his sister have the same amount after the transfer.",
        4: "Count the equal parts in the after picture.",
        5: "There are 2 equal parts that make 880 dollars. Type the amount in each equal part.",
        6: "We found 440 dollars in the after picture. Decide whether that is before or after.",
        7: "Kenneth had 440 dollars after giving. To go back to before he gave, decide whether to add or subtract 140 dollars.",
        8: "Type how much Kenneth had at first. Add back the 140 dollars.",
        9: "Check whether the answer matches the story.",
        10: "Put the strategy cards in the correct order."
      };
      return `${titles[state.screen]} ${QUESTION_TEXT} ${extra[state.screen] || ""}`;
    }

    document.getElementById("readAloudBtn").addEventListener("click", () => {
      const text = getCurrentReadText();
      if("speechSynthesis" in window){
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.92;
        utter.pitch = 1;
        window.speechSynthesis.speak(utter);
      } else {
        alert("Read aloud is not available on this device.");
      }
    });

    document.getElementById("restartBtn").addEventListener("click", () => {
      if("speechSynthesis" in window){ window.speechSynthesis.cancel(); }
      state.screen = 0;
      state.selected = null;
      state.feedbackType = "";
      state.feedbackText = "";
      state.unlocked = false;
      state.attempts = {};
      state.s6Input = "";
      state.s6MiniInput = "";
      state.s8Stage = 0;
      state.s8PracticeSelected = null;
      state.s8PracticePassed = false;
      state.s9Input = "";
      state.s11Chosen = [];
      render();
    });

    const questionToggle = document.getElementById("questionToggle");
    const questionBody = document.getElementById("questionBody");
    const questionArrow = document.getElementById("questionArrow");
    questionToggle.addEventListener("click", () => {
      const open = questionBody.classList.toggle("open");
      questionArrow.textContent = open ? "▲" : "▼";
      questionToggle.querySelector("span").textContent = open ? "Hide question" : "Show question";
    });

    render();
  </script>
</body>
</html>
