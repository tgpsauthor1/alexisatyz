<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compressibility of S([thepiquelab.com](https://thepiquelab.com/blog/properties-of-matter-what-is-compression/))itle>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #dbe3ef;
      --solid: #475569;
      --liquid: #0ea5e9;
      --gas: #f59e0b;
      --accent: #2563eb;
      --good: #16a34a;
      --warn: #dc2626;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 28%, #eef2ff 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .hero {
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(219, 227, 239, 0.95);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 28px;
      backdrop-filter: blur(10px);
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 2.8vw, 2.7rem);
      line-height: 1.1;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      max-width: 920px;
      line-height: 1.6;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 22px;
      margin-top: 22px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .slider-wrap {
      flex: 1 1 360px;
      min-width: 280px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 0.92rem;
      font-weight: 600;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .legend .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 7px;
      vertical-align: middle;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }

    .card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.45;
      min-height: 66px;
      font-size: 0.95rem;
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      border: 1px solid #e5edf6;
      display: block;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      padding: 10px 12px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e8eef7;
    }

    .stat .k {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .stat .v {
      font-weight: 700;
      font-size: 1rem;
    }

    .gas-layout {
      display: grid;
      grid-template-columns: minmax(280px, 1.2fr) minmax(260px, 0.9fr);
      gap: 18px;
      align-items: stretch;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      background: var(--accent);
      color: white;
      padding: 11px 15px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.18);
    }

    button.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .readout {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }

    .meter {
      width: 100%;
      height: 16px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin: 6px 0 12px;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444);
      border-radius: inherit;
      transition: width 0.2s ease;
    }

    .note {
      padding: 14px 16px;
      border-radius: 16px;
      background: #eef6ff;
      border: 1px solid #dbeafe;
      color: #1e3a8a;
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .gas-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Compressibility of Solids, Liquids, and Gases</h1>
      <p class="subtitle">
        Use the slider to squeeze each state of matter. Then test what happens when more gas is added into the same fixed container.
        This is a teaching model: it simplifies particle behavior so students can clearly see why gases compress much more easily.
      </p>
    </section>

    <section class="panel">
      <div class="controls">
        <div class="slider-wrap">
          <div class="label-row">
            <span>Squeeze the container</span>
            <span class="pill">Force: <span id="squeezeValue">0</span>%</span>
          </div>
          <input id="squeeze" type="range" min="0" max="100" value="0" />
        </div>
        <div class="pill">Smaller width = more compression</div>
      </div>

      <div class="legend">
        <span><span class="dot" style="background: var(--solid)"></span>Solid particles are tightly packed.</span>
        <span><span class="dot" style="background: var(--liquid)"></span>Liquid particles are close together with a little movement.</span>
        <span><span class="dot" style="background: var(--gas)"></span>Gas particles are far apart and move freely.</span>
      </div>

      <div class="grid">
        <div class="card">
          <h2>Solid</h2>
          <p>Particles are packed in a fixed arrangement with almost no empty space, so the container width changes only a tiny amount.</p>
          <canvas id="solidCanvas" width="320" height="250"></canvas>
          <div class="stats">
            <div class="stat"><span class="k">Compressibility</span><span class="v" id="solidCompress">Very low</span></div>
            <div class="stat"><span class="k">Empty space</span><span class="v" id="solidSpace">Almost none</span></div>
          </div>
        </div>

        <div class="card">
          <h2>Liquid</h2>
          <p>Particles are still close together, but they can slide past one another. Liquids change shape more easily than solids, but compress very little.</p>
          <canvas id="liquidCanvas" width="320" height="250"></canvas>
          <div class="stats">
            <div class="stat"><span class="k">Compressibility</span><span class="v" id="liquidCompress">Low</span></div>
            <div class="stat"><span class="k">Empty space</span><span class="v" id="liquidSpace">Very little</span></div>
          </div>
        </div>

        <div class="card">
          <h2>Gas</h2>
          <p>Particles are far apart with lots of empty space. When squeezed, they move closer together, so the gas volume drops much more.</p>
          <canvas id="gasCanvas" width="320" height="250"></canvas>
          <div class="stats">
            <div class="stat"><span class="k">Compressibility</span><span class="v" id="gasCompress">High</span></div>
            <div class="stat"><span class="k">Empty space</span><span class="v" id="gasSpace">A lot</span></div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2 style="margin-top:0;">What happens when we add more gas inside the same tight space?</h2>
      <div class="gas-layout">
        <div>
          <canvas id="tankCanvas" width="420" height="300"></canvas>
          <div class="footer-note">The container stays the same size here. Only the amount of gas changes.</div>
        </div>

        <div class="side">
          <div class="btn-row">
            <button id="addGas">+ Add gas</button>
            <button id="removeGas" class="secondary">- Remove gas</button>
            <button id="resetGas" class="secondary">Reset</button>
          </div>

          <div class="readout">
            <div style="font-weight: 800;">Pressure / crowding</div>
            <div class="meter"><div class="fill" id="pressureFill"></div></div>

            <div class="stats" style="margin-top: 0;">
              <div class="stat"><span class="k">Gas particles</span><span class="v" id="gasCount">10</span></div>
              <div class="stat"><span class="k">Empty space</span><span class="v" id="gasCrowding">High</span></div>
              <div class="stat"><span class="k">Container volume</span><span class="v">Same</span></div>
              <div class="stat"><span class="k">Main result</span><span class="v" id="gasOutcome">Low pressure</span></div>
            </div>
          </div>

          <div class="note" id="tankNote">
            There is still plenty of space between gas particles, so the gas is not very crowded yet.
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const squeezeSlider = document.getElementById('squeeze');
    const squeezeValue = document.getElementById('squeezeValue');

    const solidCanvas = document.getElementById('solidCanvas');
    const liquidCanvas = document.getElementById('liquidCanvas');
    const gasCanvas = document.getElementById('gasCanvas');
    const tankCanvas = document.getElementById('tankCanvas');

    const solidCtx = solidCanvas.getContext('2d');
    const liquidCtx = liquidCanvas.getContext('2d');
    const gasCtx = gasCanvas.getContext('2d');
    const tankCtx = tankCanvas.getContext('2d');

    const stateConfigs = {
      solid: { color: '#475569', compressibility: 0.07, count: 24 },
      liquid: { color: '#0ea5e9', compressibility: 0.14, count: 24 },
      gas: { color: '#f59e0b', compressibility: 0.55, count: 10 }
    };

    const gasParticles = createMovingParticles(stateConfigs.gas.count, 0.9);
    let tankParticles = createMovingParticles(10, 1.0);

    function createMovingParticles(count, speedFactor) {
      const particles = [];
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = (0.6 + Math.random() * 0.8) * speedFactor;
        particles.push({
          x: 0.1 + Math.random() * 0.8,
          y: 0.1 + Math.random() * 0.8,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 8
        });
      }
      return particles;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function drawContainer(ctx, width, height, x, y, label, tint) {
      ctx.save();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#334155';
      ctx.fillStyle = '#ffffff';
      roundRect(ctx, x, y, width, height, 14, true, true);

      ctx.strokeStyle = tint;
      ctx.globalAlpha = 0.15;
      roundRect(ctx, x, y, width, height, 14, true, false);
      ctx.globalAlpha = 1;

      ctx.fillStyle = '#64748b';
      ctx.font = '12px Inter, sans-serif';
      ctx.fillText(label, x + 8, y - 8);
      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function drawCompressionArrows(ctx, centerX, yTop, yBottom, strength) {
      const offset = 40 - strength * 0.18;
      const leftX = centerX - 90;
      const rightX = centerX + 90;

      ctx.save();
      ctx.strokeStyle = '#94a3b8';
      ctx.fillStyle = '#94a3b8';
      ctx.lineWidth = 3;

      drawArrow(ctx, leftX - offset, (yTop + yBottom) / 2, leftX, (yTop + yBottom) / 2);
      drawArrow(ctx, rightX + offset, (yTop + yBottom) / 2, rightX, (yTop + yBottom) / 2);
      ctx.restore();
    }

    function drawArrow(ctx, x1, y1, x2, y2) {
      const head = 8;
      const angle = Math.atan2(y2 - y1, x2 - x1);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - head * Math.cos(angle - Math.PI / 6), y2 - head * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(x2 - head * Math.cos(angle + Math.PI / 6), y2 - head * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    function drawSolid(ctx, squeeze) {
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      ctx.clearRect(0, 0, w, h);

      const baseWidth = 220;
      const containerWidth = baseWidth - squeeze * stateConfigs.solid.compressibility * 0.85;
      const x = (w - containerWidth) / 2;
      const y = 44;
      const containerHeight = 170;

      drawCompressionArrows(ctx, w / 2, y, y + containerHeight, squeeze);
      drawContainer(ctx, containerWidth, containerHeight, x, y, 'Solid resists squeezing', '#475569');

      const cols = 4;
      const rows = 6;
      const padX = 24;
      const padY = 18;
      const stepX = (containerWidth - padX * 2) / (cols - 1);
      const stepY = (containerHeight - padY * 2) / (rows - 1);
      const t = performance.now() * 0.002;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const px = x + padX + c * stepX + Math.sin(t + r + c) * 0.6;
          const py = y + padY + r * stepY + Math.cos(t + r * 1.2 + c) * 0.6;
          ctx.beginPath();
          ctx.fillStyle = '#475569';
          ctx.arc(px, py, 9, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawLiquid(ctx, squeeze) {
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      ctx.clearRect(0, 0, w, h);

      const baseWidth = 220;
      const containerWidth = baseWidth - squeeze * stateConfigs.liquid.compressibility;
      const x = (w - containerWidth) / 2;
      const y = 44;
      const containerHeight = 170;
      drawCompressionArrows(ctx, w / 2, y, y + containerHeight, squeeze);
      drawContainer(ctx, containerWidth, containerHeight, x, y, 'Liquid changes shape more than volume', '#0ea5e9');

      const cols = 5;
      const rows = 4;
      const spacingX = (containerWidth - 44) / (cols - 1);
      const spacingY = 26;
      const baseY = y + containerHeight - 28;
      const time = performance.now() * 0.003;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const wave = Math.sin(time * 1.6 + col * 0.7 + row) * 2;
          const px = x + 22 + col * spacingX + Math.sin(time + row + col) * 2.2;
          const py = baseY - row * spacingY + wave;
          ctx.beginPath();
          ctx.fillStyle = '#0ea5e9';
          ctx.globalAlpha = 0.95;
          ctx.arc(px, py, 9, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      ctx.beginPath();
      ctx.moveTo(x + 12, baseY - rows * spacingY + 12);
      for (let i = 0; i <= 20; i++) {
        const px = x + 12 + (containerWidth - 24) * (i / 20);
        const py = baseY - rows * spacingY + 12 + Math.sin(time * 2 + i * 0.45) * 2.5;
        ctx.lineTo(px, py);
      }
      ctx.lineTo(x + containerWidth - 12, y + containerHeight - 8);
      ctx.lineTo(x + 12, y + containerHeight - 8);
      ctx.closePath();
      ctx.fillStyle = 'rgba(14,165,233,0.12)';
      ctx.fill();
    }

    function updateMovingParticles(particles, bounds, speedBoost = 1) {
      particles.forEach((p, i) => {
        p.x += p.vx * 0.0024 * speedBoost;
        p.y += p.vy * 0.0024 * speedBoost;

        if (p.x < 0.06 || p.x > 0.94) p.vx *= -1;
        if (p.y < 0.08 || p.y > 0.92) p.vy *= -1;

        p.x = clamp(p.x, 0.06, 0.94);
        p.y = clamp(p.y, 0.08, 0.92);
      });
    }

    function drawGas(ctx, squeeze) {
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      ctx.clearRect(0, 0, w, h);

      const baseWidth = 220;
      const containerWidth = baseWidth - squeeze * stateConfigs.gas.compressibility;
      const x = (w - containerWidth) / 2;
      const y = 44;
      const containerHeight = 170;
      drawCompressionArrows(ctx, w / 2, y, y + containerHeight, squeeze);
      drawContainer(ctx, containerWidth, containerHeight, x, y, 'Gas compresses strongly', '#f59e0b');

      updateMovingParticles(gasParticles, { x, y, width: containerWidth, height: containerHeight }, 1 + squeeze / 200);

      gasParticles.forEach((p) => {
        const px = x + p.x * containerWidth;
        const py = y + p.y * containerHeight;
        ctx.beginPath();
        ctx.fillStyle = '#f59e0b';
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawTank() {
      const ctx = tankCtx;
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      ctx.clearRect(0, 0, w, h);

      const x = 58;
      const y = 34;
      const cw = 300;
      const ch = 220;

      drawContainer(ctx, cw, ch, x, y, 'Same container volume', '#f59e0b');

      const densityBoost = 1 + Math.max(0, (tankParticles.length - 10) / 24) * 0.55;
      updateMovingParticles(tankParticles, { x, y, width: cw, height: ch }, densityBoost);

      tankParticles.forEach((p) => {
        const px = x + p.x * cw;
        const py = y + p.y * ch;
        ctx.beginPath();
        ctx.fillStyle = '#f59e0b';
        ctx.arc(px, py, 7, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function updateTankReadout() {
      const count = tankParticles.length;
      const density = clamp((count - 8) / 34, 0, 1);
      const pressurePercent = Math.round(density * 100);
      document.getElementById('pressureFill').style.width = pressurePercent + '%';
      document.getElementById('gasCount').textContent = String(count);

      let crowding = 'High';
      let outcome = 'Low pressure';
      let note = 'There is still plenty of space between gas particles, so the gas is not very crowded yet.';

      if (count >= 18 && count < 28) {
        crowding = 'Medium';
        outcome = 'Pressure rising';
        note = 'More gas has been added to the same space, so the particles are closer together and collisions happen more often.';
      } else if (count >= 28) {
        crowding = 'Low';
        outcome = 'High pressure';
        note = 'The container is the same size, but there are many more gas particles inside. Empty space is reduced, so the gas becomes much more crowded and pressure is higher.';
      }

      document.getElementById('gasCrowding').textContent = crowding;
      document.getElementById('gasOutcome').textContent = outcome;
      document.getElementById('tankNote').textContent = note;
    }

    function addTankParticles(num) {
      for (let i = 0; i < num; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.7 + Math.random() * 0.8;
        tankParticles.push({
          x: 0.08 + Math.random() * 0.84,
          y: 0.08 + Math.random() * 0.84,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 7
        });
      }
      updateTankReadout();
    }

    function removeTankParticles(num) {
      tankParticles.splice(Math.max(10, tankParticles.length - num));
      updateTankReadout();
    }

    document.getElementById('addGas').addEventListener('click', () => addTankParticles(5));
    document.getElementById('removeGas').addEventListener('click', () => removeTankParticles(5));
    document.getElementById('resetGas').addEventListener('click', () => {
      tankParticles = createMovingParticles(10, 1.0);
      updateTankReadout();
    });

    squeezeSlider.addEventListener('input', () => {
      squeezeValue.textContent = squeezeSlider.value;
    });

    function animate() {
      const squeeze = Number(squeezeSlider.value);
      squeezeValue.textContent = squeeze;
      drawSolid(solidCtx, squeeze);
      drawLiquid(liquidCtx, squeeze);
      drawGas(gasCtx, squeeze);
      drawTank();
      requestAnimationFrame(animate);
    }

    updateTankReadout();
    animate();
  </script>
</body>
</html>
