<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>water_change_in_state_1</title>
  <style>
    :root {
      --bg: #f5f8fc;
      --panel: #ffffff;
      --ink: #17324d;
      --muted: #5d7286;
      --line: #d7e3ef;
      --accent: #1f6fb2;
      --accent-2: #2a9bd8;
      --accent-soft: #eaf4fc;
      --good: #176b3a;
      --good-bg: #e9f8ef;
      --bad: #9f2f2f;
      --bad-bg: #fdecec;
      --shadow: 0 14px 34px rgba(20, 44, 68, 0.08);
      --radius: 20px;
      --tap: 58px;
      --maxw: 1100px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #f8fbff 0%, #f3f7fb 35%, #eef4fa 100%);
      color: var(--ink);
    }

    .app-shell {
      min-height: 100vh;
      padding: 18px;
    }

    .top-row {
      max-width: var(--maxw);
      margin: 0 auto 16px auto;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
    }

    .top-card {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      min-height: 64px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
    }

    .title-card {
      justify-content: flex-start;
      gap: 12px;
    }

    .title-card h1 {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.2;
    }

    .title-card .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .demerit-card {
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .demerit-label {
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
    }

    .demerit-icons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .ice-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 1.15rem;
      background: #edf7ff;
      border: 1px solid #bfe0f6;
    }

    .ice-icon.spent {
      background: #fff4f4;
      border-color: #f2c1c1;
    }

    .audio-card {
      justify-content: center;
    }

    .audio-toggle {
      min-height: 46px;
      border-radius: 999px;
      border: 2px solid var(--accent);
      background: #fff;
      color: var(--accent);
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .audio-toggle.on {
      background: var(--accent);
      color: #fff;
    }

    .main-wrap {
      max-width: var(--maxw);
      margin: 0 auto;
    }

    .screen-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .screen-title {
      margin: 0 0 8px 0;
      font-size: 1.5rem;
      line-height: 1.2;
    }

    .instruction {
      display: inline-block;
      margin: 0 0 18px 0;
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--accent-soft);
      color: var(--ink);
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.35;
      border: 1px solid #d4e8f7;
    }

    .support-line {
      margin: 0 0 14px 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: #fcfeff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .panel h3 {
      margin: 0 0 10px 0;
      font-size: 1.08rem;
    }

    .question-image {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      display: block;
      background: #fff;
    }

    .typed-question {
      line-height: 1.55;
      font-size: 1.02rem;
    }

    .typed-question p {
      margin: 0 0 10px 0;
    }

    .typed-question ol {
      margin: 8px 0 0 1.25rem;
      padding: 0;
    }

    .typed-question li {
      margin: 0 0 8px 0;
      padding-left: 6px;
    }

    .hl {
      background: #fff3ad;
      border-radius: 6px;
      padding: 0 3px;
      box-shadow: inset 0 -0.45em 0 rgba(255, 232, 114, 0.55);
    }

    .diagram-wrap {
      background: linear-gradient(180deg, #fbfeff, #f3f9fd);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
      display: grid;
      place-items: center;
      min-height: 260px;
    }

    .diagram-svg {
      width: 100%;
      max-width: 760px;
      height: auto;
      display: block;
    }

    .choice-grid {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .option-card, .chip-option, .choice-button {
      width: 100%;
      min-height: var(--tap);
      border-radius: 16px;
      border: 2px solid #c9dcec;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 1.02rem;
      line-height: 1.35;
      text-align: left;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform 0.1s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .option-card:hover, .chip-option:hover, .choice-button:hover {
      transform: translateY(-1px);
      border-color: var(--accent-2);
    }

    .option-card.selected, .chip-option.selected, .choice-button.selected {
      border-color: var(--accent);
      background: #edf7ff;
      box-shadow: inset 0 0 0 1px rgba(31, 111, 178, 0.12);
    }

    .multi-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .primary-btn, .secondary-btn, .ghost-btn {
      min-height: var(--tap);
      border-radius: 16px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      border: none;
    }

    .primary-btn {
      background: var(--accent);
      color: #fff;
    }

    .primary-btn:hover { background: #165c93; }

    .secondary-btn {
      background: #eaf4fc;
      color: var(--accent);
      border: 2px solid #cfe5f8;
    }

    .ghost-btn {
      background: #fff;
      color: var(--muted);
      border: 2px solid var(--line);
    }

    .feedback {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      font-weight: 700;
      line-height: 1.45;
      border: 1px solid transparent;
    }

    .feedback.good {
      background: var(--good-bg);
      color: var(--good);
      border-color: #bde6cb;
    }

    .feedback.bad {
      background: var(--bad-bg);
      color: var(--bad);
      border-color: #f5c2c2;
    }

    .question-panel {
      margin-top: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fbfdff;
      overflow: hidden;
    }

    .question-panel summary {
      cursor: pointer;
      list-style: none;
      padding: 16px 18px;
      font-weight: 800;
      font-size: 1rem;
      background: #f0f7fc;
      border-bottom: 1px solid var(--line);
    }

    .question-panel summary::-webkit-details-marker { display: none; }

    .question-panel-body {
      padding: 18px;
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr 1fr;
    }

    .tab-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tab-btn {
      min-height: 48px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 2px solid #cde1f1;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .anim-shell {
      background: linear-gradient(180deg, #fbfeff, #f0f8fd);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
    }

    .anim-canvas {
      width: 100%;
      height: auto;
      display: block;
      background: linear-gradient(180deg, #f7fbff, #eef6fb);
      border-radius: 16px;
      border: 1px solid #dbeaf5;
    }

    .anim-caption {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 700;
      line-height: 1.4;
      color: var(--ink);
    }

    .hotspot-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .compare-card {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 14px 16px;
      line-height: 1.35;
    }

    .compare-card strong {
      display: block;
      margin-top: 6px;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .compare-card span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .compare-card.room {
      background: #f8fbff;
    }

    .compare-card.water, .compare-card.ice {
      background: #fcfeff;
    }

    .reason-note {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--line);
      line-height: 1.45;
    }

    .sequence-area {
      display: grid;
      gap: 14px;
      margin-top: 12px;
    }

    .sequence-slots {
      display: grid;
      gap: 10px;
    }

    .sequence-slot {
      min-height: 58px;
      border-radius: 16px;
      border: 2px dashed #c5d9eb;
      background: #f8fbfe;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1.35;
    }

    .sequence-slot strong {
      color: var(--accent);
      flex: 0 0 auto;
    }

    .sequence-bank {
      display: grid;
      gap: 12px;
    }

    .mini-note {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .summary-grid {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .summary-card {
      border-radius: 16px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: #f8fbfe;
      font-weight: 700;
      line-height: 1.4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(12, 25, 40, 0.55);
      display: grid;
      place-items: center;
      padding: 18px;
      z-index: 50;
    }

    .overlay-card {
      width: min(460px, 100%);
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      border: 1px solid var(--line);
      box-shadow: 0 18px 42px rgba(7, 23, 37, 0.18);
      text-align: center;
    }

    .overlay-card h2 {
      margin: 0 0 10px 0;
    }

    .overlay-card p {
      margin: 0;
      line-height: 1.5;
      color: var(--muted);
      font-size: 1.03rem;
    }

    @media (max-width: 930px) {
      .top-row {
        grid-template-columns: 1fr;
      }
      .grid-2, .question-panel-body {
        grid-template-columns: 1fr;
      }
      .hotspot-row, .multi-grid, .compare-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .app-shell { padding: 12px; }
      .screen-card { padding: 16px; }
      .instruction { font-size: 1.05rem; }
      .screen-title { font-size: 1.28rem; }
      .title-card h1 { font-size: 1.3rem; }
      .option-card, .chip-option, .choice-button { font-size: 1rem; }
    }
  </style>
</head>

    const ORIGINAL_QUESTION = {
      stem: "A glass containing a block of ice and some water was placed in a room. The room temperature was 25°C.",
      prompt: "When the ice and the water were at 0°C, which one of the following statements is correct?",
      options: [
        { id: "1", text: "The ice would not melt as it remained at 0°C." },
        { id: "2", text: "The ice would not melt as it did not gain heat." },
        { id: "3", text: "The ice would melt as it gained heat from the water." },
        { id: "4", text: "The ice would melt as it gained heat from the room." }
      ]
    };

    const SCREEN_KEYS = [
      "intro",
      "facts",
      "states",
      "meltingAtZero",
      "gainingHeat",
      "heatSource",
      "chain",
      "ruleOut",
      "originalRetry",
      "transfer",
      "complete"
    ];

    let state;
    let animationFrameId = null;
    let speakTimer = null;

    function initialState() {
      return {
        screenIndex: 0,
        demeritsTotal: 4,
        demeritsLeft: 4,
        readAloud: false,
        questionPanelOpen: false,
        screenData: {},
        overlay: null,
        finished: false
      };
    }

    function resetState(keepAudio) {
      const audio = keepAudio ? state?.readAloud : false;
      state = initialState();
      state.readAloud = audio;
    }

    resetState(false);

    function currentKey() {
      return SCREEN_KEYS[state.screenIndex];
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function uniqueBy(arr) {
      return Array.from(new Set(arr));
    }

    function sameMembers(a, b) {
      const aSorted = a.slice().sort().join("|");
      const bSorted = b.slice().sort().join("|");
      return aSorted === bSorted;
    }

    function getData(key, initFn) {
      if (!state.screenData[key]) {
        state.screenData[key] = initFn();
      }
      return state.screenData[key];
    }

    function getScreenData() {
      const key = currentKey();
      switch (key) {
        case "facts":
          return getData(key, () => ({
            order: shuffle([
              { id: "ice0", text: "Ice is at 0°C" },
              { id: "water0", text: "Water is at 0°C" },
              { id: "room25", text: "The room is 25°C" },
              { id: "clearGlass", text: "The glass is clear" },
              { id: "year2015", text: "The question came from 2015" }
            ]),
            selected: [],
            solved: false,
            feedback: null
          }));
        case "states":
          return getData(key, () => ({
            order: shuffle([
              { id: "iceOnly", text: "Only ice" },
              { id: "waterOnly", text: "Only water" },
              { id: "both", text: "Ice and water together" },
              { id: "steam", text: "Steam above the water" }
            ]),
            selected: null,
            solved: false,
            feedback: null
          }));
        case "meltingAtZero":
          return getData(key, () => ({
            order: shuffle([
              { id: "noChange", text: "The ice cannot change because it is still 0°C." },
              { id: "canMelt", text: "The ice can be melting while it is still 0°C." },
              { id: "waterHeats", text: "The water must be heating the ice." },
              { id: "roomNoMatter", text: "The room temperature does not matter." }
            ]),
            selected: null,
            solved: false,
            feedback: null
          }));
        case "gainingHeat":
          return getData(key, () => ({
            order: shuffle([
              { id: "notGaining", text: "The ice is not gaining heat." },
              { id: "gaining", text: "The ice is gaining heat." },
              { id: "losing", text: "The ice is losing heat." },
              { id: "noMove", text: "No heat moves at all." }
            ]),
            selected: null,
            solved: false,
            feedback: null
          }));
        case "heatSource":
          return getData(key, () => ({
            order: shuffle([
              { id: "room", text: "The room" },
              { id: "water", text: "The water" },
              { id: "glass", text: "The glass only" }
            ]),
            selected: null,
            solved: false,
            feedback: null,
            mode: "object"
          }));
        case "chain":
          return getData(key, () => ({
            order: shuffle([
              { id: "heatRoom", text: "Heat enters from the room" },
              { id: "iceMelts", text: "The ice melts" },
              { id: "stayZero", text: "Ice and water stay at 0°C while some ice is still present" },
              { id: "tooWarm", text: "The water temperature rises above 0°C while some ice is still present" }
            ]),
            selected: [],
            solved: false,
            feedback: null
          }));
        case "ruleOut":
          return getData(key, () => ({
            order: shuffle(ORIGINAL_QUESTION.options),
            selected: [],
            solved: false,
            feedback: null
          }));
        case "originalRetry":
          return getData(key, () => ({
            order: shuffle(ORIGINAL_QUESTION.options),
            selected: null,
            solved: false,
            feedback: null
          }));
        case "transfer":
          return getData(key, () => ({
            order: shuffle([
              { id: "freeze", text: "The ice will not melt because it is still at 0°C." },
              { id: "water0", text: "The ice will melt because it gains heat from the water at 0°C." },
              { id: "room", text: "The ice will melt because it gains heat from the room." },
              { id: "waterFreeze", text: "The water will freeze because ice is present." }
            ]),
            selected: null,
            solved: false,
            feedback: null
          }));
        case "complete":
          return getData(key, () => ({
            finished: false
          }));
        default:
          return {};
      }
    }

    function toggleReadAloud() {
      state.readAloud = !state.readAloud;
      if (!state.readAloud) {
        window.speechSynthesis?.cancel();
      }
      render();
    }

    function speak(text) {
      if (!state.readAloud || !("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.95;
      utter.pitch = 1.0;
      utter.lang = "en-SG";
      window.speechSynthesis.speak(utter);
    }

    function getScreenSpeakText() {
      const key = currentKey();
      const data = getScreenData();
      const feedbackText = data.feedback ? " " + data.feedback.message : "";
      switch (key) {
        case "intro":
          return "Read the question. Then tap Start. A glass containing a block of ice and some water was placed in a room. The room temperature was twenty five degrees Celsius. When the ice and the water were at zero degrees Celsius, which one of the following statements is correct?";
        case "facts":
          return "Tap all the facts that matter for the answer. Options: Ice is at zero degrees Celsius. Water is at zero degrees Celsius. The room is twenty five degrees Celsius. The glass is clear. The question came from two thousand fifteen." + feedbackText;
        case "states":
          return "Choose what you can see in the beaker. Options: Only ice. Only water. Ice and water together. Steam above the water." + feedbackText;
        case "meltingAtZero":
          return "Choose the best idea for this situation. Options: The ice cannot change because it is still zero degrees Celsius. The ice can be melting while it is still zero degrees Celsius. The water must be heating the ice. The room temperature does not matter." + feedbackText;
        case "gainingHeat":
          return "Choose what must be true while the ice is melting. Options: The ice is not gaining heat. The ice is gaining heat. The ice is losing heat. No heat moves at all." + feedbackText;
        case "heatSource":
          return "Watch the animation. Then tap the heat source. Compare the temperatures. The room is twenty five degrees Celsius. The water is zero degrees Celsius. The ice is zero degrees Celsius. Options: The room. The water. The glass only." + feedbackText;

    function drawArrow(ctx, x1, y1, x2, y2, progress, color) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      const px = x1 + (x2 - x1) * progress;
      const py = y1 + (y2 - y1) * progress;
      const angle = Math.atan2(y2 - y1, x2 - x1);

      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px - 13 * Math.cos(angle - 0.45), py - 13 * Math.sin(angle - 0.45));
      ctx.moveTo(px, py);
      ctx.lineTo(px - 13 * Math.cos(angle + 0.45), py - 13 * Math.sin(angle + 0.45));
      ctx.stroke();
      ctx.restore();
    }

    function roundedRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      if (fill) {
        ctx.fillStyle = fill;
        ctx.fill();
      }
      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    function startAnimation() {
      const canvas = document.getElementById("anim-canvas");
      const caption = document.getElementById("anim-caption");
      if (!canvas || !caption) return;
      const ctx = canvas.getContext("2d");
      const data = getScreenData();

      function drawFrame(ms) {
        const t = (ms % 12000) / 12000;
        const meltPortion = Math.min(t / 0.65, 1);
        const warmPortion = t < 0.65 ? 0 : (t - 0.65) / 0.35;
        const waterTemp = t < 0.65 ? 0 : Math.round(25 * warmPortion);
        const arrowProgress = (ms % 1600) / 1600;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
        sky.addColorStop(0, "#f9fcff");
        sky.addColorStop(1, "#eff7fc");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (data.mode === "object") {
          drawObjectView(ctx, meltPortion, warmPortion, waterTemp, arrowProgress);
          caption.textContent = t < 0.65
            ? "During melting: heat enters from the warmer room. The water is also at 0°C, so it is not warmer than the ice."
            : "After all the ice melts: the liquid water warms up until it reaches room temperature, 25°C.";
        } else {
          drawParticleView(ctx, meltPortion, warmPortion, waterTemp, arrowProgress, ms);
          caption.textContent = t < 0.65
            ? "Particle view: the solid particles break away into liquid particles while the temperature stays at 0°C. The water is not warmer than the ice."
            : "After the last solid particle arrangement disappears, the liquid particles move faster as the water warms up.";
        }

        animationFrameId = requestAnimationFrame(drawFrame);
      }

      animationFrameId = requestAnimationFrame(drawFrame);
    }

    function drawObjectView(ctx, meltPortion, warmPortion, waterTemp, arrowProgress) {
      const beakerX = 255;
      const beakerY = 48;
      const beakerW = 250;
      const beakerH = 205;
      const baseY = beakerY + beakerH;

      roundedRect(ctx, 592, 18, 140, 42, 20, "#ffffff", "#bfd8ea");
      ctx.fillStyle = "#17324d";
      ctx.font = "700 20px Trebuchet MS";
      ctx.textAlign = "center";
      ctx.fillText("Room 25°C", 662, 45);

      ctx.strokeStyle = "#294d68";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(beakerX + 18, beakerY);
      ctx.lineTo(beakerX, baseY);
      ctx.quadraticCurveTo(beakerX + beakerW / 2, baseY + 16, beakerX + beakerW, baseY);
      ctx.lineTo(beakerX + beakerW - 18, beakerY);
      ctx.stroke();

      const waterTop = 168 - 18 * meltPortion;
      const waterGrad = ctx.createLinearGradient(0, waterTop, 0, baseY);
      waterGrad.addColorStop(0, "#a9ddff");
      waterGrad.addColorStop(1, "#69bbea");
      ctx.fillStyle = waterGrad;
      ctx.beginPath();
      ctx.moveTo(beakerX + 10, waterTop);
      ctx.quadraticCurveTo(beakerX + beakerW / 2, waterTop + 14, beakerX + beakerW - 10, waterTop);
      ctx.lineTo(beakerX + beakerW - 6, baseY - 2);
      ctx.quadraticCurveTo(beakerX + beakerW / 2, baseY + 14, beakerX + 6, baseY - 2);
      ctx.closePath();
      ctx.fill();

      const iceHeight = Math.max(0, 72 * (1 - meltPortion));
      const iceWidth = Math.max(0, 118 * (1 - meltPortion * 0.75));
      const iceX = 330;
      const iceY = 115 + (72 - iceHeight) * 0.4;
      if (iceHeight > 1) {
        ctx.fillStyle = "#f9feff";
        ctx.strokeStyle = "#4d7895";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(iceX, iceY + 10);
        ctx.lineTo(iceX + iceWidth * 0.78, iceY);
        ctx.lineTo(iceX + iceWidth, iceY + iceHeight * 0.5);
        ctx.lineTo(iceX + iceWidth * 0.22, iceY + iceHeight);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "#9fc3d8";
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.moveTo(iceX + 18, iceY + 16);
        ctx.lineTo(iceX + 34, iceY + 28);
        ctx.moveTo(iceX + 42, iceY + 10);
        ctx.lineTo(iceX + 54, iceY + 22);
        ctx.moveTo(iceX + 74, iceY + 22);
        ctx.lineTo(iceX + 88, iceY + 34);
        ctx.stroke();
      }

      drawArrow(ctx, 120, 92, 250, 125, arrowProgress, "#2a9bd8");
      drawArrow(ctx, 120, 150, 255, 167, arrowProgress, "#2a9bd8");
      drawArrow(ctx, 635, 105, 510, 130, arrowProgress, "#2a9bd8");

      roundedRect(ctx, 40, 108, 150, 40, 18, "#ffffff", "#bdd7e8");
      roundedRect(ctx, 40, 152, 160, 40, 18, "#ffffff", "#bdd7e8");
      ctx.fillStyle = "#17324d";
      ctx.font = "700 19px Trebuchet MS";
      ctx.textAlign = "center";
      ctx.fillText("ice at 0°C", 115, 134);
      ctx.fillText("water at 0°C", 120, 178);

      ctx.strokeStyle = "#2f5872";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(190, 128);
      ctx.lineTo(iceWidth > 0 ? iceX - 4 : beakerX + beakerW / 2 - 10, 128);
      ctx.moveTo(200, 174);
      ctx.lineTo(beakerX + 24, 174);
      ctx.stroke();

      // Thermometer/timeline
      roundedRect(ctx, 570, 92, 42, 148, 18, "#ffffff", "#c7ddec");
      ctx.fillStyle = "#dfeef9";
      roundedRect(ctx, 582, 106, 18, 112, 9, "#eff7fc", null);
      const fluidHeight = 24 + 88 * (waterTemp / 25);
      ctx.fillStyle = "#f15b5b";
      roundedRect(ctx, 582, 106 + 112 - fluidHeight, 18, fluidHeight, 9, "#f15b5b", null);
      ctx.beginPath();
      ctx.arc(591, 228, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#17324d";
      ctx.font = "700 16px Trebuchet MS";
      ctx.fillText(`${waterTemp}°C`, 650, 165);

      roundedRect(ctx, 38, 270, 684, 26, 13, "#ffffff", "#d3e5f2");
      ctx.fillStyle = "#cfe7f7";
      roundedRect(ctx, 42, 274, 676, 18, 9, "#eef7fd", null);
      const barWidth = 676 * (meltPortion < 1 ? meltPortion * 0.65 : 0.65 + warmPortion * 0.35);
      ctx.fillStyle = "#2a9bd8";
      roundedRect(ctx, 42, 274, Math.max(16, barWidth), 18, 9, "#2a9bd8", null);
      ctx.fillStyle = "#17324d";
      ctx.font = "700 14px Trebuchet MS";
      ctx.textAlign = "left";
      ctx.fillText("melting at 0°C", 42, 316);
      ctx.textAlign = "right";
      ctx.fillText("warming to 25°C", 718, 316);
    }

    function drawParticleView(ctx, meltPortion, warmPortion, waterTemp, arrowProgress, ms) {
      const beakerX = 220;
      const beakerY = 48;
      const beakerW = 290;
      const beakerH = 205;
      const baseY = beakerY + beakerH;

      roundedRect(ctx, 592, 18, 140, 42, 20, "#ffffff", "#bfd8ea");
      ctx.fillStyle = "#17324d";
      ctx.font = "700 20px Trebuchet MS";
      ctx.textAlign = "center";
      ctx.fillText("Room 25°C", 662, 45);

      ctx.strokeStyle = "#294d68";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(beakerX + 18, beakerY);
      ctx.lineTo(beakerX, baseY);
      ctx.quadraticCurveTo(beakerX + beakerW / 2, baseY + 16, beakerX + beakerW, baseY);
      ctx.lineTo(beakerX + beakerW - 18, beakerY);
      ctx.stroke();

      const waterTop = 160 - 18 * meltPortion;
      ctx.fillStyle = "#bfe6ff";
      ctx.beginPath();
      ctx.moveTo(beakerX + 10, waterTop);
      ctx.quadraticCurveTo(beakerX + beakerW / 2, waterTop + 14, beakerX + beakerW - 10, waterTop);
      ctx.lineTo(beakerX + beakerW - 6, baseY - 2);
      ctx.quadraticCurveTo(beakerX + beakerW / 2, baseY + 14, beakerX + 6, baseY - 2);
      ctx.closePath();
      ctx.fill();

      // Solid particles block
      const solidRows = 4;
      const solidCols = 4;
      const totalSolid = solidRows * solidCols;
      const remainingSolid = Math.round(totalSolid * (1 - meltPortion));
      let count = 0;
      for (let r = 0; r < solidRows; r++) {
        for (let c = 0; c < solidCols; c++) {
          if (count >= remainingSolid) break;
          const x = 300 + c * 26;
          const y = 105 + r * 24;
          ctx.fillStyle = "#f8fdff";
          ctx.strokeStyle = "#4a7f9c";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(x, y, 9, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          count++;
        }
      }

      // Liquid particles
      const liquidCount = 16;
      const speedBoost = 1 + warmPortion * 1.8;
      for (let i = 0; i < liquidCount; i++) {
        const baseX = 270 + (i % 8) * 28;
        const baseY = 168 + Math.floor(i / 8) * 32;
        const wiggleX = Math.sin(ms / (320 - i * 4) + i) * (6 + 6 * speedBoost);
        const wiggleY = Math.cos(ms / (280 - i * 3) + i * 1.5) * (4 + 4 * speedBoost);
        ctx.fillStyle = "#2a9bd8";
        ctx.beginPath();
        ctx.arc(baseX + wiggleX, baseY + wiggleY, 8, 0, Math.PI * 2);
        ctx.fill();
      }

      drawArrow(ctx, 120, 94, 220, 126, arrowProgress, "#2a9bd8");
      drawArrow(ctx, 635, 105, 510, 130, arrowProgress, "#2a9bd8");

      roundedRect(ctx, 32, 102, 150, 40, 18, "#ffffff", "#bdd7e8");
      roundedRect(ctx, 32, 150, 170, 40, 18, "#ffffff", "#bdd7e8");
      ctx.fillStyle = "#17324d";
      ctx.textAlign = "center";
      ctx.font = "700 18px Trebuchet MS";
      ctx.fillText("solid particles", 107, 128);
      ctx.fillText("liquid particles", 117, 176);

      roundedRect(ctx, 560, 86, 150, 70, 18, "#ffffff", "#bdd7e8");
      ctx.fillStyle = "#17324d";
      ctx.textAlign = "left";
      ctx.font = "700 16px Trebuchet MS";
      ctx.fillText("During melting:", 575, 110);
      ctx.font = "16px Trebuchet MS";
      ctx.fillText("Both stay at 0°C.", 575, 132);
      ctx.fillText(`Water later warms to ${waterTemp}°C.`, 575, 152);

      roundedRect(ctx, 38, 270, 684, 26, 13, "#ffffff", "#d3e5f2");
      ctx.fillStyle = "#2a9bd8";
      const progressWidth = 676 * (meltPortion < 1 ? meltPortion * 0.65 : 0.65 + warmPortion * 0.35);
      roundedRect(ctx, 42, 274, Math.max(16, progressWidth), 18, 9, "#2a9bd8", null);
      ctx.fillStyle = "#17324d";
      ctx.textAlign = "left";
      ctx.font = "700 14px Trebuchet MS";
      ctx.fillText("solid + liquid at 0°C", 42, 316);
      ctx.textAlign = "right";
      ctx.fillText("liquid warms to 25°C", 718, 316);
    }

    render();
  </script>
</body>
</html>
