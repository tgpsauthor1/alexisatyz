<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant Reproduction 6(c) v4</title>
<style>
  :root{
    --green:#1f6b4f;
    --green2:#2d8a63;
    --panel:#ffffff;
    --soft:#f4fbf6;
    --sky:#eef8ff;
    --ink:#163126;
    --line:#b8dbc7;
    --ok:#2f9e44;
    --bad:#d9534f;
    --gold:#f4c542;
    --shadow:0 10px 26px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 18%, rgba(255,255,255,.82) 0 10%, transparent 10% 100%),
      linear-gradient(180deg,#eef7f8 0%,#eff8ff 44%,#f7fffb 100%);
  }
  .app{ max-width:1180px; margin:0 auto; padding:18px; }
  .topbar{
    background:linear-gradient(90deg,#19543e,#2d7b59);
    color:#fff; border-radius:28px; box-shadow:var(--shadow);
    padding:18px 22px 16px; margin-bottom:18px;
  }
  .toprow{
    display:flex; justify-content:space-between; gap:16px; align-items:flex-start; flex-wrap:wrap;
  }
  .title h1{ margin:0; font-size:clamp(1.5rem,2.8vw,2.7rem); line-height:1.05; }
  .title p{ margin:8px 0 0; font-size:1.05rem; opacity:.96; }
  .controls{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  button{
    border:none; border-radius:18px; padding:14px 18px; font-size:1rem; font-weight:800;
    cursor:pointer; transition:.18s ease; box-shadow:0 4px 12px rgba(0,0,0,.08);
  }
  button:hover{ transform:translateY(-1px); }
  button:disabled{ opacity:.55; cursor:not-allowed; transform:none; }
  .btn-light{ background:#fff; color:var(--green); }
  .btn-primary{ background:var(--green); color:#fff; }
  .btn-secondary{ background:#e6f5eb; color:#163126; }
  .toggle{
    display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.12);
    padding:12px 14px; border-radius:18px; font-weight:700;
  }
  .toggle input{ width:22px; height:22px; }
  .lives{ margin-top:16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .lives strong{ font-size:1.1rem; }
  .seed-row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .seed-icon{
    width:40px; height:28px; position:relative; transition:.25s ease;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,.20));
  }
  .seed-icon::before,.seed-icon::after{
    content:""; position:absolute; background:#dff3e5; border:2px solid #81b796;
  }
  .seed-icon::before{
    width:20px; height:16px; left:3px; top:6px; border-radius:100% 0 100% 0; transform:rotate(-28deg);
  }
  .seed-icon::after{
    width:20px; height:16px; right:3px; top:6px; border-radius:0 100% 0 100%; transform:rotate(28deg);
  }
  .seed-icon span{
    position:absolute; left:50%; top:52%; transform:translate(-50%,-22%);
    width:8px; height:9px; background:#8b5e34; border-radius:50%; border:1px solid #5d3b1a;
  }
  .seed-icon.lost{ opacity:.17; transform:translateY(-9px) rotate(-10deg); filter:grayscale(1); }

  .screen{ display:grid; gap:16px; }
  .card{ background:var(--panel); border-radius:28px; box-shadow:var(--shadow); padding:20px; }
  .instruction{
    font-size:clamp(1.3rem,2.6vw,2rem); line-height:1.2; font-weight:900; margin:0; color:#113126;
  }
  .subtext{ margin:8px 0 0; font-size:1.02rem; line-height:1.5; }
  .feedback{
    min-height:58px; border-radius:18px; padding:14px 16px; font-weight:800; line-height:1.42;
    background:#f6fcf8; border:2px dashed #c8e5d0;
  }
  .feedback.good{ background:#ebfff0; border-color:#7dc793; }
  .feedback.bad{ background:#fff1f0; border-color:#e4a4a0; }
  .footer-row{
    display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center;
  }
  .choices{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; }
  .choice,.option-card,.mission-choice,.mini-choice{
    border:3px solid transparent; background:#fbfffc; border-radius:20px; padding:16px; min-height:88px;
    display:flex; align-items:center; justify-content:center; text-align:center; font-weight:800; font-size:1rem;
  }
  .choice:hover,.option-card:hover,.mission-choice:hover,.mini-choice:hover{
    border-color:#9ed0af; background:#f2fff5;
  }
  .selected{ border-color:var(--green)!important; background:#e9f8ee!important; }
  .correct{ border-color:var(--ok)!important; background:#ecfff0!important; }
  .wrong{ border-color:var(--bad)!important; background:#fff0ef!important; }

  .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:900px){ .grid-2{ grid-template-columns:1fr; } }

  .question-box details{
    background:#fff; border-radius:22px; box-shadow:var(--shadow); overflow:hidden;
  }
  .question-box summary{
    list-style:none; cursor:pointer; padding:14px 18px; font-weight:900; background:#f1fbf4;
  }
  .question-box summary::-webkit-details-marker{ display:none; }
  .question-inner{ padding:16px 18px 20px; line-height:1.55; }
  .highlight{ background:#fff2a8; border-radius:8px; padding:2px 6px; }

  .visual{
    background:linear-gradient(180deg,#fafffb 0%,#eef8ff 100%);
    border-radius:24px; border:2px solid #d4eadb; padding:16px;
  }
  .tag{
    display:inline-block; padding:6px 10px; border-radius:999px; background:#ebf8ef; font-size:.92rem; font-weight:900;
  }

  .mission-top{
    display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:12px;
  }
  .mission-badge{
    background:#fff3cd; color:#5f4500; border-radius:999px; padding:8px 12px; font-weight:900;
  }
  .mission-badge.good{
    background:#eaf8ee; color:#16523d;
  }
  .mission-board{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  @media(max-width:900px){ .mission-board{ grid-template-columns:1fr; } }
  .trial-card{
    background:#fff;
    border:2px solid #d5eadc;
    border-radius:22px;
    padding:14px;
  }
  .trial-card h3{
    margin:0 0 10px;
    text-align:center;
    font-size:1.08rem;
  }
  .helper-strip{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:12px;
  }
  .helper-face{
    font-size:2rem;
    transition:.25s ease;
  }
  .helper-face.caught{
    transform:translateX(120px) rotate(20deg);
    opacity:.05;
  }
  .mission-controls{
    display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
  }
  .small{ font-size:.94rem; line-height:1.5; }
  .muted{ opacity:.88; }

  .lock-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px;
  }
  .lock-card{
    border:3px solid transparent; background:#fbfffc; border-radius:20px; padding:16px; min-height:108px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; font-weight:800;
  }
  .lock-card:hover{ border-color:#9ed0af; background:#f2fff5; }
  .lock-card .lock-icon{ font-size:1.8rem; }

  .completion{ text-align:center; }
  .completion h2{ font-size:2rem; margin:8px 0 14px; color:#16523d; }
  .final-answer{
    background:#effcf3; border:2px solid #91d1a7; border-radius:22px; padding:18px; font-size:1.06rem;
    line-height:1.7; font-weight:800; text-align:left;
  }

  .overlay{
    position:fixed; inset:0; background:rgba(10,24,18,.72); display:none; align-items:center; justify-content:center;
    padding:18px; z-index:40;
  }
  .overlay.show{ display:flex; }
  .overlay-card{
    max-width:560px; width:100%; background:#fff; border-radius:28px; padding:24px; text-align:center;
    box-shadow:0 18px 40px rgba(0,0,0,.25);
  }
  .overlay-card h2{ margin:0 0 10px; font-size:2rem; }

  .flow-line{ animation:flowline 1.8s infinite; }
  @keyframes flowline{
    0%,100%{ opacity:.25; }
    50%{ opacity:.95; }
  }
  .seed-float{ transform-box:fill-box; transform-origin:center; animation:seedfloat 1.55s ease-in-out infinite; }
  @keyframes seedfloat{
    0%,100%{ transform:translateY(0) rotate(-4deg); }
    50%{ transform:translateY(-6px) rotate(4deg); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="toprow">
      <div class="title">
        <h1>Plant Reproduction 6(c)</h1>
        <p>Planning a fair test when wing size is changed</p>
      </div>
      <div class="controls">
        <button class="btn-light" id="readBtn" type="button">🔊 Read this screen</button>
        <label class="toggle" for="ttsToggle">
          <input type="checkbox" id="ttsToggle" />
          <span>Read-aloud on</span>
        </label>
        <button class="btn-light" id="restartBtn" type="button">↺ Restart</button>
      </div>
    </div>
    <div class="lives" aria-label="Demerit tracker">
      <strong>Seeds left:</strong>
      <div class="seed-row" id="seedRow"></div>
      <span class="small muted">Wrong checked answers make one seed fly away.</span>
    </div>
  </div>

  <main id="host" class="screen"></main>
</div>

<div class="overlay" id="gameOver">
  <div class="overlay-card">
    <div style="font-size:3rem;">🌬️🌱</div>
    <h2>All the seeds have flown away!</h2>
    <p class="subtext">Start again and keep the experiment fair.</p>
    <button class="btn-primary" id="restartOverlayBtn" type="button">Start again</button>
  </div>
</div>

<script>
(function(){
  const state = {
    screen: 0,
    maxLives: 7,
    lives: 7,
    ttsOn: false
  };

  const missions = [
    {
      id:'fan',
      name:'Whirl',
      culprit:'fan speed',
      choiceOptions:['fan speed','drop height','wing size'],
      note:'Both seeds have the same wing size and start at the same place. One trial uses a faster-spinning fan.',
      restore:'Set the fan speed back to its original speed.'
    },
    {
      id:'height',
      name:'Tippy',
      culprit:'drop height',
      choiceOptions:['drop height','fan speed','distance travelled'],
      note:'Both seeds have the same wing size and the same fan speed. One trial lets the seed go from higher up.',
      restore:'Set the drop height back to its original height.'
    },
    {
      id:'distance',
      name:'Scoot',
      culprit:'starting distance from the fan',
      choiceOptions:['starting distance from the fan','wing size','distance travelled'],
      note:'Both seeds have the same wing size and the same fan speed. One trial starts closer to the fan.',
      restore:'Set the starting distance back to its original place.'
    }
  ];

  const host = document.getElementById('host');
  const seedRow = document.getElementById('seedRow');
  const gameOver = document.getElementById('gameOver');
  const ttsToggle = document.getElementById('ttsToggle');

  function shuffle(arr){
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function renderLives(){
    seedRow.innerHTML = '';
    for(let i=0;i<state.maxLives;i++){
      const div = document.createElement('div');
      div.className = 'seed-icon' + (i >= state.lives ? ' lost' : '');
      div.innerHTML = '<span></span>';
      seedRow.appendChild(div);
    }
  }

  function loseLife(){
    state.lives -= 1;
    if(state.lives < 0) state.lives = 0;
    renderLives();
    if(state.lives === 0){
      gameOver.classList.add('show');
      speak("All the seeds have flown away. Start again and keep the experiment fair.");
    }
  }

  let ttsVoice = null;
  function initVoice(){
    const setVoice = () => {
      const voices = speechSynthesis.getVoices();
      ttsVoice =
        voices.find(v => /en-(SG|GB|US)/i.test(v.lang)) ||
        voices.find(v => /^en/i.test(v.lang)) ||
        voices[0] || null;
    };
    setVoice();
    if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged = setVoice; }
  }
  function speak(text){
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/\s+/g,' ').trim());
    if(ttsVoice) u.voice = ttsVoice;
    u.rate = 0.95;
    speechSynthesis.speak(u);
  }
  function readableText(){
    const nodes = host.querySelectorAll('[data-read], .instruction, .subtext, .feedback, .choice, .option-card, .mission-choice, summary');
    return [...nodes].map(n => (n.getAttribute('data-read') || n.textContent || '').trim()).filter(Boolean).join('. ');
  }
  function maybeRead(){
    if(state.ttsOn){
      const text = readableText();
      if(text) speak(text);
    }
  }

  function resetState(){
    state.screen = 0;
    state.lives = 7;
    renderLives();
    gameOver.classList.remove('show');
    if('speechSynthesis' in window) speechSynthesis.cancel();
    render();
  }

  function miniSourceSvg(){
    return `
    <div class="visual" style="min-height:220px;">
      <svg viewBox="0 0 780 240" width="100%" height="190" aria-hidden="true">
        <rect x="0" y="0" width="780" height="240" rx="18" fill="#f9fffb"/>
        <rect x="0" y="180" width="780" height="60" fill="#dcefdc"/>
        <g transform="translate(86,44)">
          <rect x="0" y="38" width="36" height="118" rx="10" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
          <ellipse cx="18" cy="22" rx="20" ry="22" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
          <rect x="10" y="0" width="16" height="36" rx="7" fill="#b8cfd2"/>
          ${[60,82,104,126,148].map(y => `<path d="M 48 ${y} C 70 ${y-10}, 88 ${y+10}, 112 ${y}" stroke="#7aa5b4" stroke-width="4" fill="none"/>`).join("")}
        </g>
        <text x="44" y="160" font-size="22" fill="#222">fan</text>
        <line x1="314" y1="44" x2="314" y2="166" stroke="#555" stroke-width="3"/>
        <polygon points="314,44 307,56 321,56" fill="#555"/>
        <polygon points="314,166 307,154 321,154" fill="#555"/>
        <text x="326" y="112" font-size="28" font-weight="700" fill="#223">H</text>
        <line x1="332" y1="188" x2="612" y2="188" stroke="#555" stroke-width="3"/>
        <polygon points="612,188 600,182 600,194" fill="#555"/>
        <text x="472" y="175" font-size="28" font-weight="700" fill="#223">D</text>
        <g transform="translate(260,36)" class="seed-float">
          <path d="M 0 30 Q 34 0 68 30" fill="#dff5e6" stroke="#5a9772" stroke-width="3"/>
          <path d="M 68 30 Q 102 0 136 30" fill="#dff5e6" stroke="#5a9772" stroke-width="3"/>
          <ellipse cx="68" cy="36" rx="10" ry="12" fill="#8b5e34" stroke="#5d3b1a" stroke-width="2"/>
          <text x="48" y="12" font-size="22" font-weight="800" fill="#223">wing</text>
        </g>
      </svg>
    </div>`;
  }

  function questionPanels(){
    return `
      <div class="question-box">
        <details open>
          <summary data-read="Question">Question</summary>
          <div class="question-inner">
            <p>Meifen also wanted to find out if the <span class="highlight">size of the wing</span> on seed T affects the distance it travels. Suggest <span class="highlight">two variables</span> that she has to <span class="highlight">keep constant</span> when conducting this experiment.</p>
          </div>
        </details>
      </div>
      <div class="question-box">
        <details>
          <summary data-read="Show setup and source">Show setup and source</summary>
          <div class="question-inner">
            <p>This is a new experiment using the same fan setup.</p>
            ${miniSourceSvg()}
          </div>
        </details>
      </div>
    `;
  }

  function renderSingleChoice({instruction, subtext, options, good, bad, topHtml="", start="Choose one answer."}){
    host.innerHTML = `
      <div class="card">
        <p class="instruction" data-read="${instruction}">${instruction}</p>
        ${subtext ? `<p class="subtext" data-read="${subtext}">${subtext}</p>` : ``}
      </div>
      ${topHtml}
      <div class="card">
        <div class="choices">
          ${options.map((o,i)=>`<button class="choice" type="button" data-index="${i}" data-read="${o.text}">${o.text}</button>`).join('')}
        </div>
        <div class="footer-row">
          <div class="feedback" id="feedback">${start}</div>
          <button class="btn-primary" id="nextBtn" type="button" disabled>Next</button>
        </div>
      </div>
      ${questionPanels()}
    `;
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    host.querySelectorAll('.choice').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const option = options[Number(btn.dataset.index)];
        host.querySelectorAll('.choice').forEach(b=>b.disabled = true);
        if(option.correct){
          btn.classList.add('correct');
          feedback.className = 'feedback good';
          feedback.textContent = good;
          nextBtn.disabled = false;
        }else{
          btn.classList.add('wrong');
          feedback.className = 'feedback bad';
          feedback.textContent = bad;
          loseLife();
          setTimeout(()=>{
            host.querySelectorAll('.choice').forEach(b=>{ b.disabled = false; b.classList.remove('wrong'); });
          }, 650);
        }
      });
    });
    nextBtn.addEventListener('click', ()=>{ state.screen += 1; render(); });
    maybeRead();
  }

  function renderScreen0(){
    host.innerHTML = `
      <div class="card">
        <p class="instruction" data-read="Read the new question. Then tap I have read it.">Read the new question. Then tap <span class="tag">I have read it</span>.</p>
        <p class="subtext" data-read="Notice the words size of the wing, keep constant, and two variables.">Notice the words <strong>size of the wing</strong>, <strong>keep constant</strong>, and <strong>two variables</strong>.</p>
      </div>
      <div class="card">
        <div class="grid-2">
          <div class="question-inner" style="padding:0;">
            <p>Meifen also wanted to find out if the <span class="highlight">size of the wing</span> on seed T affects the distance it travels. Suggest <span class="highlight">two variables</span> that she has to <span class="highlight">keep constant</span> when conducting this experiment.</p>
            <div class="feedback" style="margin-top:12px;">This is a <strong>new</strong> experiment. Something different is being changed now.</div>
          </div>
          <div>${miniSourceSvg()}</div>
        </div>
        <div class="footer-row" style="margin-top:16px;">
          <div class="feedback">Read the question first. Do not answer yet.</div>
          <button class="btn-primary" id="readDone" type="button">I have read it</button>
        </div>
      </div>
    `;
    document.getElementById('readDone').addEventListener('click', ()=>{ state.screen += 1; render(); });
    maybeRead();
  }

  function renderScreen1(){
    renderSingleChoice({
      instruction: "Tap the new changed variable in this experiment.",
      subtext: "Look at what Meifen now wants to find out.",
      options: shuffle([
        {text:"size of the wing", correct:true},
        {text:"height the seed is dropped", correct:false},
        {text:"distance travelled", correct:false}
      ]),
      good: "Yes. In this new experiment, the size of the wing is changed.",
      bad: "Look at what Meifen now wants to find out."
    });
  }

  function renderScreen2(){
    renderSingleChoice({
      instruction: "Tap the variable Meifen measures.",
      subtext: "This is the result she records.",
      options: shuffle([
        {text:"distance travelled", correct:true},
        {text:"size of the wing", correct:false},
        {text:"fan speed", correct:false}
      ]),
      good: "Yes. The distance travelled is the result measured.",
      bad: "This is the result, not the thing being changed."
    });
  }

  function missionSvg(id){
    if(id === 'fan'){
      return `
      <div class="mission-board">
        <div class="trial-card">
          <h3>Trial A</h3>
          <svg viewBox="0 0 420 220" width="100%" height="200" aria-hidden="true">
            <rect x="0" y="0" width="420" height="220" rx="18" fill="#fbfffc"/>
            <rect x="0" y="168" width="420" height="52" fill="#dcefdc"/>
            <text x="18" y="24" font-size="16" font-weight="800" fill="#184934">same wing size</text>
            <text x="18" y="44" font-size="16" font-weight="800" fill="#184934">same height</text>
            <text x="18" y="64" font-size="16" font-weight="800" fill="#184934">same starting place</text>
            <g transform="translate(44,78)">
              <rect x="0" y="22" width="28" height="86" rx="8" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
              <ellipse cx="14" cy="10" rx="16" ry="16" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
              <path d="M 40 40 C 60 30, 78 50, 100 40" stroke="#7aa5b4" stroke-width="4" fill="none"/>
              <path d="M 40 62 C 60 52, 78 72, 100 62" stroke="#7aa5b4" stroke-width="4" fill="none"/>
              <path d="M 40 84 C 60 74, 78 94, 100 84" stroke="#7aa5b4" stroke-width="4" fill="none"/>
            </g>
            <line x1="172" y1="52" x2="172" y2="164" stroke="#666" stroke-width="2" stroke-dasharray="5 5"/>
            <path d="M 172 58 Q 222 90 284 168" fill="none" stroke="#57b37f" stroke-width="5"/>
            <g id="fan-seed-a" transform="translate(172 58)">
              <path d="M 0 14 Q 14 0 28 14" fill="#dff5e6" stroke="#5a9772" stroke-width="2"/>
              <path d="M 28 14 Q 42 0 56 14" fill="#dff5e6" stroke="#5a9772" stroke-width="2"/>
              <ellipse cx="28" cy="19" rx="5" ry="7" fill="#8b5e34" stroke="#5d3b1a" stroke-width="1.5"/>
            </g>
          </svg>
        </div>
        <div class="trial-card">
          <h3>Trial B</h3>
          <svg viewBox="0 0 420 220" width="100%" height="200" aria-hidden="true">
            <rect x="0" y="0" width="420" height="220" rx="18" fill="#fbfffc"/>
            <rect x="0" y="168" width="420" height="52" fill="#dcefdc"/>
            <text x="18" y="24" font-size="16" font-weight="800" fill="#184934">same wing size</text>
            <text x="18" y="44" font-size="16" font-weight="800" fill="#184934">same height</text>
            <text x="18" y="64" font-size="16" font-weight="800" fill="#184934">same starting place</text>
            <g transform="translate(44,78)">
              <rect x="0" y="22" width="28" height="86" rx="8" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
              <ellipse cx="14" cy="10" rx="16" ry="16" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>

  function animateMission(id){
    if(id === 'fan'){
      const a = document.getElementById('fan-seed-a');
      const b = document.getElementById('fan-seed-b');
      [document.getElementById('fan-fast-1'), document.getElementById('fan-fast-2'),
       document.getElementById('fan-fast-3'), document.getElementById('fan-fast-4')].forEach((el, idx)=>{
        el.animate([{opacity:0.25},{opacity:1},{opacity:0.25}], {duration:900 + idx*120, iterations:1, fill:'forwards'});
      });
      a.animate([{transform:'translate(172px,58px)'},{transform:'translate(224px,94px)'},{transform:'translate(284px,160px)'}], {duration:1500, easing:'ease-in-out', fill:'forwards'});
      b.animate([{transform:'translate(172px,58px)'},{transform:'translate(258px,86px)'},{transform:'translate(350px,158px)'}], {duration:1500, easing:'ease-in-out', fill:'forwards'});
    } else if(id === 'height'){
      const a = document.getElementById('height-seed-a');
      const b = document.getElementById('height-seed-b');
      a.animate([{transform:'translate(176px,82px)'},{transform:'translate(230px,108px)'},{transform:'translate(286px,160px)'}], {duration:1500, easing:'ease-in-out', fill:'forwards'});
      b.animate([{transform:'translate(176px,50px)'},{transform:'translate(244px,82px)'},{transform:'translate(322px,160px)'}], {duration:1500, easing:'ease-in-out', fill:'forwards'});
    } else {
      const a = document.getElementById('dist-seed-a');
      const b = document.getElementById('dist-seed-b');
      a.animate([{transform:'translate(198px,80px)'},{transform:'translate(250px,108px)'},{transform:'translate(298px,160px)'}], {duration:1500, easing:'ease-in-out', fill:'forwards'});
      b.animate([{transform:'translate(154px,80px)'},{transform:'translate(248px,104px)'},{transform:'translate(336px,160px)'}], {duration:1500, easing:'ease-in-out', fill:'forwards'});
    }
  }

  function renderMissionScreen(missionIndex){
    const mission = missions[missionIndex];
    const options = shuffle(mission.choiceOptions.map(t=>({text:t, correct:t===mission.culprit})));
    host.innerHTML = `
      <div class="card">
        <div class="mission-top">
          <span class="mission-badge">Mission ${missionIndex + 1}</span>
          <span class="mission-badge good">Catch ${mission.name}</span>
        </div>
        <p class="instruction" data-read="Spy on the two trials. Work out what ${mission.name} changed.">Spy on the two trials. Work out what ${mission.name} changed.</p>
        <p class="subtext" data-read="${mission.note}">${mission.note}</p>
      </div>
      <div class="card">
        ${missionSvg(mission.id)}
        <div class="helper-strip">
          <div class="helper-face" id="helperFace">👾</div>
          <div class="feedback" id="watchFeedback">Press “Watch sabotage” and compare Trial A with Trial B.</div>
          <button class="btn-secondary" id="watchBtn" type="button">Watch sabotage</button>
        </div>
      </div>
      <div class="card">
        <div class="feedback" style="margin-bottom:12px;">What setup condition did ${mission.name} secretly change?</div>
        <div class="choices">
          ${options.map((o,i)=>`<button class="choice" type="button" data-correct="${o.correct}" data-read="${o.text}">${o.text}</button>`).join('')}
        </div>
        <div class="footer-row" style="margin-top:14px;">
          <div class="feedback" id="choiceFeedback">Choose only after you watch the sabotage.</div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn-secondary" id="catchBtn" type="button" disabled>Catch ${mission.name}</button>
            <button class="btn-secondary" id="resetBtn" type="button" disabled>Reset to original</button>
            <button class="btn-primary" id="nextBtn" type="button" disabled>Next</button>
          </div>
        </div>
      </div>
      ${questionPanels()}
    `;
    let watched = false;
    let solved = false;
    let caught = false;
    const watchFeedback = document.getElementById('watchFeedback');
    const choiceFeedback = document.getElementById('choiceFeedback');
    const catchBtn = document.getElementById('catchBtn');
    const resetBtn = document.getElementById('resetBtn');
    const nextBtn = document.getElementById('nextBtn');
    const helperFace = document.getElementById('helperFace');

    document.getElementById('watchBtn').addEventListener('click', ()=>{
      watched = true;
      animateMission(mission.id);
      watchFeedback.className = 'feedback';
      watchFeedback.textContent = 'Now compare the two trials carefully.';
    });

    host.querySelectorAll('.choice').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(!watched){
          choiceFeedback.className = 'feedback bad';
          choiceFeedback.textContent = 'Watch the sabotage first.';
          return;
        }
        const correct = btn.dataset.correct === 'true';
        host.querySelectorAll('.choice').forEach(b=>b.disabled = true);
        if(correct){
          btn.classList.add('correct');
          solved = true;
          choiceFeedback.className = 'feedback good';
          choiceFeedback.textContent = `Yes. ${mission.name} changed the ${mission.culprit}.`;
          catchBtn.disabled = false;
        }else{
          btn.classList.add('wrong');
          choiceFeedback.className = 'feedback bad';
          choiceFeedback.textContent = 'Look again at what stayed the same and what changed between the two trials.';
          loseLife();
          setTimeout(()=>{
            host.querySelectorAll('.choice').forEach(b=>{ b.disabled = false; b.classList.remove('wrong'); });
          }, 700);
        }
      });
    });

    catchBtn.addEventListener('click', ()=>{
      if(!solved) return;
      caught = true;
      helperFace.classList.add('caught');
      choiceFeedback.className = 'feedback';
      choiceFeedback.textContent = `${mission.name} is caught. ${mission.restore}`;
      catchBtn.disabled = true;
      resetBtn.disabled = false;
    });

    resetBtn.addEventListener('click', ()=>{
      if(!caught) return;
      choiceFeedback.className = 'feedback good';
      choiceFeedback.textContent = 'Good. The setup is back to its original condition.';
      resetBtn.disabled = true;
      nextBtn.disabled = false;
    });

    nextBtn.addEventListener('click', ()=>{ state.screen += 1; render(); });
    maybeRead();
  }

  function render(){
    renderLives();
    switch(state.screen){
      case 0: renderScreen0(); break;
      case 1: renderScreen1(); break;
      case 2: renderScreen2(); break;
      case 3: renderMissionScreen(0); break;
      case 4: renderMissionScreen(1); break;
      case 5: renderMissionScreen(2); break;
      case 6: renderScreen6(); break;
      case 7: renderScreen7(); break;
      default: renderScreen8(); break;
    }
  }

  document.getElementById('readBtn').addEventListener('click', ()=>{
    const text = readableText();
    if(text) speak(text);
  });
  document.getElementById('restartBtn').addEventListener('click', resetState);
  document.getElementById('restartOverlayBtn').addEventListener('click', resetState);
  ttsToggle.addEventListener('change', e=>{
    state.ttsOn = e.target.checked;
    if(!state.ttsOn && 'speechSynthesis' in window) speechSynthesis.cancel();
    if(state.ttsOn) maybeRead();
  });

  initVoice();
  renderLives();
  render();
