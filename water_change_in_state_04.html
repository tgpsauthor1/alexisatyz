<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>water_change_in_state_04</title>
<style>
  :root {
    --bg: #f4f8fb;
    --panel: #ffffff;
    --ink: #1b2a34;
    --muted: #5c6b74;
    --line: #d6e2ea;
    --accent: #0b6fa4;
    --accent-2: #f08c00;
    --good: #0f8a5f;
    --bad: #c23b22;
    --soft-good: #e8f7f0;
    --soft-bad: #fdeceb;
    --chip: #eef5fa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #eef6fb 0%, #f7fbfe 100%);
    color: var(--ink);
  }
  .app {
    max-width: 1080px;
    margin: 0 auto;
    padding: 14px;
  }
  .topbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .top-left, .top-right {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }
  .tracker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #eef7ff;
    border: 2px solid #cfe7f8;
    border-radius: 999px;
    padding: 8px 12px;
    font-weight: 700;
  }
  .drop {
    display: inline-flex;
    width: 18px;
    height: 18px;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: #d4ecff;
    color: #0b6fa4;
    font-size: 12px;
  }
  .drop.lost {
    background: #ebeff2;
    color: #8c98a0;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f7f9fb;
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 8px 12px;
    font-weight: 700;
  }
  button {
    font: inherit;
  }
  .btn, .option, .chip, .small-btn {
    border: 2px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    border-radius: 14px;
    cursor: pointer;
    transition: 0.18s ease;
  }
  .btn {
    min-height: 48px;
    padding: 10px 16px;
    font-weight: 700;
  }
  .small-btn {
    min-height: 40px;
    padding: 8px 12px;
    font-weight: 700;
  }
  .btn:hover, .option:hover, .chip:hover, .small-btn:hover {
    transform: translateY(-1px);
    border-color: #90bdd8;
  }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn.primary[disabled] {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
  }
  .btn.ghost {
    background: #f7fbff;
  }
  .screen {
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 8px 24px rgba(16,57,88,0.05);
  }
  .title {
    margin: 0 0 6px;
    font-size: clamp(1.3rem, 2vw, 1.7rem);
  }
  .instruction {
    margin: 0 0 16px;
    font-size: clamp(1.2rem, 1.9vw, 1.45rem);
    font-weight: 800;
    color: #0f5f8e;
  }
  .muted {
    color: var(--muted);
  }
  .feedback {
    margin-top: 14px;
    border-radius: 16px;
    padding: 12px 14px;
    font-weight: 700;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good {
    background: var(--soft-good);
    border: 2px solid #bfe7d3;
    color: #0f714d;
  }
  .feedback.bad {
    background: var(--soft-bad);
    border: 2px solid #f3c7c0;
    color: #a3341f;
  }
  .grid {
    display: grid;
    gap: 14px;
  }
  .grid.two {
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  }
  .card {
    background: #fbfdff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 14px;
  }
  .question-image {
    width: 100%;
    max-width: 720px;
    display: block;
    margin: 0 auto;
    border-radius: 14px;
    border: 2px solid var(--line);
    background: white;
  }
  .chips, .options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .chip {
    padding: 12px 16px;
    background: var(--chip);
    min-height: 48px;
    font-weight: 700;
  }
  .chip.selected, .option.selected {
    border-color: var(--accent);
    background: #dff1fb;
  }
  .chip.correct, .option.correct {
    border-color: var(--good);
    background: #dff5ea;
  }
  .chip.wrong, .option.wrong {
    border-color: var(--bad);
    background: #ffe6e2;
  }
  .option {
    width: 100%;
    text-align: left;
    padding: 14px 16px;
    min-height: 58px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
  }
  .option .label {
    display: inline-flex;
    min-width: 34px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    background: #edf4f8;
    border: 2px solid #d4e3eb;
    font-size: 0.95rem;
  }
  .actions {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: space-between;
    align-items: center;
  }
  details.question-panel {
    margin-top: 16px;
    border: 2px solid var(--line);
    border-radius: 16px;
    background: #fbfdff;
    overflow: hidden;
  }
  details.question-panel summary {
    cursor: pointer;
    padding: 12px 14px;
    font-weight: 800;
    list-style: none;
  }
  details.question-panel summary::-webkit-details-marker { display: none; }
  .qp-body {
    padding: 0 14px 14px;
  }
  .diagram-wrap {
    display: grid;
    gap: 12px;
    justify-items: center;
    margin-top: 10px;
  }
  svg {
    max-width: 100%;
    height: auto;
  }
  .diagram-card {
    width: min(640px, 100%);
    background: #f9fcff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 14px;
  }
  .center {
    text-align: center;
  }
  .mini-note {
    font-size: 0.96rem;
    color: var(--muted);
  }
  .footer-space { height: 6px; }
  .hidden { display: none !important; }
  .step-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    background: #f6fafc;
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 8px 12px;
    font-weight: 700;
  }
  .summary-box {
    background: #f7fbff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 14px;
  }
  @media (max-width: 700px) {
    .screen { padding: 14px; }
    .topbar { padding: 10px; }
    .option { padding: 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="top-left">
      <div class="tracker" id="demeritTracker"></div>
      <div class="pill" id="progressPill">Step 1</div>
    </div>
    <div class="top-right">
      <button class="small-btn" id="toggleRead">🔈 Read-aloud: OFF</button>
      <button class="small-btn" id="speakNow">Read this screen</button>
    </div>
  </div>

  <div id="screenRoot" class="screen" aria-live="polite"></div>
</div>

  function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

        } else if (state.keywordSelected.length < 3) {
          state.keywordSelected = [...state.keywordSelected, i];

        clearFeedback();

        render();
        if (state.keywordSelected.length === 3) {
          const ok = state.keywordSelected.every(i => bank.keywords[i].correct) && state.keywordSelected.length === 3;

            state.doneCurrent = true;
            setFeedback('good', 'Yes. This question is mainly asking where the water droplets form.');

          if (ok) {
            state.doneCurrent = true;
            setFeedback('good', 'Good. Temperature and droplet location matter most here.');
          } else {
            loseDemerit();
            setFeedback('bad', 'Not quite. Focus on hot or cold and where the droplets are.');
          }
        }
      }));
    }

    if ([2,4,6,7,8,9,10,11].includes(state.screen)) {
      const options = [...screenRoot.querySelectorAll('.option[data-group="single"]')];
      options.forEach((btn, idx) => btn.addEventListener('click', () => {
        const banks = {
          2: randomized.hotSource,
          4: randomized.coldSurface,
          6: randomized.hotTF,
          7: randomized.leakTF,
          8: randomized.material,
          9: randomized.finalOriginal,
          10: randomized.transfer,
          11: randomized.summary
        };
        const item = banks[state.screen][idx];
        markSelection(btn, options);
        const good = !!item.correct;
        markSingleResults(options, btn, good);
        if (good) {
          state.doneCurrent = true;
          setFeedback('good', item.explain);
        } else {
          state.doneCurrent = false;
          loseDemerit();
          setFeedback('bad', item.explain);
        }
      }));
    }

    if (state.screen === 3) {
      const play = document.getElementById('playHot');
      const step = document.getElementById('stepHot');
      const replay = document.getElementById('replayHot');
      const hotPlace = [...screenRoot.querySelectorAll('.option[data-group="hotplace"]')];
      play.addEventListener('click', () => startAnimation('hot'));
      step.addEventListener('click', () => advanceAnimation('hot'));
      replay.addEventListener('click', () => {
        stopAnimation();
        state.currentAnimationStep = 0;
        clearFeedback();
        state.doneCurrent = false;
        render();
      });
      hotPlace.forEach(btn => btn.addEventListener('click', () => {
        markSelection(btn, hotPlace);
        const good = btn.dataset.value === 'inside';
        markSingleResults(hotPlace, btn, good);
        if (good) {
          state.doneCurrent = true;
          setFeedback('good', 'Yes. The vapour from the hot water cools and condenses on the inner surface.');
        } else {
          state.doneCurrent = false;
          loseDemerit();
          setFeedback('bad', 'Try again. The vapour starts inside the cup, so the droplets form on the inner surface.');
        }
      }));
    }

    if (state.screen === 5) {
      const play = document.getElementById('playCold');
      const step = document.getElementById('stepCold');
      const replay = document.getElementById('replayCold');
      const coldPlace = [...screenRoot.querySelectorAll('.option[data-group="coldplace"]')];
      play.addEventListener('click', () => startAnimation('cold'));
      step.addEventListener('click', () => advanceAnimation('cold'));
      replay.addEventListener('click', () => {
        stopAnimation();
        state.currentAnimationStep = 0;
        clearFeedback();
        state.doneCurrent = false;
        render();
      });
      coldPlace.forEach(btn => btn.addEventListener('click', () => {
        markSelection(btn, coldPlace);
        const good = btn.dataset.value === 'outside';
        markSingleResults(coldPlace, btn, good);
        if (good) {
          state.doneCurrent = true;
          setFeedback('good', 'Yes. Water vapour in the air loses heat at the cold outer surface and condenses there.');
        } else {
          state.doneCurrent = false;
          loseDemerit();
          setFeedback('bad', 'Try again. For the cold cup, water vapour in the surrounding air condenses on the outside.');
        }
      }));
    }
  }

  function updateAnimationScreen(mode) {
    const targetId = mode === 'hot' ? 'hotDiagram' : 'coldDiagram';
    const el = document.getElementById(targetId);
    if (!el) return;
    el.innerHTML = baseCupSVG({ temp: mode === 'hot' ? 'hot' : 'cold', step: state.currentAnimationStep });
  }

  function advanceAnimation(mode) {
    stopAnimation();
    state.currentAnimationStep = Math.min(3, state.currentAnimationStep + 1);
    updateAnimationScreen(mode);
  }

  function startAnimation(mode) {
    stopAnimation();
    state.currentAnimationStep = 0;
    updateAnimationScreen(mode);
    state.animationTimer = setInterval(() => {
      if (state.currentAnimationStep >= 3) {
        stopAnimation();
        return;
      }
      state.currentAnimationStep += 1;
      updateAnimationScreen(mode);
    }, 900);
  }

  function render() {
    renderScreen();
  }

  render();
})();
</script>
</body>
</html>
