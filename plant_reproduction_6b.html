<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant Reproduction 6(b)</title>
<style>
  :root{
    --green:#1f6b4f;
    --green-2:#2d8a63;
    --leaf:#dff5e6;
    --panel:#ffffff;
    --soft:#f4fbf6;
    --sky:#eef8ff;
    --ink:#163126;
    --line:#b9dbc6;
    --warn:#d9534f;
    --ok:#2f9e44;
    --shadow:0 10px 28px rgba(0,0,0,.10);
    --radius:22px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 14% 18%, rgba(255,255,255,.85) 0 10%, transparent 10% 100%),
      linear-gradient(180deg,#eef7f8 0%,#eff8ff 44%,#f7fffb 100%);
  }
  .app{
    max-width:1180px;
    margin:0 auto;
    padding:18px;
  }
  .topbar{
    background:linear-gradient(90deg,#19543e,#2d7b59);
    color:#fff;
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:18px 22px 16px;
    margin-bottom:18px;
  }
  .toprow{
    display:flex;
    justify-content:space-between;
    gap:16px;
    align-items:flex-start;
    flex-wrap:wrap;
  }
  .title h1{
    margin:0;
    font-size:clamp(1.5rem, 2.8vw, 2.7rem);
    line-height:1.05;
  }
  .title p{
    margin:8px 0 0;
    font-size:1.05rem;
    opacity:.96;
  }
  .controls{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
  }
  .pill{
    background:rgba(255,255,255,.14);
    border-radius:18px;
    padding:8px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  button{
    border:none;
    border-radius:18px;
    padding:14px 18px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    transition:.18s ease;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
  }
  button:hover{ transform:translateY(-1px); }
  button:disabled{ opacity:.55; cursor:not-allowed; transform:none; }
  .btn-light{ background:#fff; color:var(--green); }
  .btn-primary{ background:var(--green); color:#fff; }
  .btn-secondary{ background:#e6f5eb; color:#163126; }
  .btn-danger{ background:var(--warn); color:#fff; }
  .toggle{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,.12);
    padding:12px 14px;
    border-radius:18px;
    font-weight:700;
  }
  .toggle input{ width:22px; height:22px; }
  .lives{
    margin-top:16px;
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }
  .lives strong{ font-size:1.1rem; }
  .seed-row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .seed-icon{
    width:40px; height:28px; position:relative; transition:.25s ease;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,.20));
  }
  .seed-icon::before,
  .seed-icon::after{
    content:""; position:absolute; background:#dff3e5; border:2px solid #81b796;
  }
  .seed-icon::before{
    width:20px; height:16px; left:3px; top:6px; border-radius:100% 0 100% 0; transform:rotate(-28deg);
  }
  .seed-icon::after{
    width:20px; height:16px; right:3px; top:6px; border-radius:0 100% 0 100%; transform:rotate(28deg);
  }
  .seed-icon span{
    position:absolute; left:50%; top:52%; transform:translate(-50%,-22%);
    width:8px; height:9px; background:#8b5e34; border-radius:50%; border:1px solid #5d3b1a;
  }
  .seed-icon.lost{ opacity:.17; transform:translateY(-9px) rotate(-10deg); filter:grayscale(1); }
  .screen{
    display:grid;
    gap:16px;
  }
  .card{
    background:var(--panel);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:20px;
  }
  .instruction{
    font-size:clamp(1.3rem, 2.6vw, 2rem);
    line-height:1.2;
    font-weight:900;
    margin:0;
    color:#113126;
  }
  .subtext{
    margin:8px 0 0;
    font-size:1.02rem;
    line-height:1.5;
  }
  .feedback{
    min-height:58px;
    border-radius:18px;
    padding:14px 16px;
    font-weight:800;
    line-height:1.42;
    background:#f6fcf8;
    border:2px dashed #c8e5d0;
  }
  .feedback.good{ background:#ebfff0; border-color:#7dc793; }
  .feedback.bad{ background:#fff1f0; border-color:#e4a4a0; }
  .footer-row{
    display:flex;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
  }
  .choices{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:14px;
  }
  .choice, .sort-card, .multi-card, .throw-card, .token{
    border:3px solid transparent;
    background:#fbfffc;
    border-radius:20px;
    padding:16px;
    min-height:88px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:800;
    font-size:1rem;
  }
  .choice:hover, .sort-card:hover, .multi-card:hover, .throw-card:hover, .token:hover{
    border-color:#9ed0af;
    background:#f2fff5;
  }
  .selected{ border-color:var(--green)!important; background:#e9f8ee!important; }
  .correct{ border-color:var(--ok)!important; background:#ecfff0!important; }
  .wrong{ border-color:var(--warn)!important; background:#fff0ef!important; }
  .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media(max-width:900px){
    .grid-2,.grid-3{ grid-template-columns:1fr; }
  }
  .question-box details{
    background:#fff;
    border-radius:22px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .question-box summary{
    list-style:none;
    cursor:pointer;
    padding:14px 18px;
    font-weight:900;
    background:#f1fbf4;
  }
  .question-box summary::-webkit-details-marker{ display:none; }
  .question-inner{ padding:16px 18px 20px; line-height:1.55; }
  .highlight{ background:#fff2a8; border-radius:8px; padding:2px 6px; }
  .mini-table{
    width:100%; border-collapse:collapse; border-radius:16px; overflow:hidden; background:#fff;
    box-shadow:0 4px 12px rgba(0,0,0,.06);
  }
  .mini-table th,.mini-table td{
    border:1px solid #bdd9c6; padding:10px 12px; text-align:center; font-size:1rem;
  }
  .mini-table th{ background:#edfaf1; }
  .visual{
    background:linear-gradient(180deg,#fafffb 0%,#eef8ff 100%);
    border-radius:24px;
    border:2px solid #d4eadb;
    padding:16px;
  }
  .bin-wrap{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:12px; }
  @media(max-width:900px){ .bin-wrap{ grid-template-columns:1fr; } }
  .bin{
    background:#f9fffa;
    border:3px dashed #97caa7;
    border-radius:22px;
    min-height:140px;
    padding:12px;
  }
  .bin h3{
    margin:2px 0 10px; text-align:center; font-size:1.1rem;
  }
  .bin .dropzone{
    min-height:74px;
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    font-weight:800;
    border-radius:16px;
    background:#fff;
  }
  .sort-bank,.token-bank,.throw-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
  }
  .multi-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:12px;
  }
  .multi-card{
    min-height:98px; flex-direction:column; gap:8px;
  }
  .emoji{ font-size:1.8rem; }
  .sim-panels{
    display:grid; grid-template-columns:1fr 1fr; gap:16px;
  }
  @media(max-width:900px){ .sim-panels{ grid-template-columns:1fr; } }
  .sim-panel{
    background:#fff; border:2px solid #d5eadc; border-radius:22px; padding:14px;
  }
  .sim-panel h3{
    margin:0 0 10px; text-align:center;
  }
  .throw-card{
    min-height:176px; flex-direction:column; gap:12px;
    align-items:stretch; justify-content:flex-start;
  }
  .throw-buttons{
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
  }
  .tag{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#ebf8ef;
    font-size:.92rem;
    font-weight:900;
  }
  .sentence{
    background:#f9fffa;
    border:2px solid #d5eadc;
    border-radius:22px;
    padding:18px;
    font-size:1.08rem;
    line-height:1.85;
  }
  .blank{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:150px;
    min-height:48px;
    padding:4px 10px;
    margin:4px 3px;
    border-radius:16px;
    border:3px dashed #8ec49f;
    background:#fff;
    font-weight:900;
    vertical-align:middle;
  }
  .token-bank{
    margin-top:14px;
  }
  .token.used{ opacity:.35; pointer-events:none; }
  .weak-answer{
    background:#fffef6;
    border-left:8px solid #f4c542;
    border-radius:16px;
    padding:16px;
    font-size:1.08rem;
    line-height:1.55;
    font-weight:800;
  }
  .guess-sentence{
    background:#f9fffa;
    border:2px solid #d5eadc;
    border-radius:22px;
    padding:18px;
    font-size:1.08rem;
    line-height:1.95;
  }
  .guess-current{
    display:inline-flex;
    min-width:110px;
    min-height:44px;
    padding:4px 10px;
    align-items:center;
    justify-content:center;
    border-radius:14px;
    background:#fff;
    border:3px dashed #8ec49f;
    font-weight:900;
  }
  .guess-row{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  }
  .guess-row input{
    flex:1;
    min-width:200px;
    font-size:1.05rem;
    padding:14px 16px;
    border-radius:16px;
    border:2px solid #b8d8c5;
    font-weight:800;
  }
  .completion{
    text-align:center;
  }
  .completion h2{
    font-size:2rem;
    margin:8px 0 14px;
    color:#16523d;
  }
  .final-answer{
    background:#effcf3;
    border:2px solid #91d1a7;
    border-radius:22px;
    padding:18px;
    font-size:1.08rem;
    line-height:1.7;
    font-weight:800;
    text-align:left;
  }
  .overlay{
    position:fixed; inset:0; background:rgba(10,24,18,.72); display:none;
    align-items:center; justify-content:center; padding:18px; z-index:40;
  }
  .overlay.show{ display:flex; }
  .overlay-card{
    max-width:560px; width:100%; background:#fff; border-radius:28px; padding:24px; text-align:center;
    box-shadow:0 18px 40px rgba(0,0,0,.25);
  }
  .overlay-card h2{ margin:0 0 10px; font-size:2rem; }
  .small{ font-size:.94rem; line-height:1.5; }
  .muted{ opacity:.88; }

  .seed-float{ transform-box:fill-box; transform-origin:center; animation:seedfloat 1.55s ease-in-out infinite; }
  @keyframes seedfloat{
    0%,100%{ transform:translateY(0) rotate(-4deg); }
    50%{ transform:translateY(-6px) rotate(4deg); }
  }
  .flow-line{ animation:flowline 1.8s infinite; }
  @keyframes flowline{
    0%,100%{ opacity:.25; }
    50%{ opacity:.95; }
  }

  .throw-card.chosen-keep{
    border:3px solid #2f9e44;
    background:#ecfff0;
  }
  .throw-card.chosen-throw{
    border:3px solid #d9534f;
    background:#fff4f3;
  }
  .throw-status{
    text-align:center;
    font-weight:900;
    min-height:28px;
  }
  .act-btn.selected{
    background:#1f6b4f !important;
    color:#fff !important;
    border-color:#1f6b4f !important;
  }

</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="toprow">
      <div class="title">
        <h1>Plant Reproduction 6(b)</h1>
        <p>Seed dispersal: using the same seed in a fair test</p>
      </div>
      <div class="controls">
        <button class="btn-light" id="readBtn" type="button">🔊 Read this screen</button>
        <label class="toggle" for="ttsToggle">
          <input type="checkbox" id="ttsToggle" />
          <span>Read-aloud on</span>
        </label>
        <button class="btn-light" id="restartBtn" type="button">↺ Restart</button>
      </div>
    </div>
    <div class="lives" aria-label="Demerit tracker">
      <strong>Seeds left:</strong>
      <div class="seed-row" id="seedRow"></div>
      <span class="small muted">Wrong checked answers make one seed fly away.</span>
    </div>
  </div>

  <main id="host" class="screen"></main>
</div>

<div class="overlay" id="gameOver">
  <div class="overlay-card">
    <div style="font-size:3rem;">🌬️🌱</div>
    <h2>All the seeds have flown away!</h2>
    <p class="subtext">Start again and keep the experiment fair.</p>
    <button class="btn-primary" id="restartOverlayBtn" type="button">Start again</button>
  </div>
</div>

<script>
(function(){
  const state = {
    screen: 0,
    maxLives: 7,
    lives: 7,
    ttsOn: false,
    chosenProperty: null,
    sortPlaced: {changed:null, measured:null, kept:null},
    guessStage: 0,
    guessWords: ["does", "not", "affect"],
    guessDone: ["","",""],
    guessReveal: [1,1,1]
  };

  const host = document.getElementById('host');
  const seedRow = document.getElementById('seedRow');
  const gameOver = document.getElementById('gameOver');
  const ttsToggle = document.getElementById('ttsToggle');

  const propertyOptions = ["mass","size","wing length","wingspan","length of wing"];

  function finalAnswer(){
    const prop = state.chosenProperty || "mass";
    return `Meifen used the same seed so the ${prop} of the seed does not affect the distance travelled by seed T.`;
  }

  function shuffle(arr){
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function renderLives(){
    seedRow.innerHTML = '';
    for(let i=0;i<state.maxLives;i++){
      const div = document.createElement('div');
      div.className = 'seed-icon' + (i >= state.lives ? ' lost' : '');
      div.innerHTML = '<span></span>';
      seedRow.appendChild(div);
    }
  }

  function loseLife(){
    state.lives -= 1;
    if(state.lives < 0) state.lives = 0;
    renderLives();
    if(state.lives === 0){
      gameOver.classList.add('show');
      speak("All the seeds have flown away. Start again and keep the experiment fair.");
    }
  }

  let ttsVoice = null;
  function initVoice(){
    const setVoice = () => {
      const voices = speechSynthesis.getVoices();
      ttsVoice =
        voices.find(v => /en-(SG|GB|US)/i.test(v.lang)) ||
        voices.find(v => /^en/i.test(v.lang)) ||
        voices[0] || null;
    };
    setVoice();
    if('speechSynthesis' in window){
      speechSynthesis.onvoiceschanged = setVoice;
    }
  }
  function speak(text){
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/\s+/g,' ').trim());
    if(ttsVoice) u.voice = ttsVoice;
    u.rate = 0.95;
    speechSynthesis.speak(u);
  }
  function readableText(){
    const nodes = host.querySelectorAll('[data-read], .instruction, .subtext, .feedback, .choice, .sort-card, .multi-card, .throw-card, .token, .weak-answer, .guess-sentence, summary');
    return [...nodes].map(n => (n.getAttribute('data-read') || n.textContent || '').trim()).filter(Boolean).join('. ');
  }
  function maybeRead(){
    if(state.ttsOn){
      const text = readableText();
      if(text) speak(text);
    }
  }

  function resetState(){
    state.screen = 0;
    state.lives = 7;
    state.chosenProperty = null;
    state.sortPlaced = {changed:null, measured:null, kept:null};
    state.guessStage = 0;
    state.guessDone = ["","",""];
    state.guessReveal = [1,1,1];
    renderLives();
    gameOver.classList.remove('show');
    if('speechSynthesis' in window) speechSynthesis.cancel();
    render();
  }

  function questionPanels(){
    return `
      <div class="question-box">
        <details open>
          <summary data-read="Question">Question</summary>
          <div class="question-inner">
            <p>Meifen used the <span class="highlight">same seed</span> throughout the experiment. Give a reason how using the same seed helps to make the experiment a <span class="highlight">fair test</span>.</p>
          </div>
        </details>
      </div>
      <div class="question-box">
        <details>
          <summary data-read="Show setup and source">Show setup and source</summary>
          <div class="question-inner">
            <p>The experiment is about how the <strong>height</strong> affects the <strong>distance travelled</strong>.</p>
            <table class="mini-table" aria-label="Results table">
              <tr><th>H (cm)</th><th>120</th><th>100</th><th>80</th><th>60</th></tr>
              <tr><th>D (cm)</th><td>50</td><td>44</td><td>31</td><td>15</td></tr>
            </table>
            <div style="margin-top:14px;">${miniSourceSvg()}</div>
          </div>
        </details>
      </div>
    `;
  }

  function miniSourceSvg(){
    return `
    <div class="visual" style="min-height:220px;">
      <svg viewBox="0 0 780 240" width="100%" height="190" aria-hidden="true">
        <rect x="0" y="0" width="780" height="240" rx="18" fill="#f9fffb"/>
        <rect x="0" y="180" width="780" height="60" fill="#dcefdc"/>
        <g transform="translate(86,44)">
          <rect x="0" y="38" width="36" height="118" rx="10" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
          <ellipse cx="18" cy="22" rx="20" ry="22" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
          <rect x="10" y="0" width="16" height="36" rx="7" fill="#b8cfd2"/>
          ${[60,82,104,126,148].map(y => `<path d="M 48 ${y} C 70 ${y-10}, 88 ${y+10}, 112 ${y}" stroke="#7aa5b4" stroke-width="4" fill="none"/>`).join("")}
        </g>
        <text x="44" y="160" font-size="22" fill="#222">fan</text>
        <line x1="314" y1="44" x2="314" y2="166" stroke="#555" stroke-width="3"/>
        <polygon points="314,44 307,56 321,56" fill="#555"/>
        <polygon points="314,166 307,154 321,154" fill="#555"/>
        <text x="326" y="112" font-size="28" font-weight="700" fill="#223">H</text>
        <line x1="332" y1="188" x2="612" y2="188" stroke="#555" stroke-width="3"/>
        <polygon points="612,188 600,182 600,194" fill="#555"/>
        <text x="472" y="175" font-size="28" font-weight="700" fill="#223">D</text>
        <g transform="translate(260,36)" class="seed-float">
          <path d="M 0 30 Q 34 0 68 30" fill="#dff5e6" stroke="#5a9772" stroke-width="3"/>
          <path d="M 68 30 Q 102 0 136 30" fill="#dff5e6" stroke="#5a9772" stroke-width="3"/>
          <ellipse cx="68" cy="36" rx="10" ry="12" fill="#8b5e34" stroke="#5d3b1a" stroke-width="2"/>
          <text x="48" y="12" font-size="22" font-weight="800" fill="#223">4 cm</text>
        </g>
      </svg>
    </div>`;
  }

  function fairTestSvg(){
    return `
    <div class="visual">
      <svg viewBox="0 0 850 280" width="100%" height="230" aria-hidden="true">
        <rect x="0" y="0" width="850" height="280" rx="22" fill="#fbfffc"/>
        <rect x="0" y="215" width="850" height="65" fill="#dcefdc"/>
        <text x="68" y="30" font-size="22" font-weight="800" fill="#154132">Same height</text>
        <text x="466" y="30" font-size="22" font-weight="800" fill="#154132">Same height</text>

        <g transform="translate(70,78)">
          <rect x="0" y="22" width="38" height="120" rx="10" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
          <ellipse cx="19" cy="8" rx="20" ry="20" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
          ${[38,60,82,104,126].map(y => `<path d="M 50 ${y} C 70 ${y-10}, 88 ${y+10}, 114 ${y}" stroke="#7aa5b4" stroke-width="4" fill="none" class="flow-line"/>`).join("")}
        </g>
        <g transform="translate(470,78)">
          <rect x="0" y="22" width="38" height="120" rx="10" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
          <ellipse cx="19" cy="8" rx="20" ry="20" fill="#d9e7ea" stroke="#7a9199" stroke-width="2"/>
          ${[38,60,82,104,126].map(y => `<path d="M 50 ${y} C 70 ${y-10}, 88 ${y+10}, 114 ${y}" stroke="#7aa5b4" stroke-width="4" fill="none" class="flow-line"/>`).join("")}
        </g>

        <line x1="250" y1="40" x2="250" y2="210" stroke="#666" stroke-width="2" stroke-dasharray="6 5"/>
        <line x1="650" y1="40" x2="650" y2="210" stroke="#666" stroke-width="2" stroke-dasharray="6 5"/>

        <path d="M 250 58 Q 322 92 382 192" fill="none" stroke="#57b37f" stroke-width="5"/>
        <g id="seedA" transform="translate(250 58)">
          <path d="M 0 16 Q 15 0 30 16" fill="#dff5e6" stroke="#5a9772" stroke-width="2"/>

      `;
      host.querySelectorAll('.token').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          if(btn.classList.contains('used') || chosen.length >= 2) return;
          chosen.push(btn.dataset.token);
          draw();
        });
      });
      document.getElementById('clearBtn').addEventListener('click', ()=>{
        chosen.length = 0;
        draw();
      });
      const checkBtn = document.getElementById('checkBtn');
      const nextBtn = document.getElementById('nextBtn');
      if(checkBtn){
        checkBtn.addEventListener('click', ()=>{
          const ok = JSON.stringify(chosen) === JSON.stringify(correctSequence);
          const feedback = document.getElementById('feedback');
          if(ok){
            feedback.className = 'feedback good';
            feedback.textContent = 'Yes. This is why using the same seed helps to make the test fair.';
            nextBtn.disabled = false;
            host.querySelectorAll('.token').forEach(t=>t.disabled = true);
          }else{
            feedback.className = 'feedback bad';
            feedback.textContent = 'The important idea is that the characteristic of the seed must not affect the distance travelled.';
            loseLife();
          }
        });
      }
      if(nextBtn){
        nextBtn.addEventListener('click', ()=>{ state.screen += 1; render(); });
      }
      maybeRead();
    }
    draw();
  }

  function renderScreen9(){
    renderSingleChoice({
      instruction:"What is missing from this answer?",
      subtext:"Check whether it explains why the test is fair.",
      topHtml:`<div class="card"><div class="weak-answer" data-read="The seed has the same wingspan.">“The seed has the same wingspan.”</div></div>`,
      options: shuffle([
        {text:"why that helps make the test fair", correct:true},
        {text:"the table values", correct:false},
        {text:"the name of the seed", correct:false}
      ]),
      good:"Yes. This answer names a kept-same property, but it does not explain why that helps.",
      bad:"The problem is not missing data. The problem is the missing reason."
    });
  }

  function renderScreen10(){
    const stage = state.guessStage;
    const done = state.guessDone;
    const reveal = state.guessReveal;
    const displayInline = (i) => {
      if(done[i]) return done[i];
      const w = state.guessWords[i];
      return w.slice(0, reveal[i]) + "_".repeat(Math.max(w.length - reveal[i], 0));
    };

    host.innerHTML = `
      <div class="card">
        <p class="instruction" data-read="Type the missing word.">Type the missing word.</p>
        <p class="subtext" data-read="Wrong tries here do not take away a seed.">Wrong tries here do not take away a seed.</p>
      </div>
      <div class="card">
        <div class="guess-sentence" data-read="${finalAnswer()}">
          Meifen used the same seed so the <strong>${state.chosenProperty}</strong> of the seed
          <span class="guess-current">${displayInline(0)}</span>
          <span class="guess-current">${displayInline(1)}</span>
          <span class="guess-current">${displayInline(2)}</span>
          the distance travelled by seed T.
        </div>
        ${stage < state.guessWords.length ? `
          <div class="guess-row" style="margin-top:14px;">
            <input id="guessInput" type="text" autocomplete="off" spellcheck="false" />
            <button class="btn-secondary" id="checkGuess" type="button">Check</button>
          </div>
        ` : ``}
        <div class="footer-row" style="margin-top:14px;">
          <div class="feedback" id="feedback">${stage < state.guessWords.length ? `Type the word that matches <strong>${displayInline(stage)}</strong>.` : 'Well done. You built the key reason.'}</div>
          <button class="btn-primary" id="nextBtn" type="button" ${stage < state.guessWords.length ? 'disabled' : ''}>Next</button>
        </div>
      </div>
      ${questionPanels()}
    `;
    const nextBtn = document.getElementById('nextBtn');
    if(stage < state.guessWords.length){
      const input = document.getElementById('guessInput');
      const feedback = document.getElementById('feedback');
      const checkBtn = document.getElementById('checkGuess');
      input.focus();
      function check(){
        const attempt = input.value.trim().toLowerCase().replace(/\s+/g,' ');
        const target = state.guessWords[stage];
        if(attempt === target){
          state.guessDone[stage] = target;
          state.guessStage += 1;
          renderScreen10();
        }else{
          state.guessReveal[stage] = Math.min(target.length, state.guessReveal[stage] + 1);
          feedback.className = 'feedback bad';
          feedback.innerHTML = `Not yet. Try again.`;
          renderScreen10();
        }
      }
      checkBtn.addEventListener('click', check);
      input.addEventListener('keydown', e=>{ if(e.key === 'Enter') check(); });
    }else{
      nextBtn.addEventListener('click', ()=>{ state.screen += 1; render(); });
    }
    maybeRead();
  }

  function renderScreen11(){
    host.innerHTML = `
      <div class="card completion">
        <div style="font-size:3rem;">🌿✨</div>
        <h2 data-read="You have built the full answer.">You have built the full answer.</h2>
        <div class="final-answer" data-read="${finalAnswer()}">${finalAnswer()}</div>
        <div class="footer-row" style="justify-content:center; margin-top:18px;">
          <button class="btn-secondary" id="hearBtn" type="button">Hear the answer</button>
          <button class="btn-primary" id="restartFinal" type="button">Try again</button>
        </div>
      </div>
    `;
    document.getElementById('hearBtn').addEventListener('click', ()=> speak(finalAnswer()));
    document.getElementById('restartFinal').addEventListener('click', resetState);
    maybeRead();
  }

  function render(){
    renderLives();
    switch(state.screen){
      case 0: renderScreen0(); break;
      case 1: renderScreen1(); break;
      case 2: renderScreen2(); break;
      case 3: renderScreen3(); break;
      case 4: renderScreen4(); break;
      case 5: renderScreen5(); break;
      case 6: renderScreen6(); break;
      case 7: renderScreen7(); break;
      case 8: renderScreen8(); break;
      case 9: renderScreen9(); break;
      case 10: renderScreen10(); break;
      default: renderScreen11(); break;
    }
  }

  document.getElementById('readBtn').addEventListener('click', ()=>{
    const text = readableText();
    if(text) speak(text);
  });
  document.getElementById('restartBtn').addEventListener('click', resetState);
  document.getElementById('restartOverlayBtn').addEventListener('click', resetState);
  ttsToggle.addEventListener('change', e=>{
    state.ttsOn = e.target.checked;
    if(!state.ttsOn && 'speechSynthesis' in window) speechSynthesis.cancel();
    if(state.ttsOn) maybeRead();
  });

  initVoice();
  renderLives();
  render();
})();
</script>
</body>
</html>
